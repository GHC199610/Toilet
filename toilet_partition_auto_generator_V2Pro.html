const mobileSidebarHeightKey = 'toilet-mobile-sidebar-height';

function mobileSidebarBounds() {
  const viewportH = window.innerHeight || document.documentElement.clientHeight || 0;
  const min = Math.min(260, Math.max(180, viewportH - 220));
  const max = Math.max(min, viewportH - 180);
  return {min, max};
}

function applyMobileSidebarHeight(height) {
  const n = Math.round(Number(height) || 0);
  if (!n) return;
  const {min, max} = mobileSidebarBounds();
  const next = Math.max(min, Math.min(max, n));
  document.documentElement.style.setProperty('--mobile-sidebar-height', `${next}px`);
}

function updateMobileStickyOffsets() {
  if (!isMobileViewport()) return;
  const tabs = document.querySelector('.view-tabs');
  const sheet = document.querySelector('.sheet-actions');
  if (tabs) document.documentElement.style.setProperty('--mobile-sticky-tabs-height', `${Math.ceil(tabs.getBoundingClientRect().height)}px`);
  if (sheet) document.documentElement.style.setProperty('--mobile-sticky-sheet-height', `${Math.ceil(sheet.getBoundingClientRect().height)}px`);
}

function initMobileSidebarResize() {
  const sidebar = document.querySelector('.sidebar');
  const handle = document.getElementById('mobile-sidebar-resizer');
  if (!sidebar || !handle) return;
  const saved = Number(localStorage.getItem(mobileSidebarHeightKey) || 0);
  if (saved) applyMobileSidebarHeight(saved);

  let drag = null;
  handle.addEventListener('pointerdown', e => {
    if (!isMobileViewport()) return;
    e.preventDefault();
    drag = {startY:e.clientY, startH:sidebar.getBoundingClientRect().height};
    handle.setPointerCapture?.(e.pointerId);
  });
  handle.addEventListener('pointermove', e => {
    if (!drag) return;
    applyMobileSidebarHeight(drag.startH + e.clientY - drag.startY);
  });
  const endDrag = e => {
    if (!drag) return;
    drag = null;
    const next = Math.round(sidebar.getBoundingClientRect().height);
    localStorage.setItem(mobileSidebarHeightKey, String(next));
    handle.releasePointerCapture?.(e.pointerId);
    updateMobileStickyOffsets();
    if (lastParams) drawView(lastParams, currentTab);
  };
  handle.addEventListener('pointerup', endDrag);
  handle.addEventListener('pointercancel', endDrag);
  sidebar.addEventListener('wheel', e => {
    if (!isMobileViewport()) return;
    const maxScroll = sidebar.scrollHeight - sidebar.clientHeight;
    if (maxScroll <= 0) return;
    const atTop = sidebar.scrollTop <= 0;
    const atBottom = sidebar.scrollTop >= maxScroll - 1;
    if ((e.deltaY < 0 && atTop) || (e.deltaY > 0 && atBottom)) return;
    e.stopPropagation();
  }, {passive:true});
  let sidebarTouchY = null;
  sidebar.addEventListener('touchstart', e => {
    if (!isMobileViewport()) return;
    sidebarTouchY = e.touches[0]?.clientY ?? null;
  }, {passive:true});
  sidebar.addEventListener('touchmove', e => {
    if (!isMobileViewport() || sidebarTouchY === null) return;
    const y = e.touches[0]?.clientY ?? sidebarTouchY;
    const delta = sidebarTouchY - y;
    sidebarTouchY = y;
    const maxScroll = sidebar.scrollHeight - sidebar.clientHeight;
    if (maxScroll <= 0) return;
    const atTop = sidebar.scrollTop <= 0;
    const atBottom = sidebar.scrollTop >= maxScroll - 1;
    if ((delta < 0 && atTop) || (delta > 0 && atBottom)) return;
    e.stopPropagation();
  }, {passive:true});
  sidebar.addEventListener('touchend', () => { sidebarTouchY = null; }, {passive:true});
  sidebar.addEventListener('touchcancel', () => { sidebarTouchY = null; }, {passive:true});
  window.addEventListener('resize', () => {
    const current = sidebar.getBoundingClientRect().height;
    applyMobileSidebarHeight(current);
    updateMobileStickyOffsets();
  });
  updateMobileStickyOffsets();
}

function scrollMobileTop() {

const topButtonPositionKey = 'partition-top-button-y';
let topButtonDragState = null;

function clampTopButtonY(y, btn) {
  const margin = 10;
  const height = btn?.offsetHeight || 40;
  return Math.max(margin, Math.min(window.innerHeight - height - margin, y));
}

function applyTopButtonPosition(y) {
  const btn = document.querySelector('.top-btn');
  if (!btn || !isMobileViewport()) return;
  const top = clampTopButtonY(Number(y) || window.innerHeight - 110, btn);
  btn.style.top = `${top}px`;
  btn.style.bottom = 'auto';
  btn.style.left = 'auto';
  btn.style.right = window.innerWidth <= 430 ? '0.625rem' : '0.75rem';
}

function bindTopButtonDrag() {
  const btn = document.querySelector('.top-btn');
  if (!btn) return;
  const savedY = Number(localStorage.getItem(topButtonPositionKey) || 0);
  if (savedY) applyTopButtonPosition(savedY);
  btn.addEventListener('pointerdown', e => {
    if (!isMobileViewport()) return;
    const rect = btn.getBoundingClientRect();
    topButtonDragState = {pointerId:e.pointerId, offsetX:e.clientX - rect.left, offsetY:e.clientY - rect.top, startX:e.clientX, startY:e.clientY, moved:false, suppressClick:false};
    btn.setPointerCapture?.(e.pointerId);
  });
  btn.addEventListener('pointermove', e => {
    if (!topButtonDragState || topButtonDragState.pointerId !== e.pointerId) return;
    const dx = e.clientX - topButtonDragState.startX;
    const dy = e.clientY - topButtonDragState.startY;
    if (Math.hypot(dx, dy) > 5) topButtonDragState.moved = true;
    if (!topButtonDragState.moved) return;
    e.preventDefault();
    btn.classList.add('dragging');
    const x = Math.max(10, Math.min(window.innerWidth - btn.offsetWidth - 10, e.clientX - topButtonDragState.offsetX));
    const y = clampTopButtonY(e.clientY - topButtonDragState.offsetY, btn);
    btn.style.left = `${x}px`;
    btn.style.right = 'auto';
    btn.style.top = `${y}px`;
    btn.style.bottom = 'auto';
  });
  const finish = e => {
    if (!topButtonDragState || topButtonDragState.pointerId !== e.pointerId) return;
    const moved = topButtonDragState.moved;
    topButtonDragState.suppressClick = moved;
    btn.classList.remove('dragging');
    btn.releasePointerCapture?.(e.pointerId);
    if (moved) {
      const y = clampTopButtonY(btn.getBoundingClientRect().top, btn);
      applyTopButtonPosition(y);
      localStorage.setItem(topButtonPositionKey, String(Math.round(y)));
    }
  };
  btn.addEventListener('pointerup', finish);
