.bom-area{border-top:0.5px solid var(--color-border-tertiary);padding:0.625rem 0.875rem;background:var(--color-background-secondary);max-height:6.25rem;overflow:hidden;transition:max-height .2s ease}
.bom-area.expanded{max-height:18rem;overflow:auto}
.bom-head{display:flex;align-items:center;justify-content:space-between;gap:0.75rem;margin-bottom:0.375rem}
.bom-title{font-size:0.6875rem;font-weight:500;color:var(--color-text-secondary)}
.bom-toggle{border:none;background:transparent;color:#185FA5;font-size:0.6875rem;font-weight:600;cursor:pointer;padding:0.125rem 0.25rem;white-space:nowrap}
.bom-toggle::after{content:"";display:inline-block;width:0.38rem;height:0.38rem;margin-left:0.375rem;border:0.1rem solid currentColor;border-left:0;border-top:0;transform:translateY(-0.125rem) rotate(45deg)}
.bom-area.expanded .bom-toggle::after{transform:translateY(0.125rem) rotate(225deg)}
.bom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(7.5rem,1fr));gap:0.375rem}
.bom-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0.4375rem 0.625rem}
.bom-card .name{font-size:0.625rem;color:var(--color-text-tertiary)}
.bom-card .val{font-size:0.8125rem;font-weight:500;color:var(--color-text-primary)}
.bom-card .sub{font-size:0.625rem;color:var(--color-text-tertiary)}
.export-row{display:flex;gap:0.5rem;padding:0.625rem 0.875rem;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.ex-btn{padding:0.3125rem 0.75rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem}
.ex-btn:hover{background:var(--color-background-primary);border-color:#378ADD;color:#185FA5}
body.theme-dark .ex-btn:hover{border-color:#58a6ff;color:#b9dcff}
.cv-controls{position:absolute;top:0.625rem;right:0.625rem;display:flex;align-items:center;gap:0.375rem;z-index:10}
.cv-btn{padding:0.3125rem 0.625rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:rgba(255,255,255,0.94);color:var(--color-text-secondary);font-size:0.6875rem;cursor:pointer;transition:all .15s}
.cv-btn:hover{border-color:#378ADD;color:#185FA5;background:#fff}
body.theme-dark .cv-btn{background:rgba(20,26,34,.92)}
body.theme-dark .cv-btn:hover{border-color:#58a6ff;color:#b9dcff;background:#141a22}
.zoom-info{font-size:0.6875rem;color:var(--color-text-tertiary);min-width:2.25rem;text-align:right;font-family:Consolas,'Microsoft YaHei',monospace}
@media print{
  @page{margin:0}
  body,body.theme-dark{background:#fff;color:#1f2328}
  body.theme-dark{
    --color-text-primary:#1f2328;
    --color-text-secondary:#656d76;
    --color-text-tertiary:#8c959f;
    --color-background-primary:#ffffff;
    --color-background-secondary:#f6f8fa;
    --color-border-primary:#d0d7de;
    --color-border-secondary:#d8dee4;
    --color-border-tertiary:#e1e4e8;
  }
  html,body{width:100%;height:100%;margin:0!important}
  .sidebar,.view-tabs,.sheet-actions,.bom-area,.export-row,.cv-controls{display:none!important}
  .wrap{height:100vh;margin:0;border:none;border-radius:0;display:block;overflow:hidden;background:#fff}
  .right{display:block;width:100%;height:100%}
  .canvas-area{width:100vw;height:100vh;background:#fff!important;overflow:hidden}
  canvas{width:100%!important;height:100%!important}
}

<h2 class="sr-only">卫生间隔断自动生成器 — 输入参数后自动生成平面图和立面图，并输出材料清单</h2>
<div class="wrap">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">
        <p>隔断参数设置</p>
        <span>填写后点击生成图纸</span>
      </div>
      <button class="theme-btn" id="theme-toggle" type="button" onclick="toggleTheme()" title="切换深色主题" aria-label="切换深色主题">?</button>
    </div>

    <div class="sec">
      <div class="sec-title">项目分组</div>
      <div class="group-list" id="group-list"></div>
      <button class="group-advanced-toggle" id="group-advanced-toggle" type="button" onclick="toggleAdvancedGroups()">高级分组</button>
      <button class="new-group-btn" id="new-group-btn" type="button" onclick="addGroup()" style="display:none">新建组</button>
    </div>

    <div class="sec">
      <div class="quick-title-row">
        <div class="sec-title">快速布局</div>
        <button class="switch-toggle" id="quick-ten-toggle" type="button" onclick="toggleQuickTenMode()"><span>10间+</span><span class="switch-track" aria-hidden="true"></span><span class="switch-state">关闭</span></button>
      </div>
      <div class="quick-layout" id="quick-layout"></div>
      <div class="quick-actions" style="margin-top:0.625rem">
        <div class="quick-page-actions"><button class="quick-btn" id="quick-prev-page" type="button" onclick="goQuickLayoutPage(-1)">上一页</button><button class="quick-btn" type="button" onclick="addQuickLayoutPage()">下一页</button></div>
        <div class="quick-bottom-actions">
          <button class="quick-btn primary" type="button" onclick="applyQuickLayout()">生成布局</button>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">隔间布局</div>
      <div class="field count-field"><label>间数（个） <span id="layout-target-label"></span></label><input type="number" id="p-count" value="3" min="1" max="999" step="1"></div>
      <div class="field"><label>总长度（mm）</label><input type="number" id="p-total" value="3000" min="600" max="20000" step="100"></div>
      <div class="field"><label>隔间深度（mm）</label><input type="number" id="p-depth" value="1220" min="800" max="2000" step="50"></div>
      <div class="field"><label>门宽（mm）</label><input type="number" id="p-door" value="600" min="400" max="1000" step="50"></div>
      <div class="booth-swing-panel" id="booth-door-width-panel"></div>
      <div class="field"><label>门缝（mm）</label><input type="number" id="p-gap" value="10" min="4" max="100" step="1"></div>
      <label class="check-field"><span>门板/立板子母口</span><input class="switch-source" type="checkbox" id="p-rebate"><span class="switch-toggle" id="rebate-toggle"><span class="switch-track" aria-hidden="true"></span><span class="switch-state">关闭</span></span></label>
      <div class="field"><label>单边启口值（mm）</label><input type="number" id="p-rebate-depth" value="10" min="0" max="100" step="1"></div>
    </div>

    <div class="sec elevation-only" id="height-section">
      <div class="sec-title">板材高度（mm）</div>
      <div class="field"><label>立板高度</label><input type="number" id="h-upright" value="1830" min="1000" max="2400" step="50"></div>
      <div class="field"><label>门板高度</label><input type="number" id="h-door" value="1750" min="900" max="2400" step="50"></div>
      <div class="field"><label>中隔板高度</label><input type="number" id="h-mid" value="1800" min="1000" max="2400" step="50"></div>

          <svg width="32" height="24" viewBox="0 0 32 24"><rect x="0" y="0" width="4" height="24" fill="#378ADD"/><rect x="0" y="0" width="32" height="4" fill="#378ADD"/></svg>
          左边靠墙
        </button>
        <button class="wall-btn" data-wall="right" onclick="setWall(this)">
          <svg width="32" height="24" viewBox="0 0 32 24"><rect x="28" y="0" width="4" height="24" fill="#378ADD"/><rect x="0" y="0" width="32" height="4" fill="#378ADD"/></svg>
          右边靠墙
        </button>
        <button class="wall-btn" data-wall="back" onclick="setWall(this)">

  </div>

  <div class="right">
    <div class="view-tabs">
      <div class="vtab active" id="tab-plan" onclick="switchTab('plan')">平面图</div>
      <div class="vtab" id="tab-front" onclick="switchTab('front')">正立面图</div>
      <div class="vtab" id="tab-side" onclick="switchTab('side')">侧立面图</div>
      <div class="top-widths"><label>单间净宽</label><div class="width-card-row" id="width-card-row"></div></div>
      <div class="plan-note-field"><label for="plan-note-input">内容输入</label><input type="text" id="plan-note-input" placeholder="标题、备注标签"></div>
      <div class="paper-select"><label for="paper-size">纸张</label><select id="paper-size" onchange="setPaperSize(this.value)"><option value="a4">A4</option><option value="a3">A3</option><option value="auto">自适应</option></select></div>
    </div>
    <div class="sheet-actions" id="sheet-actions">
      <div class="quick-history-actions global-history-actions" aria-label="全局历史操作">
        <button class="quick-icon-btn" type="button" onclick="undoLayout()" title="撤销" aria-label="撤销"><svg viewBox="0 0 24 24"><path d="M9 7 5 11l4 4"/><path d="M5 11h8a5 5 0 0 1 5 5v1"/></svg></button>
        <button class="quick-icon-btn" type="button" onclick="redoLayout()" title="恢复" aria-label="恢复"><svg viewBox="0 0 24 24"><path d="m15 7 4 4-4 4"/><path d="M19 11h-8a5 5 0 0 0-5 5v1"/></svg></button>
      </div>
      <button class="sheet-action-btn" type="button" onclick="autoDistributeSheets()">自动分配图纸</button>
      <button class="sheet-action-btn expand" type="button" onclick="toggleUrinalPanel()">小便板</button>
      <span class="sheet-page-info" id="sheet-page-info">第 1/1 页</span>
    </div>
    <div class="urinal-panel" id="urinal-panel">
      <label>数量<input type="number" id="u-count" min="0" step="1" value="0"></label>
      <label>宽度<input type="number" id="u-width" min="1" step="10" value="400"></label>
      <label>高度<input type="number" id="u-height" min="1" step="10" value="900"></label>
      <label>厚度<input type="number" id="u-thick" min="1" step="1" value="12"></label>
      <label>形状<select id="u-shape"><option value="矩形">矩形</option><option value="异形">异形</option></select></label>
      <label>开孔<select id="u-hole"><option value="无开孔">无</option><option value="有开孔">有</option></select></label>
      <label class="wide">备注<input type="text" id="u-note" placeholder="选填"></label>
      <div class="urinal-panel-actions"><button type="button" onclick="toggleUrinalPanel(false)">取消</button><button class="primary" type="button" onclick="saveUrinalSpec()">保存</button></div>
    </div>
    <div class="canvas-area" id="carea">
      <canvas id="cv"></canvas>
      <div class="cv-controls">

    <div class="bom-area" id="bom-area">
      <div class="bom-head"><div class="bom-title">材料清单</div><button class="bom-toggle" id="bom-toggle" type="button" onclick="toggleBomArea()">展开更多</button></div>

    <div class="export-row">

      <button class="ex-btn" id="btn-export-all" type="button"><i class="ti ti-file-export" aria-hidden="true" style="font-size:14px"></i> 导出全部视图</button>
      <button class="ex-btn" id="btn-print-pdf" type="button"><i class="ti ti-printer" aria-hidden="true" style="font-size:14px"></i> PDF打印</button>

<script>
const cv = document.getElementById('cv');
let ctx = cv.getContext('2d');
let wallMode = 'three';
let swingMode = 'in-right';
let currentTab = 'plan';
let lastParams = null;
let zoomScale = 1;
let panX = 0, panY = 0;
let isDragging = false;
let sheetOrderDrag = null;
let previewSheetOrder = null;
let suppressNextPlanClick = false;
let pendingSheetOrderDrag = null;
let sheetDragVisual = null;
let sheetDragNudge = null;
let dragStartX = 0, dragStartY = 0;
let dragStartPanX = 0, dragStartPanY = 0;
let activeGroupId = 1;
let activeRowId = 1;
let selectionScope = 'row';
let selectedBoothIndex = null;
let selectedBoothRef = null;
let selectedDepthPanelRef = null;
let rowAnimation = null;
let planHitAreas = [];
let openGroupIds = new Set([1]);
let lastAutoTotal = 3000;
let committedWidthsText = '';
let paperSize = localStorage.getItem('partition-paper-size') || 'a4';
let canvasMode = paperSize === 'auto' ? 'free' : 'sheets';
let planAnnotationScale = 1;
let canvasPixelRatio = window.devicePixelRatio || 1;
let drawingForExport = false;
let currentPlanPage = 0;
const QUALITY_RENDER_SCALE = 4;
const PDF_RENDER_SCALE = 8;
const PRINT_RENDER_SCALE = 4;
let pdfLibPromise = null;
let svgPrintSeq = 0;
let quickLayoutRows = [['','','']];
let quickLayoutPages = [[['','','']]];
let activeQuickPage = 0;
let quickTenMode = false;
let widthCards = ['', '', ''];
let undoStack = [];
let redoStack = [];
let pendingSelectionDraw = 0;
let advancedGroupsVisible = false;
let urinalSpec = {count:0, width:400, height:900, thick:12, shape:'矩形', hole:'无开孔', note:''};
let quickNavKeep = null;
let noteInputValue = '';
let sheetHeaderText = '';
const GROUP_NAME_PLACEHOLDER = '备注标签';
const swingDefs = {
  'in-left': {label:'左内开', hinge:'left', opensUp:true, vx:8, y1:6, y2:30, arcEndX:32, arcEndY:30, arcSweep:1},
  'in-right': {label:'右内开', hinge:'right', opensUp:true, vx:40, y1:6, y2:30, arcEndX:16, arcEndY:30, arcSweep:0},
  'out-left': {label:'左外开', hinge:'left', opensUp:false, vx:8, y1:30, y2:6, arcEndX:32, arcEndY:6, arcSweep:0},
  'out-right': {label:'右外开', hinge:'right', opensUp:false, vx:40, y1:30, y2:6, arcEndX:16, arcEndY:6, arcSweep:1},
};
const swingOrder = ['in-left', 'in-right', 'out-left', 'out-right'];
const defaultRow = {id:1, layoutType:'cell', layoutRow:1, layoutCol:1, enabled:true, count:3, widthsText:'', total:3000, depth:1220, doorW:600, doorGap:10, rebate:false, rebateDepth:10, swing:'in-right', boothSwings:['in-right','in-right','in-right'], noDoorBooths:[], depthPanelSpecials:[], hUpright:1830, hDoor:1750, hMid:1800, hVis:1830, tPanel:12, wall:'three'};
const blankRow = {...defaultRow, enabled:false};
let groups = [
  {id:1, name:'', rows:[{...defaultRow}]},
  {id:2, name:'', rows:[{...blankRow}]},
  {id:3, name:'', rows:[{...blankRow}]},
  {id:4, name:'', rows:[{...blankRow}]},
  {id:5, name:'', rows:[{...blankRow}]},
  {id:6, name:'', rows:[{...blankRow}]}
];

function applyTheme(theme) {
  const isDark = theme === 'dark';
  document.body.classList.toggle('theme-dark', isDark);
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = isDark ? '?' : '?';
    btn.title = isDark ? '切换浅色主题' : '切换深色主题';
    btn.setAttribute('aria-label', btn.title);
  }
}

function toggleTheme() {
  const next = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
  localStorage.setItem('partition-theme', next);
  applyTheme(next);
}

applyTheme(localStorage.getItem('partition-theme') || 'light');
applyPaperSize();

function swingIcon(key) {
  const d = swingDefs[key];
  return `<svg viewBox="0 0 48 36"><path d="M${d.vx} ${d.y1} V${d.y2}" fill="none" stroke="#378ADD" stroke-width="2"/><path d="M${d.vx} ${d.y1} A24 24 0 0 ${d.arcSweep} ${d.arcEndX} ${d.arcEndY}" fill="none" stroke="#9fc4ea" stroke-width="1.2" stroke-dasharray="5 4"/></svg>`;
}

function renderSwingButtons() {
  const grid = document.getElementById('swing-grid');
  if (!grid) return;
  const row = activeRow();
  const selectedSwing = isSelectedBooth(activeGroupId, activeRowId, selectedBoothIndex) && row ? boothSwingAt(row, selectedBoothIndex) : swingMode;
  grid.innerHTML = swingOrder.map(key => `
    <button class="wall-btn ${key === selectedSwing ? 'active' : ''}" data-swing="${key}" onclick="setSwing(this)">
      ${swingIcon(key)}
      ${swingDefs[key].label}
    </button>`).join('');
}

function normalizeBoothSwings(values, count, fallback = swingMode) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => swingDefs[source[i]] ? source[i] : fallback);
}

function normalizeNoDoorBooths(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => source[i] === true);
}

function boothSwingAt(p, index) {
  return swingDefs[p.boothSwings?.[index]] ? p.boothSwings[index] : (p.swing || 'in-right');
}

function hasDoorAt(p, index) {
  return normalizeNoDoorBooths(p.noDoorBooths, Math.max(1, Number(p.count) || 1))[index] !== true;
}

function normalizeBoothNotes(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => String(source[i] || ''));
}

function depthPanelCount(row) {
  return Math.max(2, (Number(row?.count) || 1) + 1);
}

function depthPanelName(row, index) {
  const count = Math.max(1, Number(row?.count) || 1);
  if (index === 0) return '左见光板';
  if (index === count) return '右见光板';
  return `第${index}道中隔板`;
}

function depthPanelSelectable(row, index) {
  if (!row) return false;
  const c = compute(row);
  const count = Math.max(1, Number(row.count) || 1);
  if (index === 0) return !c.hasLeft;
  if (index === count) return !c.hasRight;
  return index > 0 && index < count;
}

function normalizeDepthPanelSpecials(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => {
    const item = source[i] || {};
    const protrusion = Math.max(0, Math.round(Number(item.protrusion) || 0));
    const depth = Math.max(0, Math.round(Number(item.depth) || 0));
    return {protrusion, depth};
  });
}

function depthPanelActualDepth(row, index) {
  const specials = normalizeDepthPanelSpecials(row?.depthPanelSpecials, depthPanelCount(row));
  const item = specials[index] || {};
  const baseDepth = Number(row?.depth) || 0;
  if (item.depth > 0) return Math.max(0, Math.min(baseDepth, item.depth));
  if (item.protrusion > 0) return Math.max(0, Math.round(baseDepth - Math.min(baseDepth, item.protrusion)));
  return baseDepth;
}

function depthPanelProtrusion(row, index) {
  const actual = depthPanelActualDepth(row, index);
  return Math.max(0, Math.round((Number(row?.depth) || 0) - actual));
}

function specialDepthPanelItems(row) {
  const count = depthPanelCount(row);
  const specials = normalizeDepthPanelSpecials(row?.depthPanelSpecials, count);
  return specials.map((item, index) => {
    const protrusion = depthPanelProtrusion(row, index);
    if (protrusion <= 0 && !(item.depth > 0 && item.depth !== Number(row?.depth))) return null;
    if (!depthPanelSelectable(row, index)) return null;
    return {
      index,
      name: depthPanelName(row, index),
      depth: depthPanelActualDepth(row, index),
      protrusion
    };
  }).filter(Boolean);
}

function normalizeBoothDoorWidths(values, count, fallback = 0) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => {
    const n = Number(source[i]);
    return Number.isFinite(n) && n > 0 ? Math.round(n) : 0;
  });
}

function rowDoorWidthOverrides(row, count = row?.count) {
  return normalizeBoothDoorWidths(row?.boothDoorWidths, Math.max(1, Number(count) || 1), 0);
}

function boothDoorWidthAt(p, index) {
  const n = Number(p.boothDoorWidths?.[index]);
  return Number.isFinite(n) && n > 0 ? Math.round(n) : (Number(p.doorW) || 600);
}

function boothHasDoorWidthOverride(p, index) {
  const n = Number(p?.boothDoorWidths?.[index]);
  return Number.isFinite(n) && n > 0;
}

function maxDoorWidthForBooth(row, index) {
  if (!row) return 1200;
  const p = {...row, boothDoorWidths: rowDoorWidthOverrides(row, row.count)};
  const customWidthsRaw = parseWidths(p.widthsText);
  const fixedWidths = Array.from({length:p.count}, (_, i) => {
    const value = customWidthsRaw[i];
    return Number.isFinite(value) && value > 0 ? Math.round(value) : null;
  });
  const fixedTotal = fixedWidths.reduce((sum, w) => sum + (Number.isFinite(w) ? w : 0), 0);
  const remainingCount = fixedWidths.filter(w => !Number.isFinite(w)).length;
  const fillWidths = splitInteger(Math.max(0, p.total - fixedTotal), remainingCount);
  let fillIndex = 0;
  const boothWidths = Array.from({length:p.count}, (_, i) => Number.isFinite(fixedWidths[i]) ? fixedWidths[i] : (fillWidths[fillIndex++] || Math.round(p.total / Math.max(1, p.count))));
  const minEdgePanel = 80;
  const minMiddlePanel = 180;
  const outerReserve = (index === 0 ? minEdgePanel : 0) + (index === p.count - 1 ? minEdgePanel : 0);
  let maxInstall = Math.max(0, Math.round((boothWidths[index] || 0) - (p.doorGap || 10) - outerReserve));
  const gap = Math.max(4, Number(p.doorGap) || 10);
  const installAt = (i, candidate = null) => {
    const source = candidate === null ? (p.boothDoorWidths[i] || p.doorW) : candidate;
    return rebateSmallSize(source, p, 'double');
  };
  const sidePairAt = (i, install) => {
    const available = Math.max(0, Math.round((boothWidths[i] || 0) - install - gap));
    const pair = splitInteger(available, 2);
    if (i === 0 && pair[0] < minEdgePanel && available >= minEdgePanel) return [minEdgePanel, Math.max(0, available - minEdgePanel)];
    if (i === p.count - 1 && pair[1] < minEdgePanel && available >= minEdgePanel) return [Math.max(0, available - minEdgePanel), minEdgePanel];
    return pair;
  };
  const candidateOk = candidateBig => {
    const candidateInstall = rebateSmallSize(candidateBig, p, 'double');
    const currentPair = sidePairAt(index, candidateInstall);
    if (index === 0 && currentPair[0] < minEdgePanel) return false;
    if (index === p.count - 1 && currentPair[1] < minEdgePanel) return false;
    if (index > 0) {
      const leftPair = sidePairAt(index - 1, installAt(index - 1));
      if (leftPair[1] + currentPair[0] < minMiddlePanel) return false;
    }
    if (index < p.count - 1) {
      const rightPair = sidePairAt(index + 1, installAt(index + 1));
      if (currentPair[1] + rightPair[0] < minMiddlePanel) return false;
    }
    return true;
  };
  let low = 0, high = p.rebate ? maxInstall + (p.rebateDepth || 0) * 2 : maxInstall;
  while (low < high) {
    const mid = Math.ceil((low + high) / 2);
    if (candidateOk(mid)) low = mid;
    else high = mid - 1;
  }
  return low;
}

function updateDepthPanelSpecial(index, patch) {
  const target = selectedDepthPanelRow();
  if (!target) return;
  const {row} = target;
  const count = depthPanelCount(row);
  if (index < 0 || index >= count || !depthPanelSelectable(row, index)) return;
  row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, count);
  const baseDepth = Math.max(0, Number(row.depth) || 0);
  const next = {...row.depthPanelSpecials[index], ...patch};
  if (Object.prototype.hasOwnProperty.call(patch, 'depth')) {
    next.depth = Math.max(0, Math.min(baseDepth, Math.round(Number(patch.depth) || 0)));
    next.protrusion = next.depth > 0 ? Math.max(0, baseDepth - next.depth) : 0;
  } else if (Object.prototype.hasOwnProperty.call(patch, 'protrusion')) {
    next.protrusion = Math.max(0, Math.min(baseDepth, Math.round(Number(patch.protrusion) || 0)));
    next.depth = next.protrusion > 0 ? Math.max(0, baseDepth - next.protrusion) : 0;
  }
  row.depthPanelSpecials[index] = next;
}

function activeGroup() {
  return groups.find(g => g.id === activeGroupId) || groups[0];
}

function ensureRows(group) {
  if (!group.rows) {
    group.rows = [{...group, id:1}];
  }
  return group.rows;
}

function activeRow() {
  const rows = ensureRows(activeGroup());
  return rows.find(r => r.id === activeRowId) || rows[0];
}

function allRows() {
  return groups.flatMap(group => ensureRows(group).map((row, index) => ({group, row, index})));
}

function activeGroupRows() {
  const group = activeGroup();
  return ensureRows(group).map((row, index) => ({group, row, index}));
}

function drawableGroupRows() {
  return allRows().filter(item => item.row.enabled === true);
}

function rowBoothStartIndex(group = activeGroup(), row = activeRow()) {
  const rows = ensureRows(group);
  let start = 0;
  for (const r of rows) {
    if (r.id === row?.id) break;
    start += Math.max(1, Number(r.count) || 1);
  }
  return start;
}

function findBoothByCode(code) {
  const match = String(code || '').trim().toUpperCase().match(/^([A-Z])(\d+)$/);
  if (!match) return null;
  const group = groups.find(g => g.name?.replace('组', '').toUpperCase() === match[1]);
  const targetNo = Number(match[2]);
  if (!group || !Number.isFinite(targetNo) || targetNo < 1) return null;
  let start = 0;
  for (const row of ensureRows(group)) {
    const count = Math.max(1, Number(row.count) || 1);
    if (targetNo <= start + count) {
      return {group, row, index: targetNo - start - 1};
    }
    start += count;
  }
  return null;
}

function saveActiveGroup(enable = false) {
  const row = activeRow();
  if (!row) return;
  const params = getParams();
  if (selectionScope === 'group') {
    ensureRows(activeGroup()).forEach(targetRow => applyGroupParamsToRow(targetRow, params, enable));
    return;
  }
  applyParamsToRow(row, params, enable);
}

function applyGroupParamsToRow(row, params, enable = false) {
  const keep = {
    count: row.count,
    total: row.total,
    widthsText: row.widthsText,
    layoutType: row.layoutType,
    layoutRow: row.layoutRow,
    layoutCol: row.layoutCol,
    doorInstallWidths: row.doorInstallWidths,
    doorWidths: row.doorWidths,
    boothDoorWidths: row.boothDoorWidths,
    noDoorBooths: row.noDoorBooths,
    boothNotes: row.boothNotes,
    depthPanelSpecials: row.depthPanelSpecials,
    note: row.note
  };
  applyParamsToRow(row, {...params, ...keep}, enable);
}

function applyParamsToRow(row, params, enable = false) {
  const nextEnabled = enable ? true : row.enabled === true;
  const boothSwings = row === activeRow() ? params.boothSwings : normalizeBoothSwings(row.boothSwings, params.count, params.swing || swingMode);
  const noDoorBooths = normalizeNoDoorBooths(row === activeRow() ? params.noDoorBooths : row.noDoorBooths, params.count);
  const boothDoorWidths = rowDoorWidthOverrides(row === activeRow() ? params : row, params.count);
  const depthPanelSpecials = normalizeDepthPanelSpecials(row === activeRow() ? params.depthPanelSpecials : row.depthPanelSpecials, depthPanelCount(params));
  Object.assign(row, {...params, boothSwings, noDoorBooths, boothDoorWidths, depthPanelSpecials}, {enabled: nextEnabled});
  row.boothSwings = normalizeBoothSwings(row.boothSwings, row.count, row.swing || swingMode);
  row.noDoorBooths = normalizeNoDoorBooths(row.noDoorBooths, row.count);
  row.boothNotes = normalizeBoothNotes(row.boothNotes, row.count);
  row.boothDoorWidths = rowDoorWidthOverrides(row, row.count);
  row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, depthPanelCount(row));
}

function syncQuickLayoutFromGroup(group = activeGroup()) {
  const rows = ensureRows(group).filter(row => row.enabled === true);
  if (!rows.length) {
    quickLayoutRows = [['', '', '']];
    quickLayoutPages = [[['', '', '']]];
    activeQuickPage = 0;
    return;
  }
  const maxPage = Math.max(0, ...rows.map(row => Number(row.sheetPage) || 0));
  const nextPages = Array.from({length: maxPage + 1}, () => [['', '', '']]);
  rows.forEach(row => {
    const pageIndex = Math.max(0, Number(row.sheetPage) || 0);
    const rowIndex = Math.max(0, (Number(row.layoutRow) || 1) - 1);
    const colIndex = Math.max(0, (Number(row.layoutCol) || 1) - 1);
    while (nextPages[pageIndex].length <= rowIndex) nextPages[pageIndex].push(['', '', '']);
    while (nextPages[pageIndex][rowIndex].length <= colIndex) nextPages[pageIndex][rowIndex].push('');
    nextPages[pageIndex][rowIndex][colIndex] = String(Math.max(1, Number(row.count) || 1));
  });
  quickLayoutPages = nextPages;
  activeQuickPage = Math.max(0, Math.min(activeQuickPage, quickLayoutPages.length - 1));
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  normalizeQuickRows();
}

function syncWidthCardsFromText(text = '') {
  const values = splitWidthTextParts(text).map(value => value.replace(/\D/g, '').slice(0, 5));
  const count = currentWidthCardCount();
  widthCards = Array.from({length: count}, (_, index) => values[index] || '');
  normalizeWidthCards();
}

function splitWidthTextParts(text = '') {
  const raw = String(text || '');
  if (!raw.trim()) return [];
  return /[,，]/.test(raw) ? raw.split(/[,，]/) : raw.trim().split(/\s+/);
}

function currentWidthCardCount() {
  return Math.max(1, Number(activeRow()?.count) || Number(document.getElementById('p-count')?.value) || 1);
}

function normalizeWidthCards() {
  widthCards = widthCards.map(value => String(value || ''));
  const count = currentWidthCardCount();
  while (widthCards.length < count) widthCards.push('');
  if (widthCards.length > count) widthCards = widthCards.slice(0, count);
}

function widthCardsToText() {
  normalizeWidthCardBudget();
  const count = currentWidthCardCount();
  return widthCards.slice(0, count).map(value => Number(value) > 0 ? String(value) : '').join(',');
}

function normalizeWidthCardBudget() {
  const count = currentWidthCardCount();
  const total = Math.max(0, Number(activeRow()?.total) || Number(document.getElementById('p-total')?.value) || 0);
  for (let i = 0; i < count; i++) {
    const value = Number(widthCards[i]);
    if (!(value > 0)) continue;
    const otherTotal = widthCards.slice(0, count).reduce((sum, item, idx) => idx === i ? sum : sum + (Number(item) > 0 ? Number(item) : 0), 0);
    const reserve = widthCards.slice(0, count).reduce((sum, item, idx) => idx === i || Number(item) > 0 ? sum : sum + minValidBoothWidth(idx), 0);
    const max = Math.max(0, total - otherTotal - reserve);
    if (value > max) widthCards[i] = max > 0 ? String(max) : '';
  }
}

function renderWidthCards(focusIndex = null, selectText = true) {
  normalizeWidthCards();
  const row = document.getElementById('width-card-row');
  if (!row) return;
  const filledCount = widthCards.filter(v => Number(v) > 0).length;
  row.innerHTML = widthCards.map((value, index) => {
    const lockedAuto = !value && filledCount >= currentWidthCardCount() - 1;
    return `<input class="width-card" inputmode="numeric" maxlength="5" placeholder="${index + 1}" value="${lockedAuto ? '自动' : value}" data-width-index="${index}" ${lockedAuto ? 'disabled title="自动分配"' : 'oninput="handleWidthCardInput(this)" onkeydown="handleWidthCardKey(event)"'}>`;
  }).join('');
  if (focusIndex !== null) {
    const el = row.querySelector(`[data-width-index="${focusIndex}"]`);
    if (el && !el.disabled) {
      el.focus();
      if (selectText) el.select();
      else {
        const end = el.value.length;
        el.setSelectionRange(end, end);
      }
    }
  }
}

function commitWidthCards() {
  committedWidthsText = widthCardsToText();
}

function handleWidthCardInput(input) {
  const index = Number(input.dataset.widthIndex);
  const value = input.value.replace(/\D/g, '').slice(0, 5);
  if (input.value !== value) input.value = value;
  widthCards[index] = clampWidthCardValue(index, value);
  renderWidthCards(index, false);
  if (isWidthCardReadyToCommit(index)) {
    commitWidthCards();
    refreshDrawing(false);
  }
}

function isWidthCardReadyToCommit(index) {
  const value = Number(widthCards[index]);
  if (!widthCards[index]) return true;
  return value >= minValidBoothWidth(index);
}

function minValidBoothWidth(index) {
  const params = getParams();
  const count = currentWidthCardCount();
  const doorInstallW = rebateSmallSize(params.doorW, params, 'double');
  const edgeReserve = (index === 0 ? 100 : 0) + (index === count - 1 ? 100 : 0);
  return Math.max(1, doorInstallW + params.doorGap + edgeReserve);
}

function clampWidthCardValue(index, value) {
  const n = parseInt(value, 10);
  if (!Number.isFinite(n) || n <= 0) return '';
  const total = Math.max(0, Number(activeRow()?.total) || Number(document.getElementById('p-total')?.value) || 0);
  const otherTotal = widthCards.reduce((sum, item, i) => i === index ? sum : sum + (Number(item) > 0 ? Number(item) : 0), 0);
  const count = currentWidthCardCount();
  const reserve = widthCards.slice(0, count).reduce((sum, item, i) => i === index || Number(item) > 0 ? sum : sum + minValidBoothWidth(i), 0);
  const max = Math.max(0, total - otherTotal - reserve);
  return String(Math.min(n, max));
}

function handleWidthCardKey(e) {
  const input = e.currentTarget;
  const index = Number(input.dataset.widthIndex);
  if (e.key === 'Tab') {
    e.preventDefault();
    const nextIndex = Math.min(index + 1, currentWidthCardCount() - 1);
    const filledCount = widthCards.filter(v => Number(v) > 0).length;
    if (nextIndex !== index && !(filledCount >= currentWidthCardCount() - 1 && !widthCards[nextIndex])) renderWidthCards(nextIndex);
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    commitWidthCards();
    refreshDrawing(false);
    return;
  }
  if (e.key === 'Backspace' && !input.value && index > 0) {
    e.preventDefault();
    renderWidthCards(index - 1);
  }
}

function cloneState() {
  return {
    groups: JSON.parse(JSON.stringify(groups)),
    activeGroupId,
    activeRowId,
    selectionScope,
    selectedBoothIndex,
    selectedBoothRef: selectedBoothRef ? {...selectedBoothRef} : null,
    selectedDepthPanelRef: selectedDepthPanelRef ? {...selectedDepthPanelRef} : null,
    quickLayoutRows: JSON.parse(JSON.stringify(quickLayoutRows)),
    quickLayoutPages: JSON.parse(JSON.stringify(quickLayoutPages)),
    activeQuickPage,
    noteInputValue,
    sheetHeaderText,
    currentPlanPage
  };
}

function restoreState(state) {
  groups = JSON.parse(JSON.stringify(state.groups));
  activeGroupId = state.activeGroupId;
  activeRowId = state.activeRowId;
  selectionScope = state.selectionScope;
  selectedBoothIndex = state.selectedBoothIndex;
  selectedBoothRef = state.selectedBoothRef ? {...state.selectedBoothRef} : null;
  selectedDepthPanelRef = state.selectedDepthPanelRef ? {...state.selectedDepthPanelRef} : null;
  quickLayoutPages = JSON.parse(JSON.stringify(state.quickLayoutPages || [state.quickLayoutRows || [['','','']]]));
  activeQuickPage = Math.max(0, Math.min(Number(state.activeQuickPage) || 0, quickLayoutPages.length - 1));
  quickLayoutRows = quickLayoutPages[activeQuickPage] || [['','','']];
  noteInputValue = state.noteInputValue || state.planNoteText || '';
  sheetHeaderText = state.sheetHeaderText || '';
  const noteInput = document.getElementById('plan-note-input');
  if (noteInput) noteInput.value = noteInputValue;
  currentPlanPage = state.currentPlanPage || 0;
  const group = activeGroup();
  const row = activeRow();
  if (group && row) loadGroupToForm(group, row);
  renderGroups(false);
  renderQuickLayout();
  lastParams = getParams();
  drawView(lastParams, currentTab);
  renderBOM(lastParams);
}

function pushHistory() {
  undoStack.push(cloneState());
  if (undoStack.length > 5) undoStack.shift();
  redoStack = [];
}

function undoLayout() {
  if (!undoStack.length) return;
  redoStack.push(cloneState());
  const state = undoStack.pop();
  restoreState(state);
}

function redoLayout() {
  if (!redoStack.length) return;
  undoStack.push(cloneState());
  if (undoStack.length > 5) undoStack.shift();
  const state = redoStack.pop();
  restoreState(state);
}

function normalizeQuickRows() {
  if (!Array.isArray(quickLayoutPages) || !quickLayoutPages.length) quickLayoutPages = [quickLayoutRows || [['','','']]];
  if (!quickLayoutPages[activeQuickPage]) quickLayoutPages[activeQuickPage] = [['','','']];
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  quickLayoutRows = quickLayoutRows.map((row, rowIndex) => {
    const next = row.map(value => String(value || ''));
    while (next.length < 3) next.push('');
    if (quickNavKeep && quickNavKeep.row === rowIndex) {
      while (next.length <= quickNavKeep.col) next.push('');
    }
    const hasValue = next.some(value => Number(value) > 0);
    if (hasValue) {
      while (next.length > 3 && next[next.length - 1] === '' && next[next.length - 2] === '' && !(quickNavKeep && quickNavKeep.row === rowIndex && quickNavKeep.col >= next.length - 1)) next.pop();
      if (next[next.length - 1] !== '') next.push('');
    }
    return next;
  });
  if (!quickLayoutRows.length) quickLayoutRows = [['','','']];
  quickLayoutPages[activeQuickPage] = quickLayoutRows;
}

function syncQuickPageRows() {
  if (!Array.isArray(quickLayoutPages) || !quickLayoutPages.length) quickLayoutPages = [quickLayoutRows || [['','','']]];
  quickLayoutPages[activeQuickPage] = quickLayoutRows;
}

function quickLayoutHasValues() {
  syncQuickPageRows();
  return quickLayoutPages.some(page => page.some(row => row.some(value => Number(value) > 0)));
}

function renderQuickLayout(focusRef = null) {
  renderQuickTenToggle();
  normalizeQuickRows();
  const box = document.getElementById('quick-layout');
  if (!box) return;
  const prevBtn = document.getElementById('quick-prev-page');
  if (prevBtn) prevBtn.disabled = activeQuickPage <= 0;
  box.innerHTML = `<div class="quick-row-head"><span>第 ${activeQuickPage + 1} 页</span><span>共 ${quickLayoutPages.length} 页</span></div>` + quickLayoutRows.map((row, rowIndex) => `
    <div class="quick-row">
      <div class="quick-row-head"><span>第 ${rowIndex + 1} 排</span><span>${row.filter(v => Number(v) > 0).length} 列</span></div>
      <div class="quick-cells">
        ${row.map((value, colIndex) => `<input class="quick-cell ${isQuickCellActive(rowIndex, colIndex) ? 'active' : ''}" inputmode="numeric" maxlength="${quickTenMode ? 2 : 1}" value="${value}" data-quick-row="${rowIndex}" data-quick-col="${colIndex}" onfocus="selectQuickCell(this)" oninput="handleQuickInput(this)" onkeydown="handleQuickKey(event)">`).join('')}
      </div>
    </div>`).join('');
  if (focusRef) {
    const el = box.querySelector(`[data-quick-row="${focusRef.row}"][data-quick-col="${focusRef.col}"]`);
    if (el) { el.focus(); el.select(); }
  }
}

function renderQuickTenToggle() {
  const btn = document.getElementById('quick-ten-toggle');
  if (!btn) return;
  btn.classList.toggle('active', quickTenMode);
  const state = btn.querySelector('.switch-state');
  if (state) state.textContent = quickTenMode ? '开启' : '关闭';
}

function toggleQuickTenMode() {
  quickTenMode = !quickTenMode;
  renderQuickTenToggle();
  renderQuickLayout();
}

function renderRebateToggle() {
  const input = document.getElementById('p-rebate');
  const toggle = document.getElementById('rebate-toggle');
  if (!input || !toggle) return;
  toggle.classList.toggle('active', input.checked);
  const state = toggle.querySelector('.switch-state');
  if (state) state.textContent = input.checked ? '开启' : '关闭';
}

function isQuickCellActive(rowIndex, colIndex) {
  const row = activeRow();
  return row && (row.layoutRow || 1) === rowIndex + 1 && (row.layoutCol || 1) === colIndex + 1 && selectionScope !== 'group';
}

function selectQuickCell(input) {
  const rowIndex = Number(input.dataset.quickRow);
  const colIndex = Number(input.dataset.quickCol);
  const group = activeGroup();
  const rows = ensureRows(group);
  normalizeLayoutGrid(group);
  const target = rows.find(r => (r.sheetPage || 0) === activeQuickPage && (r.layoutRow || 1) === rowIndex + 1 && (r.layoutCol || 1) === colIndex + 1);
  if (!target) {
    quickNavKeep = {row: rowIndex, col: colIndex};
    return;
  }
  saveActiveGroup();
  activeRowId = target.id;
  selectionScope = 'row';
  clearSelectedBooth();
  loadGroupToForm(group, target);
  renderGroups(false);
  renderQuickLayout({row: rowIndex, col: colIndex});
  drawView(getParams(), currentTab);
}

function handleQuickInput(input) {
  const row = Number(input.dataset.quickRow);
  const col = Number(input.dataset.quickCol);
  const value = input.value.replace(/\D/g, '').slice(0, quickTenMode ? 2 : 1);
  quickNavKeep = null;
  if (quickLayoutRows[row][col] !== value) pushHistory();
  quickLayoutRows[row][col] = value;
  syncQuickPageRows();
  if (quickTenMode && value.length === 1) return;
  syncQuickCellToLayout(row, col, value);
  const isLast = col === quickLayoutRows[row].length - 1;
  if (value && isLast) quickLayoutRows[row].push('');
  const shouldAutoAdvance = value && (!quickTenMode || value.length >= 2);
  const nextCol = shouldAutoAdvance ? Math.min(col + 1, quickLayoutRows[row].length - 1) : col;
  renderQuickLayout(value ? {row, col: nextCol} : null);
}

function syncQuickCellToLayout(rowIndex, colIndex, value) {
  const count = parseInt(value, 10);
  if (!Number.isFinite(count) || count <= 0) return;
  document.getElementById('p-count').value = count;
  document.getElementById('p-total').value = count * 1000;
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group, {page: activeQuickPage, row: rowIndex + 1, col: colIndex + 1});
  if (target) {
    activeRowId = target.id;
    selectionScope = 'row';
    clearSelectedBooth();
    loadGroupToForm(group, target);
    syncWidthCardsFromText(target.widthsText || '');
    renderWidthCards();
  }
  updateLayoutTargetLabel();
  renderGroups(false);
  refreshDrawing(false, false, false);
}

function buildRowsFromQuickLayout(group = activeGroup(), activeCell = null) {
  normalizeQuickRows();
  syncQuickPageRows();
  const existingRows = ensureRows(group);
  normalizeLayoutGrid(group);
  const byCell = new Map(existingRows.map(row => [`${row.sheetPage || 0}:${row.layoutRow || 1}:${row.layoutCol || 1}`, row]));
  const template = activeRow() || existingRows.find(row => row.enabled === true) || defaultRow;
  const generated = [];
  let id = 1;
  let activeTarget = null;
  quickLayoutPages.forEach((pageRows, pageIndex) => pageRows.forEach((row, rowIndex) => {
    row.forEach((value, colIndex) => {
      const count = parseInt(value, 10);
      if (!Number.isFinite(count) || count <= 0) return;
      const layoutRow = rowIndex + 1;
      const layoutCol = colIndex + 1;
      const existing = byCell.get(`${pageIndex}:${layoutRow}:${layoutCol}`);
      const base = existing || template;
      const next = {
        ...base,
        id: id++,
        layoutType: 'cell',
        layoutRow,
        layoutCol,
        sheetPage: pageIndex,
        enabled: true,
        count,
        total: count * 1000,
        widthsText: '',
        doorInstallWidths: undefined,
        doorWidths: undefined,
        boothDoorWidths: Array.from({length: count}, () => 0),
        noDoorBooths: normalizeNoDoorBooths(base.noDoorBooths, count),
        boothNotes: normalizeBoothNotes(base.boothNotes, count),
        depthPanelSpecials: normalizeDepthPanelSpecials(base.depthPanelSpecials, count + 1)
      };
      next.boothSwings = normalizeBoothSwings(base.boothSwings, count, next.swing || swingMode);
      generated.push(next);
      if (activeCell && (activeCell.page ?? activeQuickPage) === pageIndex && activeCell.row === layoutRow && activeCell.col === layoutCol) activeTarget = next;
    });
  }));
  if (!generated.length) return null;
  group.rows = generated;
  return activeTarget || generated[0];
}

function commitQuickLayoutForFreeCanvas() {
  if (!(currentTab === 'plan' && canvasMode === 'free')) return;
  if (!quickLayoutHasValues()) return;
  const group = activeGroup();
  const activeCell = activeRow() ? {page: activeRow().sheetPage || 0, row: activeRow().layoutRow || 1, col: activeRow().layoutCol || 1} : null;
  const target = buildRowsFromQuickLayout(group, activeCell);
  if (target) activeRowId = target.id;
}

function handleQuickKey(e) {
  const input = e.currentTarget;
  const row = Number(input.dataset.quickRow);
  const col = Number(input.dataset.quickCol);
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    moveQuickFocus(row, col, e.key);
    return;
  }
  if (e.key === 'Delete' || (e.key === 'Backspace' && !input.value)) {
    e.preventDefault();
    deleteQuickCell(row, col);
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    applyQuickLayout();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    addQuickLayoutPage();
    return;
  }
}

function moveQuickFocus(rowIndex, colIndex, key) {
  let nextRow = rowIndex;
  let nextCol = colIndex;
  if (key === 'ArrowLeft') nextCol = Math.max(0, colIndex - 1);
  if (key === 'ArrowRight') nextCol = colIndex + 1;
  if (key === 'ArrowUp') nextRow = Math.max(0, rowIndex - 1);
  if (key === 'ArrowDown') nextRow = Math.min(quickLayoutRows.length - 1, rowIndex + 1);
  ensureQuickCellExists(nextRow, nextCol);
  focusQuickCell(nextRow, nextCol);
}

function ensureQuickCellExists(rowIndex, colIndex) {
  if (!quickLayoutRows[rowIndex]) return;
  quickNavKeep = {row: rowIndex, col: colIndex};
  while (quickLayoutRows[rowIndex].length <= colIndex) quickLayoutRows[rowIndex].push('');
  const box = document.getElementById('quick-layout');
  const exists = box?.querySelector(`[data-quick-row="${rowIndex}"][data-quick-col="${colIndex}"]`);
  if (!exists) renderQuickLayout();
}

function focusQuickCell(rowIndex, colIndex) {
  const box = document.getElementById('quick-layout');
  if (!box) return;
  const el = box.querySelector(`[data-quick-row="${rowIndex}"][data-quick-col="${colIndex}"]`);
  if (!el) return;
  el.focus();
  el.select();
}

function deleteQuickCell(rowIndex, colIndex) {
  const row = quickLayoutRows[rowIndex];
  if (!row) return;
  pushHistory();
  row.splice(colIndex, 1);
  while (row.length < 3) row.push('');
  normalizeQuickRows();
  syncQuickPageRows();
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group, {page: activeQuickPage, row: rowIndex + 1, col: Math.max(1, colIndex + 1)});
  if (target) activeRowId = target.id;
  selectionScope = target ? 'row' : 'group';
  clearSelectedBooth();
  loadGroupToForm(group, target || ensureRows(group)[0]);
  renderGroups(false);
  refreshDrawing(false, false, false);
  renderQuickLayout({row: rowIndex, col: Math.max(0, Math.min(colIndex - 1, quickLayoutRows[rowIndex].length - 1))});
}

function addQuickLayoutRow(afterIndex = quickLayoutRows.length) {
  pushHistory();
  quickLayoutRows.splice(afterIndex, 0, ['', '', '']);
  syncQuickPageRows();
  renderQuickLayout({row: afterIndex, col: 0});
}

function addQuickLayoutPage() {
  pushHistory();
  normalizeQuickRows();
  syncQuickPageRows();
  activeQuickPage += 1;
  if (!quickLayoutPages[activeQuickPage]) quickLayoutPages.splice(activeQuickPage, 0, [['','','']]);
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  quickNavKeep = null;
  renderQuickLayout({row:0, col:0});
}

function goQuickLayoutPage(delta) {
  normalizeQuickRows();
  syncQuickPageRows();
  const nextPage = Math.max(0, Math.min(quickLayoutPages.length - 1, activeQuickPage + delta));
  if (nextPage === activeQuickPage) return;
  activeQuickPage = nextPage;
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  quickNavKeep = null;
  renderQuickLayout({row:0, col:0});
}

function applyQuickLayout() {
  pushHistory();
  saveActiveGroup();
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group);
  if (!target) return;
  activeRowId = target.id;
  selectionScope = 'row';
  clearSelectedBooth();
  openGroupIds.add(group.id);
  loadGroupToForm(group, target);
  renderGroups(false);
  currentPlanPage = 0;
  const p = getParams();
  lastParams = p;
  autoFit(p);
  drawView(p, currentTab);
  renderBOM(p);
}

function renderGroups(animateCollapse = false) {
  const list = document.getElementById('group-list');
  if (!list) return;
  const sidebar = document.querySelector('.sidebar');
  const scrollTop = sidebar ? sidebar.scrollTop : 0;
  const listScrollTop = list.scrollTop;
  const visibleGroups = advancedGroupsVisible ? groups : groups.filter(g => g.id === 1 || g.id === activeGroupId);
  list.classList.toggle('compact', !advancedGroupsVisible);
  list.innerHTML = visibleGroups.map((g) => {
    const groupIndex = groups.indexOf(g);
    const rows = ensureRows(g);
    const totalCount = rows.reduce((sum, r) => sum + (r.enabled === true ? r.count : 0), 0);
    const color = groupColor(groupIndex);
    return `
      <div class="group-block" data-group-block="${g.id}">
        <div class="group-item group-color ${g.id === activeGroupId ? 'active' : ''}" data-group-card="${g.id}" style="--group-color:${color}" role="button" tabindex="0" onclick="selectGroup(${g.id})">
          <input class="group-name-input" value="${escapeAttr(g.name || '')}" placeholder="${GROUP_NAME_PLACEHOLDER}" onclick="event.stopPropagation()" onfocus="selectGroup(${g.id})" oninput="updateGroupName(${g.id}, this.value)" onkeydown="handleGroupNameKey(event)">
          <span class="group-actions-inline"><span data-group-count="${g.id}">${totalCount} 间</span></span>
          <span class="group-meta" data-group-meta="${g.id}">${layoutGridSummary(rows)}</span>
        </div>
      </div>`;
  }).join('');
  rowAnimation = null;
  updateAdvancedGroupControls();
  if (sidebar) sidebar.scrollTop = scrollTop;
  list.scrollTop = listScrollTop;
  updateGroupListState();
}

function updateGroupName(id, value) {
  const group = groups.find(g => g.id === id);
  if (!group) return;
  group.name = String(value || '').trim();
  if (id === activeGroupId) updateLayoutTargetLabel();
  drawView(lastParams || getParams(), currentTab);
  renderBOM(lastParams || getParams());
}

function handleGroupNameKey(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  e.currentTarget.blur();
}

function toggleUrinalPanel(force = null) {
  const panel = document.getElementById('urinal-panel');
  if (!panel) return;
  const open = force === null ? !panel.classList.contains('open') : !!force;
  if (open) loadUrinalPanel();
  panel.classList.toggle('open', open);
}

function loadUrinalPanel() {
  document.getElementById('u-count').value = urinalSpec.count || 0;
  document.getElementById('u-width').value = urinalSpec.width || 400;
  document.getElementById('u-height').value = urinalSpec.height || 900;
  document.getElementById('u-thick').value = urinalSpec.thick || Number(document.getElementById('t-panel')?.value) || 12;
  document.getElementById('u-shape').value = urinalSpec.shape || '矩形';
  document.getElementById('u-hole').value = urinalSpec.hole || '无开孔';
  document.getElementById('u-note').value = urinalSpec.note || '';
}

function saveUrinalSpec() {
  urinalSpec = {
    count: Math.max(0, parseInt(document.getElementById('u-count').value) || 0),
    width: Math.max(0, parseInt(document.getElementById('u-width').value) || 0),
    height: Math.max(0, parseInt(document.getElementById('u-height').value) || 0),
    thick: Math.max(0, parseInt(document.getElementById('u-thick').value) || 0),
    shape: document.getElementById('u-shape').value || '矩形',
    hole: document.getElementById('u-hole').value || '无开孔',
    note: document.getElementById('u-note').value.trim()
  };
  toggleUrinalPanel(false);
  renderBOM(lastParams || getParams());
}

function updateAdvancedGroupControls() {
  const toggle = document.getElementById('group-advanced-toggle');
  const addBtn = document.getElementById('new-group-btn');
  if (toggle) toggle.textContent = advancedGroupsVisible ? '收起高级分组' : '高级分组';
  if (addBtn) addBtn.style.display = advancedGroupsVisible ? '' : 'none';
}

function toggleAdvancedGroups() {
  advancedGroupsVisible = !advancedGroupsVisible;
  renderGroups(false);
}

function updateGroupListState() {
  document.querySelectorAll('[data-group-card]').forEach(el => {
    const groupId = Number(el.dataset.groupCard);
    el.classList.toggle('active', groupId === activeGroupId);
  });
  groups.forEach(g => {
    const rows = ensureRows(g);
    const countEl = document.querySelector(`[data-group-count="${g.id}"]`);
    if (countEl) countEl.textContent = `${rows.reduce((sum, r) => sum + (r.enabled === true ? r.count : 0), 0)} 间`;
    const metaEl = document.querySelector(`[data-group-meta="${g.id}"]`);
    if (metaEl) metaEl.textContent = layoutGridSummary(rows);
  });
}

function setGroupCardActiveNow(id) {
  document.querySelectorAll('[data-group-card]').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.groupCard) === id);
  });
}

function scheduleSelectionDrawing(refit = false) {
  const token = ++pendingSelectionDraw;
  requestAnimationFrame(() => {
    if (token !== pendingSelectionDraw) return;
    refreshDrawing(refit, false, false);
  });
}

function revealActiveGroupInList() {
  const list = document.getElementById('group-list');
  const target = document.querySelector(`[data-group-block="${activeGroupId}"]`);
  if (!list || !target) return;
  const top = target.offsetTop;
  const bottom = top + target.offsetHeight;
  if (top < list.scrollTop) {
    list.scrollTop = top;
  } else if (bottom > list.scrollTop + list.clientHeight) {
    list.scrollTop = bottom - list.clientHeight;
  }
}

function selectGroup(id) {
  commitQuickLayoutForFreeCanvas();
  saveActiveGroup();
  activeGroupId = id;
  setGroupCardActiveNow(id);
  activeRowId = ensureRows(activeGroup())[0].id;
  selectionScope = 'group';
  clearSelectedBooth();
  loadGroupToForm(activeGroup(), activeRow());
  updateGroupListState();
  scheduleSelectionDrawing(!(currentTab === 'plan' && canvasMode === 'free'));
}

function toggleGroup(id) {
  saveActiveGroup();
  activeGroupId = id;
  const rows = ensureRows(activeGroup());
  activeRowId = rows.find(r => r.id === activeRowId)?.id || rows[0].id;
  selectionScope = 'group';
  clearSelectedBooth();
  const wasOpen = openGroupIds.has(id);
  if (wasOpen) {
    openGroupIds.delete(id);
    const el = document.querySelector(`.row-collapse[data-group-id="${id}"]`);
    if (el) el.classList.remove('open');
  } else {
    openGroupIds.add(id);
    const el = document.querySelector(`.row-collapse[data-group-id="${id}"]`);
    if (el) requestAnimationFrame(() => el.classList.add('open'));
  }
  loadGroupToForm(activeGroup(), activeRow());
  updateGroupListState();
  refreshDrawing(true, false, false);
}

function selectRow(groupId, rowId) {
  saveActiveGroup();
  activeGroupId = groupId;
  activeRowId = rowId;
  selectionScope = 'row';
  clearSelectedBooth();
  openGroupIds.add(groupId);
  loadGroupToForm(activeGroup(), activeRow());
  updateGroupListState();
  refreshDrawing(false, false, false);
}

function addGroup() {
  pushHistory();
  saveActiveGroup();
  advancedGroupsVisible = true;
  const base = {...activeGroup()};
  delete base.rows;
  const id = Math.max(...groups.map(g => g.id)) + 1;
  const row = {...blankRow, id:1, boothSwings:[...blankRow.boothSwings]};
  const baseGroup = {id, name:`${String.fromCharCode(64 + Math.min(id, 26))}组`, rows:[row]};
  groups.push(baseGroup);
  activeGroupId = id;
  activeRowId = 1;
  selectionScope = 'group';
  clearSelectedBooth();
  openGroupIds.add(id);
  loadGroupToForm(baseGroup, row);
  rowAnimation = null;
  renderGroups(false);
  revealActiveGroupInList();
  refreshDrawing(true, false, false);
}

function nextLayoutId(rows) {
  return Math.max(...rows.map(r => Number(r.id) || 0)) + 1;
}

function normalizeLayoutGrid(group) {
  ensureRows(group).forEach((r, i) => {
    if (!r.layoutRow) r.layoutRow = i + 1;
    if (!r.layoutCol) r.layoutCol = 1;
    r.layoutType = 'cell';
  });
}

function addStructureUnit(type = 'row', groupId = activeGroupId) {
  if (type === 'column') addColumn(groupId);
  else addRow(groupId);
}

function addRow(groupId = activeGroupId) {
  pushHistory();
  saveActiveGroup();
  activeGroupId = groupId;
  openGroupIds.add(groupId);
  const group = activeGroup();
  const rows = ensureRows(group);
  normalizeLayoutGrid(group);
  const id = nextLayoutId(rows);
  const nextRowNo = Math.max(...rows.map(r => Number(r.layoutRow) || 1)) + 1;
  const row = {...blankRow, id, layoutType:'cell', layoutRow:nextRowNo, layoutCol:1, boothSwings:[...blankRow.boothSwings]};
  rows.push(row);
  activeRowId = id;
  selectionScope = 'row';
  clearSelectedBooth();
  loadGroupToForm(group, row);
  rowAnimation = {type:'entering', groupId, rowId:id};
  renderGroups(false);
  refreshDrawing(true, false, false);
}

function addColumn(groupId = activeGroupId) {
  pushHistory();
  saveActiveGroup();
  activeGroupId = groupId;
  openGroupIds.add(groupId);
  const group = activeGroup();
  const rows = ensureRows(group);
  normalizeLayoutGrid(group);
  const current = rows.find(r => r.id === activeRowId) || rows[0];
  const currentLayoutRow = current?.layoutRow || 1;
  const id = nextLayoutId(rows);
  const nextColNo = Math.max(0, ...rows.filter(r => r.layoutRow === currentLayoutRow).map(r => Number(r.layoutCol) || 1)) + 1;
  const source = current || blankRow;
  const inheritedCount = Math.max(1, Number(source.count) || 1);
  const row = {
    ...source,
    id,
    layoutType:'cell',
    layoutRow:currentLayoutRow,
    layoutCol:nextColNo,
    enabled: source.enabled === true,
    boothSwings: normalizeBoothSwings(source.boothSwings, inheritedCount, source.swing || swingMode)
  };
  rows.push(row);
  group.rows = rows.sort((a, b) => (a.layoutRow - b.layoutRow) || (a.layoutCol - b.layoutCol) || (a.id - b.id));
  activeRowId = id;
  selectionScope = 'row';
  clearSelectedBooth();
  loadGroupToForm(group, row);
  rowAnimation = {type:'entering', groupId, rowId:id};
  renderGroups(false);
  refreshDrawing(true, false, false);
}

function deleteRow(groupId = activeGroupId, rowId = activeRowId) {
  pushHistory();
  activeGroupId = groupId;
  activeRowId = rowId;
  openGroupIds.add(groupId);
  const group = activeGroup();
  const rows = ensureRows(group);
  if (rows.length <= 1) return;
  const wrap = document.querySelector(`[data-row-wrap="${groupId}:${rowId}"]`);
  if (wrap && !wrap.classList.contains('leaving')) {
    wrap.classList.add('leaving');
    window.setTimeout(() => finishDeleteRow(groupId, rowId), 210);
    return;

  finishDeleteRow(groupId, rowId);

function finishDeleteRow(groupId, rowId) {
  activeGroupId = groupId;
  const group = activeGroup();
  const rows = ensureRows(group);
  if (rows.length <= 1) return;
  group.rows = rows.filter(r => r.id !== rowId);
  activeRowId = group.rows[0].id;
  selectionScope = 'row';
  clearSelectedBooth();
  rowAnimation = null;
  loadGroupToForm(group, group.rows[0]);
  renderGroups(false);
  refreshDrawing(true, false, false);
}

function deleteGroup(groupId = activeGroupId) {
  if (groups.length <= 1) return;
  groups = groups.filter(g => g.id !== groupId);
  openGroupIds.delete(groupId);
  activeGroupId = groups[0].id;
  activeRowId = ensureRows(groups[0])[0].id;
  selectionScope = 'group';
  clearSelectedBooth();
  openGroupIds.add(activeGroupId);
  loadGroupToForm(groups[0], ensureRows(groups[0])[0]);

  renderGroups(false);

function fmtMm(value) {
  const n = Number(value) || 0;
  return String(Math.round(n));
}

function parseWidths(text) {
  return splitWidthTextParts(text)
    .map(v => {
      const n = parseFloat(v);
      return Number.isFinite(n) && n > 0 ? n : null;
    });
}

function splitInteger(total, count) {
  const n = Math.max(0, count | 0);
  if (!n) return [];
  const roundedTotal = Math.round(Number(total) || 0);
  const base = Math.floor(roundedTotal / n);
  let rem = roundedTotal - base * n;
  return Array.from({length:n}, () => base + (rem-- > 0 ? 1 : 0));
}

function rebateLabel(size, p, type = 'double', role = 'panel', swingOverride = null) {
  const big = Math.max(0, Math.round(Number(size) || 0));
  if (!p.rebate) return fmtMm(big);
  const cut = (p.rebateDepth || 0) * (type === 'single' ? 1 : 2);
  const small = Math.max(0, Math.round(big - cut));
  const inward = String(swingOverride || p.swing || '').startsWith('in');
  const doorBigInside = role === 'door';
  const bigOnTop = doorBigInside ? inward : !inward;
  return bigOnTop ? {top: fmtMm(big), bottom: fmtMm(small), topName:'大', bottomName:'小'} : {top: fmtMm(small), bottom: fmtMm(big), topName:'小', bottomName:'大'};
}

function rebateText(size, p, type = 'double') {
  const label = rebateLabel(size, p, type);
  if (typeof label !== 'object') return label;
  const big = label.topName === '大' ? label.top : label.bottom;
  const small = label.topName === '小' ? label.top : label.bottom;
  return `大${big}/小${small}`;
}

function boardDimLabel(bigMm, p, cutSides, topIsSmall) {
  const big = Math.max(0, Math.round(Number(bigMm) || 0));
  if (!p.rebate) return fmtMm(big);
  const small = Math.max(0, Math.round(big - (p.rebateDepth || 0) * cutSides));
  return topIsSmall ? {top: fmtMm(small), bottom: fmtMm(big)} : {top: fmtMm(big), bottom: fmtMm(small)};
}

function uniqueRebateTexts(values, p, type) {
  return [...new Set(values.map(v => rebateText(v, p, type)))].join(' / ');
}

function rebateSmallSize(size, p, type = 'double') {
  const big = Math.max(0, Math.round(Number(size) || 0));
  if (!p.rebate) return big;
  const cut = (p.rebateDepth || 0) * (type === 'single' ? 1 : 2);
  return Math.max(0, Math.round(big - cut));
}

function compute(p) {
  const hasLeft = p.wall==='three'||p.wall==='left';
  const hasRight = p.wall==='three'||p.wall==='right';
  const hasBack = ['three','left','right','back'].includes(p.wall);
  const wallT = 120;
  const middlePanels = p.count - 1;
  const totalPanelThickness = middlePanels * p.tPanel;
  const projectMode = false;
  const customWidthsRaw = parseWidths(p.widthsText);
  const hasCustomWidths = customWidthsRaw.length > 0;
  const standardDoorInstallW = rebateSmallSize(p.doorW, p, 'double');
  const minEdgePanel = 80;
  const minMiddlePanel = 180;
  const minDoorW = 500;
  const autoBoothW = Math.max(0, Math.round(p.total / Math.max(1, p.count)));
  const fixedWidths = Array.from({length:p.count}, (_, i) => {
    const value = customWidthsRaw[i];
    return Number.isFinite(value) && value > 0 ? Math.round(value) : null;
  });
  const fixedTotal = fixedWidths.reduce((sum, w) => sum + (Number.isFinite(w) ? w : 0), 0);
  const remainingCount = fixedWidths.filter(w => !Number.isFinite(w)).length;
  const remainingWidth = Math.max(0, p.total - fixedTotal);
  const fillWidths = splitInteger(remainingWidth, remainingCount);
  let fillIndex = 0;
  const boothWidths = Array.from({length:p.count}, (_, i) => Number.isFinite(fixedWidths[i]) ? fixedWidths[i] : (fillWidths[fillIndex++] || autoBoothW));
  const boothDoorWidths = rowDoorWidthOverrides(p, p.count);
  const minOuterForIndex = i => (i === 0 ? minEdgePanel : 0) + (i === p.count - 1 ? minEdgePanel : 0);
  const doorInstallWidths = boothWidths.map((width, i) => {
    const preferred = rebateSmallSize(boothDoorWidths[i] || p.doorW, p, 'double');
    const maxDoor = Math.max(0, Math.round(width - p.doorGap - minOuterForIndex(i)));
    return Math.max(0, Math.min(Math.round(preferred || standardDoorInstallW), maxDoor));
  });
  const preferredDoorWidths = doorInstallWidths;
  const doorTotal = preferredDoorWidths.reduce((sum, w) => sum + w, 0);
  const doorZoneTotal = preferredDoorWidths.reduce((sum, w) => sum + w + p.doorGap, 0);
  const remainingForMargins = p.total - doorZoneTotal;
  const adjustedLength = remainingForMargins < 0;
  let doorWidths = doorInstallWidths.map(w => p.rebate ? w + (p.rebateDepth || 0) * 2 : w);
  const makeSidePairs = () => boothWidths.map((width, i) => {
    const available = Math.max(0, Math.round(width - doorInstallWidths[i] - p.doorGap));
    const pair = splitInteger(available, 2);
    if (i === 0 && pair[0] < minEdgePanel && available >= minEdgePanel) return [minEdgePanel, Math.max(0, available - minEdgePanel)];
    if (i === p.count - 1 && pair[1] < minEdgePanel && available >= minEdgePanel) return [Math.max(0, available - minEdgePanel), minEdgePanel];
    return pair;
  });
  let sidePairs = makeSidePairs();
  for (let guard = 0; guard < p.count * 6; guard++) {
    let changed = false;
    for (let i = 0; i < p.count - 1; i++) {
      const middle = sidePairs[i][1] + sidePairs[i + 1][0];
      const deficit = minMiddlePanel - middle;
      if (deficit <= 0) continue;
      const rightCanShrink = Math.max(0, doorInstallWidths[i + 1] - minDoorW);
      const leftCanShrink = Math.max(0, doorInstallWidths[i] - minDoorW);
      if (rightCanShrink >= leftCanShrink && rightCanShrink > 0) doorInstallWidths[i + 1] -= Math.min(deficit * 2, rightCanShrink);
      else if (leftCanShrink > 0) doorInstallWidths[i] -= Math.min(deficit * 2, leftCanShrink);
      else continue;
      changed = true;
      doorWidths = doorInstallWidths.map(w => p.rebate ? w + (p.rebateDepth || 0) * 2 : w);
      sidePairs = makeSidePairs();
    }
    if (!changed) break;
  }
  const gapPairs = boothWidths.map(() => splitInteger(p.doorGap, 2));
  const insufficientDoors = doorInstallWidths.map(w => w < minDoorW);
  const insufficientEdges = sidePairs.map((pair, i) => (i === 0 && pair[0] < minEdgePanel) || (i === p.count - 1 && pair[1] < minEdgePanel));
  const insufficientMiddles = sidePairs.slice(0, -1).map((pair, i) => pair[1] + sidePairs[i + 1][0] < minMiddlePanel);
  const totalRun = adjustedLength ? doorZoneTotal : p.total;
  const edge = sidePairs[0]?.[0] || 0;
  const middle = edge * 2;
  const boothW = hasCustomWidths ? boothWidths[0] : autoBoothW;
  const boothD = p.depth;
  const standardBoothW = boothW;
  const segmentSize = 999;
  const segmentedMode = false;
  return {hasLeft, hasRight, hasBack, wallT, middlePanels, boothW, boothWidths, doorWidths, doorInstallWidths, sidePairs, gapPairs, boothD, projectMode, segmentedMode, segmentSize, totalRun, standardBoothW, adjustedLength, edge, middle, doorTotal, totalPanelThickness, remainingForMargins, hasCustomWidths, minEdgePanel, minMiddlePanel, minDoorW, insufficientDoors, insufficientEdges, insufficientMiddles};
}

function renderSheetCanvas(tab = currentTab, p = lastParams || getParams(), options = {}) {
  const oldCanvasMode = canvasMode;
  if (options.canvasMode) canvasMode = options.canvasMode;
  const layout = getSheetLayout(p);
  const renderScale = Math.max(1, Number(options.renderScale || options.exportScale || QUALITY_RENDER_SCALE) || QUALITY_RENDER_SCALE);
  const out = document.createElement('canvas');
  out.width = Math.ceil(layout.sheetW * renderScale);
  out.height = Math.ceil(layout.sheetH * renderScale);
  const oldCtx = ctx;
  const oldPlanHitAreas = planHitAreas;
  const oldDrawingForExport = drawingForExport;
  const oldPlanPage = currentPlanPage;
  ctx = out.getContext('2d');
  planHitAreas = [];
  drawingForExport = true;
  if (Number.isFinite(options.planPage)) currentPlanPage = options.planPage;
  ctx.clearRect(0, 0, out.width, out.height);
  ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
  drawSheet(tab === 'plan' ? '卫生间隔断平面图' : tab === 'front' ? '卫生间隔断正立面图' : '卫生间隔断侧立面图', p, 0, 0, tab === 'plan' ? currentPlanPage : 0);
  if (tab === 'plan') drawPlan(p);
  else if (tab === 'front') drawFront(p);
  else drawSide(p);
  ctx = oldCtx;
  planHitAreas = oldPlanHitAreas;
  drawingForExport = oldDrawingForExport;
  currentPlanPage = oldPlanPage;
  canvasMode = oldCanvasMode;
  return out;
}

    w: pages.length * layout.sheetW + Math.max(0, pages.length - 1) * gap,
    h: layout.sheetH
  };
}

const PAPER_SIZES = {
  a4: {w:834, h:1180, label:'A4'},
  a3: {w:1680, h:1188, label:'A3'},
  auto: {w:1180, h:834, label:'自适应'}

function setPaperSize(size) {
  paperSize = PAPER_SIZES[size] ? size : 'a4';
  canvasMode = paperSize === 'auto' ? 'free' : 'sheets';
  localStorage.setItem('partition-paper-size', paperSize);
  if (lastParams) {
    autoFit(lastParams);
    drawView(lastParams, currentTab);
  }
}

function applyPaperSize() {
  const el = document.getElementById('paper-size');
  if (el) el.value = paperSize;
}

function getSheetLayout(p = lastParams || getParams()) {
  const rows = drawableGroupRows();
  const sourceRows = rows.length > 1 ? rows.map(item => item.row) : [p];
  const maxRun = sourceRows.reduce((max, r) => Math.max(max, compute(r).totalRun || r.total || 0), 0);
  const maxDepth = sourceRows.reduce((max, r) => Math.max(max, r.depth || 0), 0);
  const base = PAPER_SIZES[paperSize] || PAPER_SIZES.a4;
  let autoW = base.w;
  let autoH = base.h;
  if (canvasMode === 'free') {
    const freeSize = freePlanContentSize(p);
    autoW = Math.min(50000, freeSize.w);
    autoH = Math.min(50000, freeSize.h);
  }
  const sheetW = canvasMode === 'free' ? autoW : base.w;
  const sheetH = canvasMode === 'free' ? autoH : base.h;
  const frameInset = 24.5;
  const safeGap = canvasMode === 'sheets' ? 16 : 42;
  const titleH = canvasMode === 'sheets' ? 50 : 112;
  const plotX = frameInset + safeGap;
  const plotY = frameInset + (canvasMode === 'sheets' ? 52 : 88);
  const plotW = sheetW - plotX - frameInset - safeGap;
  const plotH = sheetH - plotY - titleH - frameInset;
  return {
    sheetW,
    sheetH,
    frame: {x:frameInset, y:frameInset, w:sheetW - frameInset * 2, h:sheetH - frameInset * 2},
    plot: {x:plotX, y:plotY, w:Math.max(260, plotW), h:Math.max(220, plotH)},
    safeGap,
    paper: base.label
  };
}

function annoFont(size) {

function drawDim(x1,y1,x2,y2,label,side) {
  ctx.save();
  ctx.strokeStyle='#111'; ctx.fillStyle='#111';
  ctx.lineWidth=Math.max(0.35, anno(4)); ctx.font=planFont(95);
  const isH = Math.abs(x2-x1) > Math.abs(y2-y1);
  const off = anno(side || 45);
  if (isH) {
    const dy = (y1+y2)/2 - off;
    const tick = anno(28);
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x1,dy+off);
    ctx.moveTo(x2,y2); ctx.lineTo(x2,dy+off);
    ctx.moveTo(x1,dy); ctx.lineTo(x2,dy);
    ctx.moveTo(x1,dy-tick); ctx.lineTo(x1,dy+tick);
    ctx.moveTo(x2,dy-tick); ctx.lineTo(x2,dy+tick);
    ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(label,(x1+x2)/2,dy-anno(18));
  } else {
    const dx = (x1+x2)/2 + off;
    const tick = anno(28);
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(dx-off,y1);
    ctx.moveTo(x2,y2); ctx.lineTo(dx-off,y2);
    ctx.moveTo(dx,y1); ctx.lineTo(dx,y2);
    ctx.moveTo(dx-tick,y1); ctx.lineTo(dx+tick,y1);
    ctx.moveTo(dx-tick,y2); ctx.lineTo(dx+tick,y2);
    ctx.stroke();
    ctx.save(); ctx.translate(dx+anno(70), (y1+y2)/2); ctx.rotate(Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,0,0);
    ctx.restore();
  }
  ctx.restore();
}

function drawLeftOuterDepthDim(x, y1, y2, label) {
  ctx.save();
  ctx.strokeStyle='#111'; ctx.fillStyle='#111';
  ctx.lineWidth=Math.max(0.35, anno(4)); ctx.font=planFont(95);
  const dimX = x;
  const textX = x - anno(72);
  ctx.beginPath();
  ctx.moveTo(x, y1); ctx.lineTo(x, y2);
  const tick = anno(28);
  ctx.moveTo(x - tick, y1); ctx.lineTo(x + tick, y1);
  ctx.moveTo(x - tick, y2); ctx.lineTo(x + tick, y2);
  ctx.moveTo(dimX, y1); ctx.lineTo(dimX + anno(34), y1);

  ctx.stroke();
  ctx.save(); ctx.translate(textX, (y1+y2)/2); ctx.rotate(Math.PI/2);

  ctx.restore();
  ctx.restore();
}

function drawChainDim(y, segments, color = '#111') {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = Math.max(0.35, anno(4));
  ctx.font = planFont(95);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const start = segments[0].x1;
  const end = segments[segments.length - 1].x2;
  ctx.beginPath(); ctx.moveTo(start, y); ctx.lineTo(end, y); ctx.stroke();
  segments.forEach(seg => {
    ctx.beginPath(); ctx.moveTo(seg.x1, y - anno(28)); ctx.lineTo(seg.x1, y + anno(28)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(seg.x2, y - anno(28)); ctx.lineTo(seg.x2, y + anno(28)); ctx.stroke();
    const cx = (seg.x1 + seg.x2) / 2;
    if (seg.label && typeof seg.label === 'object') {
      ctx.fillText(seg.label.top, cx, y - anno(30));

      ctx.textBaseline = 'bottom';
    } else if (seg.label) {
      ctx.fillText(seg.label, cx, y - anno(30));
    }
  });
  ctx.restore();
}

function collectGuardWarnings(c) {
  const warnings = [];
  c.insufficientDoors.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}间门<${c.minDoorW}`); });
  c.insufficientEdges.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}间边板<${c.minEdgePanel}`); });
  c.insufficientMiddles.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}-${i + 2}立板<${c.minMiddlePanel}`); });
  return warnings;
}

function drawPlanWarnings(c, x, y) {

  if (!warnings.length) return;
  ctx.save();
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
