function compute(p) {
  const hasLeft = p.wall==='three'||p.wall==='left';
  const hasRight = p.wall==='three'||p.wall==='right';
  const hasBack = ['three','left','right','back'].includes(p.wall);
  const wallT = 120;
  const middlePanels = p.count - 1;
  const totalPanelThickness = middlePanels * p.tPanel;
  const projectMode = false;
  const customWidthsRaw = parseWidths(p.widthsText);
  const hasCustomWidths = customWidthsRaw.length > 0;
  const standardDoorInstallW = rebateSmallSize(p.doorW, p, 'double');
  const minEdgePanel = 80;
  const minMiddlePanel = 180;
  const minDoorW = 500;
  const autoBoothW = Math.max(0, Math.round(p.total / Math.max(1, p.count)));
  const fixedWidths = Array.from({length:p.count}, (_, i) => {
    const value = customWidthsRaw[i];
    return Number.isFinite(value) && value > 0 ? Math.round(value) : null;
  });
  const fixedTotal = fixedWidths.reduce((sum, w) => sum + (Number.isFinite(w) ? w : 0), 0);
  const remainingCount = fixedWidths.filter(w => !Number.isFinite(w)).length;
  const remainingWidth = Math.max(0, p.total - fixedTotal);
  const fillWidths = splitInteger(remainingWidth, remainingCount);
  let fillIndex = 0;
  const boothWidths = Array.from({length:p.count}, (_, i) => Number.isFinite(fixedWidths[i]) ? fixedWidths[i] : (fillWidths[fillIndex++] || autoBoothW));
  const boothDoorWidths = rowDoorWidthOverrides(p, p.count);
  const minOuterForIndex = i => (i === 0 ? minEdgePanel : 0) + (i === p.count - 1 ? minEdgePanel : 0);
  const doorInstallWidths = boothWidths.map((width, i) => {
    const preferred = rebateSmallSize(boothDoorWidths[i] || p.doorW, p, 'double');
    const maxDoor = Math.max(0, Math.round(width - p.doorGap - minOuterForIndex(i)));
    return Math.max(0, Math.min(Math.round(preferred || standardDoorInstallW), maxDoor));
  });
  const preferredDoorWidths = doorInstallWidths;
  const doorTotal = preferredDoorWidths.reduce((sum, w) => sum + w, 0);
  const doorZoneTotal = preferredDoorWidths.reduce((sum, w) => sum + w + p.doorGap, 0);
  const remainingForMargins = p.total - doorZoneTotal;
  const adjustedLength = remainingForMargins < 0;
  let doorWidths = doorInstallWidths.map(w => p.rebate ? w + (p.rebateDepth || 0) * 2 : w);
  const makeSidePairs = () => boothWidths.map((width, i) => {
    const available = Math.max(0, Math.round(width - doorInstallWidths[i] - p.doorGap));
    const pair = splitInteger(available, 2);
    if (i === 0 && pair[0] < minEdgePanel && available >= minEdgePanel) return [minEdgePanel, Math.max(0, available - minEdgePanel)];
    if (i === p.count - 1 && pair[1] < minEdgePanel && available >= minEdgePanel) return [Math.max(0, available - minEdgePanel), minEdgePanel];
    return pair;
  });
  let sidePairs = makeSidePairs();
  for (let guard = 0; guard < p.count * 6; guard++) {
    let changed = false;
    for (let i = 0; i < p.count - 1; i++) {
      const middle = sidePairs[i][1] + sidePairs[i + 1][0];
      const deficit = minMiddlePanel - middle;
      if (deficit <= 0) continue;
      const rightCanShrink = Math.max(0, doorInstallWidths[i + 1] - minDoorW);
      const leftCanShrink = Math.max(0, doorInstallWidths[i] - minDoorW);
      if (rightCanShrink >= leftCanShrink && rightCanShrink > 0) doorInstallWidths[i + 1] -= Math.min(deficit * 2, rightCanShrink);
      else if (leftCanShrink > 0) doorInstallWidths[i] -= Math.min(deficit * 2, leftCanShrink);
      else continue;
      changed = true;
      doorWidths = doorInstallWidths.map(w => p.rebate ? w + (p.rebateDepth || 0) * 2 : w);
      sidePairs = makeSidePairs();
    }
    if (!changed) break;
  }
  const gapPairs = boothWidths.map(() => splitInteger(p.doorGap, 2));
  const insufficientDoors = doorInstallWidths.map(w => w < minDoorW);
  const insufficientEdges = sidePairs.map((pair, i) => (i === 0 && pair[0] < minEdgePanel) || (i === p.count - 1 && pair[1] < minEdgePanel));
  const insufficientMiddles = sidePairs.slice(0, -1).map((pair, i) => pair[1] + sidePairs[i + 1][0] < minMiddlePanel);
  const totalRun = adjustedLength ? doorZoneTotal : p.total;
  const edge = sidePairs[0]?.[0] || 0;
  const middle = edge * 2;
  const boothW = hasCustomWidths ? boothWidths[0] : autoBoothW;
  const boothD = p.depth;
  const standardBoothW = boothW;
  const segmentSize = 999;
  const segmentedMode = false;
  const result = {hasLeft, hasRight, hasBack, wallT, middlePanels, boothW, boothWidths, doorWidths, doorInstallWidths, sidePairs, gapPairs, boothD, projectMode, segmentedMode, segmentSize, totalRun, standardBoothW, adjustedLength, edge, middle, doorTotal, totalPanelThickness, remainingForMargins, hasCustomWidths, minEdgePanel, minMiddlePanel, minDoorW, insufficientDoors, insufficientEdges, insufficientMiddles};
  return applyDimensionLocksToComputed(p, result);
}

function generate() {

function drawView(p, tab) {
  planHitAreas = [];

function renderSheetCanvas(tab = currentTab, p = lastParams || getParams(), options = {}) {
  const oldCanvasMode = canvasMode;
  if (options.canvasMode) canvasMode = options.canvasMode;
  const renderPlanPage = Number.isFinite(options.planPage) ? options.planPage : currentPlanPage;
  const layout = sheetLayoutForRender(tab, p, renderPlanPage);
  const renderScale = Math.max(1, Number(options.renderScale || options.exportScale || QUALITY_RENDER_SCALE) || QUALITY_RENDER_SCALE);
  const out = document.createElement('canvas');
  out.width = Math.ceil(layout.sheetW * renderScale);
  out.height = Math.ceil(layout.sheetH * renderScale);
  const oldCtx = ctx;
  const oldPlanHitAreas = planHitAreas;
  const oldDrawingForExport = drawingForExport;
  const oldPlanPage = currentPlanPage;
  ctx = out.getContext('2d');
  planHitAreas = [];
  drawingForExport = true;
  if (Number.isFinite(options.planPage)) currentPlanPage = options.planPage;
  ctx.clearRect(0, 0, out.width, out.height);
  ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
  drawSheet(tab === 'plan' ? '卫生间隔断平面图' : tab === 'front' ? '卫生间隔断正立面图' : '卫生间隔断侧立面图', p, 0, 0, tab === 'plan' ? currentPlanPage : 0, layout);
  if (tab === 'plan') drawPlan(p);
  else if (tab === 'front') drawFront(p);
  else drawSide(p);
  ctx = oldCtx;
  planHitAreas = oldPlanHitAreas;
  drawingForExport = oldDrawingForExport;
  currentPlanPage = oldPlanPage;
  canvasMode = oldCanvasMode;
  return out;
}

    if (cursorX > 0 && cursorX + rawW > rowCapacity + 0.5) {

    pageIndex = pages.length;
    if (cursorY > 0 && (lineCount > maxRowsForSheetPage(pageIndex) || cursorY + rawH > maxRawH(pageIndex) + 0.5)) {

    }
    pageIndex = pages.length;
    if (rawW > maxRawW(pageIndex) + 0.5 || rawH > maxRawH(pageIndex) + 0.5) {
      // Oversized single blocks are still placed; final render will fit them to the sheet.
    }
    page.blocks.push({...block, pageX: cursorX, pageY: cursorY, sheetScale});
    page.usedW = Math.max(page.usedW, cursorX + rawW);
    page.usedH = Math.max(page.usedH, cursorY + rawH);

function autoPackPlanBlocksAtScale(blocks, layout, sheetScale) {
  const minScale = SHEET_LAYOUT_RULES.minReadableScale;
  const packingScale = Math.max(0.0001, sheetScale || minScale);
  const rawGapX = SHEET_LAYOUT_RULES.colGap / packingScale;
  const rawGapY = SHEET_LAYOUT_RULES.rowGap / packingScale;
  const pageLayoutForBlocks = blocks => sheetLayoutForPage({blocks}, lastParams || getParams());
  const maxRawW = (pageIndex, pageBlocks = []) => sheetRowAvailableWidth(pageLayoutForBlocks(pageBlocks), pageIndex) / Math.max(0.0001, minScale);
  const maxRawH = (pageIndex, pageBlocks = []) => sheetAvailableHeight(pageLayoutForBlocks(pageBlocks), pageIndex) / Math.max(0.0001, minScale);
  const pages = [];
  const createPage = () => ({blocks: [], rows: [], usedW: 0, usedH: 0, rowCount: 0});
  const packWidth = block => {
    const count = Math.max(1, Number(block.row?.count) || Number(block.originalRow?.count) || 1);
    if (count > 2) return block.metrics.w;
    const run = Number(block.metrics?.c?.totalRun) || Number(block.row?.total) || Number(block.originalRow?.total) || 0;
    const sharedLabelReserve = 260;
    return Math.max(1, Math.min(block.metrics.w, run + sharedLabelReserve));
  };
  const canFitPageHeight = (page, row, rawH, pageIndex, candidateBlocks) => {
    const nextLineH = Math.max(row.lineH, rawH);
    const nextUsedH = Math.max(page.usedH, row.y + nextLineH);
    return nextUsedH <= maxRawH(pageIndex, candidateBlocks) + 0.5;
  };
  const placeInRow = (page, row, block) => {
    const rawW = packWidth(block);
    const rawH = block.metrics.h;
    const x = row.blocks.length ? row.usedW + rawGapX : 0;
    const placed = {...block, pageX:x, pageY:row.y, sheetScale:packingScale};
    row.blocks.push(placed);
    row.usedW = x + rawW;
    row.lineH = Math.max(row.lineH, rawH);
    page.blocks.push(placed);
    page.usedW = Math.max(page.usedW, row.usedW);
    page.usedH = Math.max(page.usedH, row.y + row.lineH);
    page.rowCount = page.rows.length;
  };
  const addRow = (page, pageIndex, block) => {
    const prev = page.rows[page.rows.length - 1];
    const y = prev ? prev.y + prev.lineH + rawGapY : 0;
    const row = {blocks: [], y, usedW: 0, lineH: 0};
    const candidateBlocks = [...page.blocks, block];
    if (page.rows.length + 1 > maxRowsForSheetPage(pageIndex)) return false;
    if (y + block.metrics.h > maxRawH(pageIndex, candidateBlocks) + 0.5) return false;
    page.rows.push(row);
    placeInRow(page, row, block);
    return true;
  };
  blocks.forEach(block => {
    const rawW = packWidth(block);
    const rawH = block.metrics.h;
    let placed = false;
    let bestRow = null;
    let bestRowScore = Infinity;
    for (let pageIndex = 0; pageIndex < pages.length && !placed; pageIndex++) {
      const page = pages[pageIndex];
      for (const row of page.rows) {
        const nextW = row.blocks.length ? row.usedW + rawGapX + rawW : rawW;

        if (nextW <= maxRawW(pageIndex, candidateBlocks) + 0.5 && canFitPageHeight(page, row, rawH, pageIndex, candidateBlocks)) {

          const nextUsedH = Math.max(page.usedH, row.y + nextLineH);
          const heightLeft = maxRawH(pageIndex, candidateBlocks) - nextUsedH;
          const score = pageIndex * 1e9 + widthLeft * 1e3 + heightLeft;
          if (score < bestRowScore) {

            bestRow = {page, row};
          }
        }
      }
    }
    if (bestRow) {
      placeInRow(bestRow.page, bestRow.row, block);
      placed = true;
    }
    for (let pageIndex = 0; pageIndex < pages.length && !placed; pageIndex++) {
      if (addRow(pages[pageIndex], pageIndex, block)) placed = true;

      const page = createPage();
      pages.push(page);
      addRow(page, pages.length - 1, block);

}

  zoomScale = scale;
  const anchorX = isMobileViewport() ? Math.max(12, (viewW - (sheetPreview?.w || layout.sheetW) * scale) / 2) : Math.max(20, Math.min(48, viewW * 0.035));
  const anchorY = isMobileViewport() ? Math.max(16, Math.min(36, viewH * 0.04)) : Math.max(18, Math.min(36, viewH * 0.04));

function wheelMaxZoomScale(p = lastParams || getParams()) {

  const fits = pages.map((page, index) => {
    const P = layout.plot;
    const gaps = sheetContentGaps(index);
    const availableW = Math.max(1, P.w - gaps.left - gaps.right);
    const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
    const rawContentW = Math.max(1, page.usedW);
    const rawContentH = Math.max(1, page.usedH);
    const autoFitScale = Math.min(availableW / rawContentW, availableH / rawContentH, 1);

function sheetLayoutForPage(page = null, p = lastParams || getParams()) {

    ctx.beginPath(); ctx.moveTo(seg.x2, y - anno(28)); ctx.lineTo(seg.x2, y + anno(28)); ctx.stroke();
    const cx = (seg.x1 + seg.x2) / 2;
    if (seg.label && typeof seg.label === 'object') {
      const top = String(dimensionDisplayLabel(seg.label.top, {...seg.meta, face:'top'}));
      const bottom = String(dimensionDisplayLabel(seg.label.bottom, {...seg.meta, face:'bottom'}));
      ctx.fillText(top, cx, y - anno(30));
      registerDimensionHit({...seg.meta, face:'top'}, cx, y - anno(105), Math.max(anno(185), ctx.measureText(top).width + anno(88)), anno(88));
      ctx.textBaseline = 'top';
      ctx.fillText(bottom, cx, y + anno(42));
      registerDimensionHit({...seg.meta, face:'bottom'}, cx, y + anno(32), Math.max(anno(185), ctx.measureText(bottom).width + anno(88)), anno(92));
      ctx.textBaseline = 'bottom';
      if (dimensionEditActive({...seg.meta, face:'top'}) && Math.floor(Date.now() / 530) % 2 === 0) drawDimensionCaret(cx + ctx.measureText(top).width / 2 + anno(8), y - anno(30), 'bottom', color, top);
      if (dimensionEditActive({...seg.meta, face:'bottom'}) && Math.floor(Date.now() / 530) % 2 === 0) drawDimensionCaret(cx + ctx.measureText(bottom).width / 2 + anno(8), y + anno(42), 'top', color, bottom);
    } else if (seg.label) {
      const text = String(dimensionDisplayLabel(seg.label, seg.meta));
      ctx.fillText(text, cx, y - anno(30));
      registerDimensionHit(seg.meta, cx, y - anno(105), Math.max(anno(185), ctx.measureText(text).width + anno(88)), anno(88));
      if (dimensionEditActive(seg.meta) && Math.floor(Date.now() / 530) % 2 === 0) drawDimensionCaret(cx + ctx.measureText(text).width / 2 + anno(8), y - anno(30), 'bottom', color, text);
    }
  });
  ctx.restore();
}

function collectGuardWarnings(c) {
  const warnings = [];
  c.insufficientDoors.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}间门<${c.minDoorW}`); });
  c.insufficientEdges.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}间边板<${c.minEdgePanel}`); });
  c.insufficientMiddles.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}-${i + 2}立板<${c.minMiddlePanel}`); });
  return warnings;
}

function drawPlanWarnings(c, x, y) {
  return;
}

function notifyGuardWarnings(p = lastParams || getParams()) {
  const rows = drawableGroupRows();
  const source = rows.length ? rows.map(item => ({group:item.group, row:item.row})) : [{group:activeGroup(), row:p}];
  const messages = [];
  source.forEach(item => {
    const warnings = collectGuardWarnings(compute(item.row));
    if (!warnings.length) return;
    const name = layoutUnitName(item.group, item.row);
    messages.push(`${name}：${warnings.join('，')}`);
  });
  const signature = messages.join('|');
  if (!signature || signature === lastGuardWarningSignature) return;
  lastGuardWarningSignature = signature;
  window.setTimeout(() => alert(`尺寸冲突，请调整参数：\n${messages.join('\n')}`), 0);
}

function drawPlanWalls(ox, oy, sW, sD, swt, c, extras = {}) {
  const extraLeft = Math.max(0, Number(extras.left) || 0);
  const extraRight = Math.max(0, Number(extras.right) || 0);
  const frontExtend = Math.max(0, Number(extras.frontExtend) || 0);
  const middleExtras = Array.isArray(extras.middle) ? extras.middle.filter(item => item && item.h > 0 && item.x2 > item.x1) : [];
  const left = (c.hasLeft || extraLeft > 0) ? swt : 0;
  const right = (c.hasRight || extraRight > 0) ? swt : 0;
  const back = c.hasBack ? swt : 0;
  if (!left && !right && !back) return;
  const fullSideH = sD + frontExtend + back;
  const leftH = c.hasLeft ? fullSideH : Math.min(fullSideH, back + extraLeft);
  const rightH = c.hasRight ? fullSideH : Math.min(fullSideH, back + extraRight);
  const leftX = left ? ox - left : ox;
  const rightX = right ? ox + sW : ox + sW;
  const backX = back ? Math.min(left ? leftX : ox, ox) : ox;
  const backRight = back ? Math.max(right ? rightX + right : ox + sW, ox + sW) : ox + sW;
  const outerX = Math.min(backX, left ? leftX : ox, ox);
  const outerY = oy - back;
  const middleH = middleExtras.reduce((max, item) => Math.max(max, back + item.h), 0);
  const outerW = Math.max(backRight, right ? rightX + right : ox + sW, ox + sW) - outerX;
  const outerH = Math.max(back, leftH, rightH, middleH);
  const wallPath = new Path2D();
  if (back) wallPath.rect(backX, oy - back, backRight - backX, back);
  if (left) wallPath.rect(leftX, oy - back, left, leftH);
  if (right) wallPath.rect(rightX, oy - back, right, rightH);
  middleExtras.forEach(item => wallPath.rect(item.x1, oy - back, item.x2 - item.x1, back + item.h));

  ctx.save();
  ctx.fillStyle = '#fbfbfb';
  ctx.fill(wallPath);
  ctx.clip(wallPath);

  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 0.8;
  for (let i = -outerH; i < outerW + outerH; i += 22) {
    ctx.beginPath();
    ctx.moveTo(outerX + i, outerY + outerH);
    ctx.lineTo(outerX + i + outerH, outerY);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1.6;
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  const drawSegmentedLine = (x1, x2, y, gaps) => {
    let cursor = x1;
    gaps
      .map(gap => ({x1:Math.max(x1, gap.x1), x2:Math.min(x2, gap.x2)}))
      .filter(gap => gap.x2 > gap.x1)
      .sort((a, b) => a.x1 - b.x1)
      .forEach(gap => {
        if (gap.x1 > cursor) {
          ctx.moveTo(cursor, y);
          ctx.lineTo(gap.x1, y);
        }
        cursor = Math.max(cursor, gap.x2);
      });
    if (cursor < x2) {
      ctx.moveTo(cursor, y);
      ctx.lineTo(x2, y);
    }
  };
  if (back) {
    ctx.moveTo(backX, oy - back);
    ctx.lineTo(backRight, oy - back);
    if (!left) {
      ctx.moveTo(ox, oy - back);
      ctx.lineTo(ox, oy);
    }
    if (!right) {
      ctx.moveTo(ox + sW, oy - back);
      ctx.lineTo(ox + sW, oy);
    }
    drawSegmentedLine(ox, ox + sW, oy, middleExtras);
  }
  if (left) {
    ctx.moveTo(leftX, oy - back);
    ctx.lineTo(leftX, oy - back + leftH);
    ctx.lineTo(leftX + left, oy - back + leftH);
    ctx.moveTo(leftX + left, oy - back + leftH);
    ctx.lineTo(leftX + left, oy);
  }
  if (right) {
    ctx.moveTo(rightX + right, oy - back);
    ctx.lineTo(rightX + right, oy - back + rightH);
    ctx.lineTo(rightX, oy - back + rightH);
    ctx.moveTo(rightX, oy - back + rightH);
    ctx.lineTo(rightX, oy);
  }
  middleExtras.forEach(item => {
    const wallBottom = oy - back + back + item.h;
    ctx.moveTo(item.x1, oy);
    ctx.lineTo(item.x1, wallBottom);
    ctx.lineTo(item.x2, wallBottom);
    ctx.lineTo(item.x2, oy);
  });
  ctx.stroke();
  ctx.restore();
}

function drawDoorSwing(door, baseY, st, p) {
  const swing = swingDefs[door.swing || p.swing || 'in-right'] || swingDefs['in-right'];
  const isRight = swing.hinge === 'right';
  const closedStart = Number.isFinite(door.bigStart) ? door.bigStart : door.start;
  const closedEnd = Number.isFinite(door.bigEnd) ? door.bigEnd : door.end;
  const hingeX = isRight ? door.end : door.start;
  const closedHingeX = isRight ? closedEnd : closedStart;
  const closedY = baseY + st / 2;
  const openDir = swing.opensUp ? -1 : 1;
  const openEndY = closedY + openDir * door.width;
  const dash = anno(34);
  const gap = anno(24);
  const drawDoorBoard = (x1, y1, x2, y2, topIsSmall) => {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len <= 0.5) return;
    const ux = dx / len;
    const uy = dy / len;
    const nx = -uy;
    const ny = ux;
    const t = st;
    const panelMm = Math.max(1, Number(p.tPanel) || 12);
    const pxPerMm = st / panelMm;
    const rebate = p.rebate ? Math.min(Math.max(0, Number(p.rebateDepth) || 0) * pxPerMm, len / 3) : 0;
    const leftCut = p.rebate ? rebate : 0;
    const rightCut = p.rebate ? rebate : 0;
    const topA = topIsSmall ? leftCut : 0;
    const topB = topIsSmall ? len - rightCut : len;
    const botA = topIsSmall ? 0 : leftCut;
    const botB = topIsSmall ? len : len - rightCut;
    const px = (s, side) => x1 + ux * s + nx * side;
    const py = (s, side) => y1 + uy * s + ny * side;
    ctx.beginPath();
    ctx.moveTo(px(topA, -t / 2), py(topA, -t / 2));
    ctx.lineTo(px(topB, -t / 2), py(topB, -t / 2));
    if (topB !== botB) ctx.lineTo(px(topB, 0), py(topB, 0));
    ctx.lineTo(px(botB, 0), py(botB, 0));
    ctx.lineTo(px(botB, t / 2), py(botB, t / 2));
    ctx.lineTo(px(botA, t / 2), py(botA, t / 2));
    if (botA !== topA) ctx.lineTo(px(botA, 0), py(botA, 0));
    ctx.lineTo(px(topA, 0), py(topA, 0));
    ctx.closePath();
    ctx.stroke();
  };
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.strokeStyle = '#185FA5';
  ctx.lineWidth = Math.max(0.45, anno(0.75));
  drawDoorBoard(closedStart, closedY, closedEnd, closedY, doorSmallOnTopForSwing(door.swing));
  drawDoorBoard(hingeX, closedY, hingeX, openEndY, doorSmallOnTopForSwing(door.swing));
  ctx.strokeStyle = '#8EC5FF';
  ctx.lineWidth = Math.max(0.8, anno(5));
  ctx.setLineDash([dash, gap]);
  ctx.beginPath();
  const arcMap = {
    'in-left': [0, -Math.PI / 2, true],
    'in-right': [Math.PI, Math.PI * 1.5, false],
    'out-left': [0, Math.PI / 2, false],
    'out-right': [Math.PI, Math.PI / 2, true]
  };
  const arc = arcMap[door.swing || p.swing || 'in-right'] || arcMap['in-right'];
  ctx.arc(closedHingeX, closedY, door.width, arc[0], arc[1], arc[2]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPlanRebateEdge(x, y1, y2, color = '#222') {
  ctx.save();

function frontSmallOnTopForSwing(swing) {
  return String(swing || '').startsWith('in');
}

function doorSmallOnTopForSwing(swing) {
  return !frontSmallOnTopForSwing(swing);
}

function buildBoardModel(p, c, doors, ox, sW, scale) {
  const panels = [];
  const doorBoards = doors.filter(door => door.hasDoor !== false).map((door, i) => ({
    kind: 'door',
    index: door.index ?? i,
    bigX1: Number.isFinite(door.bigStart) ? door.bigStart : door.start,
    bigX2: Number.isFinite(door.bigEnd) ? door.bigEnd : door.end,
    smallX1: door.start,
    smallX2: door.end,
    bigMm: c.doorWidths[door.index ?? i] || p.doorW,
    smallMm: c.doorInstallWidths[door.index ?? i] || c.doorWidths[door.index ?? i] || p.doorW,
    leftRebate: true,
    rightRebate: true,
    topIsSmall: doorSmallOnTopForSwing(door.swing),
    swing: door.swing
  }));

  if (doors.length) {
    const firstDoorIndex = doors[0].index ?? 0;
    const lastDoorIndex = doors[doors.length - 1].index ?? (p.count - 1);
    panels.push({
      kind: 'edge', index: 0, lockIndex: 0, bigX1: ox, bigX2: doors[0].zoneStart,
      bigMm: c.frontPanelBigLocks?.[0] || c.sidePairs[firstDoorIndex]?.[0] || 0,
      leftRebate: false, rightRebate: true,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[0].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[0].swing)
    });
    for (let i = 0; i < doors.length - 1; i++) {
      const leftSwing = doors[i].swing;
      const rightSwing = doors[i + 1].swing;
      const leftIndex = doors[i].index ?? i;
      const rightIndex = doors[i + 1].index ?? (i + 1);
      panels.push({
        kind: 'middle', index: i, lockIndex: i + 1,
        bigX1: doors[i].zoneEnd,
        bigX2: doors[i + 1].zoneStart,
        bigMm: c.frontPanelBigLocks?.[i + 1] || (c.sidePairs[leftIndex]?.[1] || 0) + (c.sidePairs[rightIndex]?.[0] || 0),
        leftMm: c.sidePairs[leftIndex]?.[1] || 0,
        rightMm: c.sidePairs[rightIndex]?.[0] || 0,
        leftRebate: true,
        rightRebate: true,
        leftTopIsSmall: frontSmallOnTopForSwing(leftSwing),
        rightTopIsSmall: frontSmallOnTopForSwing(rightSwing),
        mixed: frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing)
      });
    }
    panels.push({
      kind: 'edge', index: doors.length - 1, lockIndex: Math.max(1, Number(p.count) || 1), bigX1: doors[doors.length - 1].zoneEnd, bigX2: ox + sW,
      bigMm: c.frontPanelBigLocks?.[Math.max(1, Number(p.count) || 1)] || c.sidePairs[lastDoorIndex]?.[1] || 0,
      leftRebate: true, rightRebate: false,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing)
    });
  }
  return {panels, doors: doorBoards};
}

function drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel) {
  if (!p.rebate || !boardModel?.doors?.length) return;
  ctx.save();
  const rebatePx = Math.max(1.5, (p.rebateDepth || 0) * scale);
  const profileH = st;
  const yTop = oy + sD;
  const yBot = oy + sD + profileH;
  const yMid = yTop + profileH * 0.5;
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.75;
  ctx.lineJoin = 'miter';
  ctx.lineCap = 'butt';

  const drawBoardProfile = (bigX1, bigX2, leftRebate, rightRebate, leftTopIsSmall, rightTopIsSmall = leftTopIsSmall) => {
    if (bigX2 <= bigX1 + 1) return;
    const r = Math.min(rebatePx, Math.max(1, (bigX2 - bigX1) / 3));
    const smallX1 = leftRebate ? bigX1 + r : bigX1;
    const smallX2 = rightRebate ? bigX2 - r : bigX2;
    const topLeft = leftTopIsSmall ? smallX1 : bigX1;
    const topRight = rightTopIsSmall ? smallX2 : bigX2;
    const botLeft = leftTopIsSmall ? bigX1 : smallX1;
    const botRight = rightTopIsSmall ? bigX2 : smallX2;
    ctx.beginPath();
    ctx.moveTo(topLeft, yTop);
    ctx.lineTo(topRight, yTop);
    if (topRight !== botRight) ctx.lineTo(topRight, yMid);
    ctx.lineTo(botRight, yMid);
    ctx.lineTo(botRight, yBot);
    ctx.lineTo(botLeft, yBot);
    if (botLeft !== topLeft) ctx.lineTo(botLeft, yMid);
    ctx.lineTo(topLeft, yMid);
    ctx.lineTo(topLeft, yTop);
    ctx.stroke();
  };

  boardModel.panels.forEach(panel => drawBoardProfile(panel.bigX1, panel.bigX2, panel.leftRebate, panel.rightRebate, panel.leftTopIsSmall, panel.rightTopIsSmall));
  ctx.restore();
}

    rows.forEach((item, i) => {

    ctx.lineWidth = item.group.id === activeGroupId && g.id === activeRowId ? 1.6 : 1;
    ctx.strokeRect(x, y, cardW, cardH);

    ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.fillText(`${g.count} 间 · ${wallLabel(g.wall)}`, x + 14, y + 36);
    ctx.fillText(`单间 ${fmtMm(c.boothW)}×${g.depth}mm · 门 ${g.doorW}mm`, x + 14, y + 56);

    const mx = x + 14, my = y + 84, mw = Math.min(120, cardW - 28), mh = 42;
    ctx.fillStyle = '#fff'; ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh);
    ctx.strokeStyle = '#185FA5'; ctx.beginPath(); ctx.moveTo(mx + mw*.3, my + mh - 5); ctx.lineTo(mx + mw*.7, my + mh - 5); ctx.stroke();
    ctx.fillStyle = '#1f2328'; ctx.textAlign = 'right'; ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.fillText(`${Math.round(c.totalRun/1000*10)/10} m`, x + cardW - 14, y + 112);
    ctx.textAlign = 'left';
  });
}

function doorWidthSummary(row, c = compute(row)) {
  const groupsByWidth = new Map();
  for (let i = 0; i < Math.max(1, Number(row.count) || 1); i++) {
    if (!hasDoorAt(row, i)) continue;
    const width = Math.round(Number(c.doorWidths?.[i]) || Number(row.doorW) || 0);
    if (!width) continue;
    groupsByWidth.set(width, (groupsByWidth.get(width) || 0) + 1);
  }
  const entries = [...groupsByWidth.entries()].sort((a, b) => a[0] - b[0]);
  return {
    count: entries.reduce((sum, [, qty]) => sum + qty, 0),
    text: entries.length ? entries.map(([width, qty]) => `${rebateText(width, row, 'double')}：${qty}块`).join(' / ') : '无'
  };
}

function drawSegmentedPlan(p, c) {
  const segmentSize = c.segmentSize;
  const segments = Math.ceil(p.count / segmentSize);
  const gapY = 64;
  const rowH = Math.min(128, (PLOT.h - 150 - gapY * (segments - 1)) / segments);
  const startY = PLOT.y + 92;
  ctx.fillStyle = '#656d76';
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`共 ${p.count} 间，按每段最多 ${segmentSize} 间分段显示。`, PLOT.x + 18, PLOT.y + 58);

  for (let s = 0; s < segments; s++) {
    const count = Math.min(segmentSize, p.count - s * segmentSize);
    const segP = {...p, count, total: count * c.boothW};
    const segC = compute(segP);
    const W = segC.totalRun, D = p.depth;
    const wt = segC.wallT, t = p.tPanel;
    const leftWall = segC.hasLeft ? wt : 0;
    const rightWall = segC.hasRight ? wt : 0;
    const backWall = segC.hasBack ? wt : 0;
    const scale = Math.min((PLOT.w - 180) / (W + leftWall + rightWall), rowH / (D + backWall));
    const ox = PLOT.x + 100 + leftWall * scale;
    const oy = startY + s * (rowH + gapY) + backWall * scale;
    const sW = W * scale, sD = D * scale, st = Math.max(1.3, t * scale), swt = wt * scale;
    const firstNo = s * segmentSize + 1;

    drawPlanWalls(ox, oy, sW, sD, swt, segC);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.1; ctx.strokeRect(ox, oy, sW, sD);
    let x = ox;
    if (!segC.hasLeft) { ctx.strokeRect(x, oy, st, sD); x += st; }
    for (let i = 0; i < count; i++) {
      const bw = segC.boothW * scale;
      const doorW = (segC.doorInstallWidths[i] || segC.doorWidths[i] || p.doorW) * scale;
      const dsx = x + (bw - doorW) / 2;
      drawDoorSwing({start:dsx, end:dsx + doorW, width:doorW, swing:boothSwingAt(p, i)}, oy + sD, st, p);
      ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`B${firstNo + i}`, x + bw / 2, oy + sD / 2);
      x += bw;
      if (i < count - 1) { ctx.strokeStyle = '#222'; ctx.strokeRect(x, oy, st, sD); x += st; }
    }
    if (!segC.hasRight) ctx.strokeRect(x, oy, st, sD);
    drawDim(ox, oy - swt - 38, ox + sW, oy - swt - 38, `第 ${s + 1} 段：B${firstNo}-B${firstNo + count - 1} / ${W}mm`, 12);
  }
}

function drawPlanRow(p, ox, oy, scale, labelPrefix = 'B', showGroupName = '', options = {}) {
  const prevDimensionContext = activeDimensionContext;
  activeDimensionContext = {groupId:options.groupId, rowId:options.rowId, hitScale:options.hitScale || 1, hitX:options.hitX || 0, hitY:options.hitY || 0};
  try {
  const c = compute(p);
  const W = c.totalRun, D = p.depth;
  const t = p.tPanel, wt = c.wallT;
  const wtPx = wt * scale;
  const sW = W * scale, sD = D * scale, st = Math.max(3, t * scale), swt = wt * scale;
  const panelGeoms = depthPanelGeometry(p, c, ox, oy, scale);

  const sideWallExtras = {
    left: panelGeoms[0]?.wallH || 0,
    right: panelGeoms[Math.max(1, Number(p.count) || 1)]?.wallH || 0,
    frontExtend: st,
    middle: panelGeoms.filter(item => !item.isEdge && item.wallH > 0).map(item => ({x1:item.wallX, x2:item.wallX + item.wallW, h:item.wallH}))
  };
  drawPlanWalls(ox, oy, sW, sD, swt, c, sideWallExtras);
  const rowSelected = options.groupId === activeGroupId && (
    selectionScope === 'group' ||
    (selectionScope === 'row' && options.rowId === activeRowId)
  ) || isMultiSelected('block', options.groupId, options.rowId);
  if (rowSelected && !drawingForExport) {
    ctx.save();
    const selPad = anno(22);
    ctx.lineJoin = 'miter';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1.2, anno(13));
    ctx.setLineDash([]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = Math.max(0.8, anno(7));
    ctx.setLineDash([anno(46), anno(26)]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (showGroupName && !(drawingForExport && options.tagPreviewOnly)) {
    ctx.save();
    const tagText = String(options.tagText || showGroupName);
    ctx.font = planFont(95);
    const tagW = Math.max(anno(PLAN_ANCHOR.noteTagMinW), ctx.measureText(tagText).width + anno(90));
    const tagH = anno(PLAN_ANCHOR.noteTagH);
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    const tagGap = anno(PLAN_ANCHOR.noteTagGap);
    const tagX = ox;
    const singleBoothTagLift = Math.max(1, Number(p.count) || 1) === 1 ? anno(165) : 0;
    const tagY = totalY - tagH - tagGap - singleBoothTagLift;
    if (!drawingForExport && options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      planHitAreas.push({
        type:'tag',
        x: hitX + tagX * hitScale,
        y: hitY + tagY * hitScale,
        w: tagW * hitScale,
        h: tagH * hitScale,
        groupId: options.groupId,
        rowId: options.rowId
      });
    }
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#d64242';
    ctx.lineWidth = Math.max(0.45, anno(1.2));
    ctx.beginPath();
    ctx.rect(tagX, tagY, tagW, tagH);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#d64242';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tagText, tagX + tagW / 2, tagY + tagH / 2);
    const tagSelected = !drawingForExport && ((selectionScope === 'tag' && options.groupId === activeGroupId && options.rowId === activeRowId) || isMultiSelected('tag', options.groupId, options.rowId));
    if (tagSelected) drawPlanSelectionBox(tagX, tagY, tagW, tagH, anno(10));
    if (canvasTextCaretVisible('tag') && options.groupId === activeGroupId && options.rowId === activeRowId) {
      const textW = ctx.measureText(tagText).width;
      const caretX = tagX + tagW / 2 + textW / 2 + anno(10);
      drawCanvasTextCaret(caretX, tagY + tagH / 2 - anno(42), anno(84), '#d64242');
    }
    ctx.restore();
  }

  const drawDepthPanel = (geom, x, y, w, h) => {
    if (!geom) return;
    const panelIndex = geom.index;
    const selected = isSelectedDepthPanel(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, panelIndex);
    const protrusion = geom.protrusion;
    const actualDepth = geom.actualDepth;
    const actualH = Math.max(1, geom.panelH);
    const count = Math.max(1, Number(p.count) || 1);
    const drawX = geom.panelX;
    const drawY = geom.panelY;
    const drawW = geom.panelW;
    ctx.strokeStyle = selected ? '#d64242' : '#222';
    ctx.lineWidth = selected ? Math.max(1.2, anno(3)) : 0.8;
    ctx.strokeRect(drawX, drawY, drawW, actualH);
    if (protrusion > 0 && actualDepth > 0) {
      if (panelIndex === 0) {
        drawDim(drawX - anno(70), drawY, drawX - anno(70), drawY + actualH, `${fmtMm(actualDepth)}mm`, -12, {kind:'depth-panel-depth', panelIndex});
      } else {
        const dimX = drawX + drawW + anno(panelIndex === count ? 70 : 54);
        drawDim(dimX, drawY, dimX, drawY + actualH, `${fmtMm(actualDepth)}mm`, 12, {kind:'depth-panel-depth', panelIndex});
      }
    }
    if (selected && !drawingForExport) drawPlanSelectionBox(drawX, drawY, drawW, actualH, anno(10));
    if (!drawingForExport && options.groupId && options.rowId && depthPanelSelectable(p, panelIndex)) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const hitPad = Math.max(anno(28), 125 * scale);
      planHitAreas.push({type:'depth-panel', x:hitX + (x - hitPad) * hitScale, y:hitY + y * hitScale, w:(w + hitPad * 2) * hitScale, h:h * hitScale, groupId:options.groupId, rowId:options.rowId, index:panelIndex});
    }
  };

  let x = ox;
  if (!c.hasLeft) {
    drawDepthPanel(panelGeoms[0], x, oy, st, Math.max(1, sD - st));
  }
  const doors = [];
  let boothX = ox;
  for (let i=0; i<p.count; i++) {
    const bx = boothX;
    const boothMm = c.boothWidths[i] || c.boothW;
    const bw = boothMm * scale;
    const hasDoor = hasDoorAt(p, i);
    const doorW = (c.doorInstallWidths[i] || c.doorWidths[i] || p.doorW) * scale;
    const gapLeft = c.gapPairs[i]?.[0] || 0;
    const gapRight = c.gapPairs[i]?.[1] || 0;
    const zoneStart = bx + (c.sidePairs[i]?.[0] || 0) * scale;
    const dsx = zoneStart + gapLeft * scale, dsw = doorW;
    const zoneEnd = dsx + dsw + gapRight * scale;
    const rebatePx = p.rebate ? Math.max(0, Number(p.rebateDepth) || 0) * scale : 0;
    const bigStart = dsx - rebatePx;
    const bigEnd = dsx + dsw + rebatePx;
    if (options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const swingKey = boothSwingAt(p, i);
      const doorHitX = dsx;
      const doorHitW = dsw;
      const doorHitSize = Math.min(sD, dsw);
      const doorHitY = String(swingKey).startsWith('out') ? oy + sD : oy + sD - doorHitSize;
      const doorHitH = doorHitSize;
      planHitAreas.push({type:'booth', x:hitX + doorHitX * hitScale, y:hitY + doorHitY * hitScale, w:doorHitW * hitScale, h:doorHitH * hitScale, groupId:options.groupId, rowId:options.rowId, index:i});
    }
    doors.push({start: dsx, end: dsx + dsw, bigStart, bigEnd, zoneStart, zoneEnd, gapLeft: gapLeft * scale, gapRight: gapRight * scale, width: dsw, boothX: bx, boothW: bw, swing: boothSwingAt(p, i), index:i, hasDoor});
    const currentLabelNo = (options.labelStart || 0) + i + 1;
    ctx.fillStyle='#185FA5'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=planFont(95);
    const boothLabel = `${labelPrefix}${currentLabelNo}`;
    const labelX = bx + bw / 2;
    const labelY = oy + sD / 2;
    if (isSelectedBooth(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, i)) {
      const textW = ctx.measureText(boothLabel).width;
      const textH = annoFont(95);
      const padX = anno(28);
      const padY = anno(18);
      ctx.strokeStyle = '#185FA5'; ctx.lineWidth = Math.max(0.45, anno(2));
      ctx.strokeRect(labelX - textW / 2 - padX, labelY - textH / 2 - padY, textW + padX * 2, textH + padY * 2);
    }
    ctx.fillText(boothLabel, labelX, labelY);
    if (!hasDoor) {
      ctx.save();
      ctx.fillStyle = '#d64242';
      ctx.font = planFont(70);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('无门', labelX, labelY + anno(108));
      ctx.restore();
    }
    if (i < p.count - 1) {
      const panelX = bx + bw - st / 2;
      drawDepthPanel(panelGeoms[i + 1], panelX, oy, st, Math.max(1, sD - st));
    }
    boothX += bw;
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
  if (doors.length && !p.rebate) {
    if (doors[0].zoneStart > ox + 0.5) ctx.strokeRect(ox, oy+sD, doors[0].zoneStart - ox, st);
    for (let i = 0; i < doors.length - 1; i++) {
      const start = doors[i].zoneEnd;
      const end = doors[i + 1].zoneStart;
      if (end > start + 0.5) ctx.strokeRect(start, oy+sD, end - start, st);
    }
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) ctx.strokeRect(doors[doors.length - 1].zoneEnd, oy+sD, ox + sW - doors[doors.length - 1].zoneEnd, st);
  }
  if (!c.hasRight) {
    drawDepthPanel(panelGeoms[p.count], ox + sW - st, oy, st, Math.max(1, sD - st));
  }
  doors.filter(door => door.hasDoor !== false).forEach(door => {
    drawDoorSwing(door, oy+sD, st, p);
  });
  const boardModel = buildBoardModel(p, c, doors, ox, sW, scale);
  drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel);

  const edge = c.edge;
  const middle = c.middle;
  if (options.showTopDims !== false) {
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    drawDim(ox, totalY, ox+sW, totalY, `${c.adjustedLength ? '展开总长' : '总长'} ${fmtMm(W)}mm`, 10, {kind:'total'});
  }
  drawPlanWarnings(c, ox + sW + swt + 18, oy - swt + 4);
  if (options.showBoothDim !== false) {
    const boothY = oy + Math.max(26, sD * 0.18);
    let boothDimX = ox;
    for (let i = 0; i < p.count; i++) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const boothPx = boothMm * scale;
      drawDim(boothDimX, boothY, boothDimX + boothPx, boothY, `${fmtMm(boothMm)}mm`, -10, {kind:'booth-width', boothIndex:i});
      boothDimX += boothPx;
    }
  }
  const depthX = ox + sW + swt + (options.depthDimGap ?? PLAN_ANCHOR.depthDimGap);
  drawDim(depthX, oy, depthX, oy+sD, `深 ${p.depth}mm`, 14, {kind:'depth'});

  const segments = [];
  boardModel.panels.forEach(panel => {
    const cutSides = (panel.leftRebate ? 1 : 0) + (panel.rightRebate ? 1 : 0);
    const label = !p.rebate
      ? fmtMm(panel.bigMm)
      : panel.mixed
      ? {top: fmtMm(Math.max(0, Math.round(panel.bigMm - (p.rebateDepth || 0)))), bottom: fmtMm(panel.bigMm)}
      : boardDimLabel(panel.bigMm, p, cutSides, panel.leftTopIsSmall);
    segments.push({x1: panel.bigX1, x2: panel.bigX2, label, meta:{kind:'front-panel', panel}});
  });
  boardModel.doors.forEach(door => {
    const sourceDoor = doors[door.index];
    const label = p.rebate
      ? {
        top: fmtMm(door.topIsSmall ? door.smallMm : door.bigMm),
        bottom: fmtMm(door.topIsSmall ? door.bigMm : door.smallMm)
      }
      : fmtMm(door.bigMm);
    segments.push({x1: sourceDoor.bigStart, x2: sourceDoor.bigEnd, label, meta:{kind:'door-width', boothIndex:door.index}});
  });
  segments.sort((a, b) => a.x1 - b.x1);
  drawChainDim(oy + sD + st + (options.bottomDimOffset || PLAN_ANCHOR.bottomDimOffset), segments);
  } finally {
    activeDimensionContext = prevDimensionContext;
  }
}

function drawPlanBlock(block, x, y, fit, pageOffsetX, pageOffsetY) {
  const g = block.row;
  const m = block.metrics;
  const group = block.group;
  const orderKey = `${group.id}:${g.id}`;
  const nudge = !previewSheetOrder && !drawingForExport && sheetDragNudge?.key === orderKey ? sheetDragNudge : null;
  const drawX = x + (nudge?.x || 0);
  const drawY = y + (nudge?.y || 0);
  if (!drawingForExport) {
    planHitAreas.push({type:'block', x:pageOffsetX + drawX * fit, y:pageOffsetY + drawY * fit, w:m.w * fit, h:m.h * fit, groupId:group.id, rowId:g.id, orderKey, pageIndex:block.pageIndex ?? 0, block, fit});
  }
  const draggingThisBlock = !drawingForExport && sheetOrderDrag?.key === orderKey;
  if (draggingThisBlock) {
    ctx.save();
    ctx.globalAlpha = 0.35;
  }
  drawPlanRow(g, drawX + m.drawX, drawY + m.drawY, 1, groupLabelPrefix(group), layoutUnitName(group, g), {
    showTopDims: true,
    showBoothDim: true,
    totalDimGap: PLAN_ANCHOR.totalDimGap,
    depthDimGap: PLAN_ANCHOR.depthDimGap,
    bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
    groupColor: groupColor(groups.indexOf(group)),
    labelStart: block.labelStart || 0,
    groupId: group.id,
    rowId: g.id,
    tagText: g.note || groupDisplayName(group),
    tagPreviewOnly: !g.note && !String(group.name || '').trim(),
    hitScale: fit,
    hitX: pageOffsetX,
    hitY: pageOffsetY
  });
  if (draggingThisBlock) ctx.restore();
}

function drawSheetDragOverlay() {
  if (drawingForExport || !sheetDragVisual) return;
  ctx.save();
  const v = sheetDragVisual;
  if (v.target) {
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([12, 8]);
    ctx.strokeRect(v.target.x, v.target.y, v.target.w, v.target.h);
    ctx.setLineDash([]);
  }
  if (v.drag) {
    const x = v.mouseX - v.drag.w / 2;
    const y = v.mouseY - v.drag.h / 2;
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([16, 10]);
    ctx.strokeRect(x, y, v.drag.w, v.drag.h);
    ctx.setLineDash([]);
    if (v.block) {
      const block = v.block;
      const m = block.metrics;
      const fit = Math.max(0.0001, Number(v.fit) || 1);
      ctx.globalAlpha = 0.82;
      const oldDrawingForExport = drawingForExport;
      drawingForExport = true;
      try {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(fit, fit);
        drawPlanRow(block.row, m.drawX, m.drawY, 1, groupLabelPrefix(block.group), layoutUnitName(block.group, block.row), {
          showTopDims: true,
          showBoothDim: true,
          totalDimGap: PLAN_ANCHOR.totalDimGap,
          depthDimGap: PLAN_ANCHOR.depthDimGap,
          bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
          groupColor: groupColor(groups.indexOf(block.group)),
          labelStart: block.labelStart || 0,
          groupId: block.group.id,
          rowId: block.row.id,
          tagText: block.row.note || groupDisplayName(block.group),
          tagPreviewOnly: !block.row.note && !String(block.group.name || '').trim(),
          hitScale: 1,
          hitX: 0,
          hitY: 0
        });
        ctx.restore();
      } finally {
        drawingForExport = oldDrawingForExport;
      }
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.68;
      ctx.fillStyle = '#E6F1FB';
      ctx.strokeStyle = '#0B6FD3';
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, v.drag.w, v.drag.h);
      ctx.strokeRect(x, y, v.drag.w, v.drag.h);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

function drawPlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0) {
  if (pageNeedsLandscape(page)) {
    drawLandscapePlanPageContent(page, layout, sheetOffsetX, sheetOffsetY, pageIndex);
    return;
  }
  drawPortraitPlanPageContent(page, layout, sheetOffsetX, sheetOffsetY, pageIndex);
}

function drawLandscapePlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0) {
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex, true);
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const rawContentW = Math.max(1, page.usedW);
  const rawContentH = Math.max(1, page.usedH);
  const pageFit = Math.min(1, availableW / rawContentW, availableH / rawContentH);
  const baseScale = Math.max(0.0001, Math.min(1, ...page.blocks.map(block => Number(block.sheetScale) || 1)));
  const fit = landscapePageAllowsScale(page) ? pageFit : baseScale;
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const rowYs = [...new Set(page.blocks.map(block => block.pageY))].sort((a, b) => a - b);
  const spareH = Math.max(0, availableH - contentH);
  const underFilledLaterPage = pageIndex > 0 && rowYs.length > 0 && rowYs.length < landscapeRowsPerPage(pageIndex);
  const extraRowGap = underFilledLaterPage ? spareH / (rowYs.length + 1) : 0;
  const rawExtraRowGap = extraRowGap / Math.max(0.0001, fit);
  const rowOffsetByY = new Map(rowYs.map((y, index) => [y, rawExtraRowGap * (index + 1)]));
  const prevAnnoScale = planAnnotationScale;
  planAnnotationScale = 1;
  const localX = sheetOffsetX + P.x + gaps.left + (availableW - contentW) / 2;
  const localY = sheetOffsetY + P.y + gaps.top;
  ctx.save();
  ctx.translate(localX, localY);
  ctx.scale(fit, fit);
  page.blocks.forEach(block => {
    const visualY = block.pageY + (rowOffsetByY.get(block.pageY) || 0);
    drawPlanBlock({...block, pageIndex, pageY: visualY}, block.pageX, visualY, fit, localX, localY);
  });
  ctx.restore();
  planAnnotationScale = prevAnnoScale;
}

function drawPortraitPlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0) {
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex);
  const baseContentW = Math.max(1, page.usedW);
  const baseContentH = Math.max(1, page.usedH);
  const singleBoothPage = page.blocks.length === 1 && Math.max(1, Number(page.blocks[0]?.row?.count) || 1) === 1;
  const singleBoothTaggedPage = singleBoothPage;
  const rawContentW = baseContentW;
  const rawContentH = baseContentH;
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const autoFitScale = Math.min(availableW / rawContentW, availableH / rawContentH, 1);
  const fit = singleBoothTaggedPage ? autoFitScale * 0.58 : singleBoothPage ? autoFitScale * 0.75 : autoFitScale;
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const rowYs = [...new Set(page.blocks.map(block => block.pageY))].sort((a, b) => a - b);
  const bottomReserve = 48;
  const spareH = Math.max(0, availableH - contentH - bottomReserve);
  const visualRowGap = rowYs.length > 1 ? Math.min(24, spareH / (rowYs.length - 1)) : 0;
  const rawVisualRowGap = visualRowGap / Math.max(0.0001, fit);
  const rowOffsetByY = new Map(rowYs.map((y, index) => [y, rawVisualRowGap * index]));
  const prevAnnoScale = planAnnotationScale;
  planAnnotationScale = 1;
  const localX = sheetOffsetX + P.x + gaps.left + (availableW - contentW) / 2;
  const titleClearance = singleBoothTaggedPage ? 90 : 0;
  const localY = sheetOffsetY + P.y + gaps.top + titleClearance;
  ctx.save();
  ctx.translate(localX, localY);
  ctx.scale(fit, fit);
  page.blocks.forEach(block => {
    const visualY = block.pageY + (rowOffsetByY.get(block.pageY) || 0);
    drawPlanBlock({...block, pageIndex, pageY: visualY}, block.pageX, visualY, fit, localX, localY);
  });
  ctx.restore();
  planAnnotationScale = prevAnnoScale;
}

function drawPlanSheetsPreview(p) {
  const baseLayout = getSheetLayout(p);
  const blocks = collectPlanBlocks(p).filter(block => block.row.enabled !== false);
  if (!blocks.length) return;
  const pages = paginatePlanBlocks(blocks, baseLayout);
  const pageLayouts = pages.map(page => sheetLayoutForPage(page, p));
  const gap = Math.max(80, Math.max(...pageLayouts.map(item => item.sheetW), baseLayout.sheetW) * 0.12);
  let x = 0;
  pages.forEach((page, index) => {
    const layout = pageLayouts[index];
    const contentGaps = sheetContentGaps(index, pageNeedsLandscape(page));
    const hitX = x + layout.plot.x + contentGaps.left;
    const hitY = layout.plot.y + contentGaps.top;
    const hitW = Math.max(1, layout.plot.w - contentGaps.left - contentGaps.right);
    const hitH = Math.max(1, layout.plot.h - contentGaps.top - contentGaps.bottom);
    drawSheet('卫生间隔断平面图', p, x, 0, index, layout);
    if (!drawingForExport) planHitAreas.push({type:'sheet-page', x:hitX, y:hitY, w:hitW, h:hitH, pageIndex:index});
    drawPlanPageContent(page, layout, x, 0, index);
    ctx.save();
    ctx.fillStyle = '#1f2328';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${index + 1}/${pages.length} 页`, x + layout.frame.x + layout.frame.w / 2, layout.frame.y + layout.frame.h - 16);
    ctx.restore();
    x += layout.sheetW + gap;
  });
  drawSheetDragOverlay();
}
function drawPlan(p) {
  const baseLayout = getSheetLayout(p);
  const blocks = collectPlanBlocks(p).filter(block => block.row.enabled !== false);
  if (!blocks.length) return;
  const pages = paginatePlanBlocks(blocks, baseLayout);
  const pageIndex = Math.max(0, Math.min(currentPlanPage, pages.length - 1));
  const page = pages[pageIndex];
  const layout = sheetLayoutForPage(page, p);
  ctx.save();
  ctx.beginPath();
  ctx.rect(layout.frame.x + layout.safeGap * 0.35, layout.frame.y + layout.safeGap * 0.35, layout.frame.w - layout.safeGap * 0.7, layout.frame.h - layout.safeGap * 0.7);
  ctx.clip();

  drawPlanPageContent(page, layout, 0, 0);  if (pages.length > 1) {
    ctx.save();
    ctx.fillStyle = '#1f2328';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${pageIndex + 1}/${pages.length} 页`, layout.frame.x + layout.frame.w / 2, layout.frame.y + layout.frame.h - 16);
    ctx.restore();
  }
  drawSheetDragOverlay();
  ctx.restore();
}
function drawFront(p) {
  const prevDimensionContext = activeDimensionContext;
  activeDimensionContext = {groupId:activeGroup()?.id, rowId:activeRow()?.id, hitScale:1, hitX:0, hitY:0};
  try {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = c.totalRun;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 170) / (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)), (P.h - 180) / H);
  const ox = P.x + (P.w - (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)) * scale) / 2 + (c.hasLeft?wt:0) * scale;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hDp = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;

  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  if (c.hasLeft) { drawHatch(ox-swt, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox-swt, oy, swt, sH); }
  if (c.hasRight) { drawHatch(ox+sW, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox+sW, oy, swt, sH); }

  let x = ox;
  for (let i=0; i<=p.count; i++) {
    const isEdge = (i===0 && !c.hasLeft)||(i===p.count && !c.hasRight);
    if (isEdge || (i>0 && i<p.count)) {
      ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(x, floor-hU, st, hU);
      x += st;
    }
    if (i < p.count) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const doorMm = c.doorWidths[i] || p.doorW;
      const bw = boothMm * scale;
      const doorOff = Math.max(0, (boothMm - doorMm) / 2) * scale;
      const dsx = x + doorOff, dsw = doorMm * scale;
      ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(dsx, floor-hDp, dsw, hDp);
      ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(x, floor-hM, bw, vis);
      ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${p.hDoor || 1750}`, dsx+dsw/2, floor-hDp/2);
      x += bw;
    }
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  drawDim(ox, oy-58, ox+sW, oy-58, `${c.adjustedLength ? '展开总长' : '总长'} ${W}mm`, 14, {kind:'total'});
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14, {kind:'h-upright'});
  drawDim(ox+sW+58, floor-vis, ox+sW+58, floor, `见光板 ${p.hVis}mm`, 14, {kind:'h-vis'});
  } finally {
    activeDimensionContext = prevDimensionContext;
  }
}

function drawStandardFrontModule(p, c) {
  const W = c.boothW;
  const H = Math.max(p.hUpright, p.hMid);
  const scale = Math.min((PLOT.w - 360) / W, (PLOT.h - 180) / H);
  const ox = PLOT.x + 120;
  const floor = PLOT.y + 118 + (PLOT.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale;
  const hDoor = (p.hDoor || 1750) * scale;
  const hMid = p.hMid * scale;
  const vis = p.hVis * scale;
  const doorW = p.doorW * scale;
  const dx = ox + (sW - doorW) / 2;

  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  ctx.strokeStyle='#185FA5'; ctx.strokeRect(dx, floor-hDoor, doorW, hDoor);
  ctx.strokeStyle='#6a9bcc'; ctx.strokeRect(ox, floor-hMid, sW, vis);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  drawDim(ox, oy-58, ox+sW, oy-58, `标准间宽 ${fmtMm(c.boothW)}mm`, 14);
  drawDim(ox+sW+58, floor-hDoor, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14);

  drawProjectStats(ox+sW+115, oy+20, p, c, Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35))), Math.ceil(p.count / Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35)))));
}

function drawSide(p) {
  const prevDimensionContext = activeDimensionContext;
  activeDimensionContext = {groupId:activeGroup()?.id, rowId:activeRow()?.id, hitScale:1, hitX:0, hitY:0};
  try {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = p.depth;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 300) / (W + wt), (P.h - 180) / H);
  const ox = P.x + (P.w - W * scale) / 2;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hD = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;
  const doorH = p.doorW * scale;

  if (c.hasBack) {
    drawHatch(ox, oy-swt, sW, swt, 18);
    ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(ox, oy-swt, sW, swt);
  }

  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox, floor-hU, st, hU);
  ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(ox+st, floor-hM, sW-st*2, vis);
  ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('见光板', ox+st+(sW-st*2)/2, floor-hM+vis/2);

  const doorStartY = floor - doorH;
  ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(ox+sW-st, doorStartY, st, doorH);
  ctx.fillStyle='#185FA5'; ctx.fillText('门', ox+sW-st/2, doorStartY+doorH/2);
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox+sW-st, floor-hU, st, hU-doorH);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);

  drawDim(ox, oy-58, ox+sW, oy-58, `深度 ${p.depth}mm`, 14, {kind:'depth'});
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14, {kind:'h-upright'});
  drawDim(ox+sW+58, floor-hD, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14, {kind:'h-door'});
  } finally {
    activeDimensionContext = prevDimensionContext;
  }
}

function renderBOM(p) {
  const rows = drawableGroupRows();
  if (!rows.length && activeRow()?.enabled !== true) {
    renderBomItems([{name:'当前图纸', val:'空白', sub:'输入参数或点击生成后显示'}]);
    return;
  }
  if (rows.length) {
    renderBomItems(buildMaterialListItems(rows.map(item => item.row)));
    return;
  }
  renderBomItems(buildMaterialListItems([p]));
}

function buildMaterialListItems(rows) {
  const sourceRows = rows.filter(Boolean);
  const front = createBomBucket();
  const doors = createBomBucket();
  const midDepths = createBomBucket();
  const visibleDepths = createBomBucket();
  let noDoorCount = 0;
  sourceRows.forEach(row => {
    const c = compute(row);
    const count = Math.max(1, Number(row.count) || 1);
    const edgeWidths = [c.sidePairs[0]?.[0] || 0, c.sidePairs[count - 1]?.[1] || 0];
    const middleWidths = c.sidePairs.slice(0, -1).map((pair, i) => pair[1] + c.sidePairs[i + 1][0]);
    const frontHeight = Number(row.hUpright) || 1830;
    if (row.rebate) {
      addFrontRebateBomPieces(front, row, c, frontHeight);
    } else {
      [...edgeWidths, ...middleWidths].forEach(width => addBomPiece(front, frontHeight, fmtMm(width), ''));
    }

    for (let i = 0; i < count; i++) {
      if (!hasDoorAt(row, i)) {
        noDoorCount++;
        continue;
      }
      const width = Math.round(Number(c.doorWidths?.[i]) || Number(row.doorW) || 0);
      if (width) addBomPiece(doors, Number(row.hDoor) || 1750, row.rebate ? rebateBomSizeText(width, row) : fmtMm(width), row.rebate ? '双启口' : '');
    }

    const specialDepths = specialDepthPanelItems(row);
    const depthTextFor = index => {
      const special = specialDepths.find(item => item.index === index);
      const depth = special ? special.depth : c.boothD;
      return fmtMm(depth);
    };
    Array.from({length: Math.max(0, count - 1)}, (_, i) => i + 1).forEach(index => addBomPiece(midDepths, row.hMid, depthTextFor(index), ''));

    const visibleIndexes = [];
    if (!c.hasLeft) visibleIndexes.push(0);
    if (!c.hasRight) visibleIndexes.push(count);
    visibleIndexes.forEach(index => addBomPiece(visibleDepths, row.hVis, depthTextFor(index), ''));
  });
  return [
    {name:'前沿板', val:`${front.count} 块`, sub:formatBomBucket(front) || '无前沿板数据'},
    {name:'门板', val:`${doors.count} 块`, sub:doors.count ? `${formatBomBucket(doors)}${noDoorCount ? ` · ${noDoorCount}间无需门板` : ''}` : `${noDoorCount || 0} 间均无需门板`},
    {name:'中隔板', val:`${midDepths.count} 块`, sub:midDepths.count ? formatBomBucket(midDepths) : '单间无中隔板'},
    {name:'见光板', val:`${visibleDepths.count} 块`, sub:visibleDepths.count ? formatBomBucket(visibleDepths) : '左右两侧均靠墙'},
  ];
}

function addFrontRebateBomPieces(bucket, row, c = compute(row), height = row.hUpright || 1830) {
  const count = Math.max(1, Number(row.count) || 1);
  const panels = [];
  if (count <= 0) return;
  panels.push({width:c.frontPanelBigLocks?.[0] || c.sidePairs[0]?.[0] || 0, process:'单启口'});
  for (let i = 0; i < count - 1; i++) {
    const leftSwing = boothSwingAt(row, i);
    const rightSwing = boothSwingAt(row, i + 1);
    const width = c.frontPanelBigLocks?.[i + 1] || (c.sidePairs[i]?.[1] || 0) + (c.sidePairs[i + 1]?.[0] || 0);
    const mixed = frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing);
    panels.push({width, process:mixed ? '异启口' : '双启口'});
  }
  panels.push({width:c.frontPanelBigLocks?.[count] || c.sidePairs[count - 1]?.[1] || 0, process:'单启口'});
  panels.forEach(panel => addBomPiece(bucket, height, rebateBomSizeText(panel.width, row), panel.process));
}

function createBomBucket() {
  return {count:0, pieces:new Map()};
}

function addBomPiece(bucket, height, sizeText, process = '') {
  const h = Math.round(Number(height) || 0);
  const size = String(sizeText || '').trim();
  if (!h || !size) return;
  const proc = String(process || '').trim();
  const key = `${h}|${size}|${proc}`;
  const item = bucket.pieces.get(key) || {height:h, size, process:proc, count:0};
  item.count++;
  bucket.count++;
  bucket.pieces.set(key, item);
}

function formatBomBucket(bucket) {
  if (!bucket?.pieces?.size) return '';
  const lastHeightByProcess = new Map();
  let lastProcess = null;
  const shownProcess = new Set();
  return [...bucket.pieces.values()]
    .sort((a, b) => bomProcessSortValue(a.process) - bomProcessSortValue(b.process) || a.process.localeCompare(b.process, 'zh-Hans-CN') || a.height - b.height || bomSizeSortValue(a.size) - bomSizeSortValue(b.size) || a.size.localeCompare(b.size, 'zh-Hans-CN'))
    .map(item => {
      const processKey = item.process || '';
      const lastHeight = lastHeightByProcess.get(processKey);
      const prefix = item.height === lastHeight ? `[size-cont]${item.size}` : `[size-head:${item.height}]${item.size}`;
      lastHeightByProcess.set(processKey, item.height);
      const groupGap = lastProcess !== null && processKey !== lastProcess ? '[bom-gap] / ' : '';
      lastProcess = processKey;
      const processText = item.process && !shownProcess.has(processKey) ? `${item.process} ` : (item.process ? `[process-cont:${item.process}] ` : '');
      if (item.process) shownProcess.add(processKey);
      return `${groupGap}${processText}${prefix}=${item.count}`;
    })
    .join(' / ');
}

function bomProcessSortValue(process) {
  const order = {'单启口':1, '双启口':2, '异启口':3};
  return order[String(process || '')] || 0;
}

function bomSizeSortValue(value) {
  const match = String(value || '').match(/\d+/);
  return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
}

function urinalBomItem() {
  const count = Number(urinalSpec.count) || 0;
  if (count <= 0 || !(urinalSpec.width > 0) || !(urinalSpec.height > 0) || !(urinalSpec.thick > 0)) return null;
  const process = `${urinalSpec.shape || '矩形'}，${urinalSpec.hole || '无开孔'}`;
  const note = urinalSpec.note ? `，${urinalSpec.note}` : (urinalSpec.shape === '异形' || urinalSpec.hole === '有开孔' ? '，需现场模板/图纸确认' : '');
  return {name:'小便板', val:`${count} 张`, sub:`${urinalSpec.width}×${urinalSpec.height}×${urinalSpec.thick}mm，${process}${note}`};
}

function renderBomItems(items) {
  const allItems = [...items];
  const urinal = urinalBomItem();
  if (urinal) allItems.push(urinal);
  document.getElementById('bom').innerHTML = allItems.map(i=>`
    <div class="bom-card">
      <div class="bom-card-head"><div class="name">${escapeHtml(i.name)}</div><div class="val">${formatBomChips(i.val)}</div></div>
      ${formatBomLines(i.sub)}
    </div>`).join('');
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function formatBomChips(value) {
  return String(value ?? '').split('/').map(part => part.trim()).filter(Boolean).map(part => `<span class="bom-chip">${escapeHtml(part)}</span>`).join('');
}

function formatBomLines(value) {
  const lines = String(value ?? '').split(/\s+\/\s+|\s+·\s+/).map(part => part.trim()).filter(Boolean);
  const htmlLines = (lines.length ? lines : ['无']).map(line => {
    if (line === '[bom-gap]') return '<div class="bom-gap" aria-hidden="true"></div>';
    const processPlaceholderHeadMatch = line.match(/^\[process-cont:(.+?)\]\s+\[size-head:(\d+)\](.*)$/);
    if (processPlaceholderHeadMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="bom-size-process bom-process-placeholder">${escapeHtml(processPlaceholderHeadMatch[1])}</span><span class="bom-size-left">${escapeHtml(processPlaceholderHeadMatch[2])} x </span><span class="bom-size-right">${escapeHtml(processPlaceholderHeadMatch[3])}</span></span></div>`;
    const processPlaceholderContMatch = line.match(/^\[process-cont:(.+?)\]\s+\[size-cont\](.*)$/);
    if (processPlaceholderContMatch) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="bom-size-process bom-process-placeholder">${escapeHtml(processPlaceholderContMatch[1])}</span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(processPlaceholderContMatch[2])}</span></span></div>`;
    const processHeadMatch = line.match(/^(.+?)\s+\[size-head:(\d+)\](.*)$/);
    if (processHeadMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="bom-size-process">${escapeHtml(processHeadMatch[1])}</span><span class="bom-size-left">${escapeHtml(processHeadMatch[2])} x </span><span class="bom-size-right">${escapeHtml(processHeadMatch[3])}</span></span></div>`;
    const processContMatch = line.match(/^(.+?)\s+\[size-cont\](.*)$/);
    if (processContMatch) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="bom-size-process">${escapeHtml(processContMatch[1])}</span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(processContMatch[2])}</span></span></div>`;
    const headMatch = line.match(/^\[size-head:(\d+)\](.*)$/);
    if (headMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="bom-size-process"></span><span class="bom-size-left">${escapeHtml(headMatch[1])} x </span><span class="bom-size-right">${escapeHtml(headMatch[2])}</span></span></div>`;
    const isContinued = line.startsWith('[size-cont]');
    if (isContinued) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="bom-size-process"></span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(line.slice(11))}</span></span></div>`;
    return `<div class="bom-line">${escapeHtml(line)}</div>`;
  });
  const columns = [];
  for (let i = 0; i < htmlLines.length; i += 20) columns.push(htmlLines.slice(i, i + 20));
  const columnHtml = columns.map((column, index) => `<div class="bom-column${index > 0 ? ' is-overflow' : ''}">${column.join('')}</div>`).join('');
  return `<div class="bom-lines" style="--bom-columns:${Math.max(1, columns.length)}">${columnHtml}</div>`;
}

function exportImg(name) {
  const filename = `隔断${name||currentTab}.png`;
  const p = lastParams || getParams();
  const sheetCanvas = (currentTab === 'plan' && canvasMode === 'sheets')
    ? renderPlanSheetsStripCanvas(p, QUALITY_RENDER_SCALE)
    : renderSheetCanvas(currentTab, p, {canvasMode, renderScale:QUALITY_RENDER_SCALE, planPage: currentTab === 'plan' ? currentPlanPage : undefined});
  try {
  const link = document.createElement('a');
  link.download = filename;
  link.href = sheetCanvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  link.remove();
  } catch (err) {
    sheetCanvas.toBlob(blob => {
      if (!blob) return alert(`导出失败：${err.message || err}`);
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = filename;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 500);
    }, 'image/png');
  }
}

function exportAll() {
  const p = lastParams || getParams();
  const oldMode = canvasMode;
  canvasMode = 'sheets';
  const planPages = paginatePlanBlocks(collectPlanBlocks(p).filter(block => block.row.enabled !== false), getSheetLayout(p));
  canvasMode = oldMode;
  const jobs = [];
  planPages.forEach((_, pageIndex) => jobs.push({tab:'plan', name:`平面图-${pageIndex + 1}`, options:{planPage:pageIndex}}));
  jobs.push({tab:'front', name:'正立面图', options:{}});
  jobs.push({tab:'side', name:'侧立面图', options:{}});
  jobs.forEach((job,i)=>{
    setTimeout(()=>{
      const sheetCanvas = renderSheetCanvas(job.tab, p, {...job.options, canvasMode:'sheets', renderScale:QUALITY_RENDER_SCALE});
      const link = document.createElement('a');
      link.download = `隔断${job.name}.png`;
      link.href = sheetCanvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      link.remove();
    }, i*300);
  });
}

async function printPdf() {
  try {
    const p = lastParams || getParams();
    const pages = currentTab === 'plan'
      ? getSheetPlanPages(p).map((_, i) => renderSheetCanvas('plan', p, {planPage:i, canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE}))
      : [renderSheetCanvas(currentTab, p, {canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE})];
    const pageImages = await Promise.all(pages.map(canvas => new Promise(resolve => {
      canvas.toBlob(blob => {
        resolve({url: blob ? URL.createObjectURL(blob) : canvas.toDataURL('image/png'), landscape: canvas.width > canvas.height});
      }, 'image/png');
    })));
    const paper = paperSize === 'a3' ? {w:297, h:420, label:'A3'} : {w:210, h:297, label:'A4'};
    const oldFrame = document.getElementById('print-frame');
    if (oldFrame) oldFrame.remove();
    const frame = document.createElement('iframe');
    frame.id = 'print-frame';
    frame.style.position = 'fixed';
    frame.style.right = '0';
    frame.style.bottom = '0';
    frame.style.width = '0';
    frame.style.height = '0';
    frame.style.border = '0';
    document.body.appendChild(frame);
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html><html><head><meta charset="utf-8"><title>PDF打印</title><style>
      @page{size:${paper.label} portrait;margin:0}
      html,body{margin:0;width:100%;height:100%;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      body{overflow:hidden}
      .page{width:${paper.w}mm;height:${paper.h}mm;display:flex;align-items:center;justify-content:center;page-break-after:always;break-after:page;overflow:hidden}
      .page.landscape{width:${paper.h}mm;height:${paper.w}mm}
      .page:last-child{page-break-after:auto;break-after:auto}
      img{width:100%;height:100%;object-fit:contain;display:block}
    </style></head><body>${pageImages.map((item, i) => `<div class="page${item.landscape ? ' landscape' : ''}"><img src="${item.url}" alt="图纸${i + 1}"></div>`).join('')}</body></html>`);
    doc.close();
    window.setTimeout(() => {
      try {
        frame.contentWindow.focus();
        frame.contentWindow.print();
      } catch (e) {
        const link = document.createElement('a');
        link.download = `隔断图纸.html`;
        link.href = `data:text/html;charset=utf-8,${encodeURIComponent(doc.documentElement.outerHTML)}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }
      window.setTimeout(() => pageImages.forEach(item => {
        if (String(item.url).startsWith('blob:')) URL.revokeObjectURL(item.url);
      }), 5000);
    }, 150);
  } catch (err) {
    alert(`PDF打印失败：${err.message || err}`);
  }
}

function markButtonBusy(id, text) {
  const btn = document.getElementById(id);
  if (!btn) return () => {};
  const old = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = text;
  return () => {
    btn.disabled = false;
    btn.innerHTML = old;
  };
}

function bindExportButtons() {
  const current = document.getElementById('btn-export-current');
  const all = document.getElementById('btn-export-all');
  const pdf = document.getElementById('btn-print-pdf');
  if (current) current.addEventListener('click', () => {
    const done = markButtonBusy('btn-export-current', '正在导出...');
    try { exportImg('平面图'); } finally { window.setTimeout(done, 600); }
  });
  if (all) all.addEventListener('click', () => {
    const done = markButtonBusy('btn-export-all', '正在导出...');
    try { exportAll(); } finally { window.setTimeout(done, 1400); }
  });
  if (pdf) pdf.addEventListener('click', () => {
    const done = markButtonBusy('btn-print-pdf', '正在打开打印...');
    try { printPdf(); } finally { window.setTimeout(done, 1200); }
  });
}

let pendingExportMode = 'current-image';

function sanitizeExportName(name, fallback = '隔断图纸') {
  const cleaned = String(name || '').trim().replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g, ' ');
  return cleaned || fallback;
}

function currentViewLabel() {
  return {plan:'平面图', front:'正立面图', side:'侧立面图'}[currentTab] || '图纸';
}

function downloadCanvasPng(canvas, filename) {
  try {
    const link = document.createElement('a');
    link.download = `${filename}.png`;
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    link.remove();
  } catch (err) {
    canvas.toBlob(blob => {
      if (!blob) return alert(`导出失败：${err.message || err}`);
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `${filename}.png`;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 500);
    }, 'image/png');
  }
}

  const p = lastParams || getParams();

    ? renderPlanSheetsStripCanvas(p, QUALITY_RENDER_SCALE)

  jobs.push({tab:'front', name:'正立面图', options:{}});

function exportPdfCanvasesForScope(p, scope = 'current') {
  if (scope === 'all') {
    const planPages = getSheetPlanPages(p).map((_, i) => renderSheetCanvas('plan', p, {planPage:i, canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE}));
    return [
      ...planPages,
      renderSheetCanvas('front', p, {canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE}),
      renderSheetCanvas('side', p, {canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE})
    ];
  }
  if (currentTab === 'plan') {
    return getSheetPlanPages(p).map((_, i) => renderSheetCanvas('plan', p, {planPage:i, canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE}));
  }
  return [renderSheetCanvas(currentTab, p, {canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE})];
}

function openExportDialog(mode) {
  pendingExportMode = mode;
  const input = document.getElementById('export-file-name');
  const scopeRow = document.getElementById('export-pdf-scope');
  const title = document.getElementById('export-modal-title');
  const label = mode === 'all-image' ? '导出全部视图' : mode === 'pdf' ? '导出PDF' : '导出当前视图';
  if (title) title.textContent = label;
  if (input) input.value = mode === 'all-image' ? '隔断全部视图' : mode === 'pdf' ? '隔断图纸' : `隔断${currentViewLabel()}`;
  scopeRow?.classList.toggle('show', mode === 'pdf');
  openProjectModal('export-modal');
  window.setTimeout(() => input?.focus(), 0);
}

function confirmNamedExport() {
  const input = document.getElementById('export-file-name');
  const name = sanitizeExportName(input?.value, '隔断图纸');
  closeProjectModal('export-modal');
  if (pendingExportMode === 'all-image') {
    exportNamedAllImages(name);
    return;
  }
  if (pendingExportMode === 'pdf') {
    const scope = document.querySelector('input[name="export-pdf-scope"]:checked')?.value || 'current';
    exportNamedPdf(name, scope);
    return;
  }
  exportNamedImage(name);
}

function bindNamedExportButtons() {
  const current = document.getElementById('btn-export-current');
  const all = document.getElementById('btn-export-all');
  const pdf = document.getElementById('btn-print-pdf');
  if (current) current.onclick = () => openExportDialog('current-image');
  if (all) all.onclick = () => openExportDialog('all-image');
  if (pdf) pdf.onclick = () => openExportDialog('pdf');
}

function updateZoomInfo() {
  document.getElementById('zoom-info').textContent = Math.round(zoomScale*100)+'%';
}
