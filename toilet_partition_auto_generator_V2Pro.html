<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卫生间隔断自动生成器</title>
<style>
:root{
  --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --color-text-primary:#1f2328;
  --color-text-secondary:#656d76;
  --color-text-tertiary:#8c959f;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f6f8fa;
  --color-border-primary:#d0d7de;
  --color-border-secondary:#d8dee4;
  --color-border-tertiary:#e1e4e8;
  --border-radius-md:0.375rem;
  --border-radius-lg:0.5rem;
  --control-gap:0.5rem;
  --field-gap:0.5rem;
  --compact-gap:0.5rem;
  --sidebar-content-font:0.875rem;
}
body.theme-dark{
  --color-text-primary:#e6edf3;
  --color-text-secondary:#9da7b3;
  --color-text-tertiary:#7d8793;
  --color-background-primary:#141a22;
  --color-background-secondary:#0f141b;
  --color-border-primary:#344152;
  --color-border-secondary:#303a48;
  --color-border-tertiary:#27313d;
  --group-mono:#ffffff;
}
body{--group-mono:#000000}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%}
body{height:100%;font-family:'Microsoft YaHei', var(--font-sans);color:var(--color-text-primary);background:#f6f8fa}
body.theme-dark{background:#090d12}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{display:flex;gap:0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);height:calc(100vh - 1.25rem);margin:0.625rem}
.sidebar{width:19rem;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);overflow-y:auto}
.sb-head{padding:1rem 1rem 0.75rem;border-bottom:0.5px solid var(--color-border-tertiary);display:grid;grid-template-columns:1fr auto auto;gap:0.75rem;align-items:start}
.sb-title{min-width:0}
.sb-head p{font-size:0.9375rem;line-height:1.4;font-weight:600;color:var(--color-text-primary)}
.sb-head span{display:block;margin-top:0.125rem;font-size:0.75rem;line-height:1.45;color:var(--color-text-tertiary)}
.theme-btn{width:2.5rem;height:2.5rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.25rem;line-height:1;transition:all .15s}
.theme-btn:hover{border-color:#378ADD;color:#185FA5}
body.theme-dark .theme-btn:hover{color:#79c0ff}
.project-folder-btn{height:2.5rem;padding:0 0.875rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:0.875rem;font-weight:700;cursor:pointer;white-space:nowrap;align-self:start}
.project-folder-btn:hover{border-color:#378ADD;color:#185FA5}
.save-drawing-btn{height:1.875rem;padding:0 0.75rem;margin-left:0.25rem;border:0.5px solid #185FA5;border-radius:var(--border-radius-md);background:#185FA5;color:#fff;font-size:0.75rem;font-weight:700;cursor:pointer;white-space:nowrap}
.save-drawing-btn:hover{background:#0C447C;border-color:#0C447C}
.project-modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:1rem;background:rgba(15,23,42,.38)}
.project-modal.open{display:flex}
.project-dialog{width:min(32rem,calc(100vw - 2rem));max-height:min(80dvh,38rem);display:flex;flex-direction:column;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);box-shadow:0 20px 60px rgba(31,35,40,.24);overflow:hidden}
.project-dialog-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.875rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.project-dialog-title{font-size:1rem;font-weight:800;color:var(--color-text-primary)}
.project-close{width:2rem;height:2rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:1.125rem;cursor:pointer}
.project-dialog-body{padding:1rem;overflow:auto}
.project-save-form{display:grid;gap:0.75rem}
.project-save-form input{height:2.5rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:0.9375rem;padding:0 0.75rem}
.export-scope-row{display:none;grid-template-columns:1fr 1fr;gap:0.5rem}
.export-scope-row label{display:flex;align-items:center;justify-content:center;gap:0.375rem;height:2.5rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:0.875rem;font-weight:700;color:var(--color-text-secondary);cursor:pointer}
.export-scope-row input{width:1rem;height:1rem;accent-color:#185FA5}
.export-scope-row.show{display:grid}
.project-actions{display:flex;justify-content:flex-end;gap:0.5rem;margin-top:1rem}
.project-actions button,.project-file-row button{height:2.25rem;padding:0 0.75rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:0.8125rem;font-weight:600;cursor:pointer;white-space:nowrap}
.project-actions .primary,.project-file-row .primary{background:#185FA5;border-color:#185FA5;color:#fff}
.project-file-list{display:grid;gap:0.625rem}
.project-file-row{display:grid;grid-template-columns:1fr auto auto;gap:0.5rem;align-items:center;padding:0.75rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary)}
.project-file-name{font-size:0.9375rem;font-weight:700;color:var(--color-text-primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-file-time{display:block;margin-top:0.125rem;font-size:0.75rem;font-weight:500;color:var(--color-text-tertiary)}
.project-empty{font-size:0.875rem;color:var(--color-text-tertiary);text-align:center;padding:1rem}
.quick-layout{display:grid;gap:var(--control-gap)}
.quick-title-row{display:flex;align-items:center;justify-content:space-between;gap:var(--field-gap);margin-bottom:var(--field-gap)}
.quick-title-row .sec-title{margin-bottom:0;white-space:nowrap;flex:0 0 auto}
.switch-toggle{display:inline-flex;align-items:center;gap:var(--control-gap);border:none;background:transparent;color:var(--color-text-secondary);font-size:var(--sidebar-content-font);font-weight:600;cursor:pointer;white-space:nowrap;padding:0}
.switch-toggle .switch-track{width:2.25rem;height:1.25rem;border:0.5px solid var(--color-border-secondary);border-radius:999px;background:var(--color-border-secondary);position:relative;flex:0 0 auto;transition:background .18s,border-color .18s}
.switch-toggle .switch-track::after{content:"";position:absolute;width:0.875rem;height:0.875rem;left:0.125rem;top:50%;border-radius:50%;background:#fff;transform:translateY(-50%);box-shadow:0 1px 2px rgba(31,35,40,.18);transition:left .18s}
.switch-toggle.active{color:#185FA5}
.switch-toggle.active .switch-track{background:#185FA5;border-color:#185FA5}
.switch-toggle.active .switch-track::after{left:1.125rem}
body.theme-dark .switch-toggle.active{color:#b9dcff}
body.theme-dark .switch-toggle.active .switch-track{background:#58a6ff;border-color:#58a6ff}
.quick-row{display:grid;gap:var(--compact-gap)}
.quick-row-head{display:flex;align-items:center;justify-content:space-between;color:var(--color-text-secondary);font-size:var(--sidebar-content-font)}
.quick-cells{display:flex;flex-wrap:wrap;gap:var(--compact-gap)}
.quick-cell{width:2.625rem;height:2.25rem;text-align:center;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:var(--sidebar-content-font);font-weight:600;font-variant-numeric:tabular-nums;padding:0 0.125rem}
.quick-cell:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.16)}
.quick-cell.active{border-color:#378ADD;background:#E6F1FB;color:#185FA5;box-shadow:0 0 0 2px rgba(55,138,221,.16)}
body.theme-dark .quick-cell.active{background:#102a43;color:#b9dcff;border-color:#58a6ff}
.quick-actions{display:grid;gap:var(--control-gap)}
.quick-page-actions{display:grid;grid-template-columns:1fr 1fr;gap:var(--control-gap)}
.quick-bottom-actions{display:grid;grid-template-columns:1fr;align-items:center;gap:var(--control-gap)}
.quick-btn{height:2.25rem;padding:0 0.75rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);font-size:var(--sidebar-content-font);cursor:pointer;white-space:nowrap}
.quick-btn:hover{border-color:#378ADD;color:#185FA5;background:var(--color-background-primary)}
.quick-btn:disabled{opacity:.45;cursor:not-allowed;background:transparent;color:var(--color-text-tertiary);border-color:var(--color-border-tertiary)}
.quick-btn.primary{width:100%;height:2.25rem;background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600;font-size:var(--sidebar-content-font)}
.quick-btn.primary:hover{background:#0C447C;border-color:#0C447C;color:#fff}
.quick-history-actions{display:flex;gap:var(--compact-gap);align-items:center}
.global-history-actions{margin-right:0.125rem;padding-right:0.5rem;border-right:0.5px solid var(--color-border-tertiary)}
.quick-icon-btn{width:2rem;height:2.25rem;padding:0;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.quick-icon-btn svg{width:1.125rem;height:1.125rem;display:block;stroke:currentColor;stroke-width:2.25;fill:none;stroke-linecap:round;stroke-linejoin:round}
.quick-icon-btn:hover{border-color:#378ADD;color:#185FA5;background:#fff}
body.theme-dark .quick-icon-btn:hover{border-color:#58a6ff;color:#b9dcff;background:#141a22}
.count-field{display:none}
.sec{padding:0.875rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.sec.elevation-only{display:block}
.sec-title{font-size:0.6875rem;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:var(--field-gap);line-height:1.35}
.collapsible-sec .sec-title{display:flex;align-items:center;justify-content:space-between;gap:var(--control-gap);cursor:pointer;margin-bottom:0}
#material-section .sec-title{font-size:0.8125rem}
.collapsible-sec .sec-title::after{content:"";width:0.42rem;height:0.42rem;border:0.11rem solid currentColor;border-left:0;border-top:0;transform:rotate(45deg);opacity:.8;transition:transform .15s}
.collapsible-sec:not(.collapsed) .sec-title{margin-bottom:var(--field-gap)}
.collapsible-sec:not(.collapsed) .sec-title::after{transform:rotate(225deg);margin-top:0.25rem}
.collapsible-sec.collapsed .collapsible-body{display:none}
.mobile-sec-toggle{display:none}
.wall-section .sec-title{font-size:0.8125rem;margin-bottom:var(--field-gap)}
.wall-section .wall-btn{font-size:var(--sidebar-content-font);min-height:5rem}
.wall-section .wall-btn svg{width:3.375rem;height:2.5rem;margin-bottom:var(--field-gap)}
.field{margin-bottom:var(--field-gap)}
.field:last-child{margin-bottom:0}
.field-pair{display:grid;grid-template-columns:1fr 1fr;gap:var(--control-gap);margin-bottom:var(--field-gap)}
.field-pair .field{margin-bottom:0}
.rebate-row{display:grid;grid-template-columns:1fr auto;gap:var(--control-gap);align-items:end;margin:var(--field-gap) 0 var(--field-gap)}
.rebate-row .field{margin-bottom:0}
.rebate-row .check-field{height:2rem;margin-bottom:0;align-items:center;justify-content:center}
.field label{display:block;font-size:var(--sidebar-content-font);line-height:1.45;color:var(--color-text-secondary);margin-bottom:var(--field-gap)}
.field label span,.sec-title span{display:inline-block;margin-left:0.25rem;padding:0 0.25rem;border-radius:0.1875rem;background:#fff;color:#111;font-weight:600;text-shadow:none;text-transform:none;letter-spacing:0}
.field input[type=number],.field input[type=text],.field select{width:100%;padding:0.4375rem 0.6875rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:var(--sidebar-content-font);line-height:1.25;height:2.25rem;-webkit-appearance:none;-moz-appearance:textfield}
.field input[type=number]::-webkit-outer-spin-button,.field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.check-field{display:flex;align-items:center;justify-content:space-between;gap:var(--field-gap);margin-bottom:var(--field-gap);color:var(--color-text-secondary);font-size:var(--sidebar-content-font);line-height:1.45}
.check-field input{width:1rem;height:1rem;accent-color:#185FA5}
.check-field .switch-toggle{font-size:var(--sidebar-content-font)}
.check-field input.switch-source{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.wall-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--control-gap)}
.wall-btn{min-height:4.25rem;padding:0.5rem 0.375rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-size:var(--sidebar-content-font);color:var(--color-text-secondary);cursor:pointer;text-align:center;line-height:1.35;transition:all 0.15s}
.wall-btn.active{background:#E6F1FB;border-color:#378ADD;color:#185FA5}
body.theme-dark .wall-btn.active{background:#102a43;border-color:#58a6ff;color:#b9dcff}
.wall-btn svg{display:block;margin:0 auto 0.3125rem;width:3rem;height:2.25rem}
.booth-swing-panel{display:grid;gap:var(--control-gap);margin-top:var(--field-gap);padding-top:var(--field-gap);border-top:0.5px solid var(--color-border-tertiary)}
.booth-swing-hint{font-size:var(--sidebar-content-font);color:var(--color-text-tertiary);line-height:1.45}
.booth-pick-line{display:flex;gap:var(--compact-gap);align-items:center}
.door-width-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--control-gap);align-items:end;margin-bottom:var(--field-gap)}
.door-width-row .field{margin-bottom:0}
.door-width-row #booth-door-width-panel{margin:0;padding:0;border-top:0;align-self:end}
.door-width-row #booth-door-width-panel .booth-swing-hint{display:none}
#booth-door-width-panel .booth-pick-line{display:grid;grid-template-columns:1fr;gap:var(--control-gap)}
#booth-door-width-panel .booth-pick-clear{width:100%;padding:0 var(--control-gap)}
.booth-pick-input{height:2.25rem;min-width:0;flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:var(--sidebar-content-font);padding:0.4375rem 0.6875rem;text-transform:uppercase}
.booth-pick-input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.16)}
.booth-pick-input.is-override{border-color:#d64242;background:#fff7f7;color:#9f2222}
.booth-pick-input:disabled{background:var(--color-background-secondary);color:var(--color-text-tertiary);cursor:not-allowed}
.booth-pick-clear{height:2.25rem;padding:0 0.75rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:var(--sidebar-content-font);cursor:pointer}
.booth-pick-clear:hover{border-color:#378ADD;color:#185FA5}
.booth-pick-clear:disabled{opacity:.45;cursor:not-allowed}
.right{flex:1;display:flex;flex-direction:column;min-width:0}
.view-tabs{display:flex;align-items:center;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.vtab{padding:0.5rem 1rem;font-size:0.75rem;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);transition:all 0.15s}
.vtab.active{border-bottom-color:#378ADD;color:#185FA5;font-weight:500}
body.theme-dark .vtab.active{border-bottom-color:#58a6ff;color:#b9dcff}
.top-widths{display:flex;align-items:center;gap:0.5rem;margin-left:1rem;min-width:20rem;max-width:42rem;flex:0 1 42rem}
.top-widths label{font-size:0.75rem;color:var(--color-text-secondary);white-space:nowrap}
.width-card-row{display:flex;align-items:center;gap:0.3125rem;min-width:0;overflow-x:auto;padding:0.125rem 0;scrollbar-width:thin}
.width-card{width:3.25rem;height:1.625rem;text-align:center;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:0.75rem;font-weight:600;line-height:1.2;flex:0 0 auto}
.width-card::placeholder{color:var(--color-text-tertiary);opacity:.72;font-weight:500}
.width-card:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.16)}
.width-card:disabled{background:var(--color-background-secondary);color:var(--color-text-tertiary);border-style:dashed;cursor:not-allowed;font-weight:500}
.special-card-row{display:grid;grid-template-columns:1fr;gap:0.5rem;min-width:0}
.special-card-field{display:grid;grid-template-columns:minmax(4.5rem,1fr) 4.25rem;align-items:center;gap:0.5rem;min-width:0}
.special-card-field label{font-size:var(--sidebar-content-font);color:var(--color-text-tertiary);white-space:nowrap}
.special-card-field .width-card{width:4.25rem;height:1.875rem;font-size:var(--sidebar-content-font)}
.paper-select{display:flex;align-items:center;gap:0.375rem;margin-left:auto;padding-right:0.875rem;white-space:nowrap}
.paper-select label{font-size:0.75rem;color:var(--color-text-secondary)}
.paper-select select{height:1.625rem;padding:0.125rem 1.5rem 0.125rem 0.5rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:0.75rem}
.sheet-actions{height:3.25rem;display:flex;align-items:center;gap:0.625rem;padding:0.625rem 0.875rem;border-bottom:0.5px solid var(--color-border-tertiary);background:#eef1f4}
body.theme-dark .sheet-actions{background:#202734}
.sheet-action-btn{height:2rem;padding:0 0.875rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:0.8125rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:0.375rem;transition:border-color .15s,color .15s,background .15s}
.sheet-action-btn:hover{border-color:#378ADD;color:#185FA5;background:#fff}
body.theme-dark .sheet-action-btn:hover{border-color:#58a6ff;color:#b9dcff;background:#141a22}
.sheet-action-btn.expand::after{content:"";width:0.42rem;height:0.42rem;border:0.11rem solid currentColor;border-left:0;border-top:0;transform:rotate(45deg);margin-left:0.125rem;margin-top:-0.125rem;opacity:.82}
.sheet-page-info{margin-left:auto;font-size:0.75rem;color:var(--color-text-secondary)}
.urinal-panel{position:absolute;top:7.15rem;left:17rem;z-index:30;width:24rem;padding:0.75rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);box-shadow:0 12px 30px rgba(31,35,40,.18);display:none;grid-template-columns:repeat(3,1fr);gap:0.5rem;align-items:end}
.urinal-panel.open{display:grid}
.urinal-panel label{display:grid;gap:0.25rem;font-size:var(--sidebar-content-font);color:var(--color-text-secondary)}
.urinal-panel input,.urinal-panel select{height:1.875rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:var(--sidebar-content-font);padding:0.25rem 0.5rem;min-width:0}
.urinal-panel .wide{grid-column:1 / -1}

.urinal-panel-actions .primary{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600}
.canvas-area{flex:1;position:relative;background:#eef1f4;overflow:hidden}
body.theme-dark .canvas-area{background:#202734}
canvas{display:block;width:100%;height:100%}
@media (pointer:coarse){canvas{touch-action:none}}
.canvas-text-editor{position:absolute;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;resize:none;border:0;padding:0;background:transparent;color:transparent;caret-color:transparent;overflow:hidden}

let sheetHeaderText = '';
const GROUP_NAME_PLACEHOLDER = '备注标签';
const swingDefs = {
  'in-left': {label:'左内开', hinge:'left', opensUp:true, vx:8, y1:6, y2:30, arcEndX:32, arcEndY:30, arcSweep:1},
  'in-right': {label:'右内开', hinge:'right', opensUp:true, vx:40, y1:6, y2:30, arcEndX:16, arcEndY:30, arcSweep:0},

};

const defaultRow = {id:1, layoutType:'cell', layoutRow:1, layoutCol:1, enabled:true, count:3, widthsText:'', total:3000, depth:1220, doorW:600, doorGap:10, rebate:false, rebateDepth:10, swing:'in-right', boothSwings:['in-right','in-right','in-right'], noDoorBooths:[], depthPanelSpecials:[], dimensionLocks:null, hUpright:1830, hDoor:1750, hMid:1800, hVis:1830, tPanel:12, wall:'three'};
const blankRow = {...defaultRow, enabled:false};
let groups = [
  {id:1, name:'', rows:[{...blankRow}]},
  {id:2, name:'', rows:[{...blankRow}]},
  {id:3, name:'', rows:[{...blankRow}]},
  {id:4, name:'', rows:[{...blankRow}]},
  {id:5, name:'', rows:[{...blankRow}]},
  {id:6, name:'', rows:[{...blankRow}]}
];

function applyTheme(theme) {
  const isDark = theme === 'dark';
  document.body.classList.toggle('theme-dark', isDark);
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.innerHTML = isDark ? '&#9728;' : '&#9790;';
    btn.title = isDark ? '切换浅色主题' : '切换深色主题';
    btn.setAttribute('aria-label', btn.title);
  }
}

function toggleTheme() {
  const next = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
  localStorage.setItem('partition-theme', next);
  applyTheme(next);
}

applyTheme(localStorage.getItem('partition-theme') || 'light');
applyPaperSize();

function swingIcon(key) {
  const d = swingDefs[key];
  return `<svg viewBox="0 0 48 36"><path d="M${d.vx} ${d.y1} V${d.y2}" fill="none" stroke="#378ADD" stroke-width="2"/><path d="M${d.vx} ${d.y1} A24 24 0 0 ${d.arcSweep} ${d.arcEndX} ${d.arcEndY}" fill="none" stroke="#9fc4ea" stroke-width="1.2" stroke-dasharray="5 4"/></svg>`;
}

function renderSwingButtons() {
  const grid = document.getElementById('swing-grid');
  if (!grid) return;
  const row = activeRow();
  const selectedSwing = isSelectedBooth(activeGroupId, activeRowId, selectedBoothIndex) && row ? boothSwingAt(row, selectedBoothIndex) : swingMode;
  grid.innerHTML = swingOrder.map(key => `
    <button class="wall-btn ${key === selectedSwing ? 'active' : ''}" data-swing="${key}" onclick="setSwing(this)">
      ${swingIcon(key)}
      ${swingDefs[key].label}
    </button>`).join('');
}

function normalizeBoothSwings(values, count, fallback = swingMode) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => swingDefs[source[i]] ? source[i] : fallback);
}

function normalizeNoDoorBooths(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => source[i] === true);
}

function boothSwingAt(p, index) {
  return swingDefs[p.boothSwings?.[index]] ? p.boothSwings[index] : (p.swing || 'in-right');
}

function hasDoorAt(p, index) {
  return normalizeNoDoorBooths(p.noDoorBooths, Math.max(1, Number(p.count) || 1))[index] !== true;
}

function normalizeBoothNotes(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => String(source[i] || ''));
}

function depthPanelCount(row) {
  return Math.max(2, (Number(row?.count) || 1) + 1);
}

function depthPanelName(row, index) {
  const count = Math.max(1, Number(row?.count) || 1);
  if (index === 0) return '左见光板';
  if (index === count) return '右见光板';
  return `第${index}道中隔板`;
}

function depthPanelSelectable(row, index) {
  if (!row) return false;
  const c = compute(row);
  const count = Math.max(1, Number(row.count) || 1);
  if (index === 0) return !c.hasLeft;
  if (index === count) return !c.hasRight;
  return index > 0 && index < count;
}

function normalizeDepthPanelSpecials(values, count) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => {
    const item = source[i] || {};
    const protrusion = Math.max(0, Math.round(Number(item.protrusion) || 0));
    const depth = Math.max(0, Math.round(Number(item.depth) || 0));
    return {protrusion, depth};
  });
}

function depthPanelActualDepth(row, index) {
  const specials = normalizeDepthPanelSpecials(row?.depthPanelSpecials, depthPanelCount(row));
  const item = specials[index] || {};
  const baseDepth = Number(row?.depth) || 0;
  if (item.depth > 0) return Math.max(0, Math.min(baseDepth, item.depth));
  if (item.protrusion > 0) return Math.max(0, Math.round(baseDepth - Math.min(baseDepth, item.protrusion)));
  return baseDepth;
}

function depthPanelProtrusion(row, index) {
  const actual = depthPanelActualDepth(row, index);
  return Math.max(0, Math.round((Number(row?.depth) || 0) - actual));
}

function specialDepthPanelItems(row) {
  const count = depthPanelCount(row);
  const specials = normalizeDepthPanelSpecials(row?.depthPanelSpecials, count);
  return specials.map((item, index) => {
    const protrusion = depthPanelProtrusion(row, index);
    if (protrusion <= 0 && !(item.depth > 0 && item.depth !== Number(row?.depth))) return null;
    if (!depthPanelSelectable(row, index)) return null;
    return {
      index,
      name: depthPanelName(row, index),
      depth: depthPanelActualDepth(row, index),
      protrusion
    };
  }).filter(Boolean);
}

function depthPanelGeometry(row, c, ox, oy, scale) {
  const count = Math.max(1, Number(row?.count) || 1);
  const panelT = Math.max(3, (Number(row?.tPanel) || 12) * scale);
  const wallT = (Number(c?.wallT) || 120) * scale;
  const totalW = (Number(c?.totalRun) || Number(row?.total) || 0) * scale;
  const depthPx = (Number(row?.depth) || 0) * scale;
  const widths = Array.from({length: count}, (_, i) => (c?.boothWidths?.[i] || c?.boothW || 0) * scale);
  const boundaries = [ox];
  widths.reduce((x, w) => {
    const next = x + w;
    boundaries.push(next);
    return next;
  }, ox);
  return Array.from({length: count + 1}, (_, index) => {
    const protrusion = Math.min(depthPx, depthPanelProtrusion(row, index) * scale);
    const actualDepth = depthPanelActualDepth(row, index);
    const boundaryX = index === 0 ? ox : index === count ? ox + totalW : boundaries[index];
    const panelX = index === 0 ? ox : index === count ? ox + totalW - panelT : boundaryX - panelT / 2;
    const wallX = index === 0 ? ox - wallT : index === count ? ox + totalW : boundaryX - wallT / 2;
    return {
      index,
      isEdge: index === 0 || index === count,
      panelX,
      panelY: oy + protrusion,
      panelW: panelT,
      panelH: Math.max(0, depthPx - protrusion),
      wallX,
      wallW: wallT,
      wallH: protrusion,
      actualDepth,
      protrusion
    };
  });
}

function resetLocalWallSpecials(row, count = row?.count) {
  const nextCount = Math.max(1, Number(count) || Number(row?.count) || 1);
  row.wall = 'three';
  row.depthPanelSpecials = normalizeDepthPanelSpecials([], nextCount + 1);
  return row;
}

function normalizeBoothDoorWidths(values, count, fallback = 0) {
  const source = Array.isArray(values) ? values : [];
  return Array.from({length: Math.max(1, count || 1)}, (_, i) => {
    const n = Number(source[i]);
    return Number.isFinite(n) && n > 0 ? Math.round(n) : 0;
  });
}

function rowDoorWidthOverrides(row, count = row?.count) {
  return normalizeBoothDoorWidths(row?.boothDoorWidths, Math.max(1, Number(count) || 1), 0);
}

function boothDoorWidthAt(p, index) {
  const n = Number(p.boothDoorWidths?.[index]);
  return Number.isFinite(n) && n > 0 ? Math.round(n) : (Number(p.doorW) || 600);
}

function boothHasDoorWidthOverride(p, index) {
  const n = Number(p?.boothDoorWidths?.[index]);
  return Number.isFinite(n) && n > 0;
}

function maxDoorWidthForBooth(row, index) {
  if (!row) return 1200;
  const p = {...row, boothDoorWidths: rowDoorWidthOverrides(row, row.count)};
  const customWidthsRaw = parseWidths(p.widthsText);
  const fixedWidths = Array.from({length:p.count}, (_, i) => {
    const value = customWidthsRaw[i];
    return Number.isFinite(value) && value > 0 ? Math.round(value) : null;
  });
  const fixedTotal = fixedWidths.reduce((sum, w) => sum + (Number.isFinite(w) ? w : 0), 0);
  const remainingCount = fixedWidths.filter(w => !Number.isFinite(w)).length;
  const fillWidths = splitInteger(Math.max(0, p.total - fixedTotal), remainingCount);
  let fillIndex = 0;
  const boothWidths = Array.from({length:p.count}, (_, i) => Number.isFinite(fixedWidths[i]) ? fixedWidths[i] : (fillWidths[fillIndex++] || Math.round(p.total / Math.max(1, p.count))));
  const minEdgePanel = 80;
  const minMiddlePanel = 180;
  const outerReserve = (index === 0 ? minEdgePanel : 0) + (index === p.count - 1 ? minEdgePanel : 0);
  let maxInstall = Math.max(0, Math.round((boothWidths[index] || 0) - (p.doorGap || 10) - outerReserve));
  const gap = Math.max(4, Number(p.doorGap) || 10);
  const installAt = (i, candidate = null) => {
    const source = candidate === null ? (p.boothDoorWidths[i] || p.doorW) : candidate;
    return rebateSmallSize(source, p, 'double');
  };
  const sidePairAt = (i, install) => {
    const available = Math.max(0, Math.round((boothWidths[i] || 0) - install - gap));
    const pair = splitInteger(available, 2);
    if (i === 0 && pair[0] < minEdgePanel && available >= minEdgePanel) return [minEdgePanel, Math.max(0, available - minEdgePanel)];
    if (i === p.count - 1 && pair[1] < minEdgePanel && available >= minEdgePanel) return [Math.max(0, available - minEdgePanel), minEdgePanel];
    return pair;
  };
  const candidateOk = candidateBig => {
    const candidateInstall = rebateSmallSize(candidateBig, p, 'double');
    const currentPair = sidePairAt(index, candidateInstall);
    if (index === 0 && currentPair[0] < minEdgePanel) return false;
    if (index === p.count - 1 && currentPair[1] < minEdgePanel) return false;
    if (index > 0) {
      const leftPair = sidePairAt(index - 1, installAt(index - 1));
      if (leftPair[1] + currentPair[0] < minMiddlePanel) return false;
    }
    if (index < p.count - 1) {
      const rightPair = sidePairAt(index + 1, installAt(index + 1));
      if (currentPair[1] + rightPair[0] < minMiddlePanel) return false;
    }
    return true;
  };
  let low = 0, high = p.rebate ? maxInstall + (p.rebateDepth || 0) * 2 : maxInstall;
  while (low < high) {
    const mid = Math.ceil((low + high) / 2);
    if (candidateOk(mid)) low = mid;
    else high = mid - 1;
  }
  return low;
}

function minTotalForDefaultDoor(row, count = row?.count) {
  const safeCount = Math.max(1, Number(count) || 1);
  const doorGap = Math.max(4, Number(row?.doorGap) || defaultRow.doorGap || 10);
  const rebateDepth = row?.rebate ? Math.max(0, Number(row.rebateDepth) || 0) : 0;
  const defaultInstallDoor = Math.max(0, (defaultRow.doorW || 600) - rebateDepth * 2);
  const minEdgePanel = 80;
  const minMiddlePanel = 180;
  const frontReserve = safeCount === 1 ? minEdgePanel * 2 : minEdgePanel * 2 + minMiddlePanel * (safeCount - 1);
  return safeCount * (defaultInstallDoor + doorGap) + frontReserve;
}

function layoutBelowDefaultMinimum(row) {
  if (!row) return false;
  const count = Math.max(1, Number(row.count) || 1);
  return Math.round(Number(row.total) || 0) < minTotalForDefaultDoor(row, count);
}

function resetRowToDefaultMinimum(row) {
  if (!row || !layoutBelowDefaultMinimum(row)) return false;
  const count = Math.max(1, Number(row.count) || 1);
  row.total = count * 1000;
  row.doorW = defaultRow.doorW;
  row.widthsText = '';
  row.boothDoorWidths = Array.from({length: count}, () => 0);
  row.dimensionLocks = null;
  if (row === activeRow()) {
    document.getElementById('p-total').value = row.total;
    document.getElementById('p-door').value = row.doorW;
    committedWidthsText = '';
    syncWidthCardsFromText('');
    renderWidthCards();
  }
  return true;
}

function selectionKey(type, groupId, rowId, index = '') {

function clearMultiSelections() {

function toggleMultiSelection(type, groupId, rowId, index = '') {

  else multiSelections.add(key);
}

function isMultiSelected(type, groupId, rowId, index = '') {

}

function hitSelectionIndex(hit) {

function hitCanMultiSelect(hit) {

function setSelectedDepthPanel(groupId, rowId, index) {

function isSelectedDepthPanel(groupId, rowId, index) {

function selectedDepthPanelRow() {

function updateDepthPanelSpecial(index, patch) {
  const target = selectedDepthPanelRow();
  if (!target) return;
  const {row} = target;
  const count = depthPanelCount(row);
  if (index < 0 || index >= count || !depthPanelSelectable(row, index)) return;
  row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, count);
  const baseDepth = Math.max(0, Number(row.depth) || 0);
  const next = {...row.depthPanelSpecials[index], ...patch};
  if (Object.prototype.hasOwnProperty.call(patch, 'depth')) {
    next.depth = Math.max(0, Math.min(baseDepth, Math.round(Number(patch.depth) || 0)));
    next.protrusion = next.depth > 0 ? Math.max(0, baseDepth - next.depth) : 0;
  } else if (Object.prototype.hasOwnProperty.call(patch, 'protrusion')) {
    next.protrusion = Math.max(0, Math.min(baseDepth, Math.round(Number(patch.protrusion) || 0)));
    next.depth = next.protrusion > 0 ? Math.max(0, baseDepth - next.protrusion) : 0;
  }
  row.depthPanelSpecials[index] = next;
}

function setSelectedBooth(groupId, rowId, index) {
  selectedBoothIndex = index;
  selectedBoothRef = {groupId, rowId, index};

}

function isSelectedBooth(groupId, rowId, index) {

function setRowSwing(row, swing) {

function layoutUnitName(group = activeGroup(), row = activeRow()) {

function layoutGridSummary(rows) {

  const maxCol = Math.max(1, ...rows.map(r => Number(r.layoutCol) || 1));

}

function escapeAttr(value) {
  return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function normalizeTwoLineText(value) {
  const parts = String(value ?? '').replace(/\r/g, '').split('\n');
  return parts.slice(0, 2).join('\n').trim();
}

function wrapCanvasTextLines(text, maxWidth, maxLines = 2) {
  const explicit = String(text || '').replace(/\r/g, '').split('\n').slice(0, maxLines);
  const lines = [];
  explicit.forEach(part => {
    let line = '';
    Array.from(part).forEach(ch => {
      const next = line + ch;
      if (line && ctx.measureText(next).width > maxWidth && lines.length < maxLines - 1) {
        lines.push(line);
        line = ch;
      } else {
        line = next;
      }
    });
    if (lines.length < maxLines) lines.push(line);
  });
  return lines.slice(0, maxLines).filter(line => line.trim() || lines.length === 1);
}

function canvasTextCaretVisible(scope) {
  const editor = document.getElementById('canvas-text-editor');
  return !drawingForExport && editor && document.activeElement === editor && selectionScope === scope && Math.floor(Date.now() / 530) % 2 === 0;
}

function drawCanvasTextCaret(x, y, h, color = '#111') {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, anno(4));
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + h);
  ctx.stroke();
  ctx.restore();
}

function drawDimensionCaret(x, baselineY, baseline = 'bottom', color = '#111', sample = '390') {
  const metrics = ctx.measureText(String(sample || '390'));
  const ascent = metrics.actualBoundingBoxAscent || annoFont(95) * 0.72;
  const descent = metrics.actualBoundingBoxDescent || annoFont(95) * 0.12;
  const h = ascent + descent;
  const y = baseline === 'top' ? baselineY + descent : baseline === 'middle' ? baselineY - h / 2 : baselineY - ascent;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, anno(6));
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + h);
  ctx.stroke();
  ctx.restore();
}

function dimensionEditActive(meta) {
  if (!activeDimensionEdit || !meta) return false;
  return activeDimensionEdit.key === dimensionMetaKey(meta);
}

function dimensionDisplayLabel(label, meta) {
  if (!dimensionEditActive(meta)) return label;
  const editor = document.getElementById('dimension-editor');
  return editor ? editor.value : label;
}

function dimensionMetaKey(meta = {}) {
  const parts = [meta.kind || '', meta.boothIndex ?? '', meta.panelIndex ?? '', meta.face || ''];
  if (meta.panel) parts.push(meta.panel.kind || '', meta.panel.lockIndex ?? meta.panel.index ?? '');
  return parts.join(':');
}

function registerDimensionHit(meta, centerX, topY, width, height) {
  if (!meta || drawingForExport) return;
  const context = activeDimensionContext;
  if (!context?.groupId || !context?.rowId) return;
  const hitScale = context.hitScale || 1;
  const hitX = context.hitX || 0;
  const hitY = context.hitY || 0;
  const pad = anno(12);
  planHitAreas.push({
    type:'dimension',
    x: hitX + (centerX - width / 2 - pad) * hitScale,
    y: hitY + (topY - pad) * hitScale,
    w: (width + pad * 2) * hitScale,
    h: (height + pad * 2) * hitScale,
    groupId: context.groupId,
    rowId: context.rowId,
    key: dimensionMetaKey(meta),
    meta
  });
}

function groupDisplayName(group) {

function groupLabelPrefix(group) {

function applySelectedDepthPanelDepth(value) {

function updateLayoutTargetLabel() {

  if (wallLabelEl) wallLabelEl.textContent = '';

function activeGroup() {
  return groups.find(g => g.id === activeGroupId) || groups[0];
}

function ensureRows(group) {
  if (!group.rows) {
    group.rows = [{...group, id:1}];
  }
  return group.rows;
}

function activeRow() {
  const rows = ensureRows(activeGroup());
  return rows.find(r => r.id === activeRowId) || rows[0];
}

function allRows() {
  return groups.flatMap(group => ensureRows(group).map((row, index) => ({group, row, index})));
}

function activeGroupRows() {
  const group = activeGroup();
  return ensureRows(group).map((row, index) => ({group, row, index}));
}

function drawableGroupRows() {
  return allRows().filter(item => item.row.enabled === true);
}

function rowBoothStartIndex(group = activeGroup(), row = activeRow()) {
  const rows = ensureRows(group);
  let start = 0;
  for (const r of rows) {
    if (r.id === row?.id) break;
    start += Math.max(1, Number(r.count) || 1);
  }
  return start;
}

function findBoothByCode(code) {
  const match = String(code || '').trim().toUpperCase().match(/^([A-Z])(\d+)$/);
  if (!match) return null;
  const group = groups.find(g => g.name?.replace('组', '').toUpperCase() === match[1]);
  const targetNo = Number(match[2]);
  if (!group || !Number.isFinite(targetNo) || targetNo < 1) return null;
  let start = 0;
  for (const row of ensureRows(group)) {
    const count = Math.max(1, Number(row.count) || 1);
    if (targetNo <= start + count) {
      return {group, row, index: targetNo - start - 1};
    }
    start += count;
  }
  return null;
}

function saveActiveGroup(enable = false) {
  const row = activeRow();
  if (!row) return;
  const params = getParams();
  if (selectionScope === 'group') {
    ensureRows(activeGroup()).forEach(targetRow => applyGroupParamsToRow(targetRow, params, enable));
    return;
  }
  applyParamsToRow(row, params, enable);
}

function applyGroupParamsToRow(row, params, enable = false) {
  const keep = {
    count: row.count,
    total: quickSelectAllActive && canBatchEditTotal() ? params.total : row.total,
    widthsText: row.widthsText,
    layoutType: row.layoutType,
    layoutRow: row.layoutRow,
    layoutCol: row.layoutCol,
    doorInstallWidths: row.doorInstallWidths,
    doorWidths: row.doorWidths,
    boothDoorWidths: row.boothDoorWidths,
    noDoorBooths: row.noDoorBooths,
    boothNotes: row.boothNotes,
    wall: row.wall,
    depthPanelSpecials: row.depthPanelSpecials,
    dimensionLocks: row.dimensionLocks,
    note: row.note
  };
  applyParamsToRow(row, {...params, ...keep}, enable);
}

function applyParamsToRow(row, params, enable = false) {
  const nextEnabled = enable ? true : row.enabled === true;
  const boothSwings = row === activeRow() ? params.boothSwings : normalizeBoothSwings(row.boothSwings, params.count, params.swing || swingMode);
  const noDoorBooths = normalizeNoDoorBooths(row === activeRow() ? params.noDoorBooths : row.noDoorBooths, params.count);
  const boothDoorWidths = rowDoorWidthOverrides(row === activeRow() ? params : row, params.count);
  const depthPanelSpecials = normalizeDepthPanelSpecials(row === activeRow() ? params.depthPanelSpecials : row.depthPanelSpecials, depthPanelCount(params));
  const dimensionLocks = row === activeRow() ? (params.dimensionLocks || row.dimensionLocks || null) : (row.dimensionLocks || null);
  Object.assign(row, {...params, boothSwings, noDoorBooths, boothDoorWidths, depthPanelSpecials, dimensionLocks}, {enabled: nextEnabled});
  row.boothSwings = normalizeBoothSwings(row.boothSwings, row.count, row.swing || swingMode);
  row.noDoorBooths = normalizeNoDoorBooths(row.noDoorBooths, row.count);
  row.boothNotes = normalizeBoothNotes(row.boothNotes, row.count);
  row.boothDoorWidths = rowDoorWidthOverrides(row, row.count);
  row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, depthPanelCount(row));
  resetRowToDefaultMinimum(row);
}

function loadGroupToForm(group, row = activeRow()) {
  syncQuickLayoutFromGroup(group);
  document.getElementById('p-count').value = row.count;
  document.getElementById('p-total').value = row.total;
  committedWidthsText = row.widthsText || '';
  syncWidthCardsFromText(committedWidthsText);
  renderWidthCards();
  document.getElementById('p-depth').value = row.depth;
  document.getElementById('p-door').value = selectionScope === 'booth' && selectedBoothRef?.rowId === row.id
    ? boothDoorWidthAt(row, selectedBoothRef.index)
    : row.doorW;
  document.getElementById('p-gap').value = row.doorGap ?? 10;
  document.getElementById('p-rebate').checked = row.rebate ?? false;
  renderRebateToggle();
  document.getElementById('p-rebate-depth').value = row.rebateDepth ?? 10;
  document.getElementById('h-upright').value = row.hUpright;
  document.getElementById('h-door').value = row.hDoor;
  document.getElementById('h-mid').value = row.hMid;
  document.getElementById('h-vis').value = row.hVis;
  document.getElementById('t-panel').value = row.tPanel;
  swingMode = row.swing || 'in-right';

  row.boothNotes = normalizeBoothNotes(row.boothNotes, row.count);
  row.boothDoorWidths = rowDoorWidthOverrides(row, row.count);
  row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, depthPanelCount(row));
  syncPlanNoteInputFromSelection();
  renderSwingButtons();
  renderBoothSwingPanel();
  renderDepthPanelSpecialPanel();

  wallMode = row.wall;

}

function syncQuickLayoutFromGroup(group = activeGroup()) {
  const rows = ensureRows(group).filter(row => row.enabled === true);
  if (!rows.length) {
    quickLayoutRows = [['', '', '']];
    quickLayoutPages = [[['', '', '']]];
    activeQuickPage = 0;
    return;
  }
  const maxPage = Math.max(0, ...rows.map(row => Number(row.sheetPage) || 0));
  const nextPages = Array.from({length: maxPage + 1}, () => [['', '', '']]);
  rows.forEach(row => {
    const pageIndex = Math.max(0, Number(row.sheetPage) || 0);
    const rowIndex = Math.max(0, (Number(row.layoutRow) || 1) - 1);
    const colIndex = Math.max(0, (Number(row.layoutCol) || 1) - 1);
    while (nextPages[pageIndex].length <= rowIndex) nextPages[pageIndex].push(['', '', '']);
    while (nextPages[pageIndex][rowIndex].length <= colIndex) nextPages[pageIndex][rowIndex].push('');
    nextPages[pageIndex][rowIndex][colIndex] = String(Math.max(1, Number(row.count) || 1));
  });
  quickLayoutPages = nextPages;
  activeQuickPage = Math.max(0, Math.min(activeQuickPage, quickLayoutPages.length - 1));
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  normalizeQuickRows();
}

function syncQuickLayoutFromDrawingOrder(group = activeGroup()) {
  const rows = ensureRows(group)
    .filter(row => row.enabled === true)
    .slice()
    .sort((a, b) => {
      const pageA = Number.isFinite(Number(a.drawSheetPage)) ? Number(a.drawSheetPage) : Number(a.sheetPage) || 0;
      const pageB = Number.isFinite(Number(b.drawSheetPage)) ? Number(b.drawSheetPage) : Number(b.sheetPage) || 0;
      const orderA = Number.isFinite(Number(a.sheetOrder)) ? Number(a.sheetOrder) : Number.MAX_SAFE_INTEGER;
      const orderB = Number.isFinite(Number(b.sheetOrder)) ? Number(b.sheetOrder) : Number.MAX_SAFE_INTEGER;
      return (pageA - pageB) || (orderA - orderB) || ((a.layoutRow || 1) - (b.layoutRow || 1)) || ((a.layoutCol || 1) - (b.layoutCol || 1)) || (a.id - b.id);
    });
  if (!rows.length) {
    quickLayoutRows = [['', '', '']];
    quickLayoutPages = [[['', '', '']]];
    activeQuickPage = 0;
    return;
  }
  const compactCols = 4;
  const pageRows = [];
  rows.forEach((row, index) => {
    const rowIndex = Math.floor(index / compactCols);
    const colIndex = index % compactCols;
    if (!pageRows[rowIndex]) pageRows[rowIndex] = Array.from({length: compactCols}, () => '');
    pageRows[rowIndex][colIndex] = String(Math.max(1, Number(row.count) || 1));
    row.sheetPage = 0;
    row.layoutRow = rowIndex + 1;
    row.layoutCol = colIndex + 1;
  });
  quickLayoutPages = [pageRows.length ? pageRows : [['', '', '']]];
  activeQuickPage = 0;
  quickLayoutRows = quickLayoutPages[0];
  quickNavKeep = null;
  quickCompactDisplayMode = true;
}

function syncWidthCardsFromText(text = '') {
  const values = splitWidthTextParts(text).map(value => value.replace(/\D/g, '').slice(0, 5));
  const count = currentWidthCardCount();
  widthCards = Array.from({length: count}, (_, index) => values[index] || '');
  normalizeWidthCards();
}

function splitWidthTextParts(text = '') {
  const raw = String(text || '');
  if (!raw.trim()) return [];
  return /[,，]/.test(raw) ? raw.split(/[,，]/) : raw.trim().split(/\s+/);
}

function currentWidthCardCount() {
  return Math.max(1, Number(activeRow()?.count) || Number(document.getElementById('p-count')?.value) || 1);
}

function normalizeWidthCards() {
  widthCards = widthCards.map(value => String(value || ''));
  const count = currentWidthCardCount();
  while (widthCards.length < count) widthCards.push('');
  if (widthCards.length > count) widthCards = widthCards.slice(0, count);
}

function widthCardsToText() {
  normalizeWidthCardBudget();
  const count = currentWidthCardCount();
  return widthCards.slice(0, count).map(value => Number(value) > 0 ? String(value) : '').join(',');
}

function normalizeWidthCardBudget() {
  const count = currentWidthCardCount();
  const total = Math.max(0, Number(activeRow()?.total) || Number(document.getElementById('p-total')?.value) || 0);
  for (let i = 0; i < count; i++) {
    const value = Number(widthCards[i]);
    if (!(value > 0)) continue;
    const otherTotal = widthCards.slice(0, count).reduce((sum, item, idx) => idx === i ? sum : sum + (Number(item) > 0 ? Number(item) : 0), 0);
    const reserve = widthCards.slice(0, count).reduce((sum, item, idx) => idx === i || Number(item) > 0 ? sum : sum + minValidBoothWidth(idx), 0);
    const max = Math.max(0, total - otherTotal - reserve);
    if (value > max) widthCards[i] = max > 0 ? String(max) : '';
  }
}

function renderWidthCards(focusIndex = null, selectText = true) {
  normalizeWidthCards();
  const row = document.getElementById('width-card-row');
  if (!row) return;
  const filledCount = widthCards.filter(v => Number(v) > 0).length;
  row.innerHTML = widthCards.map((value, index) => {
    const lockedAuto = !value && filledCount >= currentWidthCardCount() - 1;
    return `<input class="width-card" inputmode="numeric" maxlength="5" placeholder="${index + 1}" value="${lockedAuto ? '自动' : value}" data-width-index="${index}" ${lockedAuto ? 'disabled title="自动分配"' : 'oninput="handleWidthCardInput(this)" onkeydown="handleWidthCardKey(event)"'}>`;
  }).join('');
  if (focusIndex !== null) {
    const el = row.querySelector(`[data-width-index="${focusIndex}"]`);
    if (el && !el.disabled) {
      el.focus();
      if (selectText) el.select();
      else {
        const end = el.value.length;
        el.setSelectionRange(end, end);
      }
    }
  }
}

function commitWidthCards() {
  committedWidthsText = widthCardsToText();
}

function handleWidthCardInput(input) {
  const index = Number(input.dataset.widthIndex);
  const value = input.value.replace(/\D/g, '').slice(0, 5);
  if (input.value !== value) input.value = value;
  widthCards[index] = clampWidthCardValue(index, value);
  renderWidthCards(index, false);
  if (isWidthCardReadyToCommit(index)) {
    commitWidthCards();
    refreshDrawingAfterManualEdit(false);
  }
}

function isWidthCardReadyToCommit(index) {
  const value = Number(widthCards[index]);
  if (!widthCards[index]) return true;
  return value >= minValidBoothWidth(index);
}

function minValidBoothWidth(index) {
  const params = getParams();
  const count = currentWidthCardCount();
  const doorInstallW = rebateSmallSize(params.doorW, params, 'double');
  const edgeReserve = (index === 0 ? 100 : 0) + (index === count - 1 ? 100 : 0);
  return Math.max(1, doorInstallW + params.doorGap + edgeReserve);
}

function clampWidthCardValue(index, value) {
  const n = parseInt(value, 10);
  if (!Number.isFinite(n) || n <= 0) return '';
  const total = Math.max(0, Number(activeRow()?.total) || Number(document.getElementById('p-total')?.value) || 0);
  const otherTotal = widthCards.reduce((sum, item, i) => i === index ? sum : sum + (Number(item) > 0 ? Number(item) : 0), 0);
  const count = currentWidthCardCount();
  const reserve = widthCards.slice(0, count).reduce((sum, item, i) => i === index || Number(item) > 0 ? sum : sum + minValidBoothWidth(i), 0);
  const max = Math.max(0, total - otherTotal - reserve);
  return String(Math.min(n, max));
}

function handleWidthCardKey(e) {
  const input = e.currentTarget;
  const index = Number(input.dataset.widthIndex);
  if (e.key === 'Tab') {
    e.preventDefault();
    const nextIndex = Math.min(index + 1, currentWidthCardCount() - 1);
    const filledCount = widthCards.filter(v => Number(v) > 0).length;
    if (nextIndex !== index && !(filledCount >= currentWidthCardCount() - 1 && !widthCards[nextIndex])) renderWidthCards(nextIndex);
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    commitWidthCards();
    refreshDrawingAfterManualEdit(false);
    return;
  }
  if (e.key === 'Backspace' && !input.value && index > 0) {
    e.preventDefault();
    renderWidthCards(index - 1);
  }
}

function cloneState() {

    groups: JSON.parse(JSON.stringify(groups)),

  };
}

function restoreState(state) {
  groups = JSON.parse(JSON.stringify(state.groups));
  activeGroupId = state.activeGroupId;
  activeRowId = state.activeRowId;
  selectionScope = state.selectionScope;
  selectedBoothIndex = state.selectedBoothIndex;
  selectedBoothRef = state.selectedBoothRef ? {...state.selectedBoothRef} : null;
  selectedDepthPanelRef = state.selectedDepthPanelRef ? {...state.selectedDepthPanelRef} : null;

  currentPlanPage = state.currentPlanPage || 0;

function pushHistory() {
  undoStack.push(cloneState());
  if (undoStack.length > 5) undoStack.shift();
  redoStack = [];
}

function undoLayout() {
  if (!undoStack.length) return;
  redoStack.push(cloneState());
  const state = undoStack.pop();
  restoreState(state);
}

function redoLayout() {
  if (!redoStack.length) return;
  undoStack.push(cloneState());
  if (undoStack.length > 5) undoStack.shift();
  const state = redoStack.pop();
  restoreState(state);
}

function normalizeQuickRows() {
  if (!Array.isArray(quickLayoutPages) || !quickLayoutPages.length) quickLayoutPages = [quickLayoutRows || [['','','']]];
  if (!quickLayoutPages[activeQuickPage]) quickLayoutPages[activeQuickPage] = [['','','']];
  quickLayoutRows = quickLayoutPages[activeQuickPage];
  quickLayoutRows = quickLayoutRows.map((row, rowIndex) => {
    const next = row.map(value => String(value || ''));
    while (next.length < 3) next.push('');
    if (quickNavKeep && quickNavKeep.row === rowIndex) {
      while (next.length <= quickNavKeep.col) next.push('');
    }
    const hasValue = next.some(value => Number(value) > 0);
    if (hasValue) {
      while (next.length > 3 && next[next.length - 1] === '' && next[next.length - 2] === '' && !(quickNavKeep && quickNavKeep.row === rowIndex && quickNavKeep.col >= next.length - 1)) next.pop();
      if (next[next.length - 1] !== '') next.push('');
    }
    return next;
  });
  if (!quickLayoutRows.length) quickLayoutRows = [['','','']];
  quickLayoutPages[activeQuickPage] = quickLayoutRows;
  if (quickCompactDisplayMode) compactQuickRowsForDisplay();
}

function compactQuickRowsForDisplay() {
  const values = quickLayoutRows.flat().map(value => String(value || '')).filter(value => Number(value) > 0);
  const compactCols = 4;
  const nextRows = [];
  values.forEach((value, index) => {
    const rowIndex = Math.floor(index / compactCols);
    const colIndex = index % compactCols;
    if (!nextRows[rowIndex]) nextRows[rowIndex] = [];
    nextRows[rowIndex][colIndex] = value;
  });
  if (!nextRows.length) nextRows.push(['', '', '']);
  const lastRow = nextRows[nextRows.length - 1];
  if (lastRow.length >= compactCols && lastRow.every(value => Number(value) > 0)) nextRows.push(['']);
  else if (lastRow.every(value => Number(value) > 0)) lastRow.push('');
  quickLayoutRows = nextRows;
  quickLayoutPages[activeQuickPage] = quickLayoutRows;
}

function nextCompactQuickCell(rowIndex, colIndex) {
  const flat = quickLayoutRows.flat();
  const nextFlatIndex = rowIndex * 4 + colIndex + 1;
  return {row: Math.floor(nextFlatIndex / 4), col: nextFlatIndex % 4};
}

function lastQuickBlankCellRef() {
  normalizeQuickRows();
  for (let row = quickLayoutRows.length - 1; row >= 0; row--) {
    const col = quickLayoutRows[row].findLastIndex(value => !(Number(value) > 0));
    if (col >= 0) return {row, col};
  }
  return {row:0, col:0};
}
function syncQuickPageRows() {
  if (!Array.isArray(quickLayoutPages) || !quickLayoutPages.length) quickLayoutPages = [quickLayoutRows || [['','','']]];
  quickLayoutPages[activeQuickPage] = quickLayoutRows;
}

function quickLayoutHasValues() {

  return quickLayoutPages.some(page => page.some(row => row.some(value => Number(value) > 0)));
}

function renderQuickLayout(focusRef = null) {

function selectQuickCell(input) {

  if (!target) {

function focusNextQuickInputCellFromRef(currentRef = activeQuickCellRef()) {
  if (!currentRef) return false;
  normalizeQuickRows();
  syncQuickPageRows();
  const pageRows = quickLayoutPages[currentRef.page] || quickLayoutRows;
  const targetRow = pageRows?.[currentRef.row];
  if (!targetRow) return false;
  const compactNext = quickCompactDisplayMode ? nextCompactQuickCell(currentRef.row, currentRef.col) : null;
  const nextCol = compactNext ? compactNext.col : Math.min(currentRef.col + 1, targetRow.length - 1);
  const next = {page:currentRef.page, row:compactNext ? compactNext.row : currentRef.row, col:nextCol};
  ensureQuickCellExists(next.row, next.col);
  if (activeQuickPage !== next.page) {
    activeQuickPage = next.page;
    quickLayoutRows = quickLayoutPages[activeQuickPage];
  }
  lastQuickCellRef = {...next};
  renderQuickLayout({row:next.row, col:next.col});
  autoOpenTotalOnQuickFocus = Number(targetRow[next.col]) > 0;
  focusQuickCell(next.row, next.col);
  return true;
}

function selectNextQuickCellAndFocusField(currentRef = activeQuickCellRef(), fieldId = 'p-total') {
  if (!currentRef) return false;
  normalizeQuickRows();
  syncQuickPageRows();
  const pageRows = quickLayoutPages[currentRef.page] || quickLayoutRows;
  const targetRow = pageRows?.[currentRef.row];
  if (!targetRow) return false;
  const compactNext = quickCompactDisplayMode ? nextCompactQuickCell(currentRef.row, currentRef.col) : null;
  const nextCol = compactNext ? compactNext.col : Math.min(currentRef.col + 1, targetRow.length - 1);
  const next = {page:currentRef.page, row:compactNext ? compactNext.row : currentRef.row, col:nextCol};
  ensureQuickCellExists(next.row, next.col);
  if (activeQuickPage !== next.page) {
    activeQuickPage = next.page;
    quickLayoutRows = quickLayoutPages[activeQuickPage];
  }
  lastQuickCellRef = {...next};
  if (!(Number(targetRow[next.col]) > 0)) {
    renderQuickLayout({row:next.row, col:next.col});
    focusQuickCell(next.row, next.col);
    return true;
  }
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group, {page:next.page, row:next.row + 1, col:next.col + 1});
  if (!target) return false;
  activeRowId = target.id;
  selectionScope = 'row';
  clearSelectedBooth();
  loadGroupToForm(group, target);
  renderGroups(false);
  renderQuickLayout({row:next.row, col:next.col});
  drawView(getParams(), currentTab);
  window.setTimeout(() => {
    const el = document.getElementById(fieldId);
    if (!el) return;
    el.focus({preventScroll:true});
    if (typeof el.select === 'function') el.select();
  }, 0);
  return true;
}

function handleQuickInput(input) {
  const row = Number(input.dataset.quickRow);
  const col = Number(input.dataset.quickCol);
  const value = input.value.replace(/\D/g, '').slice(0, quickTenMode ? 2 : 1);
  clearAutoCompactSheetLayout();
  quickNavKeep = null;
  if (quickLayoutRows[row][col] !== value) pushHistory();
  quickLayoutRows[row][col] = value;
  syncQuickPageRows();
  if (quickTenMode && value.length === 1) return;
  const syncedToLayout = syncQuickCellToLayout(row, col, value);
  if (syncedToLayout) return;
  const isLast = col === quickLayoutRows[row].length - 1;
  if (value && isLast) quickLayoutRows[row].push('');
  const shouldAutoAdvance = value && (!quickTenMode || value.length >= 2);
  const nextCol = shouldAutoAdvance ? Math.min(col + 1, quickLayoutRows[row].length - 1) : col;
  renderQuickLayout(value ? {row, col: nextCol} : null);
}

function syncQuickCellToLayout(rowIndex, colIndex, value) {
  quickSelectAllActive = false;
  const count = parseInt(value, 10);
  if (!Number.isFinite(count) || count <= 0) return false;
  lastQuickCellRef = {page:activeQuickPage, row:rowIndex, col:colIndex};
  document.getElementById('p-count').value = count;
  document.getElementById('p-total').value = count * 1000;
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group, {page: activeQuickPage, row: rowIndex + 1, col: colIndex + 1});
  if (target) {
    activeRowId = target.id;
    selectionScope = 'row';
    clearSelectedBooth();
    loadGroupToForm(group, target);
    syncWidthCardsFromText(target.widthsText || '');
    renderWidthCards();
  }
  updateLayoutTargetLabel();
  renderGroups(false);
  refreshDrawing(false, false, false, false);
  if (target) focusTotalInputForQuickCell();
  return Boolean(target);
}

function buildRowsFromQuickLayout(group = activeGroup(), activeCell = null) {
  normalizeQuickRows();
  syncQuickPageRows();
  const existingRows = ensureRows(group);
  normalizeLayoutGrid(group);
  const byCell = new Map(existingRows.map(row => [`${row.sheetPage || 0}:${row.layoutRow || 1}:${row.layoutCol || 1}`, row]));
  const template = activeRow() || existingRows.find(row => row.enabled === true) || defaultRow;
  const generated = [];
  let id = 1;
  let activeTarget = null;
  quickLayoutPages.forEach((pageRows, pageIndex) => pageRows.forEach((row, rowIndex) => {
    row.forEach((value, colIndex) => {
      const count = parseInt(value, 10);
      if (!Number.isFinite(count) || count <= 0) return;
      const layoutRow = rowIndex + 1;
      const layoutCol = colIndex + 1;
      const existing = byCell.get(`${pageIndex}:${layoutRow}:${layoutCol}`);
      const base = existing || resetLocalWallSpecials({...template}, count);
      const isActiveCell = activeCell && (activeCell.page ?? activeQuickPage) === pageIndex && activeCell.row === layoutRow && activeCell.col === layoutCol;
      const total = (!existing || isActiveCell) ? count * 1000 : base.total;
      const widthsText = existing ? (base.widthsText || '') : '';
      const boothDoorWidths = existing ? rowDoorWidthOverrides(base, count) : Array.from({length: count}, () => 0);
      const next = {
        ...base,
        id: id++,
        layoutType: 'cell',
        layoutRow,
        layoutCol,
        sheetPage: 0,
        enabled: true,
        count,
        total,
        doorW: existing ? base.doorW : defaultRow.doorW,
        widthsText,
        doorInstallWidths: existing ? base.doorInstallWidths : undefined,
        doorWidths: existing ? base.doorWidths : undefined,
        boothDoorWidths,
        wall: existing ? base.wall : 'three',
        noDoorBooths: normalizeNoDoorBooths(base.noDoorBooths, count),
        boothNotes: normalizeBoothNotes(base.boothNotes, count),
        depthPanelSpecials: existing ? normalizeDepthPanelSpecials(base.depthPanelSpecials, count + 1) : normalizeDepthPanelSpecials([], count + 1)
      };
      next.boothSwings = normalizeBoothSwings(base.boothSwings, count, next.swing || swingMode);
      generated.push(next);
      if (isActiveCell) activeTarget = next;
    });
  }));
  if (!generated.length) return null;
  group.rows = generated;
  return activeTarget || generated[0];
}

function handleQuickKey(e) {
  const input = e.currentTarget;
  const row = Number(input.dataset.quickRow);
  const col = Number(input.dataset.quickCol);
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    moveQuickFocus(row, col, e.key);
    return;
  }
  if (e.key === 'Delete' || (e.key === 'Backspace' && !input.value)) {
    e.preventDefault();
    deleteQuickCell(row, col);
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (quickTenMode) {
      const value = input.value.replace(/\D/g, '').slice(0, 2);
      if (value) {
        input.value = value;
        quickLayoutRows[row][col] = value;
        syncQuickPageRows();
        syncQuickCellToLayout(row, col, value);
        return;
      }
    }
    applyQuickLayout();
    return;
  }
}

function moveQuickFocus(rowIndex, colIndex, key) {
  let nextRow = rowIndex;
  let nextCol = colIndex;
  if (key === 'ArrowLeft') nextCol = Math.max(0, colIndex - 1);
  if (key === 'ArrowRight') nextCol = colIndex + 1;
  if (key === 'ArrowUp') nextRow = Math.max(0, rowIndex - 1);
  if (key === 'ArrowDown') nextRow = Math.min(quickLayoutRows.length - 1, rowIndex + 1);
  ensureQuickCellExists(nextRow, nextCol);
  focusQuickCell(nextRow, nextCol);
}

function ensureQuickCellExists(rowIndex, colIndex) {
  while (quickLayoutRows.length <= rowIndex) quickLayoutRows.push(quickCompactDisplayMode ? [] : ['', '', '']);
  quickNavKeep = {row: rowIndex, col: colIndex};
  while (quickLayoutRows[rowIndex].length <= colIndex) quickLayoutRows[rowIndex].push('');
  const box = document.getElementById('quick-layout');
  const exists = box?.querySelector(`[data-quick-row="${rowIndex}"][data-quick-col="${colIndex}"]`);
  if (!exists) renderQuickLayout();
}

function focusQuickCell(rowIndex, colIndex) {

}

function deleteQuickCell(rowIndex, colIndex) {
  const row = quickLayoutRows[rowIndex];
  if (!row) return;
  pushHistory();
  clearAutoCompactSheetLayout();

  while (row.length < 3) row.push('');
  normalizeQuickRows();
  syncQuickPageRows();
  const group = activeGroup();
  const target = buildRowsFromQuickLayout(group, {page: activeQuickPage, row: rowIndex + 1, col: Math.max(1, colIndex + 1)});
  if (target) activeRowId = target.id;
  selectionScope = target ? 'row' : 'group';
  clearSelectedBooth();
  loadGroupToForm(group, target || ensureRows(group)[0]);
  renderGroups(false);
  refreshDrawing(false, false, false);
  renderQuickLayout({row: rowIndex, col: Math.max(0, Math.min(colIndex - 1, quickLayoutRows[rowIndex].length - 1))});
}

function addQuickLayoutPage() {

function goQuickLayoutPage(delta) {
  normalizeQuickRows();

  if (nextPage === activeQuickPage) return;

  quickLayoutRows = quickLayoutPages[activeQuickPage];

  }));
  return changed;

function autoCompactSheetLayout() {
  const sourceBlocks = collectPlanBlocks(lastParams || getParams()).filter(block => block.row.enabled !== false);
  if (!sourceBlocks.length) return;
  pushHistory();
  saveActiveGroup(false);
  const makeBlock = (block, index) => ({
    ...block,
    originalRow: block.row,
    row: {...block.row, sheetPage: undefined, drawSheetPage: undefined, sheetOrder: index},
    metrics: planBlockMetrics(block.row)
  });
  const baseBlocks = sourceBlocks.map(makeBlock);
  const p = getParams();
  const layout = getSheetLayout(p);
  const area = block => block.metrics.w * block.metrics.h;
  const countOf = block => Math.max(1, Number(block.originalRow?.count || block.row?.count) || 1);
  const candidates = [
    baseBlocks,
    [...baseBlocks].sort((a, b) => area(b) - area(a)),
    [...baseBlocks].sort((a, b) => (b.metrics.h - a.metrics.h) || (b.metrics.w - a.metrics.w)),
    [...baseBlocks].sort((a, b) => (b.metrics.w - a.metrics.w) || (b.metrics.h - a.metrics.h)),
    [...baseBlocks].sort((a, b) => countOf(b) - countOf(a) || area(b) - area(a)),
    [...baseBlocks].sort((a, b) => countOf(a) - countOf(b) || area(b) - area(a))
  ];
  const scorePages = pages => {
    const rowCount = pages.reduce((sum, page) => sum + (page.rowCount || 0), 0);
    const last = pages[pages.length - 1] || {usedW:0, usedH:0};
    const firstFill = pages.slice(0, -1).reduce((sum, page) => sum + page.usedW * page.usedH, 0);
    return pages.length * 1e9 + rowCount * 1e6 + last.usedH * 1e3 + last.usedW - firstFill / 1e6;
  };
  let best = null;
  candidates.forEach(candidate => {
    const P = layout.plot;
    const maxBlockW = Math.max(1, ...candidate.map(block => block.metrics.w));
    const maxBlockH = Math.max(1, ...candidate.map(block => block.metrics.h));
    const maxScale = Math.min(1, P.w / maxBlockW, P.h / maxBlockH);
    const sheetScale = chooseSheetPackScale(candidate, layout, maxScale);
    const pages = autoPackPlanBlocksAtScale(candidate, layout, sheetScale);
    const score = scorePages(pages);
    if (!best || score < best.score) best = {pages, score};
  });
  (best?.pages || []).forEach((page, pageIndex) => {
    const visualBlocks = page.blocks
      .slice()
      .sort((a, b) => (a.pageY - b.pageY) || (a.pageX - b.pageX));
    visualBlocks.forEach((block, blockIndex) => {
      const row = block.originalRow;
      if (!row) return;
      row.drawSheetPage = pageIndex;
      row.sheetOrder = pageIndex * 1000 + blockIndex;
      row.autoCompactSheetLayout = true;
    });
  });
  syncQuickLayoutFromDrawingOrder(activeGroup());
  renderQuickLayout(lastQuickBlankCellRef());
  lastParams = getParams();
  drawView(lastParams, currentTab);
  renderBOM(lastParams);
  updateGroupListState();
}

function normalizeLayoutGrid(group) {
  ensureRows(group).forEach((r, i) => {
    if (!r.layoutRow) r.layoutRow = i + 1;
    if (!r.layoutCol) r.layoutCol = 1;
    r.layoutType = 'cell';
  });
}

  const row = resetLocalWallSpecials({...blankRow, id, layoutType:'cell', layoutRow:nextRowNo, layoutCol:1, boothSwings:[...blankRow.boothSwings]}, blankRow.count);

function addColumn(groupId = activeGroupId) {
  pushHistory();
  saveActiveGroup();
  activeGroupId = groupId;
  openGroupIds.add(groupId);
  const group = activeGroup();
  const rows = ensureRows(group);
  normalizeLayoutGrid(group);
  const current = rows.find(r => r.id === activeRowId) || rows[0];
  const currentLayoutRow = current?.layoutRow || 1;
  const id = nextLayoutId(rows);
  const nextColNo = Math.max(0, ...rows.filter(r => r.layoutRow === currentLayoutRow).map(r => Number(r.layoutCol) || 1)) + 1;
  const source = current || blankRow;
  const inheritedCount = Math.max(1, Number(source.count) || 1);
  const row = {
    ...source,
    id,
    layoutType:'cell',
    layoutRow:currentLayoutRow,
    layoutCol:nextColNo,
    enabled: source.enabled === true,
    boothSwings: normalizeBoothSwings(source.boothSwings, inheritedCount, source.swing || swingMode)
  };
  resetLocalWallSpecials(row, inheritedCount);
  rows.push(row);
  group.rows = rows.sort((a, b) => (a.layoutRow - b.layoutRow) || (a.layoutCol - b.layoutCol) || (a.id - b.id));
  activeRowId = id;
  selectionScope = 'row';

  rowAnimation = {type:'entering', groupId, rowId:id};
  renderGroups(false);
  refreshDrawing(true, false, false);
}

function refreshDrawing(refit = false, renderList = true, enableRow = true, notifyWarnings = true) {
  const doorInput = document.getElementById('p-door');

    if (renderList) updateGroupListState();

function fmtMm(value) {

}

function parseWidths(text) {
  return splitWidthTextParts(text)
    .map(v => {
      const n = parseFloat(v);

    });
}

function splitInteger(total, count) {
  const n = Math.max(0, count | 0);
  if (!n) return [];
  const roundedTotal = Math.round(Number(total) || 0);
  const base = Math.floor(roundedTotal / n);
  let rem = roundedTotal - base * n;
  return Array.from({length:n}, () => base + (rem-- > 0 ? 1 : 0));
}

function isQuickCellVisuallyActive(rowIndex, colIndex, value) {

  if (lastQuickCellRef && lastQuickCellRef.page === activeQuickPage) return lastQuickCellRef.row === rowIndex && lastQuickCellRef.col === colIndex;
  return isQuickCellActive(rowIndex, colIndex);
}

function normalizeDimensionLocks(locks, count) {
  const n = Math.max(1, Number(count) || 1);
  const source = locks && typeof locks === 'object' ? locks : {};
  const fixedNumber = value => {
    const num = Math.round(Number(value) || 0);
    return num > 0 ? num : null;
  };
  return {
    frontPanels: Array.from({length:n + 1}, (_, i) => fixedNumber(source.frontPanels?.[i])),
    doorWidths: Array.from({length:n}, (_, i) => fixedNumber(source.doorWidths?.[i]))

}

function hasDimensionLocks(locks) {
  return !!locks && [...(locks.frontPanels || []), ...(locks.doorWidths || [])].some(value => Number(value) > 0);
}

function frontPanelRebateCutSidesForLock(row, index) {
  if (!row?.rebate) return 0;
  const count = Math.max(1, Number(row.count) || 1);
  const safeIndex = Math.max(0, Math.min(count, Number(index) || 0));
  if (safeIndex === 0 || safeIndex === count) return 1;
  const leftSwing = boothSwingAt(row, safeIndex - 1);
  const rightSwing = boothSwingAt(row, safeIndex);
  return frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing) ? 1 : 2;
}

function frontPanelLockCalcSize(row, index, value) {
  const big = Math.max(0, Math.round(Number(value) || 0));
  const cut = frontPanelRebateCutSidesForLock(row, index) * (Math.max(0, Number(row?.rebateDepth) || 0));
  return Math.max(0, Math.round(big - cut));
}

function applyDimensionLocksToComputed(row, computed) {
  const locks = normalizeDimensionLocks(row.dimensionLocks, row.count);
  if (!hasDimensionLocks(locks)) return computed;
  const count = Math.max(1, Number(row.count) || 1);
  const lockedDoors = locks.doorWidths.map(value => Number(value) > 0 ? rebateSmallSize(value, row, 'double') : null);
  const doorInstallWidths = computed.doorInstallWidths.map((width, i) => Number(lockedDoors[i]) > 0 ? Math.min(Number(lockedDoors[i]), computed.boothWidths[i]) : width);
  const doorWidths = doorInstallWidths.map(width => row.rebate ? width + (row.rebateDepth || 0) * 2 : width);
  const gapPairs = computed.gapPairs || computed.boothWidths.map(() => splitInteger(row.doorGap, 2));
  const availablePanels = computed.boothWidths.map((width, i) => Math.max(0, Math.round(width - doorInstallWidths[i] - row.doorGap)));
  const totalPanelWidth = availablePanels.reduce((sum, width) => sum + width, 0);
  const baseFrontPanels = Array.from({length:count + 1}, (_, i) => {
    if (i === 0) return computed.sidePairs[0]?.[0] || 0;
    if (i === count) return computed.sidePairs[count - 1]?.[1] || 0;
    return (computed.sidePairs[i - 1]?.[1] || 0) + (computed.sidePairs[i]?.[0] || 0);
  });
  const calcFrontPanelLocks = locks.frontPanels.map((value, i) => Number(value) > 0 ? frontPanelLockCalcSize(row, i, value) : null);
  const lockedTotal = calcFrontPanelLocks.reduce((sum, value) => sum + (Number(value) > 0 ? Number(value) : 0), 0);
  const unlockedIndexes = baseFrontPanels.map((_, i) => i).filter(i => !(Number(calcFrontPanelLocks[i]) > 0));
  const remainingPanelWidth = Math.max(0, totalPanelWidth - lockedTotal);
  const unlockedBaseTotal = unlockedIndexes.reduce((sum, i) => sum + baseFrontPanels[i], 0);
  const fallbackParts = splitInteger(remainingPanelWidth, unlockedIndexes.length);
  const frontPanels = Array.from({length:count + 1}, (_, i) => {
    const locked = Number(calcFrontPanelLocks[i]);
    if (locked > 0) return Math.max(0, Math.round(locked));
    if (!unlockedIndexes.length) return 0;
    if (unlockedBaseTotal > 0) return Math.max(0, Math.round(remainingPanelWidth * (baseFrontPanels[i] || 0) / unlockedBaseTotal));
    return fallbackParts.shift() || 0;
  });
  const diff = totalPanelWidth - frontPanels.reduce((sum, width) => sum + width, 0);
  if (diff && unlockedIndexes.length) frontPanels[unlockedIndexes[unlockedIndexes.length - 1]] += diff;
  const sidePairs = Array.from({length:count}, () => [0, 0]);
  if (count === 1) {
    sidePairs[0][0] = Math.min(availablePanels[0], frontPanels[0] || 0);
    sidePairs[0][1] = Math.max(0, availablePanels[0] - sidePairs[0][0]);
  } else {
    sidePairs[0][0] = Math.min(availablePanels[0], frontPanels[0] || 0);
    for (let i = 1; i < count; i++) {
      sidePairs[i - 1][1] = Math.max(0, availablePanels[i - 1] - sidePairs[i - 1][0]);
      sidePairs[i][0] = Math.max(0, (frontPanels[i] || 0) - sidePairs[i - 1][1]);
      if (sidePairs[i][0] > availablePanels[i]) {
        const overflow = sidePairs[i][0] - availablePanels[i];
        sidePairs[i][0] = availablePanels[i];
        if (!(Number(calcFrontPanelLocks[i]) > 0)) frontPanels[i] = Math.max(0, (frontPanels[i] || 0) - overflow);
      }
    }
    sidePairs[count - 1][1] = Math.max(0, availablePanels[count - 1] - sidePairs[count - 1][0]);
  }
  const insufficientDoors = doorInstallWidths.map(width => width < computed.minDoorW);
  const insufficientEdges = sidePairs.map((pair, i) => (i === 0 && pair[0] < computed.minEdgePanel) || (i === count - 1 && pair[1] < computed.minEdgePanel));
  const insufficientMiddles = sidePairs.slice(0, -1).map((pair, i) => pair[1] + sidePairs[i + 1][0] < computed.minMiddlePanel);
  const doorZoneTotal = doorInstallWidths.reduce((sum, width) => sum + width + row.doorGap, 0);
  const remainingForMargins = row.total - doorZoneTotal;
  return {...computed, doorInstallWidths, doorWidths, sidePairs, gapPairs, doorTotal:doorInstallWidths.reduce((sum, width) => sum + width, 0), remainingForMargins, adjustedLength:remainingForMargins < 0, totalRun:remainingForMargins < 0 ? doorZoneTotal : row.total, edge:sidePairs[0]?.[0] || 0, middle:(sidePairs[0]?.[0] || 0) * 2, insufficientDoors, insufficientEdges, insufficientMiddles, dimensionLocks:locks, frontPanelBigLocks:locks.frontPanels};
}

function rebateLabel(size, p, type = 'double', role = 'panel', swingOverride = null) {
  const big = Math.max(0, Math.round(Number(size) || 0));
  if (!p.rebate) return fmtMm(big);
  const cut = (p.rebateDepth || 0) * (type === 'single' ? 1 : 2);
  const small = Math.max(0, Math.round(big - cut));
  const inward = String(swingOverride || p.swing || '').startsWith('in');
  const doorBigInside = role === 'door';
  const bigOnTop = doorBigInside ? inward : !inward;
  return bigOnTop ? {top: fmtMm(big), bottom: fmtMm(small), topName:'大', bottomName:'小'} : {top: fmtMm(small), bottom: fmtMm(big), topName:'小', bottomName:'大'};
}

function rebateText(size, p, type = 'double') {
  const label = rebateLabel(size, p, type);
  if (typeof label !== 'object') return label;
  const big = label.topName === '大' ? label.top : label.bottom;
  const small = label.topName === '小' ? label.top : label.bottom;
  return `大${big}/小${small}`;
}

function rebateBomSizeText(size, p) {
  const label = rebateLabel(size, p);
  if (typeof label !== 'object') return label;
  return label.topName === '大' ? label.top : label.bottom;
}

function boardDimLabel(bigMm, p, cutSides, topIsSmall) {
  const big = Math.max(0, Math.round(Number(bigMm) || 0));
  if (!p.rebate) return fmtMm(big);
  const small = Math.max(0, Math.round(big - (p.rebateDepth || 0) * cutSides));
  return topIsSmall ? {top: fmtMm(small), bottom: fmtMm(big)} : {top: fmtMm(big), bottom: fmtMm(small)};
}

function uniqueRebateTexts(values, p, type) {
  return [...new Set(values.map(v => rebateText(v, p, type)))].join(' / ');
}

function rebateSmallSize(size, p, type = 'double') {
  const big = Math.max(0, Math.round(Number(size) || 0));
  if (!p.rebate) return big;
  const cut = (p.rebateDepth || 0) * (type === 'single' ? 1 : 2);
  return Math.max(0, Math.round(big - cut));
}
