  ctx.restore();
}

function drawProjectOverview(p, c) {
  const cols = Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35)));
  const rows = Math.ceil(p.count / cols);
  const gap = 8;
  const cellW = Math.min(68, (PLOT.w - 160 - gap * (cols - 1)) / cols);
  const cellH = Math.min(42, (PLOT.h - 190 - gap * (rows - 1)) / rows);
  const gridW = cols * cellW + (cols - 1) * gap;
  const gridH = rows * cellH + (rows - 1) * gap;
  const ox = PLOT.x + 70;
  const oy = PLOT.y + 122;

  ctx.fillStyle = '#1f2328';
  ctx.font = `bold 18px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`项目总览：共 ${p.count} 间标准隔间`, ox, oy - 54);
  ctx.fillStyle = '#656d76';
  ctx.font = `13px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.fillText(`单间参考：宽 ${fmtMm(c.boothW)}mm × 深 ${p.depth}mm，门宽 ${p.doorW}mm，板厚 ${p.tPanel}mm`, ox, oy - 28);

  for (let i = 0; i < p.count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = ox + col * (cellW + gap);
    const y = oy + row * (cellH + gap);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x, y, cellW, cellH);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
    ctx.strokeRect(x, y, cellW, cellH);
    ctx.strokeStyle = '#185FA5';
    ctx.beginPath(); ctx.moveTo(x + cellW * .28, y + cellH - 4); ctx.lineTo(x + cellW * .72, y + cellH - 4); ctx.stroke();
    if (cellW >= 40 && cellH >= 26) {
      ctx.fillStyle = '#185FA5';
      ctx.font = `10px 'Microsoft YaHei', Arial, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`${i + 1}`, x + cellW / 2, y + cellH / 2);
    }
  }

  const sx = ox + gridW + 60;
  const sy = oy;
  drawStandardPlanModule(sx, sy, 280, 185, p, c);
  drawProjectStats(sx, sy + 225, p, c, cols, rows);
  drawDim(ox, oy + gridH + 42, ox + gridW, oy + gridH + 42, `示意排布 ${cols} 列 × ${rows} 行`, -14);
}

function drawStandardPlanModule(x, y, w, h, p, c) {
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.2; ctx.strokeRect(x, y, w, h);
  drawHatch(x, y - 18, w, 18, 14); ctx.strokeStyle = '#666'; ctx.strokeRect(x, y - 18, w, 18);
  const doorW = w * Math.min(.72, p.doorW / c.boothW);
  const dx = x + (w - doorW) / 2;
  ctx.strokeStyle = '#185FA5'; ctx.strokeRect(dx, y + h - 6, doorW, 6);
  ctx.setLineDash([6,4]); ctx.strokeStyle = '#9fc4ea'; ctx.beginPath(); ctx.arc(dx + doorW, y + h - 6, doorW, Math.PI, Math.PI * 1.5); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('标准单间', x + w / 2, y + h / 2);
  drawDim(x, y - 46, x + w, y - 46, `宽 ${fmtMm(c.boothW)}mm`, 12);
  drawDim(x + w + 28, y, x + w + 28, y + h, `深 ${p.depth}mm`, 12);
}

function drawPlanWalls(ox, oy, sW, sD, swt, c, extras = {}) {
  const extraLeft = Math.max(0, Number(extras.left) || 0);
  const extraRight = Math.max(0, Number(extras.right) || 0);
  const middleExtras = Array.isArray(extras.middle) ? extras.middle.filter(item => item && item.h > 0 && item.x2 > item.x1) : [];
  const left = (c.hasLeft || extraLeft > 0) ? swt : 0;
  const right = (c.hasRight || extraRight > 0) ? swt : 0;
  const back = c.hasBack ? swt : 0;
  if (!left && !right && !back) return;
  const leftH = c.hasLeft ? sD + back : Math.min(sD + back, back + extraLeft);
  const rightH = c.hasRight ? sD + back : Math.min(sD + back, back + extraRight);
  const leftX = left ? ox - left : ox;
  const rightX = right ? ox + sW : ox + sW;
  const backX = back ? Math.min(left ? leftX : ox, ox) : ox;
  const backRight = back ? Math.max(right ? rightX + right : ox + sW, ox + sW) : ox + sW;
  const outerX = Math.min(backX, left ? leftX : ox, ox);
  const outerY = oy - back;
  const middleH = middleExtras.reduce((max, item) => Math.max(max, back + item.h), 0);
  const outerW = Math.max(backRight, right ? rightX + right : ox + sW, ox + sW) - outerX;
  const outerH = Math.max(back, leftH, rightH, middleH);
  const wallPath = new Path2D();
  if (back) wallPath.rect(backX, oy - back, backRight - backX, back);
  if (left) wallPath.rect(leftX, oy - back, left, leftH);
  if (right) wallPath.rect(rightX, oy - back, right, rightH);
  middleExtras.forEach(item => wallPath.rect(item.x1, oy - back, item.x2 - item.x1, back + item.h));

  ctx.save();
  ctx.fillStyle = '#fbfbfb';
  ctx.fill(wallPath);
  ctx.clip(wallPath);

  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 0.8;
  for (let i = -outerH; i < outerW + outerH; i += 22) {
    ctx.beginPath();
    ctx.moveTo(outerX + i, outerY + outerH);
    ctx.lineTo(outerX + i + outerH, outerY);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1.6;
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  const drawSegmentedLine = (x1, x2, y, gaps) => {
    let cursor = x1;
    gaps
      .map(gap => ({x1:Math.max(x1, gap.x1), x2:Math.min(x2, gap.x2)}))
      .filter(gap => gap.x2 > gap.x1)
      .sort((a, b) => a.x1 - b.x1)
      .forEach(gap => {
        if (gap.x1 > cursor) {
          ctx.moveTo(cursor, y);
          ctx.lineTo(gap.x1, y);
        }
        cursor = Math.max(cursor, gap.x2);
      });
    if (cursor < x2) {
      ctx.moveTo(cursor, y);
      ctx.lineTo(x2, y);
    }
  };
  if (back) {
    ctx.moveTo(backX, oy - back);
    ctx.lineTo(backRight, oy - back);
    if (!left) {
      ctx.moveTo(ox, oy - back);
      ctx.lineTo(ox, oy);
    }
    if (!right) {
      ctx.moveTo(ox + sW, oy - back);
      ctx.lineTo(ox + sW, oy);
    }
    drawSegmentedLine(ox, ox + sW, oy, middleExtras);
  }
  if (left) {
    ctx.moveTo(leftX, oy - back);
    ctx.lineTo(leftX, oy - back + leftH);
    ctx.lineTo(leftX + left, oy - back + leftH);
    ctx.moveTo(leftX + left, oy - back + leftH);
    ctx.lineTo(leftX + left, oy);
  }
  if (right) {
    ctx.moveTo(rightX + right, oy - back);
    ctx.lineTo(rightX + right, oy - back + rightH);
    ctx.lineTo(rightX, oy - back + rightH);
    ctx.moveTo(rightX, oy - back + rightH);
    ctx.lineTo(rightX, oy);
  }
  middleExtras.forEach(item => {
    const wallBottom = oy - back + back + item.h;
    ctx.moveTo(item.x1, oy);
    ctx.lineTo(item.x1, wallBottom);
    ctx.lineTo(item.x2, wallBottom);
    ctx.lineTo(item.x2, oy);
  });
  ctx.stroke();
  ctx.restore();
}

function drawDoorSwing(door, baseY, st, p) {
  const swing = swingDefs[door.swing || p.swing || 'in-right'] || swingDefs['in-right'];
  const isRight = swing.hinge === 'right';
  const hingeX = isRight ? door.end : door.start;
  const closedY = baseY - st / 2;
  const openDir = swing.opensUp ? -1 : 1;
  const openEndY = closedY + openDir * door.width;
  const dash = anno(34);
  const gap = anno(24);
  const drawDoorBoard = (x1, y1, x2, y2, topIsSmall) => {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len <= 0.5) return;
    const ux = dx / len;
    const uy = dy / len;
    const nx = -uy;
    const ny = ux;
    const t = Math.max(st, Number(p.tPanel) || 12);
    const rebate = p.rebate ? Math.min(Math.max(0, Number(p.rebateDepth) || 0), len / 3) : 0;
    const leftCut = p.rebate ? rebate : 0;
    const rightCut = p.rebate ? rebate : 0;
    const topA = topIsSmall ? leftCut : 0;
    const topB = topIsSmall ? len - rightCut : len;
    const botA = topIsSmall ? 0 : leftCut;
    const botB = topIsSmall ? len : len - rightCut;
    const px = (s, side) => x1 + ux * s + nx * side;
    const py = (s, side) => y1 + uy * s + ny * side;
    ctx.beginPath();
    ctx.moveTo(px(topA, -t / 2), py(topA, -t / 2));
    ctx.lineTo(px(topB, -t / 2), py(topB, -t / 2));
    if (topB !== botB) ctx.lineTo(px(topB, 0), py(topB, 0));
    ctx.lineTo(px(botB, 0), py(botB, 0));
    ctx.lineTo(px(botB, t / 2), py(botB, t / 2));
    ctx.lineTo(px(botA, t / 2), py(botA, t / 2));
    if (botA !== topA) ctx.lineTo(px(botA, 0), py(botA, 0));
    ctx.lineTo(px(topA, 0), py(topA, 0));
    ctx.closePath();
    ctx.stroke();
  };
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.strokeStyle = '#185FA5';
  ctx.lineWidth = Math.max(0.45, anno(0.75));
  drawDoorBoard(door.start, closedY, door.end, closedY, doorSmallOnTopForSwing(door.swing));
  drawDoorBoard(hingeX, closedY, hingeX, openEndY, doorSmallOnTopForSwing(door.swing));
  ctx.strokeStyle = '#8EC5FF';
  ctx.lineWidth = Math.max(0.8, anno(5));
  ctx.setLineDash([dash, gap]);
  ctx.beginPath();
  const arcMap = {
    'in-left': [0, -Math.PI / 2, true],
    'in-right': [Math.PI, Math.PI * 1.5, false],
    'out-left': [0, Math.PI / 2, false],
    'out-right': [Math.PI, Math.PI / 2, true]
  };
  const arc = arcMap[door.swing || p.swing || 'in-right'] || arcMap['in-right'];
  ctx.arc(hingeX, closedY, door.width, arc[0], arc[1], arc[2]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPlanRebateEdge(x, y1, y2, color = '#222') {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.55;
  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();
  ctx.restore();
}

function frontSmallOnTopForSwing(swing) {
  return String(swing || '').startsWith('in');
}

function doorSmallOnTopForSwing(swing) {
  return !frontSmallOnTopForSwing(swing);
}

function buildBoardModel(p, c, doors, ox, sW, scale) {
  const rebate = Math.max(0, Number(p.rebateDepth) || 0);
  const panels = [];
  const doorBoards = doors.filter(door => door.hasDoor !== false).map((door, i) => ({
    kind: 'door',
    index: door.index ?? i,
    bigX1: door.start - Math.min(rebate * scale, door.gapLeft || 0),
    bigX2: door.end + Math.min(rebate * scale, door.gapRight || 0),
    bigMm: c.doorWidths[door.index ?? i] || p.doorW,
    smallMm: c.doorInstallWidths[door.index ?? i] || c.doorWidths[door.index ?? i] || p.doorW,
    leftRebate: true,
    rightRebate: true,
    topIsSmall: doorSmallOnTopForSwing(door.swing),
    swing: door.swing
  }));

  if (doors.length) {
    const firstDoorIndex = doors[0].index ?? 0;
    const lastDoorIndex = doors[doors.length - 1].index ?? (p.count - 1);
    panels.push({
      kind: 'edge', index: 0, bigX1: ox, bigX2: doors[0].zoneStart,
      bigMm: c.sidePairs[firstDoorIndex]?.[0] || 0,
      leftRebate: false, rightRebate: true,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[0].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[0].swing)
    });
    for (let i = 0; i < doors.length - 1; i++) {
      const leftSwing = doors[i].swing;
      const rightSwing = doors[i + 1].swing;
      const leftIndex = doors[i].index ?? i;
      const rightIndex = doors[i + 1].index ?? (i + 1);
      panels.push({
        kind: 'middle', index: i,
        bigX1: doors[i].zoneEnd,
        bigX2: doors[i + 1].zoneStart,
        bigMm: (c.sidePairs[leftIndex]?.[1] || 0) + (c.sidePairs[rightIndex]?.[0] || 0),
        leftMm: c.sidePairs[leftIndex]?.[1] || 0,
        rightMm: c.sidePairs[rightIndex]?.[0] || 0,
        leftRebate: true,
        rightRebate: true,
        leftTopIsSmall: frontSmallOnTopForSwing(leftSwing),
        rightTopIsSmall: frontSmallOnTopForSwing(rightSwing),
        mixed: frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing)
      });
    }
    panels.push({
      kind: 'edge', index: doors.length - 1, bigX1: doors[doors.length - 1].zoneEnd, bigX2: ox + sW,
      bigMm: c.sidePairs[lastDoorIndex]?.[1] || 0,
      leftRebate: true, rightRebate: false,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing)
    });
  }
  return {panels, doors: doorBoards};
}

function drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel) {
  if (!p.rebate || !boardModel?.doors?.length) return;
  ctx.save();
  const rebatePx = Math.max(1.5, (p.rebateDepth || 0) * scale);
  const profileH = st;
  const yTop = oy + sD - profileH;
  const yBot = oy + sD;
  const yMid = yTop + profileH * 0.5;
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.75;
  ctx.lineJoin = 'miter';
  ctx.lineCap = 'butt';

  const drawBoardProfile = (bigX1, bigX2, leftRebate, rightRebate, leftTopIsSmall, rightTopIsSmall = leftTopIsSmall) => {
    if (bigX2 <= bigX1 + 1) return;
    const r = Math.min(rebatePx, Math.max(1, (bigX2 - bigX1) / 3));
    const smallX1 = leftRebate ? bigX1 + r : bigX1;
    const smallX2 = rightRebate ? bigX2 - r : bigX2;
    const topLeft = leftTopIsSmall ? smallX1 : bigX1;
    const topRight = rightTopIsSmall ? smallX2 : bigX2;
    const botLeft = leftTopIsSmall ? bigX1 : smallX1;
    const botRight = rightTopIsSmall ? bigX2 : smallX2;
    ctx.beginPath();
    ctx.moveTo(topLeft, yTop);
    ctx.lineTo(topRight, yTop);
    if (topRight !== botRight) ctx.lineTo(topRight, yMid);
    ctx.lineTo(botRight, yMid);
    ctx.lineTo(botRight, yBot);
    ctx.lineTo(botLeft, yBot);
    if (botLeft !== topLeft) ctx.lineTo(botLeft, yMid);
    ctx.lineTo(topLeft, yMid);
    ctx.lineTo(topLeft, yTop);
    ctx.stroke();
  };

  boardModel.panels.forEach(panel => drawBoardProfile(panel.bigX1, panel.bigX2, panel.leftRebate, panel.rightRebate, panel.leftTopIsSmall, panel.rightTopIsSmall));
  boardModel.doors.forEach(door => drawBoardProfile(door.bigX1, door.bigX2, door.leftRebate, door.rightRebate, door.topIsSmall));
  ctx.restore();
}


function drawProjectStats(x, y, p, c, cols, rows) {
  const doorCount = Array.from({length: Math.max(1, Number(p.count) || 1)}, (_, i) => i).filter(i => hasDoorAt(p, i)).length;

  ];
  ctx.strokeStyle = '#30343a'; ctx.lineWidth = 1; ctx.strokeRect(x, y, 280, 150);
  ctx.fillStyle = '#f6f8fa'; ctx.fillRect(x, y, 280, 28);
  ctx.fillStyle = '#1f2328'; ctx.font = `bold 13px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText('项目统计', x + 12, y + 14);
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;

}

  const rows = activeGroupRows();

  ctx.fillText(`估算总长度：${Math.round(totalRun / 1000 * 10) / 10} m。切换左侧组可编辑单组参数。`, PLOT.x + 18, PLOT.y + 48);

    rows.forEach((item, i) => {

    ctx.strokeRect(x, y, cardW, cardH);

    ctx.font = `bold 15px 'Microsoft YaHei', Arial, sans-serif`;

    ctx.fillStyle = '#656d76';
    ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.fillText(`${g.count} 间 · ${wallLabel(g.wall)}`, x + 14, y + 36);
    ctx.fillText(`单间 ${fmtMm(c.boothW)}×${g.depth}mm · 门 ${g.doorW}mm`, x + 14, y + 56);

    const mx = x + 14, my = y + 84, mw = Math.min(120, cardW - 28), mh = 42;
    ctx.fillStyle = '#fff'; ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh);
    ctx.strokeStyle = '#185FA5'; ctx.beginPath(); ctx.moveTo(mx + mw*.3, my + mh - 5); ctx.lineTo(mx + mw*.7, my + mh - 5); ctx.stroke();
    ctx.fillStyle = '#1f2328'; ctx.textAlign = 'right'; ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.fillText(`${Math.round(c.totalRun/1000*10)/10} m`, x + cardW - 14, y + 112);
    ctx.textAlign = 'left';
  });
}

function doorWidthSummary(row, c = compute(row)) {
  const groupsByWidth = new Map();
  for (let i = 0; i < Math.max(1, Number(row.count) || 1); i++) {
    if (!hasDoorAt(row, i)) continue;
    const width = Math.round(Number(c.doorWidths?.[i]) || Number(row.doorW) || 0);
    if (!width) continue;
    groupsByWidth.set(width, (groupsByWidth.get(width) || 0) + 1);
  }
  const entries = [...groupsByWidth.entries()].sort((a, b) => a[0] - b[0]);
  return {
    count: entries.reduce((sum, [, qty]) => sum + qty, 0),
    text: entries.length ? entries.map(([width, qty]) => `${rebateText(width, row, 'double')}×${row.hDoor || 1750}：${qty}块`).join(' / ') : '无'
  };
}

function drawSegmentedPlan(p, c) {
  const segmentSize = c.segmentSize;
  const segments = Math.ceil(p.count / segmentSize);
  const gapY = 64;
  const rowH = Math.min(128, (PLOT.h - 150 - gapY * (segments - 1)) / segments);
  const startY = PLOT.y + 92;
  ctx.fillStyle = '#656d76';
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`共 ${p.count} 间，按每段最多 ${segmentSize} 间分段显示。`, PLOT.x + 18, PLOT.y + 58);

  for (let s = 0; s < segments; s++) {
    const count = Math.min(segmentSize, p.count - s * segmentSize);
    const segP = {...p, count, total: count * c.boothW};
    const segC = compute(segP);
    const W = segC.totalRun, D = p.depth;
    const wt = segC.wallT, t = p.tPanel;
    const leftWall = segC.hasLeft ? wt : 0;
    const rightWall = segC.hasRight ? wt : 0;
    const backWall = segC.hasBack ? wt : 0;
    const scale = Math.min((PLOT.w - 180) / (W + leftWall + rightWall), rowH / (D + backWall));
    const ox = PLOT.x + 100 + leftWall * scale;
    const oy = startY + s * (rowH + gapY) + backWall * scale;
    const sW = W * scale, sD = D * scale, st = Math.max(1.3, t * scale), swt = wt * scale;
    const firstNo = s * segmentSize + 1;

    drawPlanWalls(ox, oy, sW, sD, swt, segC);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.1; ctx.strokeRect(ox, oy, sW, sD);
    let x = ox;
    if (!segC.hasLeft) { ctx.strokeRect(x, oy, st, sD); x += st; }
    for (let i = 0; i < count; i++) {
      const bw = segC.boothW * scale;
      const doorW = (segC.doorInstallWidths[i] || segC.doorWidths[i] || p.doorW) * scale;
      const dsx = x + (bw - doorW) / 2;
      drawDoorSwing({start:dsx, end:dsx + doorW, width:doorW, swing:boothSwingAt(p, i)}, oy + sD, st, p);
      ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`B${firstNo + i}`, x + bw / 2, oy + sD / 2);
      x += bw;
      if (i < count - 1) { ctx.strokeStyle = '#222'; ctx.strokeRect(x, oy, st, sD); x += st; }
    }
    if (!segC.hasRight) ctx.strokeRect(x, oy, st, sD);
    drawDim(ox, oy - swt - 38, ox + sW, oy - swt - 38, `第 ${s + 1} 段：B${firstNo}-B${firstNo + count - 1} / ${W}mm`, 12);
  }
}

function drawPlanRow(p, ox, oy, scale, labelPrefix = 'B', showGroupName = '', options = {}) {
  const c = compute(p);
  const W = c.totalRun, D = p.depth;
  const t = p.tPanel, wt = c.wallT;
  const wtPx = wt * scale;
  const sW = W * scale, sD = D * scale, st = Math.max(3, t * scale), swt = wt * scale;

  ctx.strokeStyle = '#222222'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(ox, oy + sD);
  ctx.lineTo(ox, oy);
  ctx.lineTo(ox + sW, oy);
  ctx.lineTo(ox + sW, oy + sD);
  ctx.stroke();

  const middleWallExtras = [];
  let depthBoundaryX = ox;
  for (let i = 0; i < Math.max(0, p.count - 1); i++) {
    depthBoundaryX += (c.boothWidths[i] || c.boothW) * scale;
    const protrusion = depthPanelProtrusion(p, i + 1) * scale;
    if (protrusion > 0) {
      const wallX = depthBoundaryX - swt / 2;
      middleWallExtras.push({x1:wallX, x2:wallX + swt, h:protrusion});
    }
  }
  const sideWallExtras = {
    left: depthPanelProtrusion(p, 0) * scale,
    right: depthPanelProtrusion(p, Math.max(1, Number(p.count) || 1)) * scale,
    middle: middleWallExtras
  };
  drawPlanWalls(ox, oy, sW, sD, swt, c, sideWallExtras);
  const rowSelected = options.groupId === activeGroupId && (
    selectionScope === 'group' ||
    (selectionScope === 'row' && options.rowId === activeRowId)
  );
  if (rowSelected && !drawingForExport) {
    ctx.save();
    const selPad = anno(22);
    ctx.lineJoin = 'miter';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1.2, anno(13));
    ctx.setLineDash([]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = Math.max(0.8, anno(7));
    ctx.setLineDash([anno(46), anno(26)]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (showGroupName && !(drawingForExport && options.tagPreviewOnly)) {
    ctx.save();
    const tagText = String(options.tagText || showGroupName);
    ctx.font = planFont(95);
    const tagW = Math.max(anno(PLAN_ANCHOR.noteTagMinW), ctx.measureText(tagText).width + anno(90));
    const tagH = anno(PLAN_ANCHOR.noteTagH);
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    const tagGap = anno(PLAN_ANCHOR.noteTagGap);
    const tagX = ox;
    const singleBoothTagLift = Math.max(1, Number(p.count) || 1) === 1 ? anno(165) : 0;
    const tagY = totalY - tagH - tagGap - singleBoothTagLift;
    if (!drawingForExport && options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      planHitAreas.push({
        type:'tag',
        x: hitX + tagX * hitScale,
        y: hitY + tagY * hitScale,
        w: tagW * hitScale,
        h: tagH * hitScale,
        groupId: options.groupId,
        rowId: options.rowId
      });
    }
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#d64242';
    ctx.lineWidth = Math.max(0.45, anno(1.2));
    ctx.beginPath();
    ctx.rect(tagX, tagY, tagW, tagH);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#d64242';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tagText, tagX + tagW / 2, tagY + tagH / 2);
    const tagSelected = !drawingForExport && selectionScope === 'tag' && options.groupId === activeGroupId && options.rowId === activeRowId;
    if (tagSelected) drawPlanSelectionBox(tagX, tagY, tagW, tagH, anno(10));
    ctx.restore();
  }

  const drawDepthPanel = (panelIndex, x, y, w, h) => {
    const selected = isSelectedDepthPanel(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, panelIndex);
    const protrusion = depthPanelProtrusion(p, panelIndex) * scale;
    const actualDepth = depthPanelActualDepth(p, panelIndex);
    const actualH = Math.max(st, h - protrusion);
    const count = Math.max(1, Number(p.count) || 1);
    const drawX = panelIndex === count ? x + w - st : x;
    const drawW = st;
    ctx.strokeStyle = selected ? '#d64242' : '#222';
    ctx.lineWidth = selected ? Math.max(1.2, anno(3)) : 0.8;
    ctx.strokeRect(drawX, y + protrusion, drawW, Math.max(1, actualH));
    if (protrusion > 0 && actualDepth > 0) {
      if (panelIndex === 0) {
        drawLeftOuterDepthDim(drawX - anno(70), y + protrusion, y + protrusion + actualH, `${fmtMm(actualDepth)}mm`);
      } else {
        const dimX = drawX + drawW + anno(panelIndex === count ? 70 : 54);
        drawDim(dimX, y + protrusion, dimX, y + protrusion + actualH, `${fmtMm(actualDepth)}mm`, 12);
      }
    }
    if (selected && !drawingForExport) drawPlanSelectionBox(drawX, y + protrusion, drawW, Math.max(1, actualH), anno(10));
    if (!drawingForExport && options.groupId && options.rowId && depthPanelSelectable(p, panelIndex)) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const hitPad = Math.max(anno(28), 125 * scale);
      planHitAreas.push({type:'depth-panel', x:hitX + (x - hitPad) * hitScale, y:hitY + y * hitScale, w:(w + hitPad * 2) * hitScale, h:h * hitScale, groupId:options.groupId, rowId:options.rowId, index:panelIndex});
    }
  };

  let x = ox;
  if (!c.hasLeft) {
    drawDepthPanel(0, x, oy, st, Math.max(1, sD - st));
  }
  const doors = [];
  let boothX = ox;
  for (let i=0; i<p.count; i++) {
    const bx = boothX;
    const boothMm = c.boothWidths[i] || c.boothW;
    const bw = boothMm * scale;
    const hasDoor = hasDoorAt(p, i);
    const doorW = (c.doorInstallWidths[i] || c.doorWidths[i] || p.doorW) * scale;
    const gapLeft = c.gapPairs[i]?.[0] || 0;
    const gapRight = c.gapPairs[i]?.[1] || 0;
    const zoneStart = bx + (c.sidePairs[i]?.[0] || 0) * scale;
    const dsx = zoneStart + gapLeft * scale, dsw = doorW;
    const zoneEnd = dsx + dsw + gapRight * scale;
    if (options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const swingKey = boothSwingAt(p, i);
      const doorHitX = dsx;
      const doorHitW = dsw;
      const doorHitSize = Math.min(sD, dsw);
      const doorHitY = String(swingKey).startsWith('out') ? oy + sD : oy + sD - doorHitSize;
      const doorHitH = doorHitSize;
      planHitAreas.push({type:'booth', x:hitX + doorHitX * hitScale, y:hitY + doorHitY * hitScale, w:doorHitW * hitScale, h:doorHitH * hitScale, groupId:options.groupId, rowId:options.rowId, index:i});
    }
    doors.push({start: dsx, end: dsx + dsw, zoneStart, zoneEnd, gapLeft: gapLeft * scale, gapRight: gapRight * scale, width: dsw, boothX: bx, boothW: bw, swing: boothSwingAt(p, i), index:i, hasDoor});
    const currentLabelNo = (options.labelStart || 0) + i + 1;
    ctx.fillStyle='#185FA5'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=planFont(95);
    const boothLabel = `${labelPrefix}${currentLabelNo}`;
    const labelX = bx + bw / 2;
    const labelY = oy + sD / 2;
    if (isSelectedBooth(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, i)) {
      const textW = ctx.measureText(boothLabel).width;
      const textH = annoFont(95);
      const padX = anno(28);
      const padY = anno(18);
      ctx.strokeStyle = '#185FA5'; ctx.lineWidth = Math.max(0.45, anno(2));
      ctx.strokeRect(labelX - textW / 2 - padX, labelY - textH / 2 - padY, textW + padX * 2, textH + padY * 2);
    }
    ctx.fillText(boothLabel, labelX, labelY);
    if (!hasDoor) {
      ctx.save();
      ctx.fillStyle = '#d64242';
      ctx.font = planFont(70);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('无门', labelX, labelY + anno(108));
      ctx.restore();
    }
    if (i < p.count - 1) {
      const panelX = bx + bw - st / 2;
      drawDepthPanel(i + 1, panelX, oy, st, Math.max(1, sD - st));
    }
    boothX += bw;
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
  if (doors.length && !p.rebate) {
    if (doors[0].zoneStart > ox + 0.5) ctx.strokeRect(ox, oy+sD-st, doors[0].zoneStart - ox, st);
    for (let i = 0; i < doors.length - 1; i++) {
      const start = doors[i].zoneEnd;
      const end = doors[i + 1].zoneStart;
      if (end > start + 0.5) ctx.strokeRect(start, oy+sD-st, end - start, st);
    }
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) ctx.strokeRect(doors[doors.length - 1].zoneEnd, oy+sD-st, ox + sW - doors[doors.length - 1].zoneEnd, st);
  }
  if (!c.hasRight) {
    drawDepthPanel(p.count, ox + sW - st, oy, st, Math.max(1, sD - st));
  }
  doors.filter(door => door.hasDoor !== false).forEach(door => {
    drawDoorSwing(door, oy+sD, st, p);
  });
  const boardModel = buildBoardModel(p, c, doors, ox, sW, scale);
  drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel);

  const edge = c.edge;
  const middle = c.middle;
  if (options.showTopDims !== false) {
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    drawDim(ox, totalY, ox+sW, totalY, `${c.adjustedLength ? '展开总长' : '总长'} ${fmtMm(W)}mm`, 10);
  }
  drawPlanWarnings(c, ox + sW + swt + 18, oy - swt + 4);
  if (options.showBoothDim !== false) {
    const boothY = oy + Math.max(26, sD * 0.18);
    let boothDimX = ox;
    for (let i = 0; i < p.count; i++) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const boothPx = boothMm * scale;
      drawDim(boothDimX, boothY, boothDimX + boothPx, boothY, `${fmtMm(boothMm)}mm`, -10);
      boothDimX += boothPx;
    }
  }
  const depthX = ox + sW + swt + (options.depthDimGap ?? PLAN_ANCHOR.depthDimGap);
  drawDim(depthX, oy, depthX, oy+sD, `深 ${p.depth}mm`, 14);

  const segments = [];
  boardModel.panels.forEach(panel => {
    const cutSides = (panel.leftRebate ? 1 : 0) + (panel.rightRebate ? 1 : 0);
    const label = !p.rebate
      ? fmtMm(panel.bigMm)
      : panel.mixed
      ? {top: fmtMm(Math.max(0, Math.round(panel.bigMm - (p.rebateDepth || 0)))), bottom: fmtMm(panel.bigMm)}
      : boardDimLabel(panel.bigMm, p, cutSides, panel.leftTopIsSmall);
    segments.push({x1: panel.bigX1, x2: panel.bigX2, label});
  });
  boardModel.doors.forEach(door => {
    const sourceDoor = doors[door.index];
    segments.push({x1: sourceDoor.start, x2: sourceDoor.end, label: p.rebate ? boardDimLabel(door.bigMm, p, 2, door.topIsSmall) : fmtMm(door.bigMm)});
  });
  segments.sort((a, b) => a.x1 - b.x1);
  drawChainDim(oy + sD + (options.bottomDimOffset || PLAN_ANCHOR.bottomDimOffset), segments);
}

function drawPlanBlock(block, x, y, fit, pageOffsetX, pageOffsetY) {
  const g = block.row;
  const m = block.metrics;
  const group = block.group;
  const orderKey = `${group.id}:${g.id}`;
  const nudge = !drawingForExport && sheetDragNudge?.key === orderKey ? sheetDragNudge : null;
  const drawX = x + (nudge?.x || 0);
  const drawY = y + (nudge?.y || 0);
  if (!drawingForExport) {
    planHitAreas.push({type:'block', x:pageOffsetX + drawX * fit, y:pageOffsetY + drawY * fit, w:m.w * fit, h:m.h * fit, groupId:group.id, rowId:g.id, orderKey, pageIndex:block.pageIndex ?? 0, block, fit});
  }
  const draggingThisBlock = !drawingForExport && sheetOrderDrag?.key === orderKey;
  if (draggingThisBlock) {
    ctx.save();
    ctx.globalAlpha = 0.35;
  }
  drawPlanRow(g, drawX + m.drawX, drawY + m.drawY, 1, groupLabelPrefix(group), layoutUnitName(group, g), {
    showTopDims: true,
    showBoothDim: true,
    totalDimGap: PLAN_ANCHOR.totalDimGap,
    depthDimGap: PLAN_ANCHOR.depthDimGap,
    bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
    groupColor: groupColor(groups.indexOf(group)),
    labelStart: block.labelStart || 0,
    groupId: group.id,
    rowId: g.id,
    tagText: g.note || groupDisplayName(group),
    tagPreviewOnly: !g.note && !String(group.name || '').trim(),
    hitScale: fit,
    hitX: pageOffsetX,
    hitY: pageOffsetY
  });
  if (draggingThisBlock) ctx.restore();
}

function drawSheetDragOverlay() {
  if (drawingForExport || !sheetDragVisual) return;
  ctx.save();
  const v = sheetDragVisual;
  if (v.target) {
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([12, 8]);
    ctx.strokeRect(v.target.x, v.target.y, v.target.w, v.target.h);
    ctx.setLineDash([]);
  }
  if (v.drag) {
    const x = v.mouseX - v.drag.w / 2;
    const y = v.mouseY - v.drag.h / 2;
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([16, 10]);
    ctx.strokeRect(x, y, v.drag.w, v.drag.h);
    ctx.setLineDash([]);
    if (v.block) {
      const block = v.block;
      const m = block.metrics;
      const fit = Math.max(0.0001, Number(v.fit) || 1);
      ctx.globalAlpha = 0.82;
      const oldDrawingForExport = drawingForExport;
      drawingForExport = true;
      try {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(fit, fit);
        drawPlanRow(block.row, m.drawX, m.drawY, 1, groupLabelPrefix(block.group), layoutUnitName(block.group, block.row), {
          showTopDims: true,
          showBoothDim: true,
          totalDimGap: PLAN_ANCHOR.totalDimGap,
          depthDimGap: PLAN_ANCHOR.depthDimGap,
          bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
          groupColor: groupColor(groups.indexOf(block.group)),
          labelStart: block.labelStart || 0,
          groupId: block.group.id,
          rowId: block.row.id,
          tagText: block.row.note || groupDisplayName(block.group),
          tagPreviewOnly: !block.row.note && !String(block.group.name || '').trim(),
          hitScale: 1,
          hitX: 0,
          hitY: 0
        });
        ctx.restore();
      } finally {
        drawingForExport = oldDrawingForExport;
      }
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.68;
      ctx.fillStyle = '#E6F1FB';
      ctx.strokeStyle = '#0B6FD3';
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, v.drag.w, v.drag.h);
      ctx.strokeRect(x, y, v.drag.w, v.drag.h);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

function drawPlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0) {
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex);
  const baseContentW = Math.max(1, page.usedW);
  const baseContentH = Math.max(1, page.usedH);
  const singleBoothPage = page.blocks.length === 1 && Math.max(1, Number(page.blocks[0]?.row?.count) || 1) === 1;
  const rawContentW = baseContentW;
  const rawContentH = baseContentH;
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const autoFitScale = Math.min(availableW / rawContentW, availableH / rawContentH, 1);
  const fit = singleBoothPage ? autoFitScale * 0.75 : autoFitScale;
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const prevAnnoScale = planAnnotationScale;
  planAnnotationScale = 1;
  const localX = sheetOffsetX + P.x + gaps.left + (availableW - contentW) / 2;
  const localY = sheetOffsetY + P.y + gaps.top;
  ctx.save();
  ctx.translate(localX, localY);
  ctx.scale(fit, fit);
  page.blocks.forEach(block => drawPlanBlock({...block, pageIndex}, block.pageX, block.pageY, fit, localX, localY));
  ctx.restore();
  planAnnotationScale = prevAnnoScale;
}

function drawPlanSheetsPreview(p) {
  const layout = getSheetLayout(p);
  const blocks = collectPlanBlocks(p).filter(block => block.row.enabled !== false);
  if (!blocks.length) return;
  const pages = paginatePlanBlocks(blocks, layout);
  const gap = Math.max(80, layout.sheetW * 0.12);
  pages.forEach((page, index) => {
    const x = index * (layout.sheetW + gap);
    const contentGaps = sheetContentGaps(index);
    const hitX = x + layout.plot.x + contentGaps.left;
    const hitY = layout.plot.y + contentGaps.top;
    const hitW = Math.max(1, layout.plot.w - contentGaps.left - contentGaps.right);
    const hitH = Math.max(1, layout.plot.h - contentGaps.top - contentGaps.bottom);
    drawSheet('卫生间隔断平面图', p, x, 0, index);
    ctx.save();
    ctx.beginPath();
    const clipTop = index === 0 ? layout.frame.y + 82 : layout.frame.y + 12;
    const clipBottom = hitY + hitH;
    ctx.rect(hitX, clipTop, hitW, Math.max(1, clipBottom - clipTop));
    ctx.clip();
    if (!drawingForExport) planHitAreas.push({type:'sheet-page', x:hitX, y:hitY, w:hitW, h:hitH, pageIndex:index});
    drawPlanPageContent(page, layout, x, 0, index);
    ctx.restore();
    ctx.save();
    ctx.fillStyle = '#1f2328';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${index + 1}/${pages.length} 页`, x + layout.frame.x + layout.frame.w / 2, layout.frame.y + layout.frame.h - 16);
    ctx.restore();
  });
  drawSheetDragOverlay();
}

function drawPlan(p) {
  const layout = getSheetLayout(p);
  const P = layout.plot;
  ctx.save();
  ctx.beginPath();
  ctx.rect(layout.frame.x + layout.safeGap * 0.35, layout.frame.y + layout.safeGap * 0.35, layout.frame.w - layout.safeGap * 0.7, layout.frame.h - layout.safeGap * 0.7);
  ctx.clip();

  const blocks = collectPlanBlocks(p).filter(block => block.row.enabled !== false);
  if (!blocks.length) { ctx.restore(); return; }
  if (canvasMode === 'free') {
    const free = layoutFreePlanBlocks(blocks);
    const fit = Math.min(P.w / Math.max(1, free.usedW), P.h / Math.max(1, free.usedH), 1);
    const prevAnnoScale = planAnnotationScale;
    planAnnotationScale = 1;
    const localX = P.x + (P.w - free.usedW * fit) / 2;
    const localY = P.y + (P.h - free.usedH * fit) / 2;
    ctx.save();
    ctx.translate(localX, localY);
    ctx.scale(fit, fit);
    free.blocks.forEach(block => drawPlanBlock(block, block.pageX, block.pageY, fit, localX, localY));
    ctx.restore();
    planAnnotationScale = prevAnnoScale;
    ctx.restore();
    return;
  }
  const pages = paginatePlanBlocks(blocks, layout);
  const pageIndex = Math.max(0, Math.min(currentPlanPage, pages.length - 1));
  const page = pages[pageIndex];
  drawPlanPageContent(page, layout, 0, 0);
  if (pages.length > 1) {
    ctx.save();
    ctx.fillStyle = '#1f2328';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${pageIndex + 1}/${pages.length} 页`, layout.frame.x + layout.frame.w / 2, layout.frame.y + layout.frame.h - 16);
    ctx.restore();
  }
  drawSheetDragOverlay();
  ctx.restore();
}
function drawFront(p) {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = c.totalRun;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 170) / (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)), (P.h - 180) / H);
  const ox = P.x + (P.w - (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)) * scale) / 2 + (c.hasLeft?wt:0) * scale;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hDp = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;

  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  if (c.hasLeft) { drawHatch(ox-swt, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox-swt, oy, swt, sH); }
  if (c.hasRight) { drawHatch(ox+sW, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox+sW, oy, swt, sH); }

  let x = ox;
  for (let i=0; i<=p.count; i++) {
    const isEdge = (i===0 && !c.hasLeft)||(i===p.count && !c.hasRight);
    if (isEdge || (i>0 && i<p.count)) {
      ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(x, floor-hU, st, hU);
      x += st;
    }
    if (i < p.count) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const doorMm = c.doorWidths[i] || p.doorW;
      const bw = boothMm * scale;
      const doorOff = Math.max(0, (boothMm - doorMm) / 2) * scale;
      const dsx = x + doorOff, dsw = doorMm * scale;
      ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(dsx, floor-hDp, dsw, hDp);
      ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(x, floor-hM, bw, vis);
      ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${p.hDoor || 1750}`, dsx+dsw/2, floor-hDp/2);
      x += bw;
    }
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  drawDim(ox, oy-58, ox+sW, oy-58, `${c.adjustedLength ? '展开总长' : '总长'} ${W}mm`, 14);
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14);
  drawDim(ox+sW+58, floor-vis, ox+sW+58, floor, `见光板 ${p.hVis}mm`, 14);
}

function drawStandardFrontModule(p, c) {
  const W = c.boothW;
  const H = Math.max(p.hUpright, p.hMid);
  const scale = Math.min((PLOT.w - 360) / W, (PLOT.h - 180) / H);
  const ox = PLOT.x + 120;
  const floor = PLOT.y + 118 + (PLOT.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale;
  const hDoor = (p.hDoor || 1750) * scale;
  const hMid = p.hMid * scale;
  const vis = p.hVis * scale;
  const doorW = p.doorW * scale;
  const dx = ox + (sW - doorW) / 2;

  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  ctx.strokeStyle='#185FA5'; ctx.strokeRect(dx, floor-hDoor, doorW, hDoor);
  ctx.strokeStyle='#6a9bcc'; ctx.strokeRect(ox, floor-hMid, sW, vis);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  drawDim(ox, oy-58, ox+sW, oy-58, `标准间宽 ${fmtMm(c.boothW)}mm`, 14);
  drawDim(ox+sW+58, floor-hDoor, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14);

  drawProjectStats(ox+sW+115, oy+20, p, c, Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35))), Math.ceil(p.count / Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35)))));
}

function drawSide(p) {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = p.depth;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 300) / (W + wt), (P.h - 180) / H);
  const ox = P.x + (P.w - W * scale) / 2;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hD = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;
  const doorH = p.doorW * scale;

  if (c.hasBack) {
    drawHatch(ox, oy-swt, sW, swt, 18);
    ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(ox, oy-swt, sW, swt);
  }

  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox, floor-hU, st, hU);
  ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(ox+st, floor-hM, sW-st*2, vis);
  ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('见光板', ox+st+(sW-st*2)/2, floor-hM+vis/2);

  const doorStartY = floor - doorH;
  ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(ox+sW-st, doorStartY, st, doorH);
  ctx.fillStyle='#185FA5'; ctx.fillText('门', ox+sW-st/2, doorStartY+doorH/2);
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox+sW-st, floor-hU, st, hU-doorH);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);

  drawDim(ox, oy-58, ox+sW, oy-58, `深度 ${p.depth}mm`, 14);
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14);
  drawDim(ox+sW+58, floor-hD, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14);
}

function renderBOM(p) {
  const rows = drawableGroupRows();
  if (!rows.length && activeRow()?.enabled !== true) {
    renderBomItems([{name:'当前图纸', val:'空白', sub:'输入参数或点击生成后显示'}]);
    return;
  }
  if (rows.length > 1) {
    const totalCount = rows.reduce((sum, item) => sum + item.row.count, 0);
    const doorSummaries = rows.map(item => doorWidthSummary(item.row, compute(item.row)));
    const totalDoorCount = doorSummaries.reduce((sum, item) => sum + item.count, 0);
    const doorSummaryText = doorSummaries.map((item, index) => item.count ? `${groupDisplayName(rows[index].group)}${rows[index].row.layoutRow || 1}排：${item.text}` : '').filter(Boolean).join(' / ');
    const totalRun = rows.reduce((sum, item) => sum + compute(item.row).totalRun, 0);
    const active = activeGroup();
    const row = activeRow();
    const items = [
      {name:'当前组', val:groupDisplayName(active), sub:`共 ${rows.length} 排`},
      {name:'总间数', val:`${totalCount} 间`, sub:'当前组合计'},
      {name:'门板', val:`${totalDoorCount} 块`, sub:doorSummaryText || `${totalCount} 间均无需门板`},
      {name:'中隔板（顶板）', val:`${totalCount} 块`, sub:'按每间 1 块估算'},
      {name:'估算总长度', val:`${Math.round(totalRun/1000*10)/10} m`, sub:'当前组合计'},
      {name:'当前排净间宽', val:`${fmtMm(compute(row).boothW)} mm`, sub:`${groupDisplayName(active)} · ${row.count} 间`},
    ];
    renderBomItems(items);
    return;
  }
  const c = compute(p);
  const doorIndexes = Array.from({length:p.count}, (_, i) => i).filter(i => hasDoorAt(p, i));
  const doorCount = doorIndexes.length;
  const doorSummary = doorWidthSummary(p, c);
  const edgeWidths = [c.sidePairs[0]?.[0] || 0, c.sidePairs[p.count - 1]?.[1] || 0];
  const uprightWidths = c.sidePairs.slice(0, -1).map((pair, i) => pair[1] + c.sidePairs[i + 1][0]);
  const edgeWidthText = uniqueRebateTexts(edgeWidths, p, 'single');
  const uprightWidthText = uprightWidths.length ? uniqueRebateTexts(uprightWidths, p, 'double') : '无';
  const hasSmallDoor = doorIndexes.some(i => c.insufficientDoors[i]);
  const hasSmallEdge = c.insufficientEdges.some(Boolean);
  const hasSmallMiddle = c.insufficientMiddles.some(Boolean);
  const guardText = [hasSmallDoor ? `门小于${c.minDoorW}` : '', hasSmallEdge ? `边板小于${c.minEdgePanel}` : '', hasSmallMiddle ? `立板小于${c.minMiddlePanel}` : ''].filter(Boolean).join(' · ');
  const specialDepths = specialDepthPanelItems(p);
  const specialDepthText = specialDepths.map(item => `${item.name} 深${fmtMm(item.depth)}mm${item.protrusion ? `（墙凸${fmtMm(item.protrusion)}mm）` : ''}`).join(' / ');
  const swingCounts = normalizeBoothSwings(p.boothSwings, p.count, p.swing).filter((_, i) => hasDoorAt(p, i)).reduce((acc, key) => {
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
  const swingSummary = Object.entries(swingCounts).map(([key, count]) => `${swingLabel(key)}${count}块`).join(' / ') || '无门板';
  const items = [
    {name:'图纸模式', val:c.projectMode ? '项目总览' : c.segmentedMode ? '分段详图' : '详细施工图', sub:c.projectMode ? '按标准单间统计' : c.segmentedMode ? `每段最多 ${c.segmentSize} 间` : '逐间绘制'},
    {name:'边板', val:'2 块', sub:p.rebate ? `${p.tPanel}×宽${edgeWidthText}×高${p.hUpright}mm · 单启口` : `${p.tPanel}×宽${edgeWidths.map(fmtMm).join('/')}×高${p.hUpright}mm`},
    {name:'立板', val:`${Math.max(0, p.count - 1)} 块`, sub:p.rebate ? `${p.tPanel}×宽${uprightWidthText}×高${p.hUpright}mm · 双启口` : `${p.tPanel}×宽${uprightWidths.length ? uprightWidths.map(fmtMm).join('/') : '无'}×高${p.hUpright}mm`},
    {name:'门板', val:`${doorCount} 块`, sub:doorCount ? `${p.tPanel}×${doorSummary.text} · ${swingSummary}${p.rebate ? ' · 双启口' : ''}${guardText ? ` · ${guardText}需调整` : ''}${p.doorGap ? ` · 门缝${p.doorGap}mm` : ''}${doorCount < p.count ? ` · ${p.count - doorCount}间无需门板` : ''}` : `${p.count} 间均无需门板`},
    {name:'中隔板（顶板）', val:`${p.count} 块`, sub:`${p.tPanel}×深${c.boothD}×高${p.hMid}mm`},
    {name:'见光板', val:`按未靠墙侧`, sub:`${p.tPanel}×深${c.boothD}×高${p.hVis}mm`},
    ...(specialDepths.length ? [{name:'特殊深度板', val:`${specialDepths.length} 块`, sub:`${p.tPanel}×${specialDepthText}`} ] : []),
    {name:'净间宽', val:`${fmtMm(c.boothW)} mm`, sub:`共 ${p.count} 间`},
    {name:'估算总长度', val:`${Math.round((c.totalRun || p.total)/1000*10)/10} m`, sub:`板厚 ${p.tPanel}mm`},
  ];
  renderBomItems(items);
}

function urinalBomItem() {
  const count = Number(urinalSpec.count) || 0;
  if (count <= 0 || !(urinalSpec.width > 0) || !(urinalSpec.height > 0) || !(urinalSpec.thick > 0)) return null;
  const process = `${urinalSpec.shape || '矩形'}，${urinalSpec.hole || '无开孔'}`;
  const note = urinalSpec.note ? `，${urinalSpec.note}` : (urinalSpec.shape === '异形' || urinalSpec.hole === '有开孔' ? '，需现场模板/图纸确认' : '');
  return {name:'小便板', val:`${count} 张`, sub:`${urinalSpec.width}×${urinalSpec.height}×${urinalSpec.thick}mm，${process}${note}`};
}

function renderBomItems(items) {

function exportImg(name) {
  const filename = `隔断${name||currentTab}.png`;
  const p = lastParams || getParams();
  const sheetCanvas = (currentTab === 'plan' && canvasMode === 'sheets')
    ? renderPlanSheetsStripCanvas(p, QUALITY_RENDER_SCALE)
    : renderSheetCanvas(currentTab, p, {canvasMode, renderScale:QUALITY_RENDER_SCALE, planPage: currentTab === 'plan' ? currentPlanPage : undefined});
  try {
  const link = document.createElement('a');
  link.download = filename;
  link.href = sheetCanvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  link.remove();
  } catch (err) {
    sheetCanvas.toBlob(blob => {
      if (!blob) return alert(`导出失败：${err.message || err}`);
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = filename;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 500);
    }, 'image/png');
  }
}

function exportAll() {
  const p = lastParams || getParams();
  const oldMode = canvasMode;
  canvasMode = 'sheets';
  const planPages = paginatePlanBlocks(collectPlanBlocks(p).filter(block => block.row.enabled !== false), getSheetLayout(p));
  canvasMode = oldMode;
  const jobs = [];
  planPages.forEach((_, pageIndex) => jobs.push({tab:'plan', name:`平面图-${pageIndex + 1}`, options:{planPage:pageIndex}}));
  jobs.push({tab:'front', name:'正立面图', options:{}});
  jobs.push({tab:'side', name:'侧立面图', options:{}});
  jobs.forEach((job,i)=>{
    setTimeout(()=>{
      const sheetCanvas = renderSheetCanvas(job.tab, p, {...job.options, canvasMode:'sheets', renderScale:QUALITY_RENDER_SCALE});
      const link = document.createElement('a');
      link.download = `隔断${job.name}.png`;
      link.href = sheetCanvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      link.remove();
    }, i*300);
  });
}

async function printPdf() {
  try {
    const p = lastParams || getParams();
    const pages = currentTab === 'plan'
      ? getSheetPlanPages(p).map((_, i) => renderSheetCanvas('plan', p, {planPage:i, canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE}))
      : [renderSheetCanvas(currentTab, p, {canvasMode:'sheets', renderScale:PRINT_RENDER_SCALE})];
    const blobUrls = await Promise.all(pages.map(canvas => new Promise(resolve => {
      canvas.toBlob(blob => {
        resolve(blob ? URL.createObjectURL(blob) : canvas.toDataURL('image/png'));
      }, 'image/png');
    })));
    const paper = paperSize === 'a3' ? {w:297, h:420, label:'A3'} : {w:210, h:297, label:'A4'};
    const oldFrame = document.getElementById('print-frame');
    if (oldFrame) oldFrame.remove();
    const frame = document.createElement('iframe');
    frame.id = 'print-frame';
    frame.style.position = 'fixed';
    frame.style.right = '0';
    frame.style.bottom = '0';
    frame.style.width = '0';
    frame.style.height = '0';
    frame.style.border = '0';
    document.body.appendChild(frame);
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html><html><head><meta charset="utf-8"><title>PDF打印</title><style>
      @page{size:${paper.label} portrait;margin:0}
      html,body{margin:0;width:100%;height:100%;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      body{overflow:hidden}
      .page{width:${paper.w}mm;height:${paper.h}mm;display:flex;align-items:center;justify-content:center;page-break-after:always;break-after:page;overflow:hidden}
      .page:last-child{page-break-after:auto;break-after:auto}
      img{width:100%;height:100%;object-fit:contain;display:block}
    </style></head><body>${blobUrls.map((url, i) => `<div class="page"><img src="${url}" alt="图纸${i + 1}"></div>`).join('')}</body></html>`);
    doc.close();
    window.setTimeout(() => {
      try {
        frame.contentWindow.focus();
        frame.contentWindow.print();
      } catch (e) {
        const link = document.createElement('a');
        link.download = `隔断图纸.html`;
        link.href = `data:text/html;charset=utf-8,${encodeURIComponent(doc.documentElement.outerHTML)}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }
      window.setTimeout(() => blobUrls.forEach(url => {
        if (String(url).startsWith('blob:')) URL.revokeObjectURL(url);
      }), 5000);
    }, 150);
  } catch (err) {
    alert(`PDF打印失败：${err.message || err}`);
  }
}

function markButtonBusy(id, text) {
  const btn = document.getElementById(id);
  if (!btn) return () => {};
  const old = btn.innerHTML;
  btn.disabled = true;

  return () => {
    btn.disabled = false;
    btn.innerHTML = old;
  };
}

function updateZoomInfo() {
  document.getElementById('zoom-info').textContent = Math.round(zoomScale*100)+'%';
}

function resetZoom() {
  if(lastParams) {
    autoFit(lastParams);
    drawView(lastParams, currentTab);
  }
}

function canvasPlanPoint(e) {
  const rect = cv.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - panX) / zoomScale,
    y: (e.clientY - rect.top - panY) / zoomScale
  };
}

function hitPlanArea(x, y) {
  const hits = [...planHitAreas].reverse().filter(area => x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h);
  return hits.find(area => area.type === 'sheet-note') || hits.find(area => area.type === 'tag') || hits.find(area => area.type === 'booth') || hits.find(area => area.type === 'depth-panel') || hits.find(area => area.type === 'block') || null;
}

function hitPlanBlock(x, y) {
  return [...planHitAreas].reverse().find(area => area.type === 'block' && x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h) || null;
}

function currentSheetOrderKeys() {
  return collectPlanBlocks(lastParams || getParams()).filter(block => block.row.enabled !== false).map(block => `${block.group.id}:${block.row.id}`);
}

function pageOrderKeys(pageIndex) {
  return [...planHitAreas]
    .filter(area => area.type === 'block' && area.pageIndex === pageIndex && area.orderKey)
    .sort((a, b) => (a.y - b.y) || (a.x - b.x))
    .map(area => area.orderKey);
}

function pageBlockSnapshot(pageIndex) {
  return [...planHitAreas]
    .filter(area => area.type === 'block' && (pageIndex == null || area.pageIndex === pageIndex) && area.orderKey)
    .sort((a, b) => (a.y - b.y) || (a.x - b.x))
    .map(area => ({...area}));
}

function hitSheetPage(x, y) {
  return [...planHitAreas].reverse().find(area => area.type === 'sheet-page' && x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h) || null;
}

function applySheetOrderKeys(keys) {
  const order = new Map(keys.map((key, index) => [key, index]));
  groups.forEach(group => ensureRows(group).forEach(row => {
    const key = `${group.id}:${row.id}`;
    if (order.has(key)) row.sheetOrder = order.get(key);
  }));
}

function previewOrderForTarget(targetKey, placeAfter = false) {
  if (!sheetOrderDrag || !targetKey || targetKey === sheetOrderDrag.key) return sheetOrderDrag?.baseOrder || null;
  const visualKeys = (sheetOrderDrag.allPageBlocks || [])
    .slice()
    .sort((a, b) => (a.pageIndex - b.pageIndex) || (a.y - b.y) || (a.x - b.x))
    .map(area => area.orderKey)
    .filter(Boolean);
  const ordered = [];
  [...visualKeys, ...(sheetOrderDrag.baseOrder || [])].forEach(key => {
    if (key !== sheetOrderDrag.key && !ordered.includes(key)) ordered.push(key);
  });
  const targetIndex = ordered.indexOf(targetKey);
  if (targetIndex < 0) return sheetOrderDrag.baseOrder;
  ordered.splice(targetIndex + (placeAfter ? 1 : 0), 0, sheetOrderDrag.key);
  return ordered;
}

function nearestBlockForPoint(pageIndex, x, y) {
  const source = sheetOrderDrag?.allPageBlocks || sheetOrderDrag?.pageBlocks || planHitAreas;
  const blocks = [...source].filter(area => area.type === 'block' && area.pageIndex === pageIndex && area.orderKey && area.orderKey !== sheetOrderDrag?.key);
  if (!blocks.length) return null;
  return blocks
    .map(area => {
      const cx = area.x + area.w / 2;
      const cy = area.y + area.h / 2;
      return {area, d: Math.hypot(cx - x, cy - y)};
    })
    .sort((a, b) => a.d - b.d)[0].area;
}

function insertionTargetForPoint(pageIndex, x, y, direction = 'down', dragSize = null) {
  const source = sheetOrderDrag?.allPageBlocks || sheetOrderDrag?.pageBlocks || planHitAreas;
  const blocks = [...source]
    .filter(area => area.type === 'block' && area.pageIndex === pageIndex && area.orderKey && area.orderKey !== sheetOrderDrag?.key)
    .sort((a, b) => ((a.y + a.h / 2) - (b.y + b.h / 2)) || ((a.x + a.w / 2) - (b.x + b.w / 2)));
  if (!blocks.length) return null;
  const w = dragSize?.w || 0;
  const h = dragSize?.h || 0;
  const probeX = direction === 'right' ? x + w / 2 : direction === 'left' ? x - w / 2 : x;
  const probeY = direction === 'down' ? y + h / 2 : direction === 'up' ? y - h / 2 : y;
  if (direction === 'left' || direction === 'right') {
    const rowLike = blocks.slice().sort((a, b) => ((a.x + a.w / 2) - (b.x + b.w / 2)) || ((a.y + a.h / 2) - (b.y + b.h / 2)));
    const beforeX = rowLike.find(area => probeX < area.x + area.w / 2);
    return beforeX ? {area:beforeX, after:false} : {area:rowLike[rowLike.length - 1], after:true};
  }
  const before = blocks.find(area => probeY < area.y + area.h / 2 || (Math.abs(probeY - (area.y + area.h / 2)) < area.h / 2 && probeX < area.x + area.w / 2));
  return before ? {area:before, after:false} : {area:blocks[blocks.length - 1], after:true};
}

function hitSnapshotBlock(x, y) {
  const source = sheetOrderDrag?.allPageBlocks || sheetOrderDrag?.pageBlocks || [];
  return [...source].reverse().find(area => area.type === 'block' && x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h) || null;
}

cv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldScale = zoomScale;
  zoomScale *= Math.exp(-e.deltaY * 0.001);
  zoomScale = Math.max(minZoomScale(), Math.min(zoomScale, 5));
  panX = mx - (mx - panX) * (zoomScale / oldScale);
  panY = my - (my - panY) * (zoomScale / oldScale);
  if(lastParams) drawView(lastParams, currentTab);
}, {passive:false});

cv.addEventListener('mousedown', e => {
  if (e.button === 0 && currentTab === 'plan' && canvasMode === 'sheets') {
    const pt = canvasPlanPoint(e);
    const hit = hitPlanBlock(pt.x, pt.y);
    if (hit?.type === 'block') {
      e.preventDefault();
      const group = groups.find(g => g.id === hit.groupId);
      const row = group ? ensureRows(group).find(r => r.id === hit.rowId) : null;
      if (!group || !row) return;
      pendingSheetOrderDrag = {hit, groupId:group.id, rowId:row.id, startX:e.clientX, startY:e.clientY};
      return;
    }
  }
  if(e.button !== 1) return;
  e.preventDefault();
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartPanX = panX;
  dragStartPanY = panY;
  cv.style.cursor = 'move';
});

cv.addEventListener('click', e => {
  if (suppressNextPlanClick) {
    suppressNextPlanClick = false;
    return;
  }
  if (currentTab !== 'plan' || isDragging) return;
  const pt = canvasPlanPoint(e);
  const hit = hitPlanArea(pt.x, pt.y);
  if (!hit) {
    selectionScope = 'none';
    clearSelectedBooth();
    clearSelectedDepthPanel();
    syncPlanNoteInputFromSelection();
    renderSwingButtons();
    renderBoothSwingPanel();
    renderDepthPanelSpecialPanel();
    drawView(lastParams || getParams(), currentTab);
    return;
  }
  if (hit.type === 'sheet-note') {
    saveActiveGroup();
    selectionScope = 'sheet-note';
    clearSelectedBooth();
    clearSelectedDepthPanel();
    syncPlanNoteInputFromSelection();
    renderDepthPanelSpecialPanel();
    drawView(lastParams || getParams(), currentTab);
    return;
  }
  const group = groups.find(g => g.id === hit.groupId);
  const row = group ? ensureRows(group).find(r => r.id === hit.rowId) : null;
  if (!group || !row) return;
  saveActiveGroup();
  activeGroupId = group.id;
  activeRowId = row.id;
  if (hit.type === 'booth') {
    selectionScope = 'booth';
    setSelectedBooth(group.id, row.id, hit.index);
  } else if (hit.type === 'depth-panel') {
    selectionScope = 'depth-panel';
    clearSelectedBooth();
    setSelectedDepthPanel(group.id, row.id, hit.index);
  } else if (hit.type === 'tag') {
    selectionScope = 'tag';
    clearSelectedBooth();
    clearSelectedDepthPanel();
  } else {
    selectionScope = 'row';
    clearSelectedBooth();
    clearSelectedDepthPanel();
  }
  openGroupIds.add(group.id);
  loadGroupToForm(group, row);
  renderGroups(false);
  revealActiveGroupInList();
  renderSwingButtons();
  renderBoothSwingPanel();
  renderDepthPanelSpecialPanel();
  syncPlanNoteInputFromSelection();
  lastParams = getParams();
  drawView(lastParams, currentTab);
});

window.addEventListener('mousemove', e => {
  if (pendingSheetOrderDrag && !sheetOrderDrag) {
    const moved = Math.hypot(e.clientX - pendingSheetOrderDrag.startX, e.clientY - pendingSheetOrderDrag.startY);
    if (moved > 4) {
      const group = groups.find(g => g.id === pendingSheetOrderDrag.groupId);
      const row = group ? ensureRows(group).find(r => r.id === pendingSheetOrderDrag.rowId) : null;
      if (group && row) {
        pushHistory();
        const startPt = canvasPlanPoint(e);
        sheetOrderDrag = {key:pendingSheetOrderDrag.hit.orderKey, pageIndex:pendingSheetOrderDrag.hit.pageIndex, pageOrder:pageOrderKeys(pendingSheetOrderDrag.hit.pageIndex), pageBlocks:pageBlockSnapshot(pendingSheetOrderDrag.hit.pageIndex), allPageBlocks:pageBlockSnapshot(null), baseOrder:currentSheetOrderKeys(), lastMouse:startPt, direction:'down', moved:false};
        previewSheetOrder = null;
        sheetDragVisual = {drag:{w:pendingSheetOrderDrag.hit.w, h:pendingSheetOrderDrag.hit.h}, block:pendingSheetOrderDrag.hit.block, fit:pendingSheetOrderDrag.hit.fit || 1, mouseX:startPt.x, mouseY:startPt.y, target:null};
        cv.style.cursor = 'grabbing';
      }
      pendingSheetOrderDrag = null;
    } else {
      return;
    }
  }
  if (sheetOrderDrag) {
    const pt = canvasPlanPoint(e);
    const dx = pt.x - (sheetOrderDrag.lastMouse?.x ?? pt.x);
    const dy = pt.y - (sheetOrderDrag.lastMouse?.y ?? pt.y);
    if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) sheetOrderDrag.direction = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    sheetOrderDrag.lastMouse = pt;
    const pageHit = hitSheetPage(pt.x, pt.y);
    const targetPageIndex = pageHit ? pageHit.pageIndex : sheetOrderDrag.pageIndex;
    const insertion = insertionTargetForPoint(targetPageIndex, pt.x, pt.y, sheetOrderDrag.direction, sheetDragVisual?.drag);
    const hit = insertion?.area || hitSnapshotBlock(pt.x, pt.y) || nearestBlockForPoint(targetPageIndex, pt.x, pt.y);
    if (sheetDragVisual) {
      sheetDragVisual.mouseX = pt.x;
      sheetDragVisual.mouseY = pt.y;
      sheetDragVisual.target = hit && hit.orderKey !== sheetOrderDrag.key ? hit : null;
    }
    if (hit?.type === 'block' && hit.orderKey) {
      sheetOrderDrag.dropTargetKey = hit.orderKey;
      sheetOrderDrag.dropAfter = insertion?.after === true;
      const dir = sheetOrderDrag.direction;
      const push = Math.min(80, Math.max(28, (dir === 'left' || dir === 'right' ? hit.w : hit.h) * 0.18));
      sheetDragNudge = {key:hit.orderKey, x:dir === 'right' ? push : dir === 'left' ? -push : 0, y:dir === 'down' ? push : dir === 'up' ? -push : 0};
      sheetOrderDrag.moved = true;
    } else {
      sheetDragNudge = null;
    }
    if (lastParams) drawView(lastParams, currentTab);
    return;
  }
  if(!isDragging) return;
  panX = dragStartPanX + (e.clientX - dragStartX);
  panY = dragStartPanY + (e.clientY - dragStartY);
  if(lastParams) drawView(lastParams, currentTab);
});

window.addEventListener('mouseup', e => {
  if (pendingSheetOrderDrag && e.button === 0) {
    pendingSheetOrderDrag = null;
    sheetDragVisual = null;
    sheetDragNudge = null;
    return;
  }
  if (sheetOrderDrag && e.button === 0) {
    const finalOrder = sheetOrderDrag.moved ? previewOrderForTarget(sheetOrderDrag.dropTargetKey, sheetOrderDrag.dropAfter) : null;
    if (finalOrder) {
      applySheetOrderKeys(finalOrder);
    }
    sheetOrderDrag = null;
    previewSheetOrder = null;
    sheetDragVisual = null;
    sheetDragNudge = null;
    suppressNextPlanClick = true;
    cv.style.cursor = 'default';
    if (lastParams) {
      lastParams = getParams();
      drawView(lastParams, currentTab);
    }
    return;
  }
  if(e.button !== 1) return;
  isDragging = false;
  cv.style.cursor = 'default';
});

cv.addEventListener('mouseleave', () => {
  pendingSheetOrderDrag = null;
  sheetOrderDrag = null;
  previewSheetOrder = null;
  sheetDragVisual = null;
  sheetDragNudge = null;
  isDragging = false;
  cv.style.cursor = 'default';
});
