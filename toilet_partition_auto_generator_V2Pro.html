    autoFit(lastParams);
    drawView(lastParams, currentTab);
  }
}

function isMobileViewport() {
  return window.matchMedia('(max-width: 700px)').matches;
}

function scrollMobileTop() {
  window.scrollTo({top:0, behavior:'smooth'});
  document.querySelector('.sidebar')?.scrollTo?.({top:0, behavior:'smooth'});
}

function canvasPlanPoint(e) {
  const rect = cv.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - panX) / zoomScale,
    y: (e.clientY - rect.top - panY) / zoomScale
  };
}

function viewportToPlanPoint(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  return {
    x: (clientX - rect.left - panX) / zoomScale,
    y: (clientY - rect.top - panY) / zoomScale
  };
}

function dimensionValueFromInput(value) {
  const n = Math.round(Number(String(value || '').replace(/[^0-9.]/g, '')) || 0);
  return Number.isFinite(n) && n > 0 ? n : 0;
}

function setRowFixedBoothWidth(row, boothIndex, width) {
  const count = Math.max(1, Number(row.count) || 1);
  const current = parseWidths(row.widthsText || '');
  const values = Array.from({length:count}, (_, i) => Number(current[i]) > 0 ? Math.round(current[i]) : '');
  values[Math.max(0, Math.min(count - 1, Number(boothIndex) || 0))] = Math.max(1, Math.round(width));
  row.widthsText = values.map(value => Number(value) > 0 ? String(value) : '').join(',');
}

function panelRelatedBoothIndex(panel, row) {
  const count = Math.max(1, Number(row?.count) || 1);
  if (!panel) return 0;
  if (panel.kind === 'edge') return panel.index === 0 ? 0 : count - 1;
  return Math.max(0, Math.min(count - 1, Number(panel.index) || 0));
}

function frontPanelWidthForCandidate(row, panel, boothIndex, width) {
  const testRow = {...row};
  setRowFixedBoothWidth(testRow, boothIndex, width);
  const c = compute(testRow);
  if (panel?.kind === 'edge') return panel.index === 0 ? c.sidePairs[0]?.[0] || 0 : c.sidePairs[Math.max(0, Number(testRow.count) || 1) - 1]?.[1] || 0;
  const index = Math.max(0, Math.min((Number(testRow.count) || 1) - 2, Number(panel?.index) || 0));
  return (c.sidePairs[index]?.[1] || 0) + (c.sidePairs[index + 1]?.[0] || 0);
}

function estimateBoothWidthForPanelTarget(row, panel, target) {
  const boothIndex = panelRelatedBoothIndex(panel, row);
  const c = compute(row);
  const current = c.boothWidths[boothIndex] || c.boothW || 1;
  let best = Math.max(1, Math.round(current));
  let diff = Infinity;
  const min = Math.max(1, Number(row.doorW) || 1);
  const max = Math.max(min, Number(row.total) || current || 1);
  for (let width = min; width <= max; width += 5) {
    const d = Math.abs(frontPanelWidthForCandidate(row, panel, boothIndex, width) - target);
    if (d < diff) { diff = d; best = width; }
  }
  for (let width = Math.max(min, best - 6); width <= Math.min(max, best + 6); width++) {
    const d = Math.abs(frontPanelWidthForCandidate(row, panel, boothIndex, width) - target);
    if (d < diff) { diff = d; best = width; }
  }
  return best;
}

function frontPanelLockIndex(panel, row) {
  const count = Math.max(1, Number(row?.count) || 1);
  if (!panel) return 0;
  if (Number.isFinite(Number(panel.lockIndex))) return Math.max(0, Math.min(count, Number(panel.lockIndex)));
  if (panel.kind === 'edge') return panel.index === 0 ? 0 : count;
  return Math.max(1, Math.min(count - 1, Number(panel.index) + 1 || 1));
}

function setRowDimensionLock(row, section, index, value) {
  const count = Math.max(1, Number(row.count) || 1);
  const locks = normalizeDimensionLocks(row.dimensionLocks, count);
  const list = section === 'frontPanels' ? locks.frontPanels : locks.doorWidths;
  const safeIndex = Math.max(0, Math.min(list.length - 1, Number(index) || 0));
  list[safeIndex] = Math.max(1, Math.round(value));
  row.dimensionLocks = locks;
}

function dimensionCurrentValue(row, meta = {}) {
  const c = compute(row);
  if (meta.kind === 'total') return c.totalRun || row.total;
  if (meta.kind === 'depth') return row.depth;
  if (meta.kind === 'booth-width') return c.boothWidths?.[meta.boothIndex] || c.boothW;
  if (meta.kind === 'door-width') return c.doorWidths?.[meta.boothIndex] || boothDoorWidthAt(row, meta.boothIndex);
  if (meta.kind === 'front-panel') return Math.round(Number(meta.panel?.bigMm) || 0);
  if (meta.kind === 'depth-panel-depth') return depthPanelActualDepth(row, meta.panelIndex || 0);
  if (meta.kind === 'h-upright') return row.hUpright;
  if (meta.kind === 'h-door') return row.hDoor;
  if (meta.kind === 'h-mid') return row.hMid;
  if (meta.kind === 'h-vis') return row.hVis;
  return 0;
}

function commitDimensionValue(hit, value) {
  const group = groups.find(item => item.id === hit?.groupId);
  const row = group ? ensureRows(group).find(item => item.id === hit.rowId) : null;
  const meta = hit?.meta || {};
  const next = dimensionValueFromInput(value);
  if (!group || !row || !(next > 0)) return false;
  pushHistory();
  activeGroupId = group.id;
  activeRowId = row.id;
  if (meta.kind === 'total') {
    row.total = next;
    row.widthsText = '';
    committedWidthsText = '';
    syncWidthCardsFromText('');
    renderWidthCards();
  }
  else if (meta.kind === 'depth') row.depth = next;
  else if (meta.kind === 'booth-width') setRowFixedBoothWidth(row, meta.boothIndex, next);
  else if (meta.kind === 'door-width') {
    setRowDimensionLock(row, 'doorWidths', meta.boothIndex, next);
    const count = Math.max(1, Number(row.count) || 1);
    row.boothDoorWidths = rowDoorWidthOverrides(row, count);
    row.boothDoorWidths[Math.max(0, Math.min(count - 1, Number(meta.boothIndex) || 0))] = next;
  } else if (meta.kind === 'front-panel') setRowDimensionLock(row, 'frontPanels', frontPanelLockIndex(meta.panel, row), next);
  else if (meta.kind === 'depth-panel-depth') {
    const count = depthPanelCount(row);
    const index = Math.max(0, Math.min(count - 1, Number(meta.panelIndex) || 0));
    row.depthPanelSpecials = normalizeDepthPanelSpecials(row.depthPanelSpecials, count);
    row.depthPanelSpecials[index] = {...row.depthPanelSpecials[index], depth:Math.min(next, Number(row.depth) || next), protrusion:0};
  } else if (meta.kind === 'h-upright') row.hUpright = next;
  else if (meta.kind === 'h-door') row.hDoor = next;
  else if (meta.kind === 'h-mid') row.hMid = next;
  else if (meta.kind === 'h-vis') row.hVis = next;
  else return false;
  activeDimensionEdit = null;
  loadGroupToForm(group, row);
  lastParams = getParams();
  drawView(lastParams, currentTab);
  renderBOM(lastParams);
  updateGroupListState();
  return true;
}

function startDimensionEdit(hit) {
  const editor = document.getElementById('dimension-editor');
  const group = groups.find(item => item.id === hit?.groupId);
  const row = group ? ensureRows(group).find(item => item.id === hit.rowId) : null;
  if (!editor || !hit || !row) return false;
  activeDimensionEdit = {groupId:hit.groupId, rowId:hit.rowId, meta:hit.meta || {}, key:hit.key || dimensionMetaKey(hit.meta || {})};
  editor.hidden = false;
  editor.value = String(dimensionCurrentValue(row, hit.meta || {}) || '');
  window.setTimeout(() => { editor.focus({preventScroll:true}); editor.select(); }, 0);
  if (lastParams) drawView(lastParams, currentTab);
  return true;
}

function finishDimensionEdit(commit = true) {
  const editor = document.getElementById('dimension-editor');
  if (!editor || editor.hidden) return;
  const hit = activeDimensionEdit;
  const value = editor.value;
  editor.hidden = true;
  activeDimensionEdit = null;
  if (commit && hit) commitDimensionValue(hit, value);
  else if (lastParams) drawView(lastParams, currentTab);
}

function hitPlanArea(x, y) {
  const hits = [...planHitAreas].reverse().filter(area => x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h);
  return hits.find(area => area.type === 'dimension') || hits.find(area => area.type === 'sheet-note') || hits.find(area => area.type === 'tag') || hits.find(area => area.type === 'booth') || hits.find(area => area.type === 'depth-panel') || hits.find(area => area.type === 'block') || null;
}

function hitPlanBlock(x, y) {
  return [...planHitAreas].reverse().find(area => area.type === 'block' && x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h) || null;
}

function currentSheetOrderKeys() {
  return collectPlanBlocks(lastParams || getParams()).filter(block => block.row.enabled !== false).map(block => `${block.group.id}:${block.row.id}`);
}

function pageOrderKeys(pageIndex) {
  return [...planHitAreas]
    .filter(area => area.type === 'block' && area.pageIndex === pageIndex && area.orderKey)
    .sort((a, b) => (a.y - b.y) || (a.x - b.x))
    .map(area => area.orderKey);
}

function pageBlockSnapshot(pageIndex) {
  return [...planHitAreas]
    .filter(area => area.type === 'block' && (pageIndex == null || area.pageIndex === pageIndex) && area.orderKey)
    .sort((a, b) => (a.y - b.y) || (a.x - b.x))
    .map(area => ({...area}));
}

function hitSheetPage(x, y) {
  return [...planHitAreas].reverse().find(area => area.type === 'sheet-page' && x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h) || null;
}

function applySheetOrderKeys(keys) {
  const order = new Map(keys.map((key, index) => [key, index]));
  groups.forEach(group => ensureRows(group).forEach(row => {
    const key = `${group.id}:${row.id}`;
    if (order.has(key)) row.sheetOrder = order.get(key);
  }));
}

function previewOrderForTarget(targetKey, placeAfter = false) {
  if (!sheetOrderDrag || !targetKey || targetKey === sheetOrderDrag.key) return sheetOrderDrag?.baseOrder || null;

    return;
  }
  saveActiveGroup(false);
  const p = getParams();
  lastParams = p;
  drawView(p, currentTab);
  renderBOM(p);
  notifyGuardWarnings(p);
  updateGroupListState();
  selectNextQuickCellAndFocusField(currentRef, fieldId);
}

function applyBatchFieldOnly(fieldId) {
  const rows = ensureRows(activeGroup()).filter(row => row.enabled === true);
  if (!rows.length) return false;
  const valueByField = {
    'p-depth': () => ({depth: parseInt(document.getElementById('p-depth').value) || 1220}),
    'p-door': () => ({doorW: parseInt(document.getElementById('p-door').value) || 600}),
    'p-gap': () => ({doorGap: Math.max(4, parseInt(document.getElementById('p-gap').value) || 10)}),
    'p-rebate': () => ({rebate: document.getElementById('p-rebate').checked}),
    'p-rebate-depth': () => ({rebateDepth: Math.max(0, parseInt(document.getElementById('p-rebate-depth').value) || 0)}),
    't-panel': () => ({tPanel: parseInt(document.getElementById('t-panel').value) || 12}),
    'h-upright': () => ({hUpright: parseInt(document.getElementById('h-upright').value) || 1830}),
    'h-door': () => ({hDoor: parseInt(document.getElementById('h-door').value) || 1750}),
    'h-mid': () => ({hMid: parseInt(document.getElementById('h-mid').value) || 1800}),
    'h-vis': () => ({hVis: parseInt(document.getElementById('h-vis').value) || 1830})
  };
  const makePatch = valueByField[fieldId];
  if (!makePatch) return false;
  const patch = makePatch();
  rows.forEach(row => Object.assign(row, patch));
  return true;
}

function commitFieldChange(fieldId) {
  if (quickSelectAllActive && selectionScope === 'group' && applyBatchFieldOnly(fieldId)) {
    const p = getParams();
    lastParams = p;
    drawView(p, currentTab);
    renderBOM(p);
    notifyGuardWarnings(p);
    updateGroupListState();
    quickSelectAllActive = false;
    return;
  }
  refreshDrawing(false);
}

document.getElementById('p-total').addEventListener('change', () => commitTotalInput(false));

document.getElementById('p-total').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  commitTotalInput(true, true);
});

document.getElementById('p-gap').addEventListener('input', () => {
  if (quickSelectAllActive && selectionScope === 'group') return;
  refreshDrawingAfterManualEdit(false);
});

document.getElementById('p-gap').addEventListener('change', () => {
  const el = document.getElementById('p-gap');
  if (el.value === '' || Number(el.value) < 4) el.value = 4;
  commitFieldChange('p-gap');
});

document.getElementById('p-gap').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const el = e.currentTarget;
  if (el.value === '' || Number(el.value) < 4) el.value = 4;
  commitFieldAndAdvance('p-gap');
});

document.getElementById('p-rebate').addEventListener('change', () => {
  renderRebateToggle();
  commitFieldChange('p-rebate');
});

document.querySelectorAll('.field input[type=number], .field select').forEach(el => {
  if (el.id === 'p-count' || el.id === 'p-total' || el.id === 'p-gap') return;
  el.addEventListener('change', () => commitFieldChange(el.id));
  el.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (el.id === 'p-door' && selectionScope === 'booth' && selectedBoothRef) {
      applySelectedBoothDoorWidth(el.value);
      updateGroupListState();
      return;
    }
    if (['p-depth','p-door','p-rebate-depth','t-panel'].includes(el.id)) commitFieldAndAdvance(el.id);
    else refreshDrawingAfterManualEdit(false);
  });
});

document.getElementById('canvas-text-editor')?.addEventListener('input', e => {
  applyCanvasTextEditorValue(e.currentTarget.value);
});

document.getElementById('canvas-text-editor')?.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    e.preventDefault();
    e.currentTarget.blur();
    return;
  }
  if (e.key === 'Enter') {
    const value = e.currentTarget.value.replace(/\r/g, '');
    if (selectionScope === 'tag' || value.includes('\n')) e.preventDefault();
  }
});

document.getElementById('dimension-editor')?.addEventListener('input', () => {
  if (lastParams) drawView(lastParams, currentTab);
});

document.getElementById('dimension-editor')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    finishDimensionEdit(true);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    finishDimensionEdit(false);
  }
});

document.getElementById('dimension-editor')?.addEventListener('blur', () => finishDimensionEdit(true));

document.getElementById('project-file-list')?.addEventListener('click', e => {
  const btn = e.target.closest('[data-project-action]');
  if (!btn) return;
  const id = btn.dataset.projectId;
  if (btn.dataset.projectAction === 'load') loadProjectFile(id);
  if (btn.dataset.projectAction === 'delete') deleteProjectFile(id);
});

document.getElementById('project-save-name')?.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  saveCurrentProjectFile();
});

document.getElementById('export-file-name')?.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  confirmNamedExport();
});

document.querySelectorAll('.project-modal').forEach(modal => {
  modal.addEventListener('click', e => {
    if (e.target === modal) closeProjectModal(modal.id);
  });
});

window.setInterval(() => {
  if (activeCanvasTextEditable() && document.activeElement === document.getElementById('canvas-text-editor') && lastParams) {
    drawView(lastParams, currentTab);
  }
  if (activeDimensionEdit && document.activeElement === document.getElementById('dimension-editor') && lastParams) {
    drawView(lastParams, currentTab);
  }
}, 530);

setTimeout(()=>{ applyViewMode(); renderSwingButtons(); renderBoothSwingPanel(); renderDepthPanelSpecialPanel(); updateLayoutTargetLabel(); renderGroups(); renderQuickLayout(); renderRebateToggle(); syncWidthCardsFromText(committedWidthsText); renderWidthCards(); bindNamedExportButtons(); generate(); }, 100);
</script>
