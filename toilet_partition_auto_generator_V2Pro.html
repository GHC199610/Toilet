    let y = 0;
    rows.forEach(rowBlocks => {
      const measured = measureLandscapeRow(rowBlocks, pageScale);
      measured.placements.forEach(block => page.blocks.push({...block, pageY:y, sheetScale:pageScale}));
      page.usedW = Math.max(page.usedW, measured.w);
      page.usedH = Math.max(page.usedH, y + measured.h);
      y += measured.h + rawGapY;
    });
    if (page.blocks.length) pages.push(page);
  };
  const pushPage = () => {
    if (!rows.length) return;
    if (landscape) pushLandscapePage();
    else pushPortraitPage();
    rows = [];
    landscape = false;
  };
  const startNewRow = block => {
    rows.push([block]);
  };

  blocks.forEach(block => {
    const needsLandscape = blockNeedsLandscape(block, pageIndex());
    let row = rows[rows.length - 1];

    if (!rows.length) {
      landscape = needsLandscape;
      startNewRow(block);
      return;
    }

    if (needsLandscape && !landscape) {
      const candidateRows = [...rows, [block]];
      if (candidateRows.length <= 4 && landscapeRowsFit(candidateRows)) {
        landscape = true;
        rows = candidateRows;
        return;
      }
      pushPage();
      landscape = true;
      startNewRow(block);
      return;
    }

    if (landscape) {
      const availableW = sheetRowAvailableWidth(sheetLayoutForPage({blocks:[...currentBlocks(), block], landscape:true}, lastParams || getParams(), pageIndex()), pageIndex(), true);
      const sameRows = row ? [...rows.slice(0, -1), [...row, block]] : [[block]];
      const sameScale = landscapeScaleForRows(sameRows, pageIndex());
      if (row && landscapeRowCanAccept(row, block, sameScale, availableW, currentBlocks())) {
        row.push(block);
        return;
      }
      const nextRows = [...rows, [block]];
      if (landscapeRowsFit(nextRows)) {
        rows = nextRows;
        return;
      }
      pushPage();
      landscape = needsLandscape;
      startNewRow(block);
      return;
    }

    const sameRawW = row.reduce((sum, item) => sum + item.metrics.w, 0) + rawPortraitGapX * row.length + block.metrics.w;
    if (row && sameRawW <= portraitRowLimit([...row, block]) + 0.5) {
      row.push(block);
      return;
    }
    const nextRows = [...rows, [block]];
    if (portraitRowsFit(nextRows)) {
      rows = nextRows;
      return;
    }
    pushPage();
    landscape = needsLandscape;
    startNewRow(block);
  });

  pushPage();
  return pages.length ? pages : [{blocks: [], usedW: 0, usedH: 0, rowCount: 0, landscape: false}];
}

function paginatePortraitPlanBlocksAtScale(blocks, layout, sheetScale) {
  const minScale = SHEET_LAYOUT_RULES.minReadableScale;
  const packingScale = Math.max(0.0001, sheetScale || minScale);
  const rawGapX = SHEET_LAYOUT_RULES.colGap / packingScale;
  const rawGapY = SHEET_LAYOUT_RULES.rowGap / packingScale;
  const pages = [];
  let page = {blocks: [], usedW: 0, usedH: 0, rowCount: 0};
  let cursorX = 0;
  let cursorY = 0;
  let lineH = 0;
  let lineCount = 1;
  const maxRawW = pageIndex => portraitPageRowLimitWidth(blocks);
  const maxRawH = pageIndex => sheetAvailableHeight(getSheetLayout(lastParams || getParams(), pageIndex), pageIndex) / Math.max(0.0001, minScale);
  const pushPage = () => {
    if (page.blocks.length) page.rowCount = Math.max(page.rowCount, lineCount);
    if (page.blocks.length) pages.push(page);
    page = {blocks: [], usedW: 0, usedH: 0, rowCount: 0};
    cursorX = 0;
    cursorY = 0;
    lineH = 0;
    lineCount = 1;
  };
  const newRow = () => {
    page.rowCount = Math.max(page.rowCount, lineCount);
    cursorX = 0;
    cursorY += lineH + rawGapY;
    lineH = 0;
    lineCount += 1;
  };
  blocks.forEach(block => {
    const rawW = block.metrics.w;
    const rawH = block.metrics.h;
    let pageIndex = pages.length;
    const rowCapacity = maxRawW(pageIndex);
    if (cursorX > 0 && cursorX + rawW > rowCapacity + 0.5) {
      newRow();
    }
    pageIndex = pages.length;
    if (cursorY > 0 && (lineCount > maxRowsForSheetPage(pageIndex) || cursorY + rawH > maxRawH(pageIndex) + 0.5)) {
      pushPage();
    }
    pageIndex = pages.length;
    if (rawW > maxRawW(pageIndex) + 0.5 || rawH > maxRawH(pageIndex) + 0.5) {
      // Oversized single blocks are still placed; final render will fit them to the sheet.
    }
    page.blocks.push({...block, pageX: cursorX, pageY: cursorY, sheetScale});
    page.usedW = Math.max(page.usedW, cursorX + rawW);
    page.usedH = Math.max(page.usedH, cursorY + rawH);
    cursorX += rawW + rawGapX;
    lineH = Math.max(lineH, rawH);
  });
  pushPage();
  return pages.length ? pages : [{blocks: [], usedW: 0, usedH: 0, rowCount: 0}];
}


function autoPackPlanBlocksAtScale(blocks, layout, sheetScale) {
  const minScale = SHEET_LAYOUT_RULES.minReadableScale;
  const packingScale = Math.max(0.0001, sheetScale || minScale);
  const rawGapX = SHEET_LAYOUT_RULES.colGap / packingScale;
  const rawGapY = SHEET_LAYOUT_RULES.rowGap / packingScale;
  const pageLayoutForBlocks = (blocks, pageIndex = 0) => sheetLayoutForPage({blocks}, lastParams || getParams(), pageIndex);
  const maxRawW = (pageIndex, pageBlocks = []) => sheetRowAvailableWidth(pageLayoutForBlocks(pageBlocks, pageIndex), pageIndex) / Math.max(0.0001, minScale);
  const maxRawH = (pageIndex, pageBlocks = []) => sheetAvailableHeight(pageLayoutForBlocks(pageBlocks, pageIndex), pageIndex) / Math.max(0.0001, minScale);
  const pages = [];
  const createPage = () => ({blocks: [], rows: [], usedW: 0, usedH: 0, rowCount: 0});
  const packWidth = block => {
    const count = Math.max(1, Number(block.row?.count) || Number(block.originalRow?.count) || 1);
    if (count > 2) return block.metrics.w;
    const run = Number(block.metrics?.c?.totalRun) || Number(block.row?.total) || Number(block.originalRow?.total) || 0;
    const sharedLabelReserve = 260;
    return Math.max(1, Math.min(block.metrics.w, run + sharedLabelReserve));
  };
  const canFitPageHeight = (page, row, rawH, pageIndex, candidateBlocks) => {
    const nextLineH = Math.max(row.lineH, rawH);
    const nextUsedH = Math.max(page.usedH, row.y + nextLineH);
    return nextUsedH <= maxRawH(pageIndex, candidateBlocks) + 0.5;
  };
  const placeInRow = (page, row, block) => {
    const rawW = packWidth(block);
    const rawH = block.metrics.h;
    const x = row.blocks.length ? row.usedW + rawGapX : 0;
    const placed = {...block, pageX:x, pageY:row.y, sheetScale:packingScale};
    row.blocks.push(placed);
    row.usedW = x + rawW;
    row.lineH = Math.max(row.lineH, rawH);
    page.blocks.push(placed);
    page.usedW = Math.max(page.usedW, row.usedW);
    page.usedH = Math.max(page.usedH, row.y + row.lineH);
    page.rowCount = page.rows.length;
  };
  const addRow = (page, pageIndex, block) => {
    const prev = page.rows[page.rows.length - 1];
    const y = prev ? prev.y + prev.lineH + rawGapY : 0;
    const row = {blocks: [], y, usedW: 0, lineH: 0};
    const candidateBlocks = [...page.blocks, block];
    if (page.rows.length + 1 > maxRowsForSheetPage(pageIndex)) return false;
    if (y + block.metrics.h > maxRawH(pageIndex, candidateBlocks) + 0.5) return false;
    page.rows.push(row);
    placeInRow(page, row, block);
    return true;
  };
  blocks.forEach(block => {
    const rawW = packWidth(block);
    const rawH = block.metrics.h;
    let placed = false;
    let bestRow = null;
    let bestRowScore = Infinity;
    for (let pageIndex = 0; pageIndex < pages.length && !placed; pageIndex++) {
      const page = pages[pageIndex];
      for (const row of page.rows) {
        const nextW = row.blocks.length ? row.usedW + rawGapX + rawW : rawW;
        const candidateBlocks = [...page.blocks, block];
        if (nextW <= maxRawW(pageIndex, candidateBlocks) + 0.5 && canFitPageHeight(page, row, rawH, pageIndex, candidateBlocks)) {
          const widthLeft = maxRawW(pageIndex, candidateBlocks) - nextW;
          const nextLineH = Math.max(row.lineH, rawH);
          const nextUsedH = Math.max(page.usedH, row.y + nextLineH);
          const heightLeft = maxRawH(pageIndex, candidateBlocks) - nextUsedH;
          const score = pageIndex * 1e9 + widthLeft * 1e3 + heightLeft;
          if (score < bestRowScore) {
            bestRowScore = score;
            bestRow = {page, row};
          }
        }
      }
    }
    if (bestRow) {
      placeInRow(bestRow.page, bestRow.row, block);
      placed = true;
    }
    for (let pageIndex = 0; pageIndex < pages.length && !placed; pageIndex++) {
      if (addRow(pages[pageIndex], pageIndex, block)) placed = true;
    }
    if (!placed) {
      const page = createPage();
      pages.push(page);
      addRow(page, pages.length - 1, block);
    }
  });
  return pages.map(page => ({blocks: page.blocks, usedW: page.usedW, usedH: page.usedH, rowCount: page.rowCount}));
}
function getPlanPages(p = lastParams || getParams()) {
  return paginatePlanBlocks(collectPlanBlocks(p).filter(block => block.row.enabled === true), getSheetLayout(p));
}

function planPageOrientationIndex(pages, pageIndex) {
  return pageOrientationIndices(pages)[Math.max(0, Math.min(pageIndex, pages.length - 1))] || 0;
}

function getSheetPlanPages(p = lastParams || getParams()) {
  const oldMode = canvasMode;
  canvasMode = 'sheets';
  const pages = getPlanPages(p);
  canvasMode = oldMode;
  return pages;
}

function updateSheetPageInfo(p = lastParams || getParams()) {

    return;
  }
  const page = Math.max(0, Math.min(currentPlanPage, pages.length - 1));
  el.textContent = `第 ${page + 1}/${pages.length} 页`;
}


function drawHatch(x, y, w, h, gap = 42, color = 'rgba(120,126,135,.16)', lineWidth = 0.7) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  const lineIntersections = c => {
    const points = [];
    const add = (px, py) => {
      if (px >= x - 0.001 && px <= x + w + 0.001 && py >= y - 0.001 && py <= y + h + 0.001) points.push({x:px, y:py});
    };
    add(c, y + h);
    add(c + h, y);
    add(x, y + h - (x - c));
    add(x + w, y + h - (x + w - c));
    return points.filter((pt, idx, arr) => arr.findIndex(other => Math.abs(other.x - pt.x) < 0.001 && Math.abs(other.y - pt.y) < 0.001) === idx);
  };
  for (let i = -h; i < w + h; i += gap) {
    const pts = lineIntersections(x + i);
    if (pts.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    ctx.lineTo(pts[1].x, pts[1].y);
    ctx.stroke();
  }
  ctx.restore();
}

function autoFit(p) {
  const layout = getSheetLayout(p);
  const sheetPreview = currentTab === 'plan' ? sheetPreviewContentSize(p, layout) : null;
  const contentW = (sheetPreview?.w || layout.sheetW) + 80;
  const contentH = (sheetPreview?.h || layout.sheetH) + 80;
  const viewW = cv.clientWidth || (cv.width / canvasPixelRatio);
  const viewH = cv.clientHeight || (cv.height / canvasPixelRatio);
  const scale = isMobileViewport() ? 0.45 : Math.min(viewW / contentW, viewH / contentH, 0.8);
  zoomScale = scale;
  const anchorX = isMobileViewport() ? Math.max(12, (viewW - (sheetPreview?.w || layout.sheetW) * scale) / 2) : Math.max(20, Math.min(48, viewW * 0.035));
  const anchorY = isMobileViewport() ? Math.max(16, Math.min(36, viewH * 0.04)) : Math.max(18, Math.min(36, viewH * 0.04));
  panX = anchorX;
  panY = anchorY;
}

function minZoomScale(p = lastParams || getParams()) {
  const layout = getSheetLayout(p);
  const sheetPreview = currentTab === 'plan' ? sheetPreviewContentSize(p, layout) : null;
  const fit = Math.min(cv.width / ((sheetPreview?.w || layout.sheetW) + 80), cv.height / ((sheetPreview?.h || layout.sheetH) + 80));
  return Math.max(0.01, Math.min(0.1, fit * 0.85));
}

function wheelMaxZoomScale(p = lastParams || getParams()) {
  if (!(currentTab === 'plan' && canvasMode === 'sheets')) return 5;
  const layout = getSheetLayout(p);
  const pages = getPlanPages(p);
  const orientationIndices = pageOrientationIndices(pages);
  const fits = pages.map((page, index) => {
    const pageLayout = sheetLayoutForPage(page, p, index);
    const landscape = pageNeedsLandscape(page);
    const gaps = sheetContentGaps(orientationIndices[index] || 0, landscape);
    const P = pageLayout.plot;
    const availableW = Math.max(1, P.w - gaps.left - gaps.right);
    const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
    const rawContentW = Math.max(1, page.usedW);
    const rawContentH = Math.max(1, page.usedH);
    const autoFitScale = Math.min(availableW / rawContentW, availableH / rawContentH, 1);
    return autoFitScale;
  }).filter(fit => fit > 0);
  const minFit = Math.min(...fits, 1);
  return Math.max(5, 5 / Math.max(0.01, minFit));
}

function planPageForIndex(p = lastParams || getParams(), pageIndex = currentPlanPage) {
  const pages = getPlanPages(p);
  return pages[Math.max(0, Math.min(pageIndex, pages.length - 1))] || null;
}

function sheetLayoutForRender(tab = currentTab, p = lastParams || getParams(), pageIndex = currentPlanPage) {
  if (tab !== 'plan') return getSheetLayout(p);
  return sheetLayoutForPage(planPageForIndex(p, pageIndex), p, pageIndex);
}
function blockNeedsLandscape(block, pageIndex = 0) {
  if (paperSize !== 'a4') return false;
  const count = Math.max(1, Number(block?.row?.count) || Number(block?.originalRow?.count) || 1);
  return count > 9;
}

function pageNeedsLandscape(page) {
  if (page && Object.prototype.hasOwnProperty.call(page, 'landscape')) return page.landscape === true;
  return (page?.blocks || []).some(block => blockNeedsLandscape(block));
}

function planBlocksNeedLandscape(blocks) {
  return pageNeedsLandscape({blocks});
}

function pageOrientationIndices(pages = []) {
  const counts = {portrait:0, landscape:0};
  return pages.map(page => {
    const key = pageNeedsLandscape(page) ? 'landscape' : 'portrait';
    const index = counts[key];
    counts[key] += 1;
    return index;
  });
}

function sheetLayoutForPage(page = null, p = lastParams || getParams(), pageIndex = 0) {
  const layout = getSheetLayout(p, pageIndex);
  if (!pageNeedsLandscape(page)) return layout;
  const paperPx = PAPER_SIZES[paperSize] || PAPER_SIZES.a4;
  const paperMm = PAPER_MM[paperSize] || PAPER_MM.a4;
  const sheetW = layout.sheetH;
  const sheetH = layout.sheetW;
  const frameInset = Math.round((paperPx.h / paperMm.h) * 10);
  const safeGap = 0;
  const titleH = sheetTitleReservedHeight(pageIndex);
  const footerH = SHEET_PAGE_NUMBER_RESERVED_H;
  const plotX = frameInset;
  const plotY = frameInset + titleH;
  const plotW = sheetW - plotX - frameInset;
  const plotH = sheetH - plotY - frameInset - footerH;
  return {
    sheetW,
    sheetH,
    frame: {x:frameInset, y:frameInset, w:sheetW - frameInset * 2, h:sheetH - frameInset * 2},
    plot: {x:plotX, y:plotY, w:Math.max(260, plotW), h:Math.max(220, plotH)},
    safeGap,
    paper: `${layout.paper}横向`
  };
}
function sheetPreviewContentSize(p = lastParams || getParams(), layout = getSheetLayout(p)) {
  const pages = getPlanPages(p);
  const pageLayouts = pages.map((page, index) => sheetLayoutForPage(page, p, index));
  const gap = sheetPreviewPageGap(layout, pageLayouts);
  return {
    w: pageLayouts.reduce((sum, item) => sum + item.sheetW, 0) + Math.max(0, pageLayouts.length - 1) * gap,
    h: Math.max(...pageLayouts.map(item => item.sheetH), layout.sheetH)
  };
}

function sheetPreviewPageGap(layout = getSheetLayout(), pageLayouts = []) {
  const maxSheetW = Math.max(layout.sheetW, ...pageLayouts.map(item => item.sheetW || 0));
  return Math.max(80, maxSheetW * 0.12);
}

const PAPER_SIZES = {
  a4: {w:834, h:1180, label:'A4'},
  a3: {w:1680, h:1188, label:'A3'}
};
const PAPER_MM = {
  a4: {w:210, h:297},
  a3: {w:420, h:297}
};
const SHEET_TITLE_H = 74;
const SHEET_TITLE_TO_CONTENT_GAP = 20;
const SHEET_TITLE_RESERVED_H = SHEET_TITLE_H + SHEET_TITLE_TO_CONTENT_GAP;
const SHEET_PAGE_NUMBER_RESERVED_H = 18;
const SHEET_W = PAPER_SIZES.a4.w;
const SHEET_H = PAPER_SIZES.a4.h;
const PLOT = {x:70, y:112, w:1040, h:545};

function paperMarginPx(size = paperSize, mm = 10) {
  const paperPx = PAPER_SIZES[size] || PAPER_SIZES.a4;
  const paperMm = PAPER_MM[size] || PAPER_MM.a4;
  return Math.round((paperPx.w / paperMm.w) * mm);
}

function paperVerticalMmPx(size = paperSize, landscape = false, mm = 10) {
  const paperPx = PAPER_SIZES[size] || PAPER_SIZES.a4;
  const paperMm = PAPER_MM[size] || PAPER_MM.a4;
  const pxH = landscape ? paperPx.w : paperPx.h;
  const mmH = landscape ? paperMm.w : paperMm.h;
  return Math.round((pxH / mmH) * mm);
}

function sheetPageNumberBaselineY(layout) {
  return layout.sheetH - paperVerticalMmPx(paperSize, layout.sheetW > layout.sheetH, 2);
}

function setPaperSize(size) {
  paperSize = PAPER_SIZES[size] ? size : 'a4';
  canvasMode = 'sheets';
  localStorage.setItem('partition-paper-size', paperSize);

function applyPaperSize() {

function sheetTitleReservedHeight(pageIndex = 0) {

}

function getSheetLayout(p = lastParams || getParams(), pageIndex = 0) {
  const rows = drawableGroupRows();
  const sourceRows = rows.length > 1 ? rows.map(item => item.row) : [p];
  const maxRun = sourceRows.reduce((max, r) => Math.max(max, compute(r).totalRun || r.total || 0), 0);
  const maxDepth = sourceRows.reduce((max, r) => Math.max(max, r.depth || 0), 0);
  const base = PAPER_SIZES[paperSize] || PAPER_SIZES.a4;
  const sheetW = base.w;
  const sheetH = base.h;
  const frameInset = paperMarginPx(paperSize, 10);
  const safeGap = 0;
  const titleH = sheetTitleReservedHeight(pageIndex);
  const footerH = SHEET_PAGE_NUMBER_RESERVED_H;
  const plotX = frameInset;
  const plotY = frameInset + titleH;
  const plotW = sheetW - plotX - frameInset;
  const plotH = sheetH - plotY - frameInset - footerH;
  return {
    sheetW,
    sheetH,
    frame: {x:frameInset, y:frameInset, w:sheetW - frameInset * 2, h:sheetH - frameInset * 2},
    plot: {x:plotX, y:plotY, w:Math.max(260, plotW), h:Math.max(220, plotH)},
    safeGap,
    paper: base.label
  };
}

function layoutPrintableBounds(layout) {
  const frame = layout?.frame || {x:0, y:0, w:layout?.sheetW || 0, h:layout?.sheetH || 0};
  return {left:frame.x, top:frame.y, right:frame.x + frame.w, bottom:frame.y + frame.h, w:frame.w, h:frame.h};

function canvasTextScale() {

}

function anno(v) {

}

function annoFont(size) {

function planFont(size) {

function drawPlanSelectionBox(x, y, w, h, pad = anno(14), light = false) {

}

function drawSheetNoteCard(layout, offsetX = 0, offsetY = 0) {

  }

function drawDim(x1,y1,x2,y2,label,side, meta = null) {
  ctx.save();
  ctx.strokeStyle='#000000'; ctx.fillStyle='#000000';
  ctx.lineWidth=Math.max(0.35, anno(4)); ctx.font=planFont(95);
  const displayLabel = dimensionDisplayLabel(label, meta);
  const isH = Math.abs(x2-x1) > Math.abs(y2-y1);
  const off = anno(side || 45);
  if (isH) {
    const dy = (y1+y2)/2 - off;
    const tick = anno(28);
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x1,dy+off);
    ctx.moveTo(x2,y2); ctx.lineTo(x2,dy+off);
    ctx.moveTo(x1,dy); ctx.lineTo(x2,dy);
    ctx.moveTo(x1,dy-tick); ctx.lineTo(x1,dy+tick);
    ctx.moveTo(x2,dy-tick); ctx.lineTo(x2,dy+tick);
    ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    const tx = (x1+x2)/2;
    const ty = dy-anno(18);
    ctx.fillText(displayLabel,tx,ty);
    const textW = ctx.measureText(String(displayLabel)).width;
    registerDimensionHit(meta, tx, ty - anno(74), Math.max(anno(210), textW + anno(95)), anno(96));
    if (dimensionEditActive(meta) && Math.floor(Date.now() / 530) % 2 === 0) drawDimensionCaret(tx + textW / 2 + anno(8), ty, 'bottom', '#000000', displayLabel);
  } else {
    const dx = (x1+x2)/2 + off;
    const tick = anno(28);
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(dx-off,y1);
    ctx.moveTo(x2,y2); ctx.lineTo(dx-off,y2);
    ctx.moveTo(dx,y1); ctx.lineTo(dx,y2);
    ctx.moveTo(dx-tick,y1); ctx.lineTo(dx+tick,y1);
    ctx.moveTo(dx-tick,y2); ctx.lineTo(dx+tick,y2);
    ctx.stroke();
    const tx = dx + (side < 0 ? -anno(70) : anno(70));
    const ty = (y1+y2)/2;
    ctx.save(); ctx.translate(tx, ty); ctx.rotate(Math.PI/2);
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(displayLabel,0,0);
    const textW = ctx.measureText(String(displayLabel)).width;
    if (dimensionEditActive(meta) && Math.floor(Date.now() / 530) % 2 === 0) drawDimensionCaret(textW / 2 + anno(8), 0, 'middle', '#000000', displayLabel);
    ctx.restore();
    registerDimensionHit(meta, tx, ty - Math.max(anno(155), textW / 2 + anno(35)), anno(130), Math.max(anno(310), textW + anno(110)));
  }
  ctx.restore();
}
function drawElevationDim(x1, y1, x2, y2, label, side, meta = null, options = {}) {
  ctx.save();
  ctx.strokeStyle = options.strokeStyle || '#185FA5';
  ctx.fillStyle = options.fillStyle || '#000000';
  const useFixed = options.fixed === true;
  const unit = value => useFixed ? value : anno(value);
  ctx.lineWidth = options.lineWidth || (useFixed ? 0.35 : Math.max(0.25, anno(2)));
  ctx.font = options.font || (useFixed ? `${options.fontSize || 8}px 'Microsoft YaHei', Arial, sans-serif` : planFont(options.fontSize || 62));
  const displayLabel = dimensionDisplayLabel(label, meta);
  const isH = Math.abs(x2 - x1) > Math.abs(y2 - y1);
  const off = unit(Number.isFinite(Number(side)) ? Number(side) : 36);
  const tick = options.tick || unit(18);
  const verticalTextGap = unit(Number(options.verticalTextGap ?? 0) || 12);
  const useArrowEnd = options.endStyle === 'arrow';
  if (isH) {
    const dy = (y1 + y2) / 2 - off;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x1, dy + off);
    ctx.moveTo(x2, y2); ctx.lineTo(x2, dy + off);
    ctx.moveTo(x1, dy); ctx.lineTo(x2, dy);
    ctx.moveTo(x1, dy - tick); ctx.lineTo(x1, dy + tick);
    ctx.moveTo(x2, dy - tick); ctx.lineTo(x2, dy + tick);
    ctx.stroke();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(displayLabel, (x1 + x2) / 2, dy - unit(12));
  } else {
    const dx = (x1 + x2) / 2 + off;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(dx - off, y1);
    ctx.moveTo(x2, y2); ctx.lineTo(dx - off, y2);
    ctx.moveTo(dx, y1); ctx.lineTo(dx, y2);
    if (useArrowEnd) {
      const arrowLength = options.arrowLength || tick;
      const arrowHalfWidth = options.arrowHalfWidth || Math.max(2, tick * 0.55);
      const drawVerticalArrowHead = (y, direction) => {
        ctx.moveTo(dx, y);
        ctx.lineTo(dx - arrowHalfWidth, y + direction * arrowLength);
        ctx.moveTo(dx, y);
        ctx.lineTo(dx + arrowHalfWidth, y + direction * arrowLength);
      };
      drawVerticalArrowHead(y1, 1);
      drawVerticalArrowHead(y2, -1);
    } else {
      ctx.moveTo(dx - tick, y1); ctx.lineTo(dx + tick, y1);
      ctx.moveTo(dx - tick, y2); ctx.lineTo(dx + tick, y2);
    }
    ctx.stroke();
    const tx = Number(side) === 0 ? dx + verticalTextGap : dx + (side < 0 ? -unit(44) : unit(44));
    const ty = (y1 + y2) / 2;
    ctx.translate(tx, ty);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(displayLabel, 0, 0);
  }
  ctx.restore();
}

  c.insufficientMiddles.forEach((bad, i) => { if (bad) warnings.push(`${i + 1}-${i + 2}立板<${c.minMiddlePanel}`); });
  return warnings;
}

function notifyGuardWarnings(p = lastParams || getParams()) {
  const rows = drawableGroupRows();
  const source = rows.length ? rows.map(item => ({group:item.group, row:item.row})) : [{group:activeGroup(), row:p}];
  const messages = [];
  source.forEach(item => {
    const warnings = collectGuardWarnings(compute(item.row));
    if (!warnings.length) return;
    const name = layoutUnitName(item.group, item.row);
    messages.push(`${name}：${warnings.join('，')}`);

function drawProjectOverview(p, c) {

  const cellW = Math.min(68, (PLOT.w - 160 - gap * (cols - 1)) / cols);
  const cellH = Math.min(42, (PLOT.h - 190 - gap * (rows - 1)) / rows);
  const gridW = cols * cellW + (cols - 1) * gap;
  const gridH = rows * cellH + (rows - 1) * gap;
  const ox = PLOT.x + 70;
  const oy = PLOT.y + 122;

  ctx.fillStyle = '#000000';

  for (let i = 0; i < p.count; i++) {

    ctx.beginPath(); ctx.moveTo(x + cellW * .28, y + cellH - 4); ctx.lineTo(x + cellW * .72, y + cellH - 4); ctx.stroke();
    if (cellW >= 40 && cellH >= 26) {
      ctx.fillStyle = '#185FA5';

  ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('标准单间', x + w / 2, y + h / 2);

function drawPlanWalls(ox, oy, sW, sD, swt, c, extras = {}) {
  const extraLeft = Math.max(0, Number(extras.left) || 0);
  const extraRight = Math.max(0, Number(extras.right) || 0);
  const frontExtend = Math.max(0, Number(extras.frontExtend) || 0);
  const middleExtras = Array.isArray(extras.middle) ? extras.middle.filter(item => item && item.h > 0 && item.x2 > item.x1) : [];
  const left = (c.hasLeft || extraLeft > 0) ? swt : 0;
  const right = (c.hasRight || extraRight > 0) ? swt : 0;
  const back = c.hasBack ? swt : 0;
  if (!left && !right && !back) return;
  const fullSideH = sD + frontExtend + back;
  const leftH = c.hasLeft ? fullSideH : Math.min(fullSideH, back + extraLeft);
  const rightH = c.hasRight ? fullSideH : Math.min(fullSideH, back + extraRight);
  const leftX = left ? ox - left : ox;
  const rightX = right ? ox + sW : ox + sW;
  const backX = back ? Math.min(left ? leftX : ox, ox) : ox;
  const backRight = back ? Math.max(right ? rightX + right : ox + sW, ox + sW) : ox + sW;
  const outerX = Math.min(backX, left ? leftX : ox, ox);
  const outerY = oy - back;
  const middleH = middleExtras.reduce((max, item) => Math.max(max, back + item.h), 0);
  const outerW = Math.max(backRight, right ? rightX + right : ox + sW, ox + sW) - outerX;
  const outerH = Math.max(back, leftH, rightH, middleH);
  const wallRects = [];
  if (back) wallRects.push({x:backX, y:oy - back, w:backRight - backX, h:back});
  if (left) wallRects.push({x:leftX, y:oy - back, w:left, h:leftH});
  if (right) wallRects.push({x:rightX, y:oy - back, w:right, h:rightH});
  middleExtras.forEach(item => wallRects.push({x:item.x1, y:oy - back, w:item.x2 - item.x1, h:back + item.h}));

  ctx.save();
  ctx.fillStyle = '#fbfbfb';
  wallRects.forEach(rect => ctx.fillRect(rect.x, rect.y, rect.w, rect.h));

  ctx.strokeStyle = '#185FA5';
  wallRects.forEach(rect => drawHatch(rect.x, rect.y, rect.w, rect.h, 46, 'rgba(0,0,0,.36)', 1.05));
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1.6;
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  const drawSegmentedLine = (x1, x2, y, gaps) => {
    let cursor = x1;
    gaps
      .map(gap => ({x1:Math.max(x1, gap.x1), x2:Math.min(x2, gap.x2)}))
      .filter(gap => gap.x2 > gap.x1)
      .sort((a, b) => a.x1 - b.x1)
      .forEach(gap => {
        if (gap.x1 > cursor) {
          ctx.moveTo(cursor, y);
          ctx.lineTo(gap.x1, y);
        }
        cursor = Math.max(cursor, gap.x2);
      });
    if (cursor < x2) {
      ctx.moveTo(cursor, y);
      ctx.lineTo(x2, y);
    }
  };
  if (back) {
    ctx.moveTo(backX, oy - back);
    ctx.lineTo(backRight, oy - back);
    if (!left) {
      ctx.moveTo(ox, oy - back);
      ctx.lineTo(ox, oy);
    }
    if (!right) {
      ctx.moveTo(ox + sW, oy - back);
      ctx.lineTo(ox + sW, oy);
    }
    drawSegmentedLine(ox, ox + sW, oy, middleExtras);
  }
  if (left) {
    ctx.moveTo(leftX, oy - back);
    ctx.lineTo(leftX, oy - back + leftH);
    ctx.lineTo(leftX + left, oy - back + leftH);
    ctx.moveTo(leftX + left, oy - back + leftH);
    ctx.lineTo(leftX + left, oy);
  }
  if (right) {
    ctx.moveTo(rightX + right, oy - back);
    ctx.lineTo(rightX + right, oy - back + rightH);
    ctx.lineTo(rightX, oy - back + rightH);
    ctx.moveTo(rightX, oy - back + rightH);
    ctx.lineTo(rightX, oy);
  }
  middleExtras.forEach(item => {
    const wallBottom = oy - back + back + item.h;
    ctx.moveTo(item.x1, oy);
    ctx.lineTo(item.x1, wallBottom);
    ctx.lineTo(item.x2, wallBottom);
    ctx.lineTo(item.x2, oy);
  });
  ctx.stroke();
  ctx.restore();
}

function drawDoorSwing(door, baseY, st, p) {
  const swing = swingDefs[door.swing || p.swing || 'in-right'] || swingDefs['in-right'];
  const isRight = swing.hinge === 'right';
  const closedStart = Number.isFinite(door.bigStart) ? door.bigStart : door.start;
  const closedEnd = Number.isFinite(door.bigEnd) ? door.bigEnd : door.end;
  const hingeX = isRight ? door.end : door.start;
  const closedHingeX = isRight ? closedEnd : closedStart;
  const closedY = baseY + st / 2;
  const openDir = swing.opensUp ? -1 : 1;
  const openEndY = closedY + openDir * door.width;
  const dash = anno(34);
  const gap = anno(24);
  const drawDoorBoard = (x1, y1, x2, y2, topIsSmall) => {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len <= 0.5) return;
    const ux = dx / len;
    const uy = dy / len;
    const nx = -uy;
    const ny = ux;
    const t = st;
    const panelMm = Math.max(1, Number(p.tPanel) || 12);
    const pxPerMm = st / panelMm;
    const rebate = p.rebate ? Math.min(Math.max(0, Number(p.rebateDepth) || 0) * pxPerMm, len / 3) : 0;
    const leftCut = p.rebate ? rebate : 0;
    const rightCut = p.rebate ? rebate : 0;
    const topA = topIsSmall ? leftCut : 0;
    const topB = topIsSmall ? len - rightCut : len;
    const botA = topIsSmall ? 0 : leftCut;
    const botB = topIsSmall ? len : len - rightCut;
    const px = (s, side) => x1 + ux * s + nx * side;
    const py = (s, side) => y1 + uy * s + ny * side;
    ctx.beginPath();
    ctx.moveTo(px(topA, -t / 2), py(topA, -t / 2));
    ctx.lineTo(px(topB, -t / 2), py(topB, -t / 2));
    if (topB !== botB) ctx.lineTo(px(topB, 0), py(topB, 0));
    ctx.lineTo(px(botB, 0), py(botB, 0));
    ctx.lineTo(px(botB, t / 2), py(botB, t / 2));
    ctx.lineTo(px(botA, t / 2), py(botA, t / 2));
    if (botA !== topA) ctx.lineTo(px(botA, 0), py(botA, 0));
    ctx.lineTo(px(topA, 0), py(topA, 0));
    ctx.closePath();
    ctx.stroke();
  };
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.strokeStyle = '#185FA5';
  ctx.lineWidth = Math.max(0.45, anno(0.75));
  drawDoorBoard(closedStart, closedY, closedEnd, closedY, doorSmallOnTopForSwing(door.swing));
  drawDoorBoard(hingeX, closedY, hingeX, openEndY, doorSmallOnTopForSwing(door.swing));
  ctx.strokeStyle = '#8EC5FF';
  ctx.lineWidth = Math.max(0.8, anno(5));
  ctx.setLineDash([dash, gap]);
  ctx.beginPath();
  const arcMap = {
    'in-left': [0, -Math.PI / 2, true],
    'in-right': [Math.PI, Math.PI * 1.5, false],
    'out-left': [0, Math.PI / 2, false],
    'out-right': [Math.PI, Math.PI / 2, true]
  };
  const arc = arcMap[door.swing || p.swing || 'in-right'] || arcMap['in-right'];
  ctx.arc(closedHingeX, closedY, door.width, arc[0], arc[1], arc[2]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPlanRebateEdge(x, y1, y2, color = '#000000') {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.55;
  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();
  ctx.restore();
}

function frontSmallOnTopForSwing(swing) {
  return String(swing || '').startsWith('in');
}

function doorSmallOnTopForSwing(swing) {
  return !frontSmallOnTopForSwing(swing);
}

function buildBoardModel(p, c, doors, ox, sW, scale) {
  const panels = [];
  const doorBoards = doors.filter(door => door.hasDoor !== false).map((door, i) => ({
    kind: 'door',
    index: door.index ?? i,
    bigX1: Number.isFinite(door.bigStart) ? door.bigStart : door.start,
    bigX2: Number.isFinite(door.bigEnd) ? door.bigEnd : door.end,
    smallX1: door.start,
    smallX2: door.end,
    bigMm: c.doorWidths[door.index ?? i] || p.doorW,
    smallMm: c.doorInstallWidths[door.index ?? i] || c.doorWidths[door.index ?? i] || p.doorW,
    leftRebate: true,
    rightRebate: true,
    topIsSmall: doorSmallOnTopForSwing(door.swing),
    swing: door.swing
  }));

  if (doors.length) {
    const firstDoorIndex = doors[0].index ?? 0;
    const lastDoorIndex = doors[doors.length - 1].index ?? (p.count - 1);
    panels.push({
      kind: 'edge', index: 0, lockIndex: 0, bigX1: ox, bigX2: doors[0].zoneStart,
      bigMm: c.frontPanelBigLocks?.[0] || c.sidePairs[firstDoorIndex]?.[0] || 0,
      leftRebate: false, rightRebate: true,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[0].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[0].swing)
    });
    for (let i = 0; i < doors.length - 1; i++) {
      const leftSwing = doors[i].swing;
      const rightSwing = doors[i + 1].swing;
      const leftIndex = doors[i].index ?? i;
      const rightIndex = doors[i + 1].index ?? (i + 1);
      panels.push({
        kind: 'middle', index: i, lockIndex: i + 1,
        bigX1: doors[i].zoneEnd,
        bigX2: doors[i + 1].zoneStart,
        bigMm: c.frontPanelBigLocks?.[i + 1] || (c.sidePairs[leftIndex]?.[1] || 0) + (c.sidePairs[rightIndex]?.[0] || 0),
        leftMm: c.sidePairs[leftIndex]?.[1] || 0,
        rightMm: c.sidePairs[rightIndex]?.[0] || 0,
        leftRebate: true,
        rightRebate: true,
        leftTopIsSmall: frontSmallOnTopForSwing(leftSwing),
        rightTopIsSmall: frontSmallOnTopForSwing(rightSwing),
        mixed: frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing)
      });
    }
    panels.push({
      kind: 'edge', index: doors.length - 1, lockIndex: Math.max(1, Number(p.count) || 1), bigX1: doors[doors.length - 1].zoneEnd, bigX2: ox + sW,
      bigMm: c.frontPanelBigLocks?.[Math.max(1, Number(p.count) || 1)] || c.sidePairs[lastDoorIndex]?.[1] || 0,
      leftRebate: true, rightRebate: false,
      leftTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing),
      rightTopIsSmall: frontSmallOnTopForSwing(doors[doors.length - 1].swing)
    });
  }
  return {panels, doors: doorBoards};
}

function drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel) {
  if (!p.rebate || !boardModel?.doors?.length) return;
  ctx.save();
  const rebatePx = Math.max(1.5, (p.rebateDepth || 0) * scale);
  const profileH = st;
  const yTop = oy + sD;
  const yBot = oy + sD + profileH;
  const yMid = yTop + profileH * 0.5;
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 0.75;
  ctx.lineJoin = 'miter';
  ctx.lineCap = 'butt';

  const drawBoardProfile = (bigX1, bigX2, leftRebate, rightRebate, leftTopIsSmall, rightTopIsSmall = leftTopIsSmall) => {
    if (bigX2 <= bigX1 + 1) return;
    const r = Math.min(rebatePx, Math.max(1, (bigX2 - bigX1) / 3));
    const smallX1 = leftRebate ? bigX1 + r : bigX1;
    const smallX2 = rightRebate ? bigX2 - r : bigX2;
    const topLeft = leftTopIsSmall ? smallX1 : bigX1;
    const topRight = rightTopIsSmall ? smallX2 : bigX2;
    const botLeft = leftTopIsSmall ? bigX1 : smallX1;
    const botRight = rightTopIsSmall ? bigX2 : smallX2;
    ctx.beginPath();
    ctx.moveTo(topLeft, yTop);
    ctx.lineTo(topRight, yTop);
    if (topRight !== botRight) ctx.lineTo(topRight, yMid);
    ctx.lineTo(botRight, yMid);
    ctx.lineTo(botRight, yBot);
    ctx.lineTo(botLeft, yBot);
    if (botLeft !== topLeft) ctx.lineTo(botLeft, yMid);
    ctx.lineTo(topLeft, yMid);
    ctx.lineTo(topLeft, yTop);
    ctx.stroke();
  };

  boardModel.panels.forEach(panel => drawBoardProfile(panel.bigX1, panel.bigX2, panel.leftRebate, panel.rightRebate, panel.leftTopIsSmall, panel.rightTopIsSmall));
  ctx.restore();
}

function doorWidthSummary(row, c = compute(row)) {
  const groupsByWidth = new Map();
  for (let i = 0; i < Math.max(1, Number(row.count) || 1); i++) {
    if (!hasDoorAt(row, i)) continue;
    const width = Math.round(Number(c.doorWidths?.[i]) || Number(row.doorW) || 0);
    if (!width) continue;
    groupsByWidth.set(width, (groupsByWidth.get(width) || 0) + 1);
  }
  const entries = [...groupsByWidth.entries()].sort((a, b) => a[0] - b[0]);
  return {
    count: entries.reduce((sum, [, qty]) => sum + qty, 0),
    text: entries.length ? entries.map(([width, qty]) => `${rebateText(width, row, 'double')}：${qty}块`).join(' / ') : '无'
  };
}

function drawSegmentedPlan(p, c) {
  const segmentSize = c.segmentSize;
  const segments = Math.ceil(p.count / segmentSize);
  const gapY = 64;
  const rowH = Math.min(128, (PLOT.h - 150 - gapY * (segments - 1)) / segments);
  const startY = PLOT.y + 92;
  ctx.fillStyle = '#000000';
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`共 ${p.count} 间，按每段最多 ${segmentSize} 间分段显示。`, PLOT.x + 18, PLOT.y + 58);

  for (let s = 0; s < segments; s++) {
    const count = Math.min(segmentSize, p.count - s * segmentSize);
    const segP = {...p, count, total: count * c.boothW};
    const segC = compute(segP);
    const W = segC.totalRun, D = p.depth;
    const wt = segC.wallT, t = p.tPanel;
    const leftWall = segC.hasLeft ? wt : 0;
    const rightWall = segC.hasRight ? wt : 0;
    const backWall = segC.hasBack ? wt : 0;
    const scale = Math.min((PLOT.w - 180) / (W + leftWall + rightWall), rowH / (D + backWall));
    const ox = PLOT.x + 100 + leftWall * scale;
    const oy = startY + s * (rowH + gapY) + backWall * scale;
    const sW = W * scale, sD = D * scale, st = Math.max(1.3, t * scale), swt = wt * scale;
    const firstNo = s * segmentSize + 1;

    drawPlanWalls(ox, oy, sW, sD, swt, segC);
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.1; ctx.strokeRect(ox, oy, sW, sD);
    let x = ox;
    if (!segC.hasLeft) { ctx.strokeRect(x, oy, st, sD); x += st; }
    for (let i = 0; i < count; i++) {
      const bw = segC.boothW * scale;
      const doorW = (segC.doorInstallWidths[i] || segC.doorWidths[i] || p.doorW) * scale;
      const dsx = x + (bw - doorW) / 2;
      drawDoorSwing({start:dsx, end:dsx + doorW, width:doorW, swing:boothSwingAt(p, i)}, oy + sD, st, p);
      ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`B${firstNo + i}`, x + bw / 2, oy + sD / 2);
      x += bw;
      if (i < count - 1) { ctx.strokeStyle = '#000000'; ctx.strokeRect(x, oy, st, sD); x += st; }
    }
    if (!segC.hasRight) ctx.strokeRect(x, oy, st, sD);
    drawDim(ox, oy - swt - 38, ox + sW, oy - swt - 38, `第 ${s + 1} 段：B${firstNo}-B${firstNo + count - 1} / ${W}mm`, 12);
  }
}

function drawPlanRow(p, ox, oy, scale, labelPrefix = 'B', showGroupName = '', options = {}) {
  const prevDimensionContext = activeDimensionContext;
  activeDimensionContext = {groupId:options.groupId, rowId:options.rowId, hitScale:options.hitScale || 1, hitX:options.hitX || 0, hitY:options.hitY || 0};
  try {
  const c = compute(p);
  const W = c.totalRun, D = p.depth;
  const t = p.tPanel, wt = c.wallT;
  const wtPx = wt * scale;
  const sW = W * scale, sD = D * scale, st = Math.max(3, t * scale), swt = wt * scale;
  const panelGeoms = depthPanelGeometry(p, c, ox, oy, scale);

  const sideWallExtras = {
    left: panelGeoms[0]?.wallH || 0,
    right: panelGeoms[Math.max(1, Number(p.count) || 1)]?.wallH || 0,
    frontExtend: st,
    middle: panelGeoms.filter(item => !item.isEdge && item.wallH > 0).map(item => ({x1:item.wallX, x2:item.wallX + item.wallW, h:item.wallH}))
  };
  drawPlanWalls(ox, oy, sW, sD, swt, c, sideWallExtras);
  const rowSelected = options.groupId === activeGroupId && (
    selectionScope === 'group' ||
    (selectionScope === 'row' && options.rowId === activeRowId)
  ) || isMultiSelected('block', options.groupId, options.rowId);
  if (rowSelected && !drawingForExport) {
    ctx.save();
    const selPad = anno(22);
    ctx.lineJoin = 'miter';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1.2, anno(13));
    ctx.setLineDash([]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = Math.max(0.8, anno(7));
    ctx.setLineDash([anno(46), anno(26)]);
    ctx.strokeRect(ox - selPad, oy - selPad, sW + selPad * 2, sD + selPad * 2);
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (showGroupName && !(drawingForExport && options.tagPreviewOnly)) {
    ctx.save();
    const tagText = String(options.tagText || showGroupName);
    const isSingleBoothTag = Math.max(1, Number(p.count) || 1) === 1;
    const tagFontSize = isSingleBoothTag ? 66 : 95;
    const tagHPreset = isSingleBoothTag ? 76 : PLAN_ANCHOR.noteTagH;
    const tagMinW = isSingleBoothTag ? 250 : PLAN_ANCHOR.noteTagMinW;
    const tagPadX = isSingleBoothTag ? 50 : 90;
    ctx.font = planFont(tagFontSize);
    const tagW = Math.max(anno(tagMinW), ctx.measureText(tagText).width + anno(tagPadX));
    const tagH = anno(tagHPreset);
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    const tagGap = anno(PLAN_ANCHOR.noteTagGap);
    const tagX = ox;
    const wallTopY = oy - swt;
    const tagY = isSingleBoothTag
      ? Math.max(totalY + tagGap, Math.min(wallTopY - tagH - tagGap, totalY + (wallTopY - totalY - tagH) / 2))
      : totalY - tagH - tagGap;
    if (!drawingForExport && options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      planHitAreas.push({
        type:'tag',
        x: hitX + tagX * hitScale,
        y: hitY + tagY * hitScale,
        w: tagW * hitScale,
        h: tagH * hitScale,
        groupId: options.groupId,
        rowId: options.rowId
      });
    }
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#d64242';
    ctx.lineWidth = Math.max(0.45, anno(1.2));
    ctx.beginPath();
    ctx.rect(tagX, tagY, tagW, tagH);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#d64242';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tagText, tagX + tagW / 2, tagY + tagH / 2);
    const tagSelected = !drawingForExport && ((selectionScope === 'tag' && options.groupId === activeGroupId && options.rowId === activeRowId) || isMultiSelected('tag', options.groupId, options.rowId));
    if (tagSelected) drawPlanSelectionBox(tagX, tagY, tagW, tagH, anno(10));
    if (canvasTextCaretVisible('tag') && options.groupId === activeGroupId && options.rowId === activeRowId) {
      const textW = ctx.measureText(tagText).width;
      const caretX = tagX + tagW / 2 + textW / 2 + anno(10);
      drawCanvasTextCaret(caretX, tagY + tagH / 2 - anno(42), anno(84), '#d64242');
    }
    ctx.restore();
  }

  const drawDepthPanel = (geom, x, y, w, h) => {
    if (!geom) return;
    const panelIndex = geom.index;
    const selected = isSelectedDepthPanel(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, panelIndex);
    const protrusion = geom.protrusion;
    const actualDepth = geom.actualDepth;
    const actualH = Math.max(1, geom.panelH);
    const count = Math.max(1, Number(p.count) || 1);
    const drawX = geom.panelX;
    const drawY = geom.panelY;
    const drawW = geom.panelW;
    ctx.strokeStyle = selected ? '#d64242' : '#000000';
    ctx.lineWidth = selected ? Math.max(1.2, anno(3)) : 0.8;
    ctx.strokeRect(drawX, drawY, drawW, actualH);
    if (protrusion > 0 && actualDepth > 0) {
      if (panelIndex === 0) {
        drawDim(drawX - anno(70), drawY, drawX - anno(70), drawY + actualH, `${fmtMm(actualDepth)}mm`, -12, {kind:'depth-panel-depth', panelIndex});
      } else {
        const dimX = drawX + drawW + anno(panelIndex === count ? 70 : 54);
        drawDim(dimX, drawY, dimX, drawY + actualH, `${fmtMm(actualDepth)}mm`, 12, {kind:'depth-panel-depth', panelIndex});
      }
    }
    if (selected && !drawingForExport) drawPlanSelectionBox(drawX, drawY, drawW, actualH, anno(10));
    if (!drawingForExport && options.groupId && options.rowId && depthPanelSelectable(p, panelIndex)) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const hitPad = Math.max(anno(28), 125 * scale);
      planHitAreas.push({type:'depth-panel', x:hitX + (x - hitPad) * hitScale, y:hitY + y * hitScale, w:(w + hitPad * 2) * hitScale, h:h * hitScale, groupId:options.groupId, rowId:options.rowId, index:panelIndex});
    }
  };

  let x = ox;
  if (!c.hasLeft) {
    drawDepthPanel(panelGeoms[0], x, oy, st, Math.max(1, sD - st));
  }
  const doors = [];
  let boothX = ox;
  for (let i=0; i<p.count; i++) {
    const bx = boothX;
    const boothMm = c.boothWidths[i] || c.boothW;
    const bw = boothMm * scale;
    const hasDoor = hasDoorAt(p, i);
    const doorW = (c.doorInstallWidths[i] || c.doorWidths[i] || p.doorW) * scale;
    const gapLeft = c.gapPairs[i]?.[0] || 0;
    const gapRight = c.gapPairs[i]?.[1] || 0;
    const zoneStart = bx + (c.sidePairs[i]?.[0] || 0) * scale;
    const dsx = zoneStart + gapLeft * scale, dsw = doorW;
    const zoneEnd = dsx + dsw + gapRight * scale;
    const rebatePx = p.rebate ? Math.max(0, Number(p.rebateDepth) || 0) * scale : 0;
    const bigStart = dsx - rebatePx;
    const bigEnd = dsx + dsw + rebatePx;
    if (options.groupId && options.rowId) {
      const hitScale = options.hitScale || 1;
      const hitX = options.hitX || 0;
      const hitY = options.hitY || 0;
      const swingKey = boothSwingAt(p, i);
      const doorHitX = dsx;
      const doorHitW = dsw;
      const doorHitSize = Math.min(sD, dsw);
      const doorHitY = String(swingKey).startsWith('out') ? oy + sD : oy + sD - doorHitSize;
      const doorHitH = doorHitSize;
      planHitAreas.push({type:'booth', x:hitX + doorHitX * hitScale, y:hitY + doorHitY * hitScale, w:doorHitW * hitScale, h:doorHitH * hitScale, groupId:options.groupId, rowId:options.rowId, index:i});
    }
    doors.push({start: dsx, end: dsx + dsw, bigStart, bigEnd, zoneStart, zoneEnd, gapLeft: gapLeft * scale, gapRight: gapRight * scale, width: dsw, boothX: bx, boothW: bw, swing: boothSwingAt(p, i), index:i, hasDoor});
    const currentLabelNo = (options.labelStart || 0) + i + 1;
    ctx.fillStyle='#185FA5'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=planFont(95);
    const boothLabel = `${labelPrefix}${currentLabelNo}`;
    const labelX = bx + bw / 2;
    const labelY = oy + sD / 2;
    if (isSelectedBooth(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, i)) {
      const textW = ctx.measureText(boothLabel).width;
      const textH = annoFont(95);
      const padX = anno(28);
      const padY = anno(18);
      ctx.strokeStyle = '#185FA5'; ctx.lineWidth = Math.max(0.45, anno(2));
      ctx.strokeRect(labelX - textW / 2 - padX, labelY - textH / 2 - padY, textW + padX * 2, textH + padY * 2);
    }
    ctx.fillText(boothLabel, labelX, labelY);
    if (!hasDoor) {
      ctx.save();
      ctx.fillStyle = '#d64242';
      ctx.font = planFont(70);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('无门', labelX, labelY + anno(108));
      ctx.restore();
    }
    if (i < p.count - 1) {
      const panelX = bx + bw - st / 2;
      drawDepthPanel(panelGeoms[i + 1], panelX, oy, st, Math.max(1, sD - st));
    }
    boothX += bw;
  }
  ctx.strokeStyle='#000000'; ctx.lineWidth=0.8;
  if (doors.length && !p.rebate) {
    if (doors[0].zoneStart > ox + 0.5) ctx.strokeRect(ox, oy+sD, doors[0].zoneStart - ox, st);
    for (let i = 0; i < doors.length - 1; i++) {
      const start = doors[i].zoneEnd;
      const end = doors[i + 1].zoneStart;
      if (end > start + 0.5) ctx.strokeRect(start, oy+sD, end - start, st);
    }
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) ctx.strokeRect(doors[doors.length - 1].zoneEnd, oy+sD, ox + sW - doors[doors.length - 1].zoneEnd, st);
  }
  if (!c.hasRight) {
    drawDepthPanel(panelGeoms[p.count], ox + sW - st, oy, st, Math.max(1, sD - st));
  }
  doors.filter(door => door.hasDoor !== false).forEach(door => {
    drawDoorSwing(door, oy+sD, st, p);
  });
  const boardModel = buildBoardModel(p, c, doors, ox, sW, scale);
  drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel);

  const edge = c.edge;
  const middle = c.middle;
  if (options.showTopDims !== false) {
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    drawDim(ox, totalY, ox+sW, totalY, `${c.adjustedLength ? '展开总长' : '总长'} ${fmtMm(W)}mm`, 10, {kind:'total'});
  }
  drawPlanWarnings(c, ox + sW + swt + 18, oy - swt + 4);
  if (options.showBoothDim !== false) {
    const boothY = oy + Math.max(26, sD * 0.18);
    let boothDimX = ox;
    for (let i = 0; i < p.count; i++) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const boothPx = boothMm * scale;
      drawDim(boothDimX, boothY, boothDimX + boothPx, boothY, `${fmtMm(boothMm)}mm`, -10, {kind:'booth-width', boothIndex:i});
      boothDimX += boothPx;
    }
  }
  const depthX = ox + sW + swt + (options.depthDimGap ?? PLAN_ANCHOR.depthDimGap);
  drawDim(depthX, oy, depthX, oy+sD, `深 ${p.depth}mm`, 14, {kind:'depth'});

  const segments = [];
  boardModel.panels.forEach(panel => {
    const cutSides = (panel.leftRebate ? 1 : 0) + (panel.rightRebate ? 1 : 0);
    const label = !p.rebate
      ? fmtMm(panel.bigMm)
      : panel.mixed
      ? {top: fmtMm(Math.max(0, Math.round(panel.bigMm - (p.rebateDepth || 0)))), bottom: fmtMm(panel.bigMm)}
      : boardDimLabel(panel.bigMm, p, cutSides, panel.leftTopIsSmall);
    segments.push({x1: panel.bigX1, x2: panel.bigX2, label, meta:{kind:'front-panel', panel}});
  });
  boardModel.doors.forEach(door => {
    const sourceDoor = doors[door.index];
    const label = p.rebate
      ? {
        top: fmtMm(door.topIsSmall ? door.smallMm : door.bigMm),
        bottom: fmtMm(door.topIsSmall ? door.bigMm : door.smallMm)
      }
      : fmtMm(door.bigMm);
    segments.push({x1: sourceDoor.bigStart, x2: sourceDoor.bigEnd, label, meta:{kind:'door-width', boothIndex:door.index}});
  });
  segments.sort((a, b) => a.x1 - b.x1);
  drawChainDim(oy + sD + st + (options.bottomDimOffset || PLAN_ANCHOR.bottomDimOffset), segments);
  } finally {
    activeDimensionContext = prevDimensionContext;
  }
}

function drawPlanBlock(block, x, y, fit, pageOffsetX, pageOffsetY) {
  const g = block.row;
  const m = block.metrics;
  const group = block.group;
  const orderKey = `${group.id}:${g.id}`;
  const nudge = !previewSheetOrder && !drawingForExport && sheetDragNudge?.key === orderKey ? sheetDragNudge : null;
  const drawX = x + (nudge?.x || 0);
  const drawY = y + (nudge?.y || 0);
  if (!drawingForExport) {
    planHitAreas.push({type:'block', x:pageOffsetX + drawX * fit, y:pageOffsetY + drawY * fit, w:m.w * fit, h:m.h * fit, groupId:group.id, rowId:g.id, orderKey, pageIndex:block.pageIndex ?? 0, block, fit});
  }
  const draggingThisBlock = !drawingForExport && sheetOrderDrag?.key === orderKey;
  if (draggingThisBlock) {
    ctx.save();
    ctx.globalAlpha = 0.35;
  }
  drawPlanRow(g, drawX + m.drawX, drawY + m.drawY, 1, groupLabelPrefix(group), layoutUnitName(group, g), {
    showTopDims: true,
    showBoothDim: true,
    totalDimGap: PLAN_ANCHOR.totalDimGap,
    depthDimGap: PLAN_ANCHOR.depthDimGap,
    bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
    groupColor: groupColor(groups.indexOf(group)),
    labelStart: block.labelStart || 0,
    groupId: group.id,
    rowId: g.id,
    tagText: g.note || groupDisplayName(group),
    tagPreviewOnly: !g.note && !String(group.name || '').trim(),
    hitScale: fit,
    hitX: pageOffsetX,
    hitY: pageOffsetY
  });
  if (draggingThisBlock) ctx.restore();
}

function drawSheetDragOverlay() {
  if (drawingForExport || !sheetDragVisual) return;
  ctx.save();
  const v = sheetDragVisual;
  if (v.target) {
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([12, 8]);
    ctx.strokeRect(v.target.x, v.target.y, v.target.w, v.target.h);
    ctx.setLineDash([]);
  }
  if (v.drag) {
    const x = v.mouseX - v.drag.w / 2;
    const y = v.mouseY - v.drag.h / 2;
    ctx.strokeStyle = '#0B6FD3';
    ctx.lineWidth = 2;
    ctx.setLineDash([16, 10]);
    ctx.strokeRect(x, y, v.drag.w, v.drag.h);
    ctx.setLineDash([]);
    if (v.block) {
      const block = v.block;
      const m = block.metrics;
      const fit = Math.max(0.0001, Number(v.fit) || 1);
      ctx.globalAlpha = 0.82;
      const oldDrawingForExport = drawingForExport;
      drawingForExport = true;
      try {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(fit, fit);
        drawPlanRow(block.row, m.drawX, m.drawY, 1, groupLabelPrefix(block.group), layoutUnitName(block.group, block.row), {
          showTopDims: true,
          showBoothDim: true,
          totalDimGap: PLAN_ANCHOR.totalDimGap,
          depthDimGap: PLAN_ANCHOR.depthDimGap,
          bottomDimOffset: PLAN_ANCHOR.bottomDimOffset,
          groupColor: groupColor(groups.indexOf(block.group)),
          labelStart: block.labelStart || 0,
          groupId: block.group.id,
          rowId: block.row.id,
          tagText: block.row.note || groupDisplayName(block.group),
          tagPreviewOnly: !block.row.note && !String(block.group.name || '').trim(),
          hitScale: 1,
          hitX: 0,
          hitY: 0
        });
        ctx.restore();
      } finally {
        drawingForExport = oldDrawingForExport;
      }
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.68;
      ctx.fillStyle = '#E6F1FB';
      ctx.strokeStyle = '#0B6FD3';
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, v.drag.w, v.drag.h);
      ctx.strokeRect(x, y, v.drag.w, v.drag.h);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

function drawPlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0, visualPageIndex = pageIndex) {
  if (pageNeedsLandscape(page)) {
    drawLandscapePlanPageContent(page, layout, sheetOffsetX, sheetOffsetY, pageIndex, visualPageIndex);
    return;
  }
  drawPortraitPlanPageContent(page, layout, sheetOffsetX, sheetOffsetY, pageIndex, visualPageIndex);
}

function drawLandscapePlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0, visualPageIndex = pageIndex) {
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex, true);
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const rawContentW = Math.max(1, page.usedW);
  const rawContentH = Math.max(1, page.usedH);
  const pageFit = Math.min(1, availableW / rawContentW, availableH / rawContentH);
  const fit = pageFit;
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const centerX = Math.max(0, (availableW - contentW) / 2);
  const centerY = Math.max(0, (availableH - contentH) / 2);
  const prevAnnoScale = planAnnotationScale;
  planAnnotationScale = 1;
  const localX = sheetOffsetX + P.x + gaps.left + centerX;
  const localY = sheetOffsetY + P.y + gaps.top + centerY;
  ctx.save();
  ctx.translate(localX, localY);
  ctx.scale(fit, fit);
  page.blocks.forEach(block => {
    const visualY = block.pageY;
    drawPlanBlock({...block, pageIndex: visualPageIndex, pageY: visualY}, block.pageX, visualY, fit, localX, localY);
  });
  ctx.restore();
  planAnnotationScale = prevAnnoScale;
}

function drawPortraitPlanPageContent(page, layout, sheetOffsetX = 0, sheetOffsetY = 0, pageIndex = 0, visualPageIndex = pageIndex) {
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex);
  const baseContentW = Math.max(1, page.usedW);
  const baseContentH = Math.max(1, page.usedH);
  const singleBoothPage = page.blocks.length === 1 && Math.max(1, Number(page.blocks[0]?.row?.count) || 1) === 1;
  const rawContentW = baseContentW;
  const rawContentH = baseContentH;
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const autoFitScale = Math.min(availableW / rawContentW, availableH / rawContentH, 1);
  const fit = autoFitScale;
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const rowYs = [...new Set(page.blocks.map(block => block.pageY))].sort((a, b) => a - b);
  const bottomReserve = 48;
  const spareH = Math.max(0, availableH - contentH - bottomReserve);
  const visualRowGap = rowYs.length > 1 ? Math.min(24, spareH / (rowYs.length - 1)) : 0;
  const rawVisualRowGap = visualRowGap / Math.max(0.0001, fit);
  const rowOffsetByY = new Map(rowYs.map((y, index) => [y, rawVisualRowGap * index]));
  const adjustedContentH = contentH + visualRowGap * Math.max(0, rowYs.length - 1);
  const centerX = Math.max(0, (availableW - contentW) / 2);
  const centerY = singleBoothPage ? Math.max(0, (availableH - adjustedContentH) / 2) : 0;
  const prevAnnoScale = planAnnotationScale;
  planAnnotationScale = 1;
  const localX = sheetOffsetX + P.x + gaps.left + centerX;
  const localY = sheetOffsetY + P.y + gaps.top + centerY;
  ctx.save();
  ctx.translate(localX, localY);
  ctx.scale(fit, fit);
  page.blocks.forEach(block => {
    const visualY = block.pageY + (rowOffsetByY.get(block.pageY) || 0);
    drawPlanBlock({...block, pageIndex: visualPageIndex, pageY: visualY}, block.pageX, visualY, fit, localX, localY);
  });
  ctx.restore();
  planAnnotationScale = prevAnnoScale;
}

function drawPlanSheetsPreview(p) {
  const baseLayout = getSheetLayout(p);
  const pages = getPlanPages(p);
  const pageLayouts = pages.map((page, index) => sheetLayoutForPage(page, p, index));
  const orientationIndices = pageOrientationIndices(pages);
  const gap = sheetPreviewPageGap(baseLayout, pageLayouts);
  let x = 0;
  pages.forEach((page, index) => {
    const layout = pageLayouts[index];
    const orientationPageIndex = orientationIndices[index] || 0;
    drawSheet('卫生间隔断平面图', p, x, 0, index, layout);
    drawPlanPageContent(page, layout, x, 0, orientationPageIndex, index);
    ctx.save();
    ctx.fillStyle = '#000000';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${index + 1}/${pages.length} 页`, x + layout.frame.x + layout.frame.w / 2, sheetPageNumberBaselineY(layout));
    ctx.restore();
    x += layout.sheetW + gap;
  });
  drawSheetDragOverlay();
}
function drawPlan(p) {
  const baseLayout = getSheetLayout(p);
  const pages = getPlanPages(p);
  const pageIndex = Math.max(0, Math.min(currentPlanPage, pages.length - 1));
  const page = pages[pageIndex];
  const orientationPageIndex = planPageOrientationIndex(pages, pageIndex);
  const layout = sheetLayoutForPage(page, p, pageIndex);
  ctx.save();
  ctx.beginPath();
  const clipBleed = drawingForExport ? 80 : 0;
  ctx.rect(
    layout.frame.x + layout.safeGap * 0.35 - clipBleed,
    layout.frame.y + layout.safeGap * 0.35 - clipBleed,
    layout.frame.w - layout.safeGap * 0.7 + clipBleed * 2,
    layout.frame.h - layout.safeGap * 0.7 + clipBleed * 2
  );
  ctx.clip();

  drawPlanPageContent(page, layout, 0, 0, orientationPageIndex, pageIndex);  if (pages.length > 1) {
    ctx.save();
    ctx.fillStyle = '#000000';
    ctx.font = `14px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`第 ${pageIndex + 1}/${pages.length} 页`, layout.frame.x + layout.frame.w / 2, sheetPageNumberBaselineY(layout));
    ctx.restore();
  }
  drawSheetDragOverlay();
  ctx.restore();
}

function frontElevationLayout(p, layoutOverride = null) {
  const c = compute(p);
  const layout = layoutOverride || getSheetLayout(p);
  const P = layout.plot;
  const printable = layoutPrintableBounds(layout);
  const count = Math.max(1, Number(p.count) || 1);
  const W = Math.max(1, Number(c.totalRun) || Number(p.total) || 1);
  const hUMm = Number(p.hUpright) || 1830;
  const hDoorMm = Number(p.hDoor) || 1750;
  const hHeaderMm = Math.max(0, Number(p.hHeader) || 0);
  const hHeaderGapMm = Math.max(0, Number(p.hHeaderGap) || 0);
  const hMidMm = Number(p.hMid) || 1800;
  const hVisMm = Number(p.hVis) || 1830;
  const H = Math.max(hUMm, hMidMm, hDoorMm, hVisMm);
  const t = Math.max(1, Number(p.tPanel) || 12);
  const wt = Math.max(0, Number(c.wallT) || 0);
  const leftWall = c.hasLeft ? wt : 0;
  const rightWall = c.hasRight ? wt : 0;
  const reserve = {left:132, top:82, right:88, bottom:112};
  const fitBox = {
    x: Math.max(P.x, printable.left + reserve.left),
    y: Math.max(P.y, printable.top + reserve.top),
    right: Math.min(P.x + P.w, printable.right - reserve.right),
    bottom: Math.min(P.y + P.h, printable.bottom - reserve.bottom)
  };
  fitBox.w = Math.max(1, fitBox.right - fitBox.x);
  fitBox.h = Math.max(1, fitBox.bottom - fitBox.y);
  const fit = Math.min(1, fitBox.w / Math.max(1, W + leftWall + rightWall), fitBox.h / Math.max(1, H));
  const scale = Math.max(0.001, fit);
  const ox = fitBox.x + (fitBox.w - (W + leftWall + rightWall) * scale) / 2 + leftWall * scale;
  const floor = fitBox.y + (fitBox.h + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale;
  const sH = H * scale;
  const st = Math.max(1.5, t * scale);
  const swt = wt * scale;
  const hU = hUMm * scale;
  const hDoor = hDoorMm * scale;
  const hHeader = hHeaderMm * scale;
  const hHeaderGap = hHeaderGapMm * scale;
  const hMid = hMidMm * scale;
  const vis = hVisMm * scale;
  const rebate = Math.max(0, Number(p.rebateDepth) || 0) * scale;
  const labelPrefix = groupLabelPrefix(activeGroup());
  const boothWidths = Array.from({length:count}, (_, i) => Number(c.boothWidths?.[i]) || Number(c.boothW) || W / count);
  const boundaries = [0];
  boothWidths.forEach(width => boundaries.push(boundaries[boundaries.length - 1] + width));
  const posts = [];
  for (let i = 0; i <= count; i++) {
    const isLeftEdge = i === 0;
    const isRightEdge = i === count;
    const shouldDraw = (isLeftEdge && !c.hasLeft) || (isRightEdge && !c.hasRight) || (!isLeftEdge && !isRightEdge);
    if (!shouldDraw) continue;
    const bx = ox + (boundaries[i] || 0) * scale;
    const x = isLeftEdge ? bx : isRightEdge ? bx - st : bx - st / 2;
    posts.push({index:i, x, y:floor - hU, w:st, h:hU, label:isLeftEdge ? '左立板' : isRightEdge ? '右立板' : `中立板${i}`});
  }
  posts.forEach(post => {
    if (post.index > 0 && post.index < count) {
      post.y = floor - hMid;
      post.h = hMid;
    }
  });
  const booths = [];
  const doors = [];
  const headerPanels = [];
  for (let i = 0; i < count; i++) {
    const boothX = ox + (boundaries[i] || 0) * scale;
    const boothW = boothWidths[i] * scale;
    const hasDoor = hasDoorAt(p, i);
    const installMm = Number(c.doorInstallWidths?.[i]) || Number(c.doorWidths?.[i]) || Number(p.doorW) || 0;
    const bigMm = Number(c.doorWidths?.[i]) || installMm;
    const gapLeft = Number(c.gapPairs?.[i]?.[0]) || 0;
    const gapRight = Number(c.gapPairs?.[i]?.[1]) || 0;
    const zoneStart = boothX + (Number(c.sidePairs?.[i]?.[0]) || 0) * scale;
    const installX = zoneStart + gapLeft * scale;
    const installW = installMm * scale;
    const doorX = p.rebate ? installX - rebate : installX;
    const doorW = bigMm * scale;
    const swing = boothSwingAt(p, i);
    const swingDef = swingDefs[swing] || swingDefs['in-right'];
    const hingeX = swingDef.hinge === 'right' ? doorX + doorW : doorX;
    const lockX = swingDef.hinge === 'right' ? doorX + doorW * 0.22 : doorX + doorW * 0.78;
    const door = {index:i, hasDoor, x:doorX, y:floor - hDoor, w:doorW, h:hDoor, installX, installW, bigMm, installMm, swing, hingeX, lockX, gapLeft, gapRight, start:installX, end:installX + installW, bigStart:doorX, bigEnd:doorX + doorW, zoneStart, zoneEnd:installX + installW + gapRight * scale, width:installW};
    booths.push({index:i, x:boothX, y:floor - vis, w:boothW, h:vis, boothMm:boothWidths[i], label:`${labelPrefix}${i + 1}门`, hasDoor, door});
    if (hasDoor) {
      doors.push(door);
      if (hHeader > 0) headerPanels.push({index:i, x:doorX, y:floor - hDoor - hHeaderGap - hHeader, w:doorW, h:hHeader, heightMm:hHeaderMm, gapMm:hHeaderGapMm, door});
    }
  }
  const boardModel = buildBoardModel(p, c, doors, ox, sW, scale);
  const result = {c, layout, P, printableBounds:printable, count, W, H, scale, ox, oy, floor, sW, sH, st, swt, hU, hDoor, hHeader, hHeaderGap, hMid, vis, leftWall, rightWall, walls:{left:c.hasLeft, right:c.hasRight}, posts, booths, doors, headerPanels, boardModel};
  assertFrontLayoutInsidePrintable(result);
  return result;
}

function frontLayoutContentBounds(L) {
  const leftWall = L.walls.left ? L.swt : 0;
  const rightWall = L.walls.right ? L.swt : 0;
  const dimOffset = frontDimOffsetPx();
  return {
    left: Math.min(L.ox - leftWall, L.ox - leftWall - dimOffset - 34),
    top: Math.min(L.oy, L.oy - dimOffset - 34),
    right: Math.max(L.ox + L.sW + rightWall, L.ox + L.sW + dimOffset + 34),
    bottom: Math.max(L.floor, L.floor + dimOffset + 34)
  };
}

function assertFrontLayoutInsidePrintable(L) {
  const bounds = frontLayoutContentBounds(L);
  const printable = L.printableBounds || layoutPrintableBounds(L.layout);
  const epsilon = 0.75;
  if (bounds.left < printable.left - epsilon || bounds.top < printable.top - epsilon || bounds.right > printable.right + epsilon || bounds.bottom > printable.bottom + epsilon) {
    throw new Error('前立面图纸内容超出纸张打印范围');
  }
  return bounds;
}

function frontDoorSwingSegments(door, inset = 7) {
  const swing = swingDefs[door?.swing] || swingDefs['in-right'];
  const hingeLeft = swing.hinge !== 'right';
  const hingeX = hingeLeft ? door.x : door.x + door.w;
  const lockX = hingeLeft ? door.x + door.w - inset : door.x + inset;
  const topY = door.y + inset;
  const midY = door.y + door.h * 0.5;
  const bottomY = door.y + door.h - inset;
  return [
    {x1:hingeX, y1:midY, x2:lockX, y2:topY},
    {x1:hingeX, y1:midY, x2:lockX, y2:bottomY}
  ];
}

function frontSwingText(door) {
  return (swingDefs[door?.swing] || swingDefs['in-right']).label || '右内开';
}

function frontPanelSegments(L) {
  const segments = [];
  const minW = Math.max(2, L.st * 1.2);
  const middlePostRanges = frontMiddlePostRanges(L);
  const nearMiddlePost = x => middlePostRanges.some(range => x >= range.x1 - 0.5 && x <= range.x2 + 0.5);
  L.booths.forEach(booth => {
    if (!booth.hasDoor || !booth.door) {
      if (booth.w > minW) segments.push({x1:booth.x, x2:booth.x + booth.w, label:booth.label});
      return;
    }
    const door = booth.door;
    const leftEnd = Math.max(booth.x, door.bigStart);
    const rightStart = Math.min(booth.x + booth.w, door.bigEnd);
    if (leftEnd - booth.x > minW && !nearMiddlePost(leftEnd)) segments.push({x1:booth.x, x2:leftEnd, label:`${booth.label}-????`});
    if (booth.x + booth.w - rightStart > minW && !nearMiddlePost(rightStart)) segments.push({x1:rightStart, x2:booth.x + booth.w, label:`${booth.label}-????`});
  });
  return segments;
}

function frontMiddlePostRanges(L) {
  return (L.posts || [])
    .filter(post => post.index > 0 && post.index < L.count)
    .map(post => ({x1:post.x, x2:post.x + post.w}));
}

function frontTouchesMiddlePostEdge(L, x) {
  return frontMiddlePostRanges(L).some(range => Math.abs(x - range.x1) <= 0.75 || Math.abs(x - range.x2) <= 0.75 || (x > range.x1 && x < range.x2));
}

function drawFrontPanelSegmentsCanvas(L) {
  ctx.save();
  ctx.strokeStyle = '#000000';
  ctx.fillStyle = '#000000';
  ctx.lineWidth = Math.max(0.25, anno(1.6));
  ctx.setLineDash([]);
  frontPanelSegments(L).forEach(seg => {
    const y1 = L.floor - L.vis;
    const y2 = L.floor;
    const skipLeft = frontTouchesMiddlePostEdge(L, seg.x1);
    const skipRight = frontTouchesMiddlePostEdge(L, seg.x2);
    ctx.beginPath();
    ctx.moveTo(seg.x1, y1);
    ctx.lineTo(seg.x2, y1);
    ctx.moveTo(seg.x1, y2);
    ctx.lineTo(seg.x2, y2);
    if (!skipLeft) {
      ctx.moveTo(seg.x1, y1);
      ctx.lineTo(seg.x1, y2);
    }
    if (!skipRight) {
      ctx.moveTo(seg.x2, y1);
      ctx.lineTo(seg.x2, y2);
    }
    ctx.stroke();
  });
  ctx.setLineDash([]);
  ctx.restore();
}

function drawFrontHeaderPanelsCanvas(L) {

  if (L.walls.right) { drawHatch(L.ox + L.sW, L.oy, L.swt, L.sH, anno(36)); ctx.strokeStyle = '#000000'; ctx.lineWidth = Math.max(0.25, anno(2.2)); ctx.strokeRect(L.ox + L.sW, L.oy, L.swt, L.sH); }

  L.headerPanels.forEach(panel => drawElevationDim(panel.x + panel.w / 2, panel.y, panel.x + panel.w / 2, panel.y + panel.h, frontDimValue(panel.heightMm), 0, {kind:'h-header', boothIndex:panel.index}, smallDim));
  drawChainDim(bottomDimY, frontBottomDimSegments(L), FRONT_DIM.strokeStyle);

function drawStandardFrontModule(p, c) {

function drawSide(p) {
