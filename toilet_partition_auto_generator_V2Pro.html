function renderBOM(p) {
  const rows = drawableGroupRows();
  if (!rows.length && p?.enabled !== true) {
    renderBomItems([{name:'当前图纸', val:'空白', sub:'输入参数或点击生成后显示'}]);
    return;
  }
  if (rows.length) {
    renderBomItems(buildMaterialListItems(rows.map(item => item.row)));
    return;
  }
  renderBomItems(buildMaterialListItems([p]));
}

function buildMaterialListItems(rows) {
  const sourceRows = rows.filter(Boolean);
  const front = createBomBucket();
  const doors = createBomBucket();
  const midDepths = createBomBucket();
  const jointDepths = createBomBucket();
  const visibleDepths = createBomBucket();
  let noDoorCount = 0;
  sourceRows.forEach(row => {
    const c = compute(row);
    const count = Math.max(1, Number(row.count) || 1);
    const edgeWidths = [c.sidePairs[0]?.[0] || 0, c.sidePairs[count - 1]?.[1] || 0];
    const middleWidths = c.sidePairs.slice(0, -1).map((pair, i) => pair[1] + c.sidePairs[i + 1][0]);
    const frontHeight = Number(row.hUpright) || 1830;
    if (row.rebate) {
      addFrontRebateBomPieces(front, row, c, frontHeight);
    } else {
      [...edgeWidths, ...middleWidths].forEach(width => addBomPiece(front, frontHeight, fmtMm(width), ''));
    }

    for (let i = 0; i < count; i++) {
      if (!hasDoorAt(row, i)) {
        noDoorCount++;
        continue;
      }
      const width = Math.round(Number(c.doorWidths?.[i]) || Number(row.doorW) || 0);
      if (width) addBomPiece(doors, Number(row.hDoor) || 1750, row.rebate ? rebateBomSizeText(width, row) : fmtMm(width), row.rebate ? '双启口' : (sourceRows.some(item => item?.rebate) ? '平口' : ''));
    }

    const specialDepths = specialDepthPanelItems(row);
    const splitDepthTextFor = index => {
      const special = specialDepths.find(item => item.index === index);
      const depth = special ? special.depth : c.boothD;
      const standardDepth = bomStandardPanelDepth();
      const mainDepth = Math.min(depth, standardDepth);
      const jointDepth = Math.max(0, depth - standardDepth);
      return {main:fmtMm(mainDepth), joint:jointDepth ? fmtMm(jointDepth) : ''};
    };
    Array.from({length: Math.max(0, count - 1)}, (_, i) => i + 1).forEach(index => {
      if (isDepthPanelDeleted(row, index)) return;
      const split = splitDepthTextFor(index);
      addBomPiece(midDepths, row.hMid, split.main, '');
      if (split.joint) addBomPiece(jointDepths, row.hMid, split.joint, '');
    });

    const visibleIndexes = [];
    if (!c.hasLeft) visibleIndexes.push(0);
    if (!c.hasRight) visibleIndexes.push(count);
    visibleIndexes.forEach(index => {
      if (isDepthPanelDeleted(row, index)) return;
      addBomPiece(visibleDepths, row.hVis, splitDepthTextFor(index).main, '');
    });
  });
  return [
    {name:'前沿板', val:`${front.count} 块`, sub:formatBomBucket(front) || '无前沿板数据'},
    {name:'门板', val:`${doors.count} 块`, sub:doors.count ? `${formatBomBucket(doors)}${noDoorCount ? ` · ${noDoorCount}间无需门板` : ''}` : `${noDoorCount || 0} 间均无需门板`},
    {name:'中隔板', val:`${midDepths.count} 块`, sub:midDepths.count ? formatBomBucket(midDepths) : '单间无中隔板'},
    {name:'拼接板', val:`${jointDepths.count} 块`, sub:jointDepths.count ? formatBomBucket(jointDepths) : '无拼接板'},
    {name:'见光板', val:`${visibleDepths.count} 块`, sub:visibleDepths.count ? formatBomBucket(visibleDepths) : '左右两侧均靠墙'},
  ];
}

function addFrontRebateBomPieces(bucket, row, c = compute(row), height = row.hUpright || 1830) {
  const count = Math.max(1, Number(row.count) || 1);
  const panels = [];
  if (count <= 0) return;
  panels.push({width:c.frontPanelBigLocks?.[0] || c.sidePairs[0]?.[0] || 0, process:'单启口'});
  for (let i = 0; i < count - 1; i++) {
    const leftSwing = boothSwingAt(row, i);
    const rightSwing = boothSwingAt(row, i + 1);
    const width = c.frontPanelBigLocks?.[i + 1] || (c.sidePairs[i]?.[1] || 0) + (c.sidePairs[i + 1]?.[0] || 0);
    const mixed = frontSmallOnTopForSwing(leftSwing) !== frontSmallOnTopForSwing(rightSwing);
    panels.push({width, process:mixed ? '异启口' : '双启口'});
  }
  panels.push({width:c.frontPanelBigLocks?.[count] || c.sidePairs[count - 1]?.[1] || 0, process:'单启口'});
  panels.forEach(panel => addBomPiece(bucket, height, rebateBomSizeText(panel.width, row), panel.process));
}

function createBomBucket() {
  return {count:0, pieces:new Map()};
}

function addBomPiece(bucket, height, sizeText, process = '') {
  const h = Math.round(Number(height) || 0);
  const size = String(sizeText || '').trim();
  if (!h || !size) return;
  const proc = String(process || '').trim();
  const key = `${h}|${size}|${proc}`;
  const item = bucket.pieces.get(key) || {height:h, size, process:proc, count:0};
  item.count++;
  bucket.count++;
  bucket.pieces.set(key, item);
}

function formatBomBucket(bucket) {
  if (!bucket?.pieces?.size) return '';
  const lastHeightByProcess = new Map();
  let lastProcess = null;
  const shownProcess = new Set();
  return [...bucket.pieces.values()]
    .sort((a, b) => bomProcessSortValue(a.process) - bomProcessSortValue(b.process) || a.process.localeCompare(b.process, 'zh-Hans-CN') || a.height - b.height || bomSizeSortValue(a.size) - bomSizeSortValue(b.size) || a.size.localeCompare(b.size, 'zh-Hans-CN'))
    .map(item => {
      const processKey = item.process || '';
      const lastHeight = lastHeightByProcess.get(processKey);
      const prefix = item.height === lastHeight ? `[size-cont]${item.size}` : `[size-head:${item.height}]${item.size}`;
      lastHeightByProcess.set(processKey, item.height);
      const groupGap = lastProcess !== null && processKey !== lastProcess ? '[bom-gap] / ' : '';
      lastProcess = processKey;
      const processText = item.process && !shownProcess.has(processKey) ? `${item.process} ` : (item.process ? `[process-cont:${item.process}] ` : '');
      if (item.process) shownProcess.add(processKey);
      return `${groupGap}${processText}${prefix}=${item.count}`;
    })
    .join(' / ');
}

function bomProcessSortValue(process) {
  const order = {'单启口':1, '双启口':2, '异启口':3};
  return order[String(process || '')] || 0;
}

function bomSizeSortValue(value) {
  const match = String(value || '').match(/\d+/);
  return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
}

function urinalBomItem() {
  const count = Number(urinalSpec.count) || 0;
  if (count <= 0 || !(urinalSpec.width > 0) || !(urinalSpec.height > 0) || !(urinalSpec.thick > 0)) return null;
  const process = `${urinalSpec.shape || '矩形'}，${urinalSpec.hole || '无开孔'}`;
  const note = urinalSpec.note ? `，${urinalSpec.note}` : (urinalSpec.shape === '异形' || urinalSpec.hole === '有开孔' ? '，需现场模板/图纸确认' : '');
  return {name:'小便板', val:`${count} 张`, sub:`${urinalSpec.height}×${urinalSpec.width} = ${count}，厚${urinalSpec.thick}mm，${process}${note}`};
}

function parseBomPieceLine(line, fallbackHeight = 0) {
  const text = String(line || '').replace(/×/g, 'x');
  const qtyMatch = text.match(/=\s*(\d+)/);
  const qty = qtyMatch ? Number(qtyMatch[1]) : 0;
  const markedHeadMatch = text.match(/\[size-head:(\d+)\]\s*(\d+)/);
  if (qty && markedHeadMatch) {
    const h = Number(markedHeadMatch[1]);
    const w = Number(markedHeadMatch[2]);
    if (h > 0 && w > 0) return {w, h, qty, lastHeight:h};
  }
  const markedContMatch = text.match(/\[size-cont\]\s*(\d+)/);
  if (qty && markedContMatch && fallbackHeight > 0) {
    const w = Number(markedContMatch[1]);
    if (w > 0) return {w, h:fallbackHeight, qty, lastHeight:fallbackHeight};
  }
  const sizeMatch = text.match(/(\d+)\s*x\s*(\d+)/i);
  if (!qty || !sizeMatch) return null;
  const h = Number(sizeMatch[1]);
  const w = Number(sizeMatch[2]);
  if (!(h > 0) || !(w > 0)) return null;
  return {w, h, qty, lastHeight:h};
}

function collectBomPiecesFromItems(items) {
  const pieces = [];
  items.forEach(item => {
    let lastHeight = 0;
    String(item.sub || '').split(/\s+\/\s+|\s+·\s+/).forEach(part => {
      const parsed = parseBomPieceLine(part, lastHeight);
      if (!parsed) return;
      lastHeight = parsed.lastHeight || lastHeight;
      for (let i = 0; i < parsed.qty; i++) pieces.push({w:parsed.w, h:parsed.h, label:item.name || ''});
    });
  });
  return pieces;
}

function pruneFreeRects(rects) {
  return rects.filter((rect, i) => !rects.some((other, j) => i !== j
    && rect.x >= other.x && rect.y >= other.y
    && rect.x + rect.w <= other.x + other.w
    && rect.y + rect.h <= other.y + other.h));
}

function placePieceOnBoard(board, piece, allowRotate, kerf = 0) {
  let best = null;
  board.free.forEach((rect, rectIndex) => {
    const variants = allowRotate && piece.w !== piece.h ? [{w:piece.w,h:piece.h},{w:piece.h,h:piece.w}] : [{w:piece.w,h:piece.h}];
    variants.forEach(size => {
      if (size.w > rect.w || size.h > rect.h) return;
      const occupyW = Math.min(rect.w, size.w + Math.max(0, kerf));
      const occupyH = Math.min(rect.h, size.h + Math.max(0, kerf));
      const waste = rect.w * rect.h - occupyW * occupyH;
      const shortSide = Math.min(rect.w - occupyW, rect.h - occupyH);
      const score = waste * 100000 + shortSide;
      if (!best || score < best.score) best = {rect, rectIndex, size, occupyW, occupyH, score};
    });
  });
  if (!best) return false;
  const {rect, rectIndex, size, occupyW, occupyH} = best;
  board.free.splice(rectIndex, 1);
  const right = {x:rect.x + occupyW, y:rect.y, w:rect.w - occupyW, h:occupyH};
  const bottom = {x:rect.x, y:rect.y + occupyH, w:rect.w, h:rect.h - occupyH};
  if (right.w > 0 && right.h > 0) board.free.push(right);
  if (bottom.w > 0 && bottom.h > 0) board.free.push(bottom);
  board.free = pruneFreeRects(board.free);
  board.usedArea += size.w * size.h;
  return true;
}

function estimatePackedBoardSheetCount(pieces, sheet, allowRotate, kerf = 0) {
  const boards = [];
  const unplaced = [];
  const safeKerf = Math.max(0, kerf);
  pieces.forEach(piece => {
    let placed = boards.some(board => placePieceOnBoard(board, piece, allowRotate, safeKerf));
    if (!placed) {
      const fits = (piece.w <= sheet.w && piece.h <= sheet.h) || (allowRotate && piece.h <= sheet.w && piece.w <= sheet.h);
      if (!fits) {
        unplaced.push(piece);
        return;
      }
      const board = {free:[{x:0,y:0,w:sheet.w,h:sheet.h}], usedArea:0, area:sheet.w * sheet.h};
      placePieceOnBoard(board, piece, allowRotate, safeKerf);
      boards.push(board);
    }
  });
  const usedArea = pieces.reduce((sum, piece) => sum + piece.w * piece.h, 0);
  const sheetArea = boards.reduce((sum, board) => sum + board.area, 0);
  return {count:boards.length, unplacedCount:unplaced.length, utilization:boards.length && sheetArea ? usedArea / sheetArea : 0};
}

function estimateSingleBoardSheetCount(pieces, sheet, allowRotate, kerf = 0) {
  return estimatePackedBoardSheetCount(pieces, sheet, allowRotate, kerf);
}

function estimateBoardSheets(pieces, sheets, allowRotate, kerf = 0) {
  const enabledSheets = sheets.filter(sheet => sheet.enabled && sheet.w > 0 && sheet.h > 0);
  const sorted = pieces
    .filter(piece => piece.w > 0 && piece.h > 0)
    .sort((a, b) => (b.w * b.h - a.w * a.h) || Math.max(b.w, b.h) - Math.max(a.w, a.h));
  if (enabledSheets.length === 1) {
    const single = estimateSingleBoardSheetCount(sorted, enabledSheets[0], allowRotate, kerf);
    const usedArea = sorted.reduce((sum, piece) => sum + piece.w * piece.h, 0);
    const sheetArea = (single.count || 0) * enabledSheets[0].w * enabledSheets[0].h;
    return {...single, utilization:sheetArea ? usedArea / sheetArea : 0};
  }
  const boards = [];
  const unplaced = [];
  sorted.forEach(piece => {
    if (!enabledSheets.length) return;
    let placed = boards.some(board => placePieceOnBoard(board, piece, allowRotate, kerf));
    if (!placed) {
      const sheet = enabledSheets
        .filter(candidate => (piece.w <= candidate.w && piece.h <= candidate.h) || (allowRotate && piece.h <= candidate.w && piece.w <= candidate.h))
        .sort((a, b) => (a.w * a.h - b.w * b.h))[0];
      if (!sheet) {
        unplaced.push(piece);
        return;
      }
      const board = {free:[{x:0,y:0,w:sheet.w,h:sheet.h}], usedArea:0, area:sheet.w * sheet.h};
      placePieceOnBoard(board, piece, allowRotate, kerf);
      boards.push(board);
    }
  });
  const usedArea = sorted.reduce((sum, piece) => sum + piece.w * piece.h, 0);
  const sheetArea = boards.reduce((sum, board) => sum + board.area, 0);
  return {count:boards.length, unplacedCount:unplaced.length, utilization:boards.length && sheetArea ? usedArea / sheetArea : 0};
}

function checkBoardFitWarnings(pieces = lastBomPieces) {
  const activeSheet = boardSheets?.[activeBoardSheetIndex] || boardSheets?.[0];
  const sheetW = Math.round(Number(activeSheet?.w) || 0);
  const sheetH = Math.round(Number(activeSheet?.h) || 0);
  if (!sheetW || !sheetH || !Array.isArray(pieces) || !pieces.length) return;
  const tooTall = pieces.filter(piece => piece.h > sheetH && piece.h <= sheetW && piece.w <= sheetH);
  const tooLarge = pieces.filter(piece => (piece.h > sheetH || piece.w > sheetW) && !(piece.h <= sheetW && piece.w <= sheetH));
  const messages = [];
  if (tooTall.length) {
    const maxHeight = Math.max(...tooTall.map(piece => piece.h));
    messages.push(`板高 ${maxHeight}mm 超过整板高度 ${sheetH}mm，可能是整板宽高填反。`);
  }
  if (tooLarge.length) {
    const sample = tooLarge[0];
    messages.push(`有板件 ${sample.h}×${sample.w}mm 超过当前整板 ${sheetW}×${sheetH}mm，请确认整板规格或板高。`);
  }
  const signature = messages.join('|');
  if (!signature || signature === lastBoardFitWarningSignature) return;
  lastBoardFitWarningSignature = signature;
  showHintToast(messages.join(' '));
}

function updateBoardSheetEstimate() {
  const select = document.getElementById('board-sheet-select');
  const wInput = document.getElementById('board-sheet-w');
  const hInput = document.getElementById('board-sheet-h');
  const kerfInput = document.getElementById('board-kerf');
  const result = document.getElementById('board-sheet-result');
  const toggle = document.getElementById('board-rotate-toggle');
  const sheetToggle = document.getElementById('board-sheet-enabled-toggle');
  const activeSheet = boardSheets[activeBoardSheetIndex] || boardSheets[0];
  if (select) select.value = String(activeBoardSheetIndex);
  if (wInput && document.activeElement !== wInput) wInput.value = String(activeSheet?.w || '');
  if (hInput && document.activeElement !== hInput) hInput.value = String(activeSheet?.h || '');
  if (kerfInput && document.activeElement !== kerfInput) kerfInput.value = String(boardKerf || 0);
  toggle?.classList.toggle('active', boardRotateEnabled);
  sheetToggle?.classList.toggle('show', activeBoardSheetIndex > 0);
  sheetToggle?.classList.toggle('active', activeSheet?.enabled !== false);
  if (!result) return;
  if (!boardSheets.some(sheet => sheet.enabled && sheet.w > 0 && sheet.h > 0) || !lastBomPieces.length) {
    result.textContent = '≈ -- 张';
    return;
  }
  const estimate = estimateBoardSheets(lastBomPieces, boardSheets, boardRotateEnabled, boardKerf);
  const displayCount = estimate.count + (estimate.unplacedCount || 0);
  result.textContent = displayCount ? `≈ ${displayCount} 张` : '≈ -- 张';
  checkBoardFitWarnings(lastBomPieces);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function formatBomChips(value) {
  return String(value ?? '').split('/').map(part => part.trim()).filter(Boolean).map(part => `<span class="bom-chip">${escapeHtml(part)}</span>`).join('');
}

function bomProcessClass(process) {
  return String(process || '') === '平口' ? ' bom-size-process align-three' : ' bom-size-process';
}

function parseBomDisplayPart(line, state) {
  if (line === '[bom-gap]') return {gap:true};
  let match = line.match(/^\[process-cont:(.+?)\]\s+\[size-head:(\d+)\](.*)$/);
  if (match) {
    state.process = match[1];
    state.height = match[2];
    return {process:state.process, height:state.height, size:match[3]};
  }
  match = line.match(/^\[process-cont:(.+?)\]\s+\[size-cont\](.*)$/);
  if (match) {
    state.process = match[1];
    return {process:state.process, height:state.height, size:match[2]};
  }
  match = line.match(/^(.+?)\s+\[size-head:(\d+)\](.*)$/);
  if (match) {
    state.process = match[1];
    state.height = match[2];
    return {process:state.process, height:state.height, size:match[3]};
  }
  match = line.match(/^(.+?)\s+\[size-cont\](.*)$/);
  if (match) {
    state.process = match[1];
    return {process:state.process, height:state.height, size:match[2]};
  }
  match = line.match(/^\[size-head:(\d+)\](.*)$/);
  if (match) {
    state.height = match[1];
    return {process:state.process, height:state.height, size:match[2]};
  }
  if (line.startsWith('[size-cont]')) return {process:state.process, height:state.height, size:line.slice(11)};
  return {plain:line};
}

function bomMobileGroupsFromSub(value) {
  const lines = String(value ?? '').split(/\s+\/\s+|\s+·\s+/).map(part => part.trim()).filter(Boolean);
  const state = {process:'', height:''};
  const groups = [];
  let current = null;
  (lines.length ? lines : ['无']).forEach(line => {
    const parsed = parseBomDisplayPart(line, state);
    if (parsed.gap) {
      current = null;
      return;
    }
    if (parsed.plain) {
      groups.push({title:'', tags:[parsed.plain]});
      current = null;
      return;
    }
    const processLabel = parsed.process || '平口';
    const title = `${processLabel ? `${processLabel} ` : ''}${parsed.height ? `${parsed.height} x` : ''}`.trim();
    if (!current || current.title !== title) {
      current = {title, tags:[]};
      groups.push(current);
    }
    current.tags.push(parsed.size);
  });
  return groups;
}

function formatBomMobileLines(value) {
  const groups = bomMobileGroupsFromSub(value);
  return `<div class="bom-mobile-groups">${groups.map(group => `<div class="bom-mobile-group">${group.title ? `<div class="bom-mobile-group-title">${escapeHtml(group.title)}</div>` : '<div></div>'}<div class="bom-mobile-tags">${group.tags.map(tag => `<span class="bom-mobile-tag">${escapeHtml(tag)}</span>`).join('')}</div></div>`).join('')}</div>`;
}

function bomTextLinesFromSub(value) {
  const lines = String(value ?? '').split(/\s+\/\s+|\s+·\s+/).map(part => part.trim()).filter(Boolean);
  const state = {process:'', height:''};
  return (lines.length ? lines : ['无']).map(line => {
    const parsed = parseBomDisplayPart(line, state);
    if (parsed.gap) return {gap:true, text:''};
    if (parsed.plain) return {text:parsed.plain};
    const processLabel = parsed.process || '平口';
    const heightText = parsed.height ? `${parsed.height} x ` : '';
    return {text:`${processLabel} ${heightText}${parsed.size}`.replace(/\s+/g, ' ').trim()};
  });
}

function bomStructuredLinesFromSub(value) {
  const lines = String(value ?? '').split(/\s+\/\s+|\s+·\s+/).map(part => part.trim()).filter(Boolean);
  const state = {process:'', height:''};
  return (lines.length ? lines : ['无']).map(line => {
    const parsed = parseBomDisplayPart(line, state);
    if (parsed.gap) return {gap:true};
    if (parsed.plain) return {plain:parsed.plain};
    const explicitProcess = !line.includes('[process-cont:') && /^.+?\s+\[size-/.test(line);
    const continued = line.includes('[size-cont]') || line.includes('[process-cont:');
    return {
      process:explicitProcess ? (parsed.process || '') : '',
      height:parsed.height || '',
      size:parsed.size || '',
      continued
    };
  });
}

function collectBomTextItemsFromData(items) {
  const allItems = [...items];
  const urinal = urinalBomItem();
  if (urinal) allItems.push(urinal);
  return allItems.map(item => ({
    name:item.name || '',
    val:String(item.val || '').replace(/<[^>]*>/g, '').trim(),

  })).filter(item => item.name || item.val || item.lines.length);
}

function currentBomTextItems() {

  if ((lastParams || getParams())?.enabled === true) return collectBomTextItemsFromData(buildMaterialListItems([lastParams || getParams()]));
  return collectBomTextItemsFromData([{name:'当前图纸', val:'空白', sub:'输入参数或点击生成后显示'}]);
}

function formatBomLines(value, itemName = '') {
  if (itemName === '前沿板') return formatBomMobileLines(value);
  const lines = String(value ?? '').split(/\s+\/\s+|\s+·\s+/).map(part => part.trim()).filter(Boolean);
  const htmlLines = (lines.length ? lines : ['无']).map(line => {
    if (line === '[bom-gap]') return '<div class="bom-gap" aria-hidden="true"></div>';
    const processPlaceholderHeadMatch = line.match(/^\[process-cont:(.+?)\]\s+\[size-head:(\d+)\](.*)$/);
    if (processPlaceholderHeadMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="${bomProcessClass(processPlaceholderHeadMatch[1])} bom-process-placeholder">${escapeHtml(processPlaceholderHeadMatch[1])}</span><span class="bom-size-left">${escapeHtml(processPlaceholderHeadMatch[2])} x </span><span class="bom-size-right">${escapeHtml(processPlaceholderHeadMatch[3])}</span></span></div>`;
    const processPlaceholderContMatch = line.match(/^\[process-cont:(.+?)\]\s+\[size-cont\](.*)$/);
    if (processPlaceholderContMatch) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="${bomProcessClass(processPlaceholderContMatch[1])} bom-process-placeholder">${escapeHtml(processPlaceholderContMatch[1])}</span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(processPlaceholderContMatch[2])}</span></span></div>`;
    const processHeadMatch = line.match(/^(.+?)\s+\[size-head:(\d+)\](.*)$/);
    if (processHeadMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="${bomProcessClass(processHeadMatch[1])}">${escapeHtml(processHeadMatch[1])}</span><span class="bom-size-left">${escapeHtml(processHeadMatch[2])} x </span><span class="bom-size-right">${escapeHtml(processHeadMatch[3])}</span></span></div>`;
    const processContMatch = line.match(/^(.+?)\s+\[size-cont\](.*)$/);
    if (processContMatch) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="${bomProcessClass(processContMatch[1])}">${escapeHtml(processContMatch[1])}</span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(processContMatch[2])}</span></span></div>`;
    const headMatch = line.match(/^\[size-head:(\d+)\](.*)$/);
    if (headMatch) return `<div class="bom-line"><span class="bom-size-line"><span class="bom-size-process"></span><span class="bom-size-left">${escapeHtml(headMatch[1])} x </span><span class="bom-size-right">${escapeHtml(headMatch[2])}</span></span></div>`;
    const isContinued = line.startsWith('[size-cont]');
    if (isContinued) return `<div class="bom-line" data-bom-cont="1"><span class="bom-size-line"><span class="bom-size-process"></span><span class="bom-size-left"></span><span class="bom-size-right">${escapeHtml(line.slice(11))}</span></span></div>`;
    return `<div class="bom-line">${escapeHtml(line)}</div>`;
  });
  const columns = [];
  for (let i = 0; i < htmlLines.length; i += 5) columns.push(htmlLines.slice(i, i + 5));
  const rows = [];
  for (let i = 0; i < columns.length; i += 5) rows.push(columns.slice(i, i + 5));
  const rowHtml = rows.map(row => {
    const columnHtml = row.map((column, index) => `<div class="bom-column${index > 0 ? ' is-overflow' : ''}">${column.join('')}</div>`).join('');
    return `<div class="bom-line-row" style="--bom-row-columns:${Math.max(1, row.length)}">${columnHtml}</div>`;
  }).join('');
  return `<div class="bom-lines">${rowHtml}</div>`;
}

function combineCanvasesVertical(items, gap = 28, background = '#fff') {
  const list = items.map(item => item?.canvas ? item : {canvas:item, scale:1}).filter(item => item.canvas);
  const metrics = list.map(item => ({...item, scale:Math.max(0.1, Number(item.scale) || 1), w:item.canvas.width * (Math.max(0.1, Number(item.scale) || 1)), h:item.canvas.height * (Math.max(0.1, Number(item.scale) || 1))}));
  const width = Math.ceil(Math.max(...metrics.map(item => item.w)));
  const height = Math.ceil(metrics.reduce((sum, item) => sum + item.h, 0) + Math.max(0, metrics.length - 1) * gap);
  const out = document.createElement('canvas');
  out.width = width;
  out.height = height;
  const outCtx = out.getContext('2d');
  outCtx.fillStyle = background;
  outCtx.fillRect(0, 0, width, height);
  let y = 0;
  metrics.forEach(item => {
    const x = Math.round((width - item.w) / 2);
    outCtx.drawImage(item.canvas, x, y, item.w, item.h);
    y += item.h + gap;
  });
  return out;
}

async function addBomCanvasPageToPdf(pdfDoc, canvas, pageSize) {
  const png = await pdfDoc.embedPng(await canvasToPngBytes(canvas));
  const page = pdfDoc.addPage(pageSize);
  const {width: pageW, height: pageH} = page.getSize();
  const logicalW = Number(canvas.dataset.logicalWidth) || canvas.width;
  const logicalH = Number(canvas.dataset.logicalHeight) || canvas.height;
  const margin = 28;
  const maxW = pageW - margin * 2;
  const maxH = pageH - margin * 2;
  const scale = Math.min(maxW / Math.max(1, logicalW), maxH / Math.max(1, logicalH));
  const drawW = logicalW * scale;
  const drawH = logicalH * scale;
  page.drawImage(png, {
    x:(pageW - drawW) / 2,
    y:pageH - margin - drawH,
    width:drawW,
    height:drawH
  });
}

function normalizeSvgForPrint(svg) {

    .replace(/stroke="rgba\(0,0,0,\.36\)"/g, 'stroke="#000" stroke-opacity="0.55"')
    .replace(/stroke="rgba\(0,0,0,0\.36\)"/g, 'stroke="#000" stroke-opacity="0.55"');
  const boosted = blackened.replace(/stroke-width="([0-9.]+)"/g, (match, value, offset, source) => {
    const width = Number(value);
    if (!Number.isFinite(width) || width >= 1.2) return match;
    const near = source.slice(Math.max(0, offset - 120), offset + 160);
    if (!/stroke="#000(?:000)?"/.test(near)) return match;
    return 'stroke-width="1.2"';
  });
  return boosted.replace(/^<svg\b([^>]*)>/i, (match, attrs) => {
    const cleaned = attrs
      .replace(/\swidth="[^"]*"/i, '')
      .replace(/\sheight="[^"]*"/i, '');
    return `<svg${cleaned} width="100%" height="100%" preserveAspectRatio="xMidYMid meet">`;
  });
}

    const lineStyle = {stroke, strokeWidth:1.1, className:`${textClass}-line`};
    B.line(model, seg.x1, y, seg.x2, y, lineStyle);
    B.line(model, seg.x1, y - 14, seg.x1, y + 14, lineStyle);
    B.line(model, seg.x2, y - 14, seg.x2, y + 14, lineStyle);
    if (seg.label) B.text(model, String(seg.label), cx, y - 24, {fill, fontSize, align:'middle', baseline:'alphabetic', className:textClass, maxWidth:Math.max(1, seg.x2 - seg.x1 - 12), fitMode:'shrink'});
  });
}

function backendDrawDoorSwing(B, model, door, baseY, st, p) {
  const swing = swingDefs[door.swing || p.swing || 'in-right'] || swingDefs['in-right'];
  const isRight = swing.hinge === 'right';
  const closedStart = Number.isFinite(door.bigStart) ? door.bigStart : door.start;
  const closedEnd = Number.isFinite(door.bigEnd) ? door.bigEnd : door.end;
  const hingeX = isRight ? door.end : door.start;
  const closedHingeX = isRight ? closedEnd : closedStart;
  const closedY = baseY + st / 2;
  const openEndY = closedY + (swing.opensUp ? -1 : 1) * door.width;
  const drawDoorBoard = (x1, y1, x2, y2, topIsSmall) => {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len <= 0.5) return;
    const ux = dx / len;
    const uy = dy / len;
    const nx = -uy;
    const ny = ux;
    const panelMm = Math.max(1, Number(p.tPanel) || 12);
    const pxPerMm = st / panelMm;
    const rebate = p.rebate ? Math.min(Math.max(0, Number(p.rebateDepth) || 0) * pxPerMm, len / 3) : 0;
    const topA = topIsSmall ? rebate : 0;
    const topB = topIsSmall ? len - rebate : len;
    const botA = topIsSmall ? 0 : rebate;
    const botB = topIsSmall ? len : len - rebate;
    const px = (s, side) => x1 + ux * s + nx * side;
    const py = (s, side) => y1 + uy * s + ny * side;
    const points = [
      {x:px(topA, -st / 2), y:py(topA, -st / 2)},
      {x:px(topB, -st / 2), y:py(topB, -st / 2)}
    ];
    if (topB !== botB) points.push({x:px(topB, 0), y:py(topB, 0)});
    points.push(
      {x:px(botB, 0), y:py(botB, 0)},
      {x:px(botB, st / 2), y:py(botB, st / 2)},
      {x:px(botA, st / 2), y:py(botA, st / 2)}
    );
    if (botA !== topA) points.push({x:px(botA, 0), y:py(botA, 0)});
    points.push({x:px(topA, 0), y:py(topA, 0)});
    B.path(model, points, {fill:'none', stroke:'#185FA5', strokeWidth:0.75, closed:true, lineCap:'butt', lineJoin:'miter'});
  };
  drawDoorBoard(closedStart, closedY, closedEnd, closedY, doorSmallOnTopForSwing(door.swing));
  drawDoorBoard(hingeX, closedY, hingeX, openEndY, doorSmallOnTopForSwing(door.swing));
  const arcMap = {
    'in-left': [0, -Math.PI / 2],
    'in-right': [Math.PI, Math.PI * 1.5],
    'out-left': [0, Math.PI / 2],
    'out-right': [Math.PI, Math.PI / 2]
  };
  const arc = arcMap[door.swing || p.swing || 'in-right'] || arcMap['in-right'];
  B.arc(model, closedHingeX, closedY, door.width, arc[0], arc[1], {stroke:'#8EC5FF', strokeWidth:2, dash:[12, 8]});
}

function backendDrawPlanRebateDetails(B, model, p, ox, oy, sW, sD, st, scale, boardModel) {
  if (!p.rebate || !boardModel?.doors?.length) return;
  const rebatePx = Math.max(1.5, (p.rebateDepth || 0) * scale);
  const yTop = oy + sD;
  const yBot = yTop + st;
  const yMid = yTop + st * 0.5;
  const drawBoardProfile = (bigX1, bigX2, leftRebate, rightRebate, leftTopIsSmall, rightTopIsSmall = leftTopIsSmall) => {
    if (bigX2 <= bigX1 + 1) return;
    const r = Math.min(rebatePx, Math.max(1, (bigX2 - bigX1) / 3));
    const smallX1 = leftRebate ? bigX1 + r : bigX1;
    const smallX2 = rightRebate ? bigX2 - r : bigX2;
    const topLeft = leftTopIsSmall ? smallX1 : bigX1;
    const topRight = rightTopIsSmall ? smallX2 : bigX2;
    const botLeft = leftTopIsSmall ? bigX1 : smallX1;
    const botRight = rightTopIsSmall ? bigX2 : smallX2;
    const points = [
      {x:topLeft, y:yTop},
      {x:topRight, y:yTop}
    ];
    if (topRight !== botRight) points.push({x:topRight, y:yMid});
    points.push(
      {x:botRight, y:yMid},
      {x:botRight, y:yBot},
      {x:botLeft, y:yBot}
    );
    if (botLeft !== topLeft) points.push({x:botLeft, y:yMid});
    points.push({x:topLeft, y:yMid}, {x:topLeft, y:yTop});
    B.path(model, points, {fill:'none', stroke:'#000', strokeWidth:0.75, lineCap:'butt', lineJoin:'miter'});
  };
  boardModel.panels.forEach(panel => drawBoardProfile(panel.bigX1, panel.bigX2, panel.leftRebate, panel.rightRebate, panel.leftTopIsSmall, panel.rightTopIsSmall));
}

function backendDrawPlanWalls(B, model, ox, oy, sW, sD, swt, c, extras = {}) {
  const extraLeft = Math.max(0, Number(extras.left) || 0);
  const extraRight = Math.max(0, Number(extras.right) || 0);
  const frontExtend = Math.max(0, Number(extras.frontExtend) || 0);
  const middleExtras = Array.isArray(extras.middle) ? extras.middle.filter(item => item && item.h > 0 && item.x2 > item.x1) : [];
  const left = (c.hasLeft || extraLeft > 0) ? swt : 0;
  const right = (c.hasRight || extraRight > 0) ? swt : 0;
  const back = c.hasBack ? swt : 0;
  if (!left && !right && !back) return;
  const fullSideH = sD + frontExtend + back;
  const leftH = c.hasLeft ? fullSideH : Math.min(fullSideH, back + extraLeft);
  const rightH = c.hasRight ? fullSideH : Math.min(fullSideH, back + extraRight);
  const leftX = left ? ox - left : ox;
  const rightX = right ? ox + sW : ox + sW;
  const backX = back ? Math.min(left ? leftX : ox, ox) : ox;
  const backRight = back ? Math.max(right ? rightX + right : ox + sW, ox + sW) : ox + sW;
  const wallRects = [];
  if (back) wallRects.push({x:backX, y:oy - back, w:backRight - backX, h:back});
  if (left) wallRects.push({x:leftX, y:oy - back, w:left, h:leftH});
  if (right) wallRects.push({x:rightX, y:oy - back, w:right, h:rightH});
  middleExtras.forEach(item => wallRects.push({x:item.x1, y:oy - back, w:item.x2 - item.x1, h:back + item.h}));
  wallRects.forEach(rect => {
    B.rect(model, rect.x, rect.y, rect.w, rect.h, {fill:'#fbfbfb', stroke:'none'});
    B.hatch(model, rect.x, rect.y, rect.w, rect.h, 46, {stroke:'rgba(0,0,0,.36)', strokeWidth:1.05});
  });
  const wallLine = {stroke:'#000', strokeWidth:1.6, lineJoin:'miter'};
  const drawSegmentedLine = (x1, x2, y, gaps) => {
    let cursor = x1;
    gaps
      .map(gap => ({x1:Math.max(x1, gap.x1), x2:Math.min(x2, gap.x2)}))
      .filter(gap => gap.x2 > gap.x1)
      .sort((a, b) => a.x1 - b.x1)
      .forEach(gap => {
        if (gap.x1 > cursor) B.line(model, cursor, y, gap.x1, y, wallLine);
        cursor = Math.max(cursor, gap.x2);
      });
    if (cursor < x2) B.line(model, cursor, y, x2, y, wallLine);
  };
  if (back) {
    B.line(model, backX, oy - back, backRight, oy - back, wallLine);
    if (!left) B.line(model, ox, oy - back, ox, oy, wallLine);
    if (!right) B.line(model, ox + sW, oy - back, ox + sW, oy, wallLine);
    drawSegmentedLine(ox, ox + sW, oy, middleExtras);
  }
  if (left) {
    B.line(model, leftX, oy - back, leftX, oy - back + leftH, wallLine);
    B.line(model, leftX, oy - back + leftH, leftX + left, oy - back + leftH, wallLine);
    B.line(model, leftX + left, oy - back + leftH, leftX + left, oy, wallLine);
  }
  if (right) {
    B.line(model, rightX + right, oy - back, rightX + right, oy - back + rightH, wallLine);
    B.line(model, rightX + right, oy - back + rightH, rightX, oy - back + rightH, wallLine);
    B.line(model, rightX, oy - back + rightH, rightX, oy, wallLine);
  }
  middleExtras.forEach(item => {
    const wallBottom = oy + item.h;
    B.line(model, item.x1, oy, item.x1, wallBottom, wallLine);
    B.line(model, item.x1, wallBottom, item.x2, wallBottom, wallLine);
    B.line(model, item.x2, wallBottom, item.x2, oy, wallLine);
  });
}

function buildPlanRowDrawingModel(p, ox = 150, oy = 260, scale = null, labelPrefix = 'B', options = {}) {
  const B = requireDrawingBackendV1();
  const showGroupName = String(options.showGroupName || options.groupName || '');
  const c = compute(p);
  const W = c.totalRun;
  const D = p.depth;
  const fit = Number.isFinite(scale) && scale > 0 ? scale : Math.min(0.62, 620 / Math.max(1, W + c.wallT * 2), 760 / Math.max(1, D + c.wallT));
  const sW = W * fit;
  const sD = D * fit;
  const st = Math.max(3, p.tPanel * fit);
  const swt = c.wallT * fit;
  const model = B.createDrawingModel(Math.ceil(ox + sW + swt + 230), Math.ceil(oy + sD + st + 230));
  const panelGeoms = depthPanelGeometry(p, c, ox, oy, fit);
  backendDrawPlanWalls(B, model, ox, oy, sW, sD, swt, c, {
    left: panelGeoms[0]?.wallH || 0,
    right: panelGeoms[Math.max(1, Number(p.count) || 1)]?.wallH || 0,
    frontExtend: st,
    middle: panelGeoms.filter(item => !item.isEdge && item.wallH > 0).map(item => ({x1:item.wallX, x2:item.wallX + item.wallW, h:item.wallH}))
  });
  if (showGroupName && !(drawingForExport && options.tagPreviewOnly)) {
    const tagText = String(options.tagText || showGroupName);
    const isSingleBoothTag = Math.max(1, Number(p.count) || 1) === 1;
    const tagFontSize = isSingleBoothTag ? 30 : 42;
    const tagH = isSingleBoothTag ? 76 : PLAN_ANCHOR.noteTagH;
    const tagMinW = isSingleBoothTag ? 250 : PLAN_ANCHOR.noteTagMinW;
    const tagPadX = isSingleBoothTag ? 50 : 90;
    const approxTextW = tagText.length * tagFontSize;
    const tagW = Math.max(tagMinW, approxTextW + tagPadX);
    const totalY = oy - swt - (options.totalDimGap ?? PLAN_ANCHOR.totalDimGap);
    const tagGap = PLAN_ANCHOR.noteTagGap;
    const wallTopY = oy - swt;
    const tagY = isSingleBoothTag
      ? Math.max(totalY + tagGap, Math.min(wallTopY - tagH - tagGap, totalY + (wallTopY - totalY - tagH) / 2))
      : totalY - tagH - tagGap;
    B.rect(model, ox, tagY, tagW, tagH, {fill:'#fff', stroke:'#d64242', strokeWidth:1.2});
    B.text(model, tagText, ox + tagW / 2, tagY + tagH / 2, {fill:'#d64242', fontSize:tagFontSize, align:'middle', baseline:'central', className:'note-tag', maxWidth:Math.max(1, tagW - tagPadX), fitMode:'shrink'});
  }
  const drawDepthPanel = geom => {
    if (geom) B.rect(model, geom.panelX, geom.panelY, geom.panelW, Math.max(1, geom.panelH), {fill:'none', stroke:'#000', strokeWidth:0.8});
  };
  if (!c.hasLeft) drawDepthPanel(panelGeoms[0]);
  const doors = [];
  let boothX = ox;
  for (let i = 0; i < p.count; i++) {
    const bx = boothX;
    const boothMm = c.boothWidths[i] || c.boothW;
    const bw = boothMm * fit;
    const doorW = (c.doorInstallWidths[i] || c.doorWidths[i] || p.doorW) * fit;
    const gapLeft = c.gapPairs[i]?.[0] || 0;
    const gapRight = c.gapPairs[i]?.[1] || 0;
    const zoneStart = bx + (c.sidePairs[i]?.[0] || 0) * fit;
    const dsx = zoneStart + gapLeft * fit;
    const zoneEnd = dsx + doorW + gapRight * fit;
    const rebatePx = p.rebate ? Math.max(0, Number(p.rebateDepth) || 0) * fit : 0;
    const door = {start:dsx, end:dsx + doorW, bigStart:dsx - rebatePx, bigEnd:dsx + doorW + rebatePx, zoneStart, zoneEnd, width:doorW, boothX:bx, boothW:bw, swing:boothSwingAt(p, i), index:i, hasDoor:hasDoorAt(p, i)};
    doors.push(door);
    B.text(model, `${labelPrefix}${(options.labelStart || 0) + i + 1}`, bx + bw / 2, oy + sD / 2, {fill:'#185FA5', fontSize:44, fontWeight:'400', align:'middle', baseline:'central', className:'booth-label', maxWidth:Math.max(1, bw - 24), fitMode:'shrink'});
    if (!door.hasDoor) B.text(model, 'no door', bx + bw / 2, oy + sD / 2 + 54, {fill:'#d64242', fontSize:30, align:'middle', baseline:'central', className:'no-door-label', maxWidth:Math.max(1, bw - 24), fitMode:'shrink'});
    if (i < p.count - 1) drawDepthPanel(panelGeoms[i + 1]);
    boothX += bw;
  }
  if (doors.length && !p.rebate) {
    if (doors[0].zoneStart > ox + 0.5) B.rect(model, ox, oy + sD, doors[0].zoneStart - ox, st, {fill:'none', stroke:'#000', strokeWidth:0.8});
    for (let i = 0; i < doors.length - 1; i++) {
      const start = doors[i].zoneEnd;
      const end = doors[i + 1].zoneStart;
      if (end > start + 0.5) B.rect(model, start, oy + sD, end - start, st, {fill:'none', stroke:'#000', strokeWidth:0.8});
    }
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) B.rect(model, doors[doors.length - 1].zoneEnd, oy + sD, ox + sW - doors[doors.length - 1].zoneEnd, st, {fill:'none', stroke:'#000', strokeWidth:0.8});
  }
  if (!c.hasRight) drawDepthPanel(panelGeoms[p.count]);
  doors.filter(door => door.hasDoor !== false).forEach(door => backendDrawDoorSwing(B, model, door, oy + sD, st, p));
  const boardModel = buildBoardModel(p, c, doors, ox, sW, fit);
  backendDrawPlanRebateDetails(B, model, p, ox, oy, sW, sD, st, fit, boardModel);
  if (options.showTopDims !== false) backendDrawDim(B, model, ox, oy - swt - 70, ox + sW, oy - swt - 70, `${c.adjustedLength ? '展开总长' : '总长'} ${fmtMm(W)}mm`, 10, 38, 'total-dimension');
  if (options.showBoothDim !== false) {
    const boothY = oy + Math.max(26, sD * 0.18);
    let boothDimX = ox;
    for (let i = 0; i < p.count; i++) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const boothPx = boothMm * fit;
      backendDrawDim(B, model, boothDimX, boothY, boothDimX + boothPx, boothY, `${fmtMm(boothMm)}mm`, -10, 32, 'booth-width-dimension');
      boothDimX += boothPx;
    }
  }
  backendDrawDim(B, model, ox + sW + swt + 78, oy, ox + sW + swt + 78, oy + sD, `深 ${fmtMm(p.depth)}mm`, 14, 34, 'depth-dimension');
  const segments = [];
  if (doors.length) {
    if (doors[0].zoneStart > ox + 0.5) segments.push({x1:ox, x2:doors[0].zoneStart, label:fmtMm((doors[0].zoneStart - ox) / fit)});
    doors.forEach((door, i) => {
      segments.push({x1:door.bigStart, x2:door.bigEnd, label:fmtMm((door.bigEnd - door.bigStart) / fit)});
      const next = doors[i + 1];
      if (next && next.zoneStart > door.zoneEnd + 0.5) segments.push({x1:door.zoneEnd, x2:next.zoneStart, label:fmtMm((next.zoneStart - door.zoneEnd) / fit)});
    });
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) segments.push({x1:doors[doors.length - 1].zoneEnd, x2:ox + sW, label:fmtMm((ox + sW - doors[doors.length - 1].zoneEnd) / fit)});
  }
  backendDrawChainDim(B, model, oy + sD + st + 86, segments, 30, 'front-chain-dimension');
  return model;
}

function renderPlanRowBackendSvg(p = lastParams || getParams()) {
  return requireDrawingBackendV1().modelToSvg(buildPlanRowDrawingModel(p));
}

function renderPlanRowBackendCanvas(p = lastParams || getParams()) {
  const B = requireDrawingBackendV1();
  const model = buildPlanRowDrawingModel(p);
  const canvas = document.createElement('canvas');
  canvas.width = Math.ceil(model.width);
  canvas.height = Math.ceil(model.height);
  const rctx = canvas.getContext('2d');
  rctx.fillStyle = '#fff';
  rctx.fillRect(0, 0, canvas.width, canvas.height);
  B.renderToCanvas(rctx, model);
  return canvas;
}

function rasterizeSvgText(svgText, width, height) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = Math.ceil(width);
        canvas.height = Math.ceil(height);
        const rctx = canvas.getContext('2d');
        rctx.fillStyle = '#fff';
        rctx.fillRect(0, 0, canvas.width, canvas.height);
        rctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        resolve(canvas);
      } catch (err) {
        URL.revokeObjectURL(url);
        reject(err);
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('SVG rasterize failed'));
    };
    img.src = url;
  });
}

function canvasInkBounds(canvas, threshold = 245) {
  const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  let minX = canvas.width;
  let minY = canvas.height;
  let maxX = -1;
  let maxY = -1;
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const i = (y * canvas.width + x) * 4;
      const a = data[i + 3];
      if (a === 0) continue;
      if (data[i] < threshold || data[i + 1] < threshold || data[i + 2] < threshold) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  return maxX >= minX ? {x:minX, y:minY, w:maxX - minX + 1, h:maxY - minY + 1} : null;
}

function compareCanvasPixels(a, b, tolerance = 28) {
  if (!a || !b || a.width !== b.width || a.height !== b.height) {
    return {sameSize:false, mismatchRatio:1, maxDelta:255, compared:0, mismatched:0};
  }
  const ad = a.getContext('2d').getImageData(0, 0, a.width, a.height).data;
  const bd = b.getContext('2d').getImageData(0, 0, b.width, b.height).data;
  let mismatched = 0;
  let maxDelta = 0;
  const compared = a.width * a.height;
  for (let i = 0; i < ad.length; i += 4) {
    const delta = Math.max(
      Math.abs(ad[i] - bd[i]),
      Math.abs(ad[i + 1] - bd[i + 1]),
      Math.abs(ad[i + 2] - bd[i + 2]),
      Math.abs(ad[i + 3] - bd[i + 3])
    );
    if (delta > maxDelta) maxDelta = delta;
    if (delta > tolerance) mismatched += 1;
  }
  return {sameSize:true, mismatchRatio:mismatched / Math.max(1, compared), maxDelta, compared, mismatched};
}

function compareCanvasPixelRegions(a, b, regions = [], tolerance = 36) {
  if (!a || !b || a.width !== b.width || a.height !== b.height) return [];
  const ad = a.getContext('2d').getImageData(0, 0, a.width, a.height).data;
  const bd = b.getContext('2d').getImageData(0, 0, b.width, b.height).data;
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  return regions.map(region => {
    const x1 = clamp(Math.floor(region.x), 0, a.width);
    const y1 = clamp(Math.floor(region.y), 0, a.height);
    const x2 = clamp(Math.ceil(region.x + region.w), x1, a.width);
    const y2 = clamp(Math.ceil(region.y + region.h), y1, a.height);
    let mismatched = 0;
    let compared = 0;
    for (let y = y1; y < y2; y++) {
      for (let x = x1; x < x2; x++) {
        const i = (y * a.width + x) * 4;
        const delta = Math.max(
          Math.abs(ad[i] - bd[i]),
          Math.abs(ad[i + 1] - bd[i + 1]),
          Math.abs(ad[i + 2] - bd[i + 2]),
          Math.abs(ad[i + 3] - bd[i + 3])
        );
        compared += 1;
        if (delta > tolerance) mismatched += 1;
      }
    }
    return {...region, compared, mismatched, mismatchRatio:mismatched / Math.max(1, compared)};
  }).sort((aRegion, bRegion) => bRegion.mismatchRatio - aRegion.mismatchRatio);
}

function backendTextRegionsForModel(model, scaleX = 1, scaleY = scaleX, pad = 10) {
  const measure = document.createElement('canvas').getContext('2d');
  return (model?.commands || []).filter(cmd => cmd.type === 'text').map((cmd, index) => {
    const s = cmd.style || {};
    const fontSize = Math.max(1, Number(s.fontSize) || 12);
    measure.font = `${s.fontWeight || '400'} ${fontSize}px ${s.fontFamily || 'Microsoft YaHei, Arial, sans-serif'}`;
    const metrics = measure.measureText(String(cmd.value ?? ''));
    const textW = Math.max(fontSize * 0.8, metrics.width || 0);
    const textH = Math.max(fontSize, (metrics.actualBoundingBoxAscent || fontSize * 0.8) + (metrics.actualBoundingBoxDescent || fontSize * 0.2));
    const anchor = s.align || 'start';
    const baseline = s.baseline || 'alphabetic';
    let x = Number(cmd.x) || 0;
    let y = Number(cmd.y) || 0;
    let left = anchor === 'middle' ? x - textW / 2 : anchor === 'end' ? x - textW : x;
    let top = baseline === 'central' || baseline === 'middle' ? y - textH / 2 : baseline === 'top' || baseline === 'hanging' ? y : y - textH;
    let w = textW;
    let h = textH;
    if (s.rotate) {
      left = x - textH / 2;
      top = y - textW / 2;
      w = textH;
      h = textW;
    }
    const p = Math.max(2, pad);
    return {
      name:s.className || s.role || 'text',
      textIndex:index,
      x:(left - p) * scaleX,
      y:(top - p) * scaleY,
      w:(w + p * 2) * scaleX,
      h:(h + p * 2) * scaleY,
      value:String(cmd.value ?? ''),
      fontSize:fontSize * scaleY
    };
  });
}

function summarizeRegionComparisons(regions) {
  const out = {};
  (regions || []).forEach(region => {
    const item = out[region.name] || {count:0, compared:0, mismatched:0, worst:0};
    item.count += 1;
    item.compared += region.compared || 0;
    item.mismatched += region.mismatched || 0;
    item.worst = Math.max(item.worst, region.mismatchRatio || 0);
    out[region.name] = item;
  });
  Object.values(out).forEach(item => {
    item.mismatchRatio = item.mismatched / Math.max(1, item.compared);
  });
  return out;
}

function backendCommandRegionsForModel(model, scaleX = 1, scaleY = scaleX, pad = 4) {
  return (model?.commands || []).flatMap((cmd, index) => {
    const cls = cmd.style?.className || cmd.style?.role || '';
    if (cmd.type === 'text') return [];
    const stroke = Math.max(1, Number(cmd.style?.strokeWidth) || 1);
    const p = Math.max(pad, stroke + 2);
    const region = (name, x, y, w, h) => ({name, commandIndex:index, x:(x - p) * scaleX, y:(y - p) * scaleY, w:(w + p * 2) * scaleX, h:(h + p * 2) * scaleY});
    if (cmd.type === 'line') {
      const name = cls || 'line';
      const x = Math.min(cmd.x1, cmd.x2);
      const y = Math.min(cmd.y1, cmd.y2);
      return [region(name, x, y, Math.abs(cmd.x2 - cmd.x1), Math.abs(cmd.y2 - cmd.y1))];
    }
    if (cmd.type === 'rect') return [region(cls || 'rect', cmd.x, cmd.y, cmd.w, cmd.h)];
    if (cmd.type === 'path') {
      const pts = cmd.points || [];
      if (!pts.length) return [];
      const xs = pts.map(pt => pt.x);
      const ys = pts.map(pt => pt.y);
      return [region(cls || 'path', Math.min(...xs), Math.min(...ys), Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys))];
    }
    if (cmd.type === 'arc') return [region(cls || 'arc', cmd.cx - cmd.r, cmd.cy - cmd.r, cmd.r * 2, cmd.r * 2)];
    if (cmd.type === 'hatch') return [region(cls || 'hatch', cmd.x, cmd.y, cmd.w, cmd.h)];
    return [];
  });
}

function resizeCanvasForCompare(source, width, height) {
  if (source.width === width && source.height === height) return source;
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const rctx = canvas.getContext('2d');
  rctx.fillStyle = '#fff';
  rctx.fillRect(0, 0, width, height);
  rctx.drawImage(source, 0, 0, width, height);
  return canvas;
}

async function comparePlanRowBackendOutputs(p = lastParams || getParams()) {

  rctx.fillStyle = '#fff';
  rctx.fillRect(0, 0, canvas.width, canvas.height);
  B.renderToCanvas(rctx, model);
  const svg = B.modelToSvg(model);
  const svgCanvas = await rasterizeSvgText(svg, model.width, model.height);
  const canvasBounds = canvasInkBounds(canvas);
  const svgBounds = canvasInkBounds(svgCanvas);
  const pixels = compareCanvasPixels(canvas, svgCanvas);
  const boundsDelta = canvasBounds && svgBounds ? {
    x: Math.abs(canvasBounds.x - svgBounds.x),
    y: Math.abs(canvasBounds.y - svgBounds.y),
    w: Math.abs(canvasBounds.w - svgBounds.w),
    h: Math.abs(canvasBounds.h - svgBounds.h)
  } : null;
  return {
    width: model.width,
    height: model.height,
    commandCount: model.commands.length,
    commandTypes: [...new Set(model.commands.map(cmd => cmd.type))].sort(),
    textSummary: B.textSummary ? B.textSummary(model) : null,
    svgStarts: svg.startsWith('<svg'),
    canvasBounds,
    svgBounds,
    boundsDelta,
    pixels
  };
}

function backendPlanPagePlacement(page, layout, pageIndex = 0) {
  const landscape = pageNeedsLandscape(page);
  const P = layout.plot;
  const gaps = sheetContentGaps(pageIndex, landscape);
  const availableW = Math.max(1, P.w - gaps.left - gaps.right);
  const availableH = Math.max(1, P.h - gaps.top - gaps.bottom);
  const rawContentW = Math.max(1, page.usedW);
  const rawContentH = Math.max(1, page.usedH);
  const fit = Math.min(1, availableW / rawContentW, availableH / rawContentH);
  if (landscape) {
    const contentW = Math.max(1, rawContentW * fit);
    const contentH = Math.max(1, rawContentH * fit);
    return {
      fit,
      localX: P.x + gaps.left + Math.max(0, (availableW - contentW) / 2),
      localY: P.y + gaps.top + Math.max(0, (availableH - contentH) / 2),
      rowOffsetByY: new Map()
    };
  }
  const rowYs = [...new Set(page.blocks.map(block => block.pageY))].sort((a, b) => a - b);
  const contentW = Math.max(1, rawContentW * fit);
  const contentH = Math.max(1, rawContentH * fit);
  const bottomReserve = 48;
  const spareH = Math.max(0, availableH - contentH - bottomReserve);
  const visualRowGap = rowYs.length > 1 ? Math.min(24, spareH / (rowYs.length - 1)) : 0;
  const rawVisualRowGap = visualRowGap / Math.max(0.0001, fit);
  const rowOffsetByY = new Map(rowYs.map((y, index) => [y, rawVisualRowGap * index]));
  const adjustedContentH = contentH + visualRowGap * Math.max(0, rowYs.length - 1);
  const singleBoothPage = page.blocks.length === 1 && Math.max(1, Number(page.blocks[0]?.row?.count) || 1) === 1;
  return {
    fit,
    localX: P.x + gaps.left + Math.max(0, (availableW - contentW) / 2),
    localY: P.y + gaps.top + (singleBoothPage ? Math.max(0, (availableH - adjustedContentH) / 2) : 0),
    rowOffsetByY
  };
}

function buildPlanPageDrawingModel(p = lastParams || getParams(), pageIndex = currentPlanPage) {
  const B = requireDrawingBackendV1();
  const pages = getPlanPages(p);
  const safePageIndex = Math.max(0, Math.min(pageIndex, pages.length - 1));
  const page = pages[safePageIndex] || {blocks:[], usedW:1, usedH:1};
  const orientationPageIndex = planPageOrientationIndex(pages, safePageIndex);
  const layout = sheetLayoutForPage(page, p, safePageIndex);
  const model = B.createDrawingModel(layout.sheetW, layout.sheetH);
  backendAddSheetFrame(B, model, layout, 'Plan', safePageIndex, pages.length);
  const placement = backendPlanPagePlacement(page, layout, orientationPageIndex);
  page.blocks.forEach(block => {
    const visualY = block.pageY + (placement.rowOffsetByY.get(block.pageY) || 0);
    const rowModel = buildPlanRowDrawingModel(block.row, block.metrics.drawX, block.metrics.drawY, 1, groupLabelPrefix(block.group), {
      labelStart:block.labelStart || 0,
      showGroupName:String(block.row.note || '').trim(),
      tagText:String(block.row.note || '').trim(),
      tagPreviewOnly:!String(block.row.note || '').trim(),
      showTopDims:true,
      showBoothDim:true
    });
    B.appendModel(model, rowModel, placement.localX + block.pageX * placement.fit, placement.localY + visualY * placement.fit, placement.fit);
  });
  return model;
}

function buildSidePageDrawingModel(p = lastParams || getParams()) {
  const B = requireDrawingBackendV1();
  const layout = sheetLayoutForRender('side', p, 0);
  const model = B.createDrawingModel(layout.sheetW, layout.sheetH);
  backendAddSheetFrame(B, model, layout, 'Side', 0, 1);
  const c = compute(p);
  const P = layout.plot;
  const W = p.depth;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel;
  const wt = c.wallT;
  const fit = Math.min(1, (P.w - 300) / Math.max(1, W + wt), (P.h - 180) / Math.max(1, H));
  const ox = P.x + (P.w - W * fit) / 2;
  const floor = P.y + 118 + (P.h - 180 + H * fit) / 2;
  const oy = floor - H * fit;
  const sW = W * fit;
  const sH = H * fit;
  const st = Math.max(1.5, t * fit);
  const swt = wt * fit;
  const hU = p.hUpright * fit;
  const hDoor = (p.hDoor || 1750) * fit;
  const hMid = p.hMid * fit;
  const vis = p.hVis * fit;
  const doorH = p.doorW * fit;

  if (c.hasBack) {
    B.rect(model, ox, oy - swt, sW, swt, {fill:'#fbfbfb', stroke:'none'});
    B.hatch(model, ox, oy - swt, sW, swt, 18, {stroke:'rgba(0,0,0,.36)', strokeWidth:1});
    B.rect(model, ox, oy - swt, sW, swt, {fill:'none', stroke:'#000', strokeWidth:1});
  }
  B.rect(model, ox, floor - hU, st, hU, {fill:'none', stroke:'#000', strokeWidth:0.8});
  B.rect(model, ox + st, floor - hMid, sW - st * 2, vis, {fill:'none', stroke:'#6a9bcc', strokeWidth:0.6});
  B.text(model, '见光板', ox + st + (sW - st * 2) / 2, floor - hMid + vis / 2, {fill:'#185FA5', fontSize:14, align:'middle', baseline:'central', className:'side-visible-label'});
  const doorStartY = floor - doorH;
  B.rect(model, ox + sW - st, doorStartY, st, doorH, {fill:'none', stroke:'#185FA5', strokeWidth:1});
  B.text(model, '门', ox + sW - st / 2, doorStartY + doorH / 2, {fill:'#185FA5', fontSize:14, align:'middle', baseline:'central', className:'side-door-label'});
  B.rect(model, ox + sW - st, floor - hU, st, hU - doorH, {fill:'none', stroke:'#000', strokeWidth:0.8});
  B.line(model, ox, floor, ox + sW, floor, {stroke:'#000', strokeWidth:1});
  B.rect(model, ox, oy, sW, sH, {fill:'none', stroke:'#000', strokeWidth:1.2});
  backendDrawDim(B, model, ox, oy - 42, ox + sW, oy - 42, `深度 ${p.depth}mm`, 14, 14, 'side-depth-dimension');
  backendDrawDim(B, model, ox - 34, floor - hU, ox - 34, floor, `立板高 ${p.hUpright}mm`, -14, 14, 'side-upright-dimension');
  backendDrawDim(B, model, ox + sW + 34, floor - hDoor, ox + sW + 34, floor, `门高 ${p.hDoor || 1750}mm`, 14, 14, 'side-door-height-dimension');
  return model;
}

  const backendBounds = canvasInkBounds(backendSized);
  const pixels = compareCanvasPixels(production, backendSized, 36);
  const regions = compareCanvasPixelRegions(production, backendSized, [
    {name:'sheet-note', x:0, y:0, w:production.width, h:120},
    {name:'plan-body', x:0, y:120, w:production.width, h:production.height - 260},
    {name:'bottom-dims', x:0, y:production.height - 260, w:production.width, h:190},
    {name:'footer', x:0, y:production.height - 70, w:production.width, h:70}
  ], 36);
  const textRegions = compareCanvasPixelRegions(production, backendSized, backendTextRegionsForModel(model, textScaleX, textScaleY, 12), 36);
  const commandRegions = compareCanvasPixelRegions(production, backendSized, backendCommandRegionsForModel(model, textScaleX, textScaleY, 4), 36);
  return {
    width: production.width,
    height: production.height,
    productionBounds,
    backendBounds,
    boundsDelta: productionBounds && backendBounds ? {
      x: Math.abs(productionBounds.x - backendBounds.x),
      y: Math.abs(productionBounds.y - backendBounds.y),
      w: Math.abs(productionBounds.w - backendBounds.w),
      h: Math.abs(productionBounds.h - backendBounds.h)
    } : null,
    pixels,
    regions,
    textRegions: summarizeRegionComparisons(textRegions),
    commandRegions: summarizeRegionComparisons(commandRegions)
  };
}

function compareBackendSheetToProductionCanvas(tab = currentTab, p = lastParams || getParams(), options = {}) {
  const production = renderSheetCanvas(tab, p, {canvasMode:'sheets', renderScale:1, ...options});
  const backend = renderBackendSheetCanvas(tab, p, options);
  const backendSized = resizeCanvasForCompare(backend, production.width, production.height);
  const model = buildBackendSheetDrawingModel(tab, p, options);
  const textScaleX = production.width / Math.max(1, model.width || production.width);
  const textScaleY = production.height / Math.max(1, model.height || production.height);
  const productionBounds = canvasInkBounds(production);
  const backendBounds = canvasInkBounds(backendSized);
  const regions = compareCanvasPixelRegions(production, backendSized, [
    {name:'header', x:0, y:0, w:production.width, h:130},
    {name:'plot-top', x:0, y:130, w:production.width, h:220},
    {name:'plot-mid', x:0, y:350, w:production.width, h:420},
    {name:'plot-bottom', x:0, y:770, w:production.width, h:260},
    {name:'footer', x:0, y:1030, w:production.width, h:Math.max(0, production.height - 1030)}
  ], 36);
  return {
    tab,
    width: production.width,
    height: production.height,
    productionBounds,
    backendBounds,
    boundsDelta: productionBounds && backendBounds ? {
      x: Math.abs(productionBounds.x - backendBounds.x),
      y: Math.abs(productionBounds.y - backendBounds.y),
      w: Math.abs(productionBounds.w - backendBounds.w),
      h: Math.abs(productionBounds.h - backendBounds.h)
    } : null,
    pixels: compareCanvasPixels(production, backendSized, 36),
    regions,
    textRegions: summarizeRegionComparisons(compareCanvasPixelRegions(production, backendSized, backendTextRegionsForModel(model, textScaleX, textScaleY, 12), 36)),
    commandRegions: summarizeRegionComparisons(compareCanvasPixelRegions(production, backendSized, backendCommandRegionsForModel(model, textScaleX, textScaleY, 4), 36))
  };
}

function compareBackendAllSheetsToProduction(p = lastParams || getParams()) {
  const planPages = getSheetPlanPages(p);

  ];
}

async function runSvgBackendScenarioMatrix() {
  const oldGroups = groups;
  const oldLast = lastParams;
  const oldActiveGroupId = activeGroupId;
  const oldActiveRowId = activeRowId;
  const makeRow = (id, overrides = {}) => {
    const count = Math.max(1, Number(overrides.count ?? defaultRow.count) || 1);
    const row = {
      ...defaultRow,
      id,
      enabled:true,
      count,
      total:Number(overrides.total ?? count * 1000),
      depth:Number(overrides.depth ?? defaultRow.depth),
      doorW:Number(overrides.doorW ?? defaultRow.doorW),
      doorGap:Number(overrides.doorGap ?? defaultRow.doorGap),
      wall:overrides.wall || defaultRow.wall,
      rebate:overrides.rebate === true,
      rebateDepth:Number(overrides.rebateDepth ?? defaultRow.rebateDepth),
      note:overrides.note || '',
      widthsText:overrides.widthsText || ''
    };
    row.boothSwings = normalizeBoothSwings(overrides.boothSwings || row.boothSwings, count, row.swing || swingMode);
    row.noDoorBooths = normalizeNoDoorBooths(overrides.noDoorBooths || row.noDoorBooths, count);
    row.depthPanelSpecials = normalizeDepthPanelSpecials(overrides.depthPanelSpecials || row.depthPanelSpecials, count + 1);
    return row;
  };
  const scenarios = [
    {name:'plain-3', row:makeRow(8001, {note:'Plain', boothSwings:['in-right','in-left','out-right']})},
    {name:'rebate-3', row:makeRow(8002, {note:'Rebate', rebate:true, boothSwings:['in-right','in-left','out-right']})},
    {name:'no-door-3', row:makeRow(8003, {note:'No door', noDoorBooths:[false,true,false], boothSwings:['in-right','in-left','out-right']})},
    {name:'left-wall-4', row:makeRow(8004, {note:'Left wall', count:4, total:4200, wall:'left', boothSwings:['in-right','out-left','in-left','out-right']})},
    {name:'back-wall-5', row:makeRow(8005, {note:'Back wall', count:5, total:5200, wall:'back', boothSwings:['in-right','in-left','out-right','out-left','in-right']})},
    {name:'wide-10', row:makeRow(8006, {note:'Wide', count:10, total:10000, boothSwings:['in-right','in-left','out-right','out-left','in-right','in-left','out-right','out-left','in-right','in-left']})}
  ];
  try {
    const results = [];
    for (const scenario of scenarios) {
      groups = [{id:scenario.row.id, name:scenario.name, rows:[scenario.row]}];
      activeGroupId = scenario.row.id;
      activeRowId = scenario.row.id;
      lastParams = scenario.row;
      const baseLayout = getSheetLayout(scenario.row);
      const pages = paginatePlanBlocks(collectPlanBlocks(scenario.row).filter(block => block.row.enabled === true), baseLayout);
      const pageResults = [];
      for (let pageIndex = 0; pageIndex < pages.length; pageIndex++) {
        const production = comparePlanPageToProductionCanvas(scenario.row, pageIndex);
        const backend = await comparePlanPageBackendOutputs(scenario.row, pageIndex);
        pageResults.push({
          pageIndex,
          productionMismatch: production.pixels.mismatchRatio,
          productionMaxDelta: production.pixels.maxDelta,
          productionBoundsDelta: production.boundsDelta,
          worstRegion: production.regions[0] || null,
          textRegions: production.textRegions,
          commandRegions: production.commandRegions,
          backendMismatch: backend.pixels.mismatchRatio,
          backendMaxDelta: backend.pixels.maxDelta,
          backendBoundsDelta: backend.boundsDelta,
          commandCount: backend.commandCount,
          commandTypes: backend.commandTypes,
          textSummary: backend.textSummary
        });
      }
      results.push({name:scenario.name, pageCount:pages.length, pages:pageResults});
    }
    return results;
  } finally {
    groups = oldGroups;
    lastParams = oldLast;
    activeGroupId = oldActiveGroupId;
    activeRowId = oldActiveRowId;
  }
}

function buildPrototypePlanDrawingModel(p = lastParams || getParams()) {
  const B = window.DrawingBackendV1;
  if (!B) throw new Error('DrawingBackendV1 未加载');
  const model = B.createDrawingModel(900, 1200);
  const c = compute(p);
  const scale = Math.min(0.62, 560 / Math.max(1, c.totalRun), 760 / Math.max(1, p.depth));
  const ox = 150;
  const oy = 260;
  const sW = c.totalRun * scale;
  const sD = p.depth * scale;
  const swt = c.wallT * scale;
  const st = Math.max(3, p.tPanel * scale);
  const doorW = (c.doorInstallWidths?.[0] || c.doorWidths?.[0] || p.doorW) * scale;
  const doorX = ox + (sW - doorW) / 2;
  B.rect(model, 40, 40, 820, 76, {fill:'#fff', stroke:'#c7cbd1', strokeWidth:1});
  if (c.hasBack) {
    B.rect(model, ox - (c.hasLeft ? swt : 0), oy - swt, sW + (c.hasLeft ? swt : 0) + (c.hasRight ? swt : 0), swt, {fill:'#fbfbfb', stroke:'none'});
    B.hatch(model, ox - (c.hasLeft ? swt : 0), oy - swt, sW + (c.hasLeft ? swt : 0) + (c.hasRight ? swt : 0), swt, 28, {stroke:'rgba(0,0,0,.24)', strokeWidth:1});
  }
  if (c.hasLeft) {
    B.rect(model, ox - swt, oy - swt, swt, sD + swt + st, {fill:'#fbfbfb', stroke:'none'});
    B.hatch(model, ox - swt, oy - swt, swt, sD + swt + st, 28, {stroke:'rgba(0,0,0,.24)', strokeWidth:1});
  }
  if (c.hasRight) {
    B.rect(model, ox + sW, oy - swt, swt, sD + swt + st, {fill:'#fbfbfb', stroke:'none'});
    B.hatch(model, ox + sW, oy - swt, swt, sD + swt + st, 28, {stroke:'rgba(0,0,0,.24)', strokeWidth:1});
  }
  B.line(model, ox - (c.hasLeft ? swt : 0), oy - swt, ox + sW + (c.hasRight ? swt : 0), oy - swt, {stroke:'#000', strokeWidth:1.4});
  B.line(model, ox - swt, oy - swt, ox - swt, oy + sD + st, {stroke:'#000', strokeWidth:1.4});
  B.line(model, ox + sW + swt, oy - swt, ox + sW + swt, oy + sD + st, {stroke:'#000', strokeWidth:1.4});
  B.line(model, ox, oy + sD, doorX, oy + sD, {stroke:'#000', strokeWidth:0.8});
  B.line(model, doorX + doorW, oy + sD, ox + sW, oy + sD, {stroke:'#000', strokeWidth:0.8});
  B.rect(model, doorX, oy + sD - st / 2, doorW, st / 2, {fill:'none', stroke:'#8EC5FF', strokeWidth:0.8});
  B.arc(model, doorX + doorW, oy + sD - st / 2, doorW, Math.PI, Math.PI * 1.5, {stroke:'#8EC5FF', strokeWidth:2, dash:[12, 8]});
  B.text(model, 'A1', ox + sW / 2, oy + sD / 2, {fill:'#185FA5', fontSize:44, fontWeight:'400', align:'middle', baseline:'central'});
  B.line(model, ox, oy - swt - 70, ox + sW, oy - swt - 70, {stroke:'#000', strokeWidth:1.2});
  B.line(model, ox, oy - swt - 84, ox, oy - swt - 56, {stroke:'#000', strokeWidth:1.2});
  B.line(model, ox + sW, oy - swt - 84, ox + sW, oy - swt - 56, {stroke:'#000', strokeWidth:1.2});
  B.text(model, `总长 ${fmtMm(c.totalRun)}mm`, ox + sW / 2, oy - swt - 92, {fill:'#000', fontSize:42, fontWeight:'400', align:'middle', baseline:'alphabetic'});
  B.line(model, ox, oy + sD + 70, doorX, oy + sD + 70, {stroke:'#000', strokeWidth:1.2});
  B.line(model, doorX, oy + sD + 70, doorX + doorW, oy + sD + 70, {stroke:'#000', strokeWidth:1.2});
  B.line(model, doorX + doorW, oy + sD + 70, ox + sW, oy + sD + 70, {stroke:'#000', strokeWidth:1.2});
  B.text(model, fmtMm((doorX - ox) / scale), (ox + doorX) / 2, oy + sD + 120, {fill:'#000', fontSize:38, align:'middle', baseline:'central'});
  B.text(model, fmtMm(doorW / scale), doorX + doorW / 2, oy + sD + 120, {fill:'#000', fontSize:38, align:'middle', baseline:'central'});
  B.text(model, fmtMm((ox + sW - doorX - doorW) / scale), (doorX + doorW + ox + sW) / 2, oy + sD + 120, {fill:'#000', fontSize:38, align:'middle', baseline:'central'});
  B.line(model, ox + sW + swt + 78, oy, ox + sW + swt + 78, oy + sD, {stroke:'#000', strokeWidth:1.2});
  B.line(model, ox + sW + swt + 64, oy, ox + sW + swt + 92, oy, {stroke:'#000', strokeWidth:1.2});
  B.line(model, ox + sW + swt + 64, oy + sD, ox + sW + swt + 92, oy + sD, {stroke:'#000', strokeWidth:1.2});
  B.text(model, `深 ${fmtMm(p.depth)}mm`, ox + sW + swt + 126, oy + sD / 2, {fill:'#000', fontSize:38, align:'middle', baseline:'central', rotate:90});
  return model;
}

function downloadTextFile(content, filename, mime = 'image/svg+xml;charset=utf-8') {
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  downloadUrl(url, filename, filename, 60000);
}

async function exportNamedPdf(name = '隔断图纸', scope = 'current', includeBom = false) {
  const title = sanitizeExportName(name, '隔断图纸');
  try {
    saveActiveGroup(true);
    const p = getParams();
    lastParams = p;
    const {PDFDocument} = await loadPdfLib();
    const pdfDoc = await PDFDocument.create();
    const jobs = drawingJobsForScope(p, scope);
    for (const job of jobs) {
      const renderPlanPage = Number.isFinite(job.options.planPage) ? job.options.planPage : currentPlanPage;
      const layout = sheetLayoutForRender(job.tab, p, renderPlanPage);
      const canvas = renderSheetCanvas(job.tab, p, {...job.options, canvasMode:'sheets', renderScale:PDF_RENDER_SCALE});
      await addCanvasPageToPdf(pdfDoc, canvas, pdfPageSizePoints(layout.sheetW > layout.sheetH));
    }
    if (includeBom) {
      const bomCanvas = renderBomCanvas(`${title}-开料清单`);
      await addBomCanvasPageToPdf(pdfDoc, bomCanvas, pdfPageSizePoints(false));
    }
    downloadPdfBytes(await pdfDoc.save(), title);
  } catch (err) {
    alert(`导出PDF失败：${err.message || err}`);
  }
}

function bomSvgMarkup(title = '开料清单') {
  const safeTitle = sanitizeExportName(title, '开料清单');
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;left:-10000px;top:0;width:900px;visibility:hidden;pointer-events:none';
  probe.innerHTML = bomSnapshotHtml(safeTitle);
  document.body.appendChild(probe);
  const height = Math.ceil(probe.firstElementChild?.getBoundingClientRect().height || 600);

  return `<svg xmlns="http://www.w3.org/2000/svg" width="900" height="${height}" viewBox="0 0 900 ${height}"><foreignObject width="900" height="${height}">${bomSnapshotHtml(safeTitle)}</foreignObject></svg>`;
}

function bomPrintDocumentHtml(title = '开料清单', mode = 'canvas') {

  const canvas = renderBomCanvas(safeTitle, {scale:BOM_RENDER_SCALE});
  const image = canvas.toDataURL('image/png');
  return `<!doctype html><html><head><meta charset="utf-8"><title>${escapeHtml(safeTitle)}</title><style>@page{size:${paper.label} portrait;margin:0}html,body{margin:0;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}.bom-print-page{box-sizing:border-box;width:${paper.w}mm;min-height:${paper.h}mm;padding:8mm;background:#fff;display:flex;align-items:flex-start;justify-content:center}.bom-print-page img{display:block;width:100%;height:auto}</style></head><body><section class="bom-print-page"><img alt="${escapeAttr(safeTitle)}" src="${image}"></section></body></html>`;
}

function exportBomDomImage(name = '开料清单') {
  const title = sanitizeExportName(name, '开料清单');
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;left:-10000px;top:0;width:900px;visibility:hidden;pointer-events:none';
  probe.innerHTML = bomSnapshotHtml(title);
  document.body.appendChild(probe);
  const target = probe.firstElementChild;
  const width = 900;
  const height = Math.ceil(target.getBoundingClientRect().height || 600);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}"><foreignObject width="100%" height="100%">${bomSnapshotHtml(title)}</foreignObject></svg>`;
  const img = new Image();
  const url = URL.createObjectURL(new Blob([svg], {type:'image/svg+xml;charset=utf-8'}));
  let done = false;
  const cleanup = () => {
    URL.revokeObjectURL(url);
    probe.remove();
  };
  const fallback = () => {
    if (done) return;
    done = true;
    cleanup();
    exportBomCanvasImage(title);
  };
  img.onload = () => {
    if (done) return;
    done = true;
    const scale = BOM_RENDER_SCALE;
    const canvas = document.createElement('canvas');
    canvas.width = Math.ceil(width * scale);
    canvas.height = Math.ceil(height * scale);
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    try {
      ctx.drawImage(img, 0, 0, width, height);
      cleanup();
      downloadCanvasPng(canvas, title);
    } catch (err) {
      cleanup();
      exportBomCanvasImage(title);
    }
  };
  img.onerror = fallback;
  img.src = url;
  window.setTimeout(fallback, 900);
}

function wrapCanvasText(ctx, text, maxWidth) {
  const source = String(text || '');
  const rows = [];
  let line = '';
  for (const ch of source) {
    const next = line + ch;
    if (line && ctx.measureText(next).width > maxWidth) {
      rows.push(line);
      line = ch;
    } else {
      line = next;
    }
  }
  if (line) rows.push(line);
  return rows.length ? rows : [''];
}

function roundRectPath(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function drawBomCanvasStructuredLine(ctx, line, x, y, maxWidth) {
  const textY = y + 11;
  if (line.plain) {
    const rows = wrapCanvasText(ctx, line.plain, maxWidth - 18);
    rows.forEach((text, index) => {
      if (index === 0) {
        ctx.fillStyle = '#57606a';
        ctx.beginPath();
        ctx.arc(x + 6, textY, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.fillText(text, x + 20, textY);
      y += 22;
    });
    return y;
  }
  const process = line.process || '';
  const heightText = line.height ? `${line.height} x ` : '';
  const sizeText = line.size || '';
  const processW = process ? Math.max(44, Math.ceil(ctx.measureText(process).width) + 8) : 0;
  const heightW = heightText ? Math.max(58, Math.ceil(ctx.measureText(heightText).width) + 8) : 0;
  ctx.fillStyle = '#57606a';
  ctx.beginPath();
  ctx.arc(x + 6, textY, 3, 0, Math.PI * 2);
  ctx.fill();
  const contentX = x + 20;
  if (process) {
    ctx.fillStyle = '#185FA5';
    ctx.font = '800 14px Microsoft YaHei, Arial, sans-serif';
    ctx.fillText(process, contentX, textY);
  }
  ctx.fillStyle = '#000';
  ctx.font = '14px Microsoft YaHei, Arial, sans-serif';
  if (!line.continued && heightText) ctx.fillText(heightText, contentX + processW, textY);
  ctx.fillText(sizeText, contentX + processW + heightW, textY);
  return y + 22;
}

function renderBomCanvas(name = '开料清单', options = {}) {
  const title = sanitizeExportName(name, '开料清单');
  const items = collectBomImageItems();
  const width = 900;
  const pad = 30;
  const cardGap = 12;
  const lineH = 22;
  const frontTitleW = 100;
  const frontCellW = 54;
  const frontCellH = 24;
  const frontGapX = 7;
  const frontGapY = 7;
  const frontCols = 8;
  const scale = Math.max(1, Number(options.scale || 0) || BOM_RENDER_SCALE);
  const measure = document.createElement('canvas').getContext('2d');
  measure.font = '15px Microsoft YaHei, Arial, sans-serif';
  const cardInnerW = width - pad * 2 - 24;
  let height = pad + 50;
  items.forEach(item => {
    let cardH = 42;
    if (item.mobileGroups?.length) {
      item.mobileGroups.forEach(group => {
        const rows = Math.max(1, Math.ceil((group.tags.length || 1) / frontCols));
        cardH += Math.max(frontCellH, rows * frontCellH + (rows - 1) * frontGapY) + 10;
      });
    } else {
      const lines = item.lines.length ? item.lines : [{plain:'无'}];
      lines.forEach(line => {
        if (line.gap) cardH += 10;
        else cardH += line.plain ? wrapCanvasText(measure, line.plain, cardInnerW - 18).length * lineH : lineH;
      });
    }
    item._cardH = cardH + 10;
    height += item._cardH + cardGap;
  });
  height += pad;
  const out = document.createElement('canvas');
  out.width = Math.ceil(width * scale);
  out.height = Math.ceil(height * scale);
  out.dataset.logicalWidth = String(width);
  out.dataset.logicalHeight = String(height);
  const outCtx = out.getContext('2d');
  outCtx.scale(scale, scale);
  outCtx.textBaseline = 'middle';
  outCtx.fillStyle = '#fff';
  outCtx.fillRect(0, 0, width, height);
  outCtx.fillStyle = '#000';
  outCtx.font = '700 28px Microsoft YaHei, Arial, sans-serif';
  outCtx.fillText(title, pad, pad + 20);
  outCtx.strokeStyle = '#d0d7de';
  outCtx.lineWidth = 1;
  outCtx.beginPath();
  outCtx.moveTo(pad, pad + 46);
  outCtx.lineTo(width - pad, pad + 46);
  outCtx.stroke();
  let y = pad + 60;
  items.forEach(item => {
    roundRectPath(outCtx, pad, y, width - pad * 2, item._cardH, 8);
    outCtx.fillStyle = '#fff';
    outCtx.fill();
    outCtx.strokeStyle = '#d8dee4';
    outCtx.stroke();
    outCtx.fillStyle = '#000';
    outCtx.font = '700 17px Microsoft YaHei, Arial, sans-serif';
    outCtx.fillText(item.name || '材料', pad + 14, y + 23);
    outCtx.fillStyle = '#0C447C';
    outCtx.font = '700 15px Microsoft YaHei, Arial, sans-serif';
    outCtx.textAlign = 'right';
    outCtx.fillText(item.val || '', width - pad - 14, y + 23);
    outCtx.textAlign = 'left';
    let lineY = y + 50;
    if (item.mobileGroups?.length) {
      item.mobileGroups.forEach(group => {
        outCtx.fillStyle = '#185FA5';
        outCtx.font = '900 13px Microsoft YaHei, Arial, sans-serif';
        outCtx.fillText(group.title || '', pad + 14, lineY + frontCellH / 2);
        outCtx.font = '800 13px Microsoft YaHei, Arial, sans-serif';
        const tags = group.tags.length ? group.tags : ['无'];
        tags.forEach((tag, index) => {
          const col = index % frontCols;
          const row = Math.floor(index / frontCols);
          const x = pad + 14 + frontTitleW + 8 + col * (frontCellW + frontGapX);
          const ty = lineY + row * (frontCellH + frontGapY);
          roundRectPath(outCtx, x, ty, frontCellW, frontCellH, 5);
          outCtx.fillStyle = '#F6F8FA';
          outCtx.fill();
          outCtx.fillStyle = '#000';
          outCtx.textAlign = 'center';
          outCtx.fillText(String(tag), x + frontCellW / 2, ty + frontCellH / 2);
          outCtx.textAlign = 'left';
        });
        const rows = Math.max(1, Math.ceil(tags.length / frontCols));
        lineY += Math.max(frontCellH, rows * frontCellH + (rows - 1) * frontGapY) + 10;
      });
    } else {
      outCtx.font = '14px Microsoft YaHei, Arial, sans-serif';
      outCtx.fillStyle = '#000';
      const lines = item.lines.length ? item.lines : [{plain:'无'}];
      lines.forEach(line => {
        if (line.gap) {
          lineY += 10;
          return;
        }
        lineY = drawBomCanvasStructuredLine(outCtx, line, pad + 14, lineY, cardInnerW - 18);
      });
    }
    y += item._cardH + cardGap;
  });
  return out;
}

function openExportDialog(mode) {

  const title = document.getElementById('export-modal-title');
  const confirmBtn = document.getElementById('export-confirm-btn');

  if (title) title.textContent = label;
  if (input) input.value = mode === 'bom' ? '开料清单' : mode === 'all-image' ? '隔断全部视图' : (mode === 'pdf' || mode === 'print' || mode === 'svg' || mode === 'svg-print' || mode === 'svg-pdf') ? '隔断图纸' : `隔断${currentViewLabel()}`;
  if (input) input.style.display = (mode === 'print' || mode === 'svg-print' || mode === 'svg-pdf') ? 'none' : '';

  if (confirmBtn) confirmBtn.textContent = (mode === 'print' || mode === 'svg-print' || mode === 'svg-pdf') ? '确认打印' : '确认导出';

function confirmNamedExport() {
  const input = document.getElementById('export-file-name');
  const name = sanitizeExportName(input?.value, '隔断图纸');
  if (shouldUseExternalMobileTab()) reserveMobileExportTab((pendingExportMode || '').includes('print') ? '打印图纸' : name);
  closeProjectModal('export-modal');
  if (pendingExportMode === 'bom') {
    try { exportBomImage(name); }
    catch (err) { alert(`导出图片失败：${err.message || err}`); }
    return;
  }
  if (pendingExportMode === 'all-image') {
    exportNamedAllImages(name);
    return;
  }
  if (pendingExportMode === 'pdf') {
    const scope = document.querySelector('input[name="export-scope"]:checked')?.value || 'current';
    exportNamedPdf(name, scope, false);
    return;
  }
  if (pendingExportMode === 'svg') {
    const scope = document.querySelector('input[name="export-scope"]:checked')?.value || 'current';
    exportNamedSvg(name, scope);
    return;
  }
  if (pendingExportMode === 'svg-print') {
    const scope = document.querySelector('input[name="export-scope"]:checked')?.value || 'current';
    directSvgPrint(scope, false);
    return;
  }
  if (pendingExportMode === 'svg-pdf') {
    const scope = document.querySelector('input[name="export-scope"]:checked')?.value || 'current';
    exportSvgPdfViaPrint(scope, false);
    return;
  }
  if (pendingExportMode === 'print') {
    const scope = document.querySelector('input[name="export-scope"]:checked')?.value || 'current';
    directCanvasPrint(scope, false);
    return;
  }
  exportNamedImage(name, false);
}

function isMobileViewport() {
