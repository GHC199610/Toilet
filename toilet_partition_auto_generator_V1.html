function drawSegmentedPlan(p, c) {
  const segmentSize = c.segmentSize;
  const segments = Math.ceil(p.count / segmentSize);
  const gapY = 64;
  const rowH = Math.min(128, (PLOT.h - 150 - gapY * (segments - 1)) / segments);
  const startY = PLOT.y + 92;
  ctx.fillStyle = '#656d76';
  ctx.font = `12px 'Microsoft YaHei', Arial, sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`共 ${p.count} 间，按每段最多 ${segmentSize} 间分段显示。`, PLOT.x + 18, PLOT.y + 58);

  for (let s = 0; s < segments; s++) {
    const count = Math.min(segmentSize, p.count - s * segmentSize);
    const segP = {...p, count, total: count * c.boothW};
    const segC = compute(segP);
    const W = segC.totalRun, D = p.depth;
    const wt = segC.wallT, t = p.tPanel;
    const leftWall = segC.hasLeft ? wt : 0;
    const rightWall = segC.hasRight ? wt : 0;
    const backWall = segC.hasBack ? wt : 0;
    const scale = Math.min((PLOT.w - 180) / (W + leftWall + rightWall), rowH / (D + backWall));
    const ox = PLOT.x + 100 + leftWall * scale;
    const oy = startY + s * (rowH + gapY) + backWall * scale;
    const sW = W * scale, sD = D * scale, st = Math.max(1.3, t * scale), swt = wt * scale;
    const firstNo = s * segmentSize + 1;

    drawPlanWalls(ox, oy, sW, sD, swt, segC);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.1; ctx.strokeRect(ox, oy, sW, sD);
    let x = ox;
    if (!segC.hasLeft) { ctx.strokeRect(x, oy, st, sD); x += st; }
    for (let i = 0; i < count; i++) {
      const bw = segC.boothW * scale;
      const doorW = (segC.doorInstallWidths[i] || segC.doorWidths[i] || p.doorW) * scale;
      const dsx = x + (bw - doorW) / 2;
      drawDoorSwing({start:dsx, end:dsx + doorW, width:doorW, swing:boothSwingAt(p, i)}, oy + sD, st, p);
      ctx.fillStyle = '#185FA5'; ctx.font = `bold 14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`B${firstNo + i}`, x + bw / 2, oy + sD / 2);
      x += bw;
      if (i < count - 1) { ctx.strokeStyle = '#222'; ctx.strokeRect(x, oy, st, sD); x += st; }
    }
    if (!segC.hasRight) ctx.strokeRect(x, oy, st, sD);
    drawDim(ox, oy - swt - 38, ox + sW, oy - swt - 38, `第 ${s + 1} 段：B${firstNo}-B${firstNo + count - 1} / ${W}mm`, 12);
  }
}

function drawPlanRow(p, ox, oy, scale, labelPrefix = 'B', showGroupName = '', options = {}) {
  const c = compute(p);
  const W = c.totalRun, D = p.depth;
  const t = p.tPanel, wt = c.wallT;
  const wtPx = wt * scale;
  const sW = W * scale, sD = D * scale, st = Math.max(3, t * scale), swt = wt * scale;

  ctx.strokeStyle = '#222222'; ctx.lineWidth = 0.8;
  ctx.strokeRect(ox, oy, sW, sD);

  drawPlanWalls(ox, oy, sW, sD, swt, c);
  const rowSelected = options.groupId === activeGroupId && (
    selectionScope === 'group' ||
    (selectionScope === 'row' && options.rowId === activeRowId)
  );
  if (rowSelected) {
    ctx.save();
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 1.4;
    ctx.setLineDash([10, 5]);
    ctx.strokeRect(ox - 6, oy - 6, sW + 12, sD + 12);
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (showGroupName) {
    ctx.save();
    const tagText = showGroupName;
    ctx.font = `13px 'Microsoft YaHei', Arial, sans-serif`;
    const tagW = Math.max(68, ctx.measureText(tagText).width + 18);
    const tagH = 22;
    const tagX = options.labelX ?? (ox - tagW - 24);
    const tagY = options.labelY ?? (oy - Math.min(12, swt));
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#d64242';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.rect(tagX, tagY, tagW, tagH);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#d64242';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tagText, tagX + tagW / 2, tagY + tagH / 2);
    ctx.restore();
  }

  let x = ox;
  if (!c.hasLeft) {
    ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
    ctx.strokeRect(x, oy, st, Math.max(1, sD - st));
  }
  const doors = [];
  let boothX = ox;
  for (let i=0; i<p.count; i++) {
    const bx = boothX;
    const boothMm = c.boothWidths[i] || c.boothW;
    const bw = boothMm * scale;
    const doorW = (c.doorInstallWidths[i] || c.doorWidths[i] || p.doorW) * scale;
    const gapLeft = c.gapPairs[i]?.[0] || 0;
    const gapRight = c.gapPairs[i]?.[1] || 0;
    const zoneStart = bx + (c.sidePairs[i]?.[0] || 0) * scale;
    const dsx = zoneStart + gapLeft * scale, dsw = doorW;
    const zoneEnd = dsx + dsw + gapRight * scale;
    if (options.groupId && options.rowId) {
      planHitAreas.push({x:bx, y:oy, w:bw, h:sD, groupId:options.groupId, rowId:options.rowId, index:i});
    }
    doors.push({start: dsx, end: dsx + dsw, zoneStart, zoneEnd, gapLeft: gapLeft * scale, gapRight: gapRight * scale, width: dsw, boothX: bx, boothW: bw, swing: boothSwingAt(p, i)});
    const currentLabelNo = (options.labelStart || 0) + i + 1;
    if (isSelectedBooth(options.groupId ?? activeGroupId, options.rowId ?? activeRowId, i)) {
      const cx = bx + bw / 2, cy = oy + sD / 2;
      ctx.strokeStyle = '#185FA5'; ctx.lineWidth = 0.8;
      ctx.strokeRect(cx - 20, cy - 14, 40, 28);
    }
    ctx.fillStyle='#185FA5'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`18px 'Microsoft YaHei', Arial, sans-serif`;
    ctx.fillText(`${labelPrefix}${currentLabelNo}`, bx+bw/2, oy+sD/2);
    if (i < p.count - 1) {
      ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
      const panelX = bx + bw - st / 2;
      ctx.strokeRect(panelX, oy, st, Math.max(1, sD - st));
    }
    boothX += bw;
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
  if (doors.length && !p.rebate) {
    if (doors[0].zoneStart > ox + 0.5) ctx.strokeRect(ox, oy+sD-st, doors[0].zoneStart - ox, st);
    for (let i = 0; i < doors.length - 1; i++) {
      const start = doors[i].zoneEnd;
      const end = doors[i + 1].zoneStart;
      if (end > start + 0.5) ctx.strokeRect(start, oy+sD-st, end - start, st);
    }
    if (ox + sW > doors[doors.length - 1].zoneEnd + 0.5) ctx.strokeRect(doors[doors.length - 1].zoneEnd, oy+sD-st, ox + sW - doors[doors.length - 1].zoneEnd, st);
  }
  if (!c.hasRight) {
    ctx.strokeStyle='#222'; ctx.lineWidth=0.8;
    ctx.strokeRect(ox + sW - st, oy, st, Math.max(1, sD - st));
  }
  doors.forEach(door => {
    drawDoorSwing(door, oy+sD, st, p);
  });
  const boardModel = buildBoardModel(p, c, doors, ox, sW, scale);
  drawPlanRebateDetails(p, ox, oy, sW, sD, st, scale, boardModel);

  const edge = c.edge;
  const middle = c.middle;
  if (options.showTopDims !== false) {
    const totalY = oy - swt - (options.totalDimGap ?? 12);
    drawDim(ox, totalY, ox+sW, totalY, `${c.adjustedLength ? '展开总长' : '总长'} ${fmtMm(W)}mm`, 10);
  }
  drawPlanWarnings(c, ox + sW + swt + 18, oy - swt + 4);
  if (options.showBoothDim !== false) {
    const boothY = oy + Math.max(26, sD * 0.18);
    let boothDimX = ox;
    for (let i = 0; i < p.count; i++) {
      const boothMm = c.boothWidths[i] || c.boothW;
      const boothPx = boothMm * scale;
      drawDim(boothDimX, boothY, boothDimX + boothPx, boothY, `${fmtMm(boothMm)}mm`, -10);
      boothDimX += boothPx;
    }
  }
  const depthX = ox + sW + swt + (options.depthDimGap ?? 18);
  drawDim(depthX, oy, depthX, oy+sD, `深 ${p.depth}mm`, 14);

  const segments = [];
  boardModel.panels.forEach(panel => {
    const cutSides = (panel.leftRebate ? 1 : 0) + (panel.rightRebate ? 1 : 0);
    const label = panel.mixed
      ? {top: fmtMm(Math.max(0, Math.round(panel.bigMm - (p.rebateDepth || 0)))), bottom: fmtMm(panel.bigMm)}
      : boardDimLabel(panel.bigMm, p, cutSides, panel.leftTopIsSmall);
    segments.push({x1: panel.bigX1, x2: panel.bigX2, label});
  });
  boardModel.doors.forEach(door => {
    const sourceDoor = doors[door.index];
    segments.push({x1: sourceDoor.zoneStart, x2: sourceDoor.zoneEnd, label: boardDimLabel(door.bigMm, p, 2, door.topIsSmall)});
  });
  segments.sort((a, b) => a.x1 - b.x1);
  drawChainDim(oy + sD + (options.bottomDimOffset || (p.rebate ? 52 : 42)), segments);
}

function drawPlan(p) {
  const P = getSheetLayout(p).plot;
  const rows = drawableGroupRows();
  if (!rows.length && activeRow()?.enabled !== true) return;
  if (rows.length > 1) {
    const maxRun = rows.reduce((max, item) => Math.max(max, compute(item.row).totalRun), 0);
    const maxDepth = rows.reduce((max, item) => Math.max(max, item.row.depth), 0);
    const rowGap = 150;
    const rowTopDim = 42;
    const availableH = P.h - 70 - rowGap * (rows.length - 1) - rowTopDim * rows.length;
    const scale = Math.max(0.03, Math.min((P.w - 190) / maxRun, availableH / rows.reduce((sum, item) => sum + item.row.depth, 0)));
    let y = P.y + 86;
    let labelStart = 0;
    rows.forEach(item => {
      const g = item.row;
      const c = compute(g);
      const x = P.x + (P.w - c.totalRun * scale) / 2;
      const rowY = y + rowTopDim;
      const rowLabelX = Math.max(P.x + 18, x - 104);
      drawPlanRow(g, x, rowY, scale, item.group.name.replace('组', ''), `${item.group.name}-${item.index + 1}排`, {showTopDims:true, showBoothDim:true, totalDimGap:12, depthDimGap:18, bottomDimOffset:52, groupColor: groupColor(groups.indexOf(item.group)), labelX:rowLabelX, labelY:rowY - 22, labelStart, groupId:item.group.id, rowId:g.id});
      y += rowTopDim + g.depth * scale + rowGap;
      labelStart += Math.max(1, Number(g.count) || 1);
    });
    return;
  }
  const c = compute(p);
  const W = c.totalRun, D = p.depth;
  const wt = c.wallT;
  const leftWall = c.hasLeft ? wt : 0;
  const rightWall = c.hasRight ? wt : 0;
  const backWall = c.hasBack ? wt : 0;
  const scale = Math.min((P.w - 160) / (W + leftWall + rightWall), (P.h - 185) / (D + backWall));
  const ox = P.x + (P.w - (W + leftWall + rightWall) * scale) / 2 + leftWall * scale;
  const oy = P.y + 118 + backWall * scale;
  drawPlanRow(p, ox, oy, scale, activeGroup().name.replace('组', ''), '', {labelX:Math.max(P.x + 18, ox - 104), labelY:oy - 22, groupId:activeGroupId, rowId:activeRowId});
}

function drawFront(p) {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = c.totalRun;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 170) / (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)), (P.h - 180) / H);
  const ox = P.x + (P.w - (W + (c.hasLeft?wt:0) + (c.hasRight?wt:0)) * scale) / 2 + (c.hasLeft?wt:0) * scale;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hDp = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;

  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  if (c.hasLeft) { drawHatch(ox-swt, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox-swt, oy, swt, sH); }
  if (c.hasRight) { drawHatch(ox+sW, oy, swt, sH, 18); ctx.strokeStyle='#666'; ctx.strokeRect(ox+sW, oy, swt, sH); }

  let x = ox;
  for (let i=0; i<=p.count; i++) {
    const isEdge = (i===0 && !c.hasLeft)||(i===p.count && !c.hasRight);
    if (isEdge || (i>0 && i<p.count)) {
      ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(x, floor-hU, st, hU);
      x += st;
    }
    if (i < p.count) {
      const bw = c.boothW * scale;
      const doorOff = (c.boothW - p.doorW) / 2 * scale;
      const dsx = x + doorOff, dsw = p.doorW * scale;
      ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(dsx, floor-hDp, dsw, hDp);
      ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(x, floor-hM, bw, vis);
      ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${p.hDoor || 1750}`, dsx+dsw/2, floor-hDp/2);
      x += bw;
    }
  }
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  drawDim(ox, oy-58, ox+sW, oy-58, `${c.adjustedLength ? '展开总长' : '总长'} ${W}mm`, 14);
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14);
  drawDim(ox+sW+58, floor-vis, ox+sW+58, floor, `见光板 ${p.hVis}mm`, 14);
}

function drawStandardFrontModule(p, c) {
  const W = c.boothW;
  const H = Math.max(p.hUpright, p.hMid);
  const scale = Math.min((PLOT.w - 360) / W, (PLOT.h - 180) / H);
  const ox = PLOT.x + 120;
  const floor = PLOT.y + 118 + (PLOT.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale;
  const hDoor = (p.hDoor || 1750) * scale;
  const hMid = p.hMid * scale;
  const vis = p.hVis * scale;
  const doorW = p.doorW * scale;
  const dx = ox + (sW - doorW) / 2;

  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);
  ctx.strokeStyle='#185FA5'; ctx.strokeRect(dx, floor-hDoor, doorW, hDoor);
  ctx.strokeStyle='#6a9bcc'; ctx.strokeRect(ox, floor-hMid, sW, vis);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  drawDim(ox, oy-58, ox+sW, oy-58, `标准间宽 ${fmtMm(c.boothW)}mm`, 14);
  drawDim(ox+sW+58, floor-hDoor, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14);

  drawProjectStats(ox+sW+115, oy+20, p, c, Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35))), Math.ceil(p.count / Math.min(12, Math.ceil(Math.sqrt(p.count * 1.35)))));
}

function drawSide(p) {
  const c = compute(p);
  const P = getSheetLayout(p).plot;
  const W = p.depth;
  const H = Math.max(p.hUpright, p.hMid);
  const t = p.tPanel, wt = c.wallT;
  const scale = Math.min((P.w - 300) / (W + wt), (P.h - 180) / H);
  const ox = P.x + (P.w - W * scale) / 2;
  const floor = P.y + 118 + (P.h - 180 + H * scale) / 2;
  const oy = floor - H * scale;
  const sW = W * scale, sH = H * scale, st = Math.max(1.5, t * scale), swt = wt * scale;
  const hU = p.hUpright * scale, hD = (p.hDoor || 1750) * scale, hM = p.hMid * scale, vis = p.hVis * scale;
  const doorH = p.doorW * scale;

  if (c.hasBack) {
    drawHatch(ox, oy-swt, sW, swt, 18);
    ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(ox, oy-swt, sW, swt);
  }

  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox, floor-hU, st, hU);
  ctx.strokeStyle='#6a9bcc'; ctx.lineWidth=0.6; ctx.strokeRect(ox+st, floor-hM, sW-st*2, vis);
  ctx.fillStyle='#185FA5'; ctx.font=`14px 'Microsoft YaHei', Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('见光板', ox+st+(sW-st*2)/2, floor-hM+vis/2);

  const doorStartY = floor - doorH;
  ctx.strokeStyle='#185FA5'; ctx.lineWidth=1; ctx.strokeRect(ox+sW-st, doorStartY, st, doorH);
  ctx.fillStyle='#185FA5'; ctx.fillText('门', ox+sW-st/2, doorStartY+doorH/2);
  ctx.strokeStyle='#222'; ctx.lineWidth=0.8; ctx.strokeRect(ox+sW-st, floor-hU, st, hU-doorH);
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(ox, floor); ctx.lineTo(ox+sW, floor); ctx.stroke();
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(ox, oy, sW, sH);

  drawDim(ox, oy-58, ox+sW, oy-58, `深度 ${p.depth}mm`, 14);
  drawDim(ox-56, floor-hU, ox-56, floor, `立板高 ${p.hUpright}mm`, -14);
  drawDim(ox+sW+58, floor-hD, ox+sW+58, floor, `门高 ${p.hDoor||1750}mm`, 14);
}

function renderBOM(p) {
  const rows = drawableGroupRows();
  if (!rows.length && activeRow()?.enabled !== true) {
    document.getElementById('bom').innerHTML = `
      <div class="bom-card">
        <div class="name">当前图纸</div>
        <div class="val">空白</div>
        <div class="sub">输入参数或点击生成后显示</div>
      </div>`;
    return;
  }
  if (rows.length > 1) {
    const totalCount = rows.reduce((sum, item) => sum + item.row.count, 0);
    const totalRun = rows.reduce((sum, item) => sum + compute(item.row).totalRun, 0);
    const active = activeGroup();
    const row = activeRow();
    const items = [
      {name:'当前组', val:active.name, sub:`共 ${rows.length} 排`},
      {name:'总间数', val:`${totalCount} 间`, sub:'当前组合计'},
      {name:'门板', val:`${totalCount} 块`, sub:'按每间 1 块估算'},
      {name:'中隔板（顶板）', val:`${totalCount} 块`, sub:'按每间 1 块估算'},
      {name:'估算总长度', val:`${Math.round(totalRun/1000*10)/10} m`, sub:'当前组合计'},
      {name:'当前排净间宽', val:`${fmtMm(compute(row).boothW)} mm`, sub:`${active.name} · ${row.count} 间`},
    ];
    document.getElementById('bom').innerHTML = items.map(i=>`
      <div class="bom-card">
        <div class="name">${i.name}</div>
        <div class="val">${i.val}</div>
        <div class="sub">${i.sub}</div>
      </div>`).join('');
    return;
  }
  const c = compute(p);
  const uniqueDoorWidths = [...new Set(c.doorWidths.map(w => fmtMm(w)))];
  const doorWidthText = uniqueDoorWidths.length === 1 ? rebateText(c.doorWidths[0], p, 'double') : uniqueDoorWidths.map(w => rebateText(Number(w), p, 'double')).join(' / ');
  const edgeWidths = [c.sidePairs[0]?.[0] || 0, c.sidePairs[p.count - 1]?.[1] || 0];
  const uprightWidths = c.sidePairs.slice(0, -1).map((pair, i) => pair[1] + c.sidePairs[i + 1][0]);
  const edgeWidthText = uniqueRebateTexts(edgeWidths, p, 'single');
  const uprightWidthText = uprightWidths.length ? uniqueRebateTexts(uprightWidths, p, 'double') : '无';
  const hasSmallDoor = c.insufficientDoors.some(Boolean);
  const hasSmallEdge = c.insufficientEdges.some(Boolean);
  const hasSmallMiddle = c.insufficientMiddles.some(Boolean);
  const guardText = [hasSmallDoor ? `门小于${c.minDoorW}` : '', hasSmallEdge ? `边板小于${c.minEdgePanel}` : '', hasSmallMiddle ? `立板小于${c.minMiddlePanel}` : ''].filter(Boolean).join(' · ');
  const swingCounts = normalizeBoothSwings(p.boothSwings, p.count, p.swing).reduce((acc, key) => {
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
  const swingSummary = Object.entries(swingCounts).map(([key, count]) => `${swingLabel(key)}${count}块`).join(' / ');
  const items = [
    {name:'图纸模式', val:c.projectMode ? '项目总览' : c.segmentedMode ? '分段详图' : '详细施工图', sub:c.projectMode ? '按标准单间统计' : c.segmentedMode ? `每段最多 ${c.segmentSize} 间` : '逐间绘制'},
    {name:'边板', val:'2 块', sub:p.rebate ? `${p.tPanel}×宽${edgeWidthText}×高${p.hUpright}mm · 单启口` : `${p.tPanel}×宽${edgeWidths.map(fmtMm).join('/')}×高${p.hUpright}mm`},
    {name:'立板', val:`${Math.max(0, p.count - 1)} 块`, sub:p.rebate ? `${p.tPanel}×宽${uprightWidthText}×高${p.hUpright}mm · 双启口` : `${p.tPanel}×宽${uprightWidths.length ? uprightWidths.map(fmtMm).join('/') : '无'}×高${p.hUpright}mm`},
    {name:'门板', val:`${p.count} 块`, sub:`${p.tPanel}×宽${doorWidthText}×高${p.hDoor||1750}mm · ${swingSummary}${p.rebate ? ' · 双启口' : ''}${guardText ? ` · ${guardText}需调整` : ''}${p.doorGap ? ` · 门缝${p.doorGap}mm` : ''}`},
    {name:'中隔板（顶板）', val:`${p.count} 块`, sub:`${p.tPanel}×深${c.boothD}×高${p.hMid}mm`},
    {name:'见光板', val:`按未靠墙侧`, sub:`${p.tPanel}×深${c.boothD}×高${p.hVis}mm`},
    {name:'净间宽', val:`${fmtMm(c.boothW)} mm`, sub:`共 ${p.count} 间`},
    {name:'估算总长度', val:`${Math.round((c.totalRun || p.total)/1000*10)/10} m`, sub:`板厚 ${p.tPanel}mm`},
  ];
  document.getElementById('bom').innerHTML = items.map(i=>`
    <div class="bom-card">
      <div class="name">${i.name}</div>
      <div class="val">${i.val}</div>
      <div class="sub">${i.sub}</div>
    </div>`).join('');
}

function exportImg(name) {
  const link = document.createElement('a');
  link.download = `隔断${name||currentTab}.png`;
  link.href = cv.toDataURL('image/png');
  link.click();
}

function exportAll() {
  ['plan','front','side'].forEach((tab,i)=>{
    setTimeout(()=>{
      drawView(lastParams||getParams(), tab);
      exportImg(['平面图','正立面图','侧立面图'][i]);
    }, i*300);
  });
}

function updateZoomInfo() {
  document.getElementById('zoom-info').textContent = Math.round(zoomScale*100)+'%';
}

function resetZoom() {
  if(lastParams) {
    autoFit(lastParams);
    drawView(lastParams, currentTab);
  }
}

cv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldScale = zoomScale;
  zoomScale *= Math.exp(-e.deltaY * 0.001);
  zoomScale = Math.max(0.1, Math.min(zoomScale, 5));
  panX = mx - (mx - panX) * (zoomScale / oldScale);
  panY = my - (my - panY) * (zoomScale / oldScale);
  if(lastParams) drawView(lastParams, currentTab);
}, {passive:false});

cv.addEventListener('mousedown', e => {
  if(e.button !== 1) return;
  e.preventDefault();
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartPanX = panX;
  dragStartPanY = panY;
  cv.style.cursor = 'move';
});

cv.addEventListener('click', e => {
  if (currentTab !== 'plan' || isDragging) return;
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left - panX) / zoomScale;
  const y = (e.clientY - rect.top - panY) / zoomScale;
  const hit = [...planHitAreas].reverse().find(area => x >= area.x && x <= area.x + area.w && y >= area.y && y <= area.y + area.h);
  if (!hit) return;
  const group = groups.find(g => g.id === hit.groupId);
  const row = group ? ensureRows(group).find(r => r.id === hit.rowId) : null;
  if (!group || !row) return;
  saveActiveGroup();
  activeGroupId = group.id;
  activeRowId = row.id;
  selectionScope = 'booth';
  setSelectedBooth(group.id, row.id, hit.index);
  openGroupIds.add(group.id);
  loadGroupToForm(group, row);
  renderGroups(false);
  revealActiveGroupInList();
  renderSwingButtons();
  renderBoothSwingPanel();
  lastParams = getParams();
  drawView(lastParams, currentTab);
});

window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  panX = dragStartPanX + (e.clientX - dragStartX);
  panY = dragStartPanY + (e.clientY - dragStartY);
  if(lastParams) drawView(lastParams, currentTab);
});

window.addEventListener('mouseup', e => {
  if(e.button !== 1) return;
  isDragging = false;
  cv.style.cursor = 'default';
});

cv.addEventListener('mouseleave', () => {
  isDragging = false;
  cv.style.cursor = 'default';
});

cv.addEventListener('contextmenu', e => e.preventDefault());

const ro = new ResizeObserver(()=>{ resizeCanvas(); if(lastParams) drawView(lastParams, currentTab); });
ro.observe(document.getElementById('carea'));

document.getElementById('h-upright').addEventListener('change', function() {
  document.getElementById('h-vis').value = this.value;
  refreshDrawing(false);
});

document.getElementById('p-count').addEventListener('input', () => {
  syncTotalByCount();
  syncBoothSwingsByCount();
  renderBoothSwingPanel();
  refreshDrawing(false);
});

document.getElementById('p-count').addEventListener('change', () => {
  syncTotalByCount();
  syncBoothSwingsByCount();
  renderBoothSwingPanel();
  refreshDrawing(false);
});

document.getElementById('p-count').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  syncTotalByCount();
  syncBoothSwingsByCount();
  renderBoothSwingPanel();
  refreshDrawing(false);
});

document.getElementById('p-widths').addEventListener('input', () => {
  // Editing is staged; press Enter or leave the field to apply the widths.
});

document.getElementById('p-widths').addEventListener('change', () => {
  syncCustomWidths();
  refreshDrawing(false);
});

document.getElementById('p-widths').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  syncCustomWidths();
  refreshDrawing(false);
});

document.getElementById('p-gap').addEventListener('input', () => {
  refreshDrawing(false);
});

document.getElementById('p-gap').addEventListener('change', () => {
  const el = document.getElementById('p-gap');
  if (el.value === '' || Number(el.value) < 4) el.value = 4;
  refreshDrawing(false);
});

document.getElementById('p-gap').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const el = e.currentTarget;
  if (el.value === '' || Number(el.value) < 4) el.value = 4;
  refreshDrawing(false);
});

document.getElementById('p-rebate').addEventListener('change', () => {
  refreshDrawing(false);
});

document.querySelectorAll('.field input[type=number], .field select').forEach(el => {
  if (el.id === 'p-count' || el.id === 'p-widths' || el.id === 'p-gap') return;
  el.addEventListener('change', () => refreshDrawing(false));
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') refreshDrawing(false);
  });
});

setTimeout(()=>{ applyViewMode(); renderSwingButtons(); renderBoothSwingPanel(); updateLayoutTargetLabel(); renderGroups(); generate(); }, 100);
</script>
